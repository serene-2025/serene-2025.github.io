<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | ระบบค่าส่วนกลาง โกลเด้นแลนด์ ซีรีน</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <!-- Import Map for React & Icons -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.300.0"
      }
    }
    </script>

    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Table Styles for Data Grid */
        .admin-table th {
            position: sticky;
            top: 0;
            background-color: #f1f5f9;
            z-index: 10;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .admin-table td, .admin-table th {
            white-space: nowrap;
        }
        
        .status-cell {
            font-size: 10px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 9999px;
            text-align: center;
        }
        .status-paid { background-color: #dcfce7; color: #166534; }
        .status-unpaid { background-color: #fee2e2; color: #991b1b; }
        .status-pending-verification { background-color: #fef08a; color: #854d0e; cursor: pointer; border: 1px solid #facc15; box-shadow: 0 1px 2px rgba(0,0,0,0.05); } 
        .status-waiting-info { background-color: #ffedd5; color: #9a3412; } 
        .status-advance { background-color: #dbeafe; color: #1e40af; }
        .status-empty { background-color: #f1f5f9; color: #64748b; }

        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.5s ease-out forwards; }
        
        .bar-grow {
            animation: growUp 1s ease-out forwards;
            transform-origin: bottom;
        }
        @keyframes growUp {
            from { transform: scaleY(0); }
            to { transform: scaleY(1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Lock, LayoutDashboard, Users, FileText, Download, Search, 
            RefreshCw, Filter, Bell, LogOut, CheckCircle, XCircle, AlertTriangle, 
            Coins, Building, Database, Receipt, ShieldAlert, Mail, HelpCircle, Loader2,
            X, ExternalLink, Clock, Image as ImageIcon, Calendar, Home, AlertCircle, ArrowRightLeft, Settings,
            PieChart, TrendingUp, MapPin, FilePlus, Globe, Info, Save, 
            ListIcon
        } from 'lucide-react';

        // --- Configuration ---
        const SUPABASE_URL = 'https://kiumelolsilduqnvrekf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpdW1lbG9sc2lsZHVxbnZyZWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwODUyNzYsImV4cCI6MjA3MjY2MTI3Nn0.3hCFJiDrkgNJQEggS8MkRnxlhvqIMAax_a73NJq14gU';
        const ADMIN_PIN = '9999'; 

        // --- GAS API Configuration ---
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxhRu8OqqvWyb5q7_kH4KZ3VEUZPGXJXTp2hr4kFawmgX95gBCtXS34_bbAC4mczvV8/exec';
        
        const callGasApi = async (action, data = {}) => {
            const payload = { action, ...data };
            const response = await fetch(GAS_API_URL, {
                method: "POST",
                mode: "cors",
                body: JSON.stringify(payload),
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                redirect: "follow"
            });
            const text = await response.text();
            try { return JSON.parse(text); } 
            catch (e) { throw new Error('เซิร์ฟเวอร์ GAS ตอบกลับข้อมูลที่ไม่ใช่รูปแบบ JSON'); }
        };

        // --- Main Admin App ---
        const AdminApp = () => {
            const monthMap = { 'มกราคม': 'jan', 'กุมภาพันธ์': 'feb', 'มีนาคม': 'mar', 'เมษายน': 'apr', 'พฤษภาคม': 'may', 'มิถุนายน': 'jun', 'กรกฎาคม': 'jul', 'สิงหาคม': 'aug', 'กันยายน': 'sep', 'ตุลาคม': 'oct', 'พฤศจิกายน': 'nov', 'ธันวาคม': 'dec' };
            const months = [ 
                { key: 'jan', label: 'ม.ค.' }, { key: 'feb', label: 'ก.พ.' }, { key: 'mar', label: 'มี.ค.' }, 
                { key: 'apr', label: 'เม.ย.' }, { key: 'may', label: 'พ.ค.' }, { key: 'jun', label: 'มิ.ย.' }, 
                { key: 'jul', label: 'ก.ค.' }, { key: 'aug', label: 'ส.ค.' }, { key: 'sep', label: 'ก.ย.' }, 
                { key: 'oct', label: 'ต.ค.' }, { key: 'nov', label: 'พ.ย.' }, { key: 'dec', label: 'ธ.ค.' } 
            ];

            const getStatusClass = (status) => {
                if (!status || status.includes('ไม่เก็บ')) return 'status-empty';
                if (status.includes('จ่ายแล้ว') || status.includes('ชำระแล้ว')) return 'status-paid';
                if (status.includes('ยังไม่จ่าย') || status.includes('ค้าง')) return 'status-unpaid';
                if (status.includes('รอตรวจสอบ')) return 'status-pending-verification';
                if (status.includes('รอข้อมูล')) return 'status-waiting-info';
                if (status.includes('ล่วงหน้า')) return 'status-advance';
                return 'status-empty';
            };

            const calculateHouseTotal = (house) => {
                let paid = 0, unpaid = 0, waiting = 0;
                months.forEach(m => {
                    const s = house[m.key] || '';
                    if (s.includes('จ่ายแล้ว') || s.includes('ชำระแล้ว') || s.includes('ล่วงหน้า')) paid += 300;
                    else if (s.includes('ยังไม่จ่าย') || s.includes('ค้าง')) unpaid += 300;
                    else if (s.includes('รอตรวจสอบ') || s.includes('รอข้อมูล')) waiting += 300;
                });
                return { paid, unpaid, waiting };
            };

            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [pin, setPin] = useState('');
            const [pinError, setPinError] = useState('');

            const [supabase, setSupabase] = useState(null);
            const [data, setData] = useState([]); // Supabase House Payments
            const [pendingFees, setPendingFees] = useState([]);
            const [allTransactions, setAllTransactions] = useState([]); // GAS Transactions
            const [loading, setLoading] = useState(true);
            const [isGlobalSyncing, setIsGlobalSyncing] = useState(false);

            // View & Filters
            const [currentView, setCurrentView] = useState('grid');
            const [yearFilter, setYearFilter] = useState('all'); 
            const [searchQuery, setSearchQuery] = useState('');
            const [filterStatus, setFilterStatus] = useState('all'); 

            // Settings State
            const [appConfig, setAppConfig] = useState({ useManual: false, manualYears: [] });
            const [localConfig, setLocalConfig] = useState({ useManual: false, manualYears: [] });
            const [updateTargetYear, setUpdateTargetYear] = useState('');
            const [updateTargetMonth, setUpdateTargetMonth] = useState('');
            const [newYearTarget, setNewYearTarget] = useState('');
            const [isSaving, setIsSaving] = useState(false);

            // Modal State
            const [imageModalOpen, setImageModalOpen] = useState(false);
            const [selectedImageUrl, setSelectedImageUrl] = useState(null);
            const [resultModal, setResultModal] = useState({ isOpen: false, type: 'success', message: '', isLoading: false });

            useEffect(() => {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
                script.async = true;
                script.onload = () => { 
                    if (window.supabase) setSupabase(window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));
                };
                document.body.appendChild(script);
                
                if (localStorage.getItem('admin_auth') === 'true') setIsAuthenticated(true);
                
                const currentYear = new Date().getFullYear() + 543;
                setUpdateTargetYear(currentYear.toString());
                const currentMonthIdx = new Date().getMonth();
                setUpdateTargetMonth(months[currentMonthIdx].key);
                setNewYearTarget((currentYear + 1).toString());

                return () => { if (document.body.contains(script)) document.body.removeChild(script); };
            }, []);

            const fetchConfig = async () => {
                try {
                    const { data, error } = await supabase.from('app_settings').select('config').eq('id', 1).single();
                    if (data && data.config) { setAppConfig(data.config); setLocalConfig(data.config); }
                } catch (err) { console.error('Error fetching config from DB.', err); }
            };

            const fetchData = async () => {
                if (!supabase) return;
                setLoading(true);
                try {
                    // ปรับปรุงใหม่: ดึงข้อมูลจาก Supabase และ GAS พร้อมกัน (Parallel Fetching) เพื่อให้โหลดเร็วขึ้น
                    const [supabaseResult, gasDataArray] = await Promise.all([
                        // 1. ดึงข้อมูล House Payments (จาก Supabase)
                        (async () => {
                            let allHouseData = [];
                            let page = 0; const pageSize = 1000; let hasMore = true;
                            while (hasMore) {
                                const { data: houseData, error: houseError } = await supabase
                                    .from('house_payments').select('*').order('house_numbe', { ascending: true }).order('year', { ascending: false }).range(page * pageSize, (page + 1) * pageSize - 1);
                                if (houseError) throw houseError;
                                if (houseData && houseData.length > 0) {
                                    allHouseData = [...allHouseData, ...houseData];
                                    if (houseData.length < pageSize) hasMore = false;
                                } else { hasMore = false; }
                                page++;
                            }
                            return allHouseData;
                        })(),
                        
                        // 2. ดึงข้อมูล Common Fees Transactions (จาก GAS API) เพื่อนำมาประมวลผลการ Sync และหน้ารอตรวจสอบ
                        callGasApi('getData', { admin: 'Admin' }).catch(err => {
                            console.error("GAS Fetch Error:", err);
                            return null;
                        })
                    ]);

                    // นำข้อมูล Supabase มาใส่ State
                    setData(supabaseResult);

                    // นำข้อมูล GAS มาใส่ State (แม้ไม่ได้แสดงตารางนี้แล้ว แต่ยังต้องใช้นับจำนวนที่รอตรวจ และอ้างอิงรูปสลิป)
                    if (gasDataArray) {
                        const mappedFees = gasDataArray.map(row => ({
                            id: row[0],
                            name: row[3],
                            house_number: row[4],
                            month: row[5],
                            year: row[6],
                            payment_method: row[7],
                            remark: row[8],
                            amount: parseFloat(row[10] || 0),
                            image_url: row[11],
                            inspector: row[12],
                            status: row[13],
                            reported_at: row[14] || new Date().toISOString(),
                            pdf_url: row[15],
                            oldfile: row[11] 
                        }));
                        
                        mappedFees.sort((a,b) => parseInt(b.id) - parseInt(a.id)); 
                        setAllTransactions(mappedFees);
                        setPendingFees(mappedFees.filter(f => f.status === 'รอตรวจสอบ' || f.status === 'กำลังดำเนินการ'));
                    }
                } catch (err) {
                    console.error("Error fetching admin data:", err);
                    alert("เกิดข้อผิดพลาดในการดึงข้อมูล");
                } finally {
                    setLoading(false);
                }
            };

            // Global Auto Sync Logic (GAS -> Supabase)
            const handleGlobalSync = async (silent = false) => {
                if (!supabase) return;
                if (!silent) setIsGlobalSyncing(true);
                try {
                    let allHouseData = [...data];
                    if(allHouseData.length === 0) return;

                    const fees = allTransactions;
                    let updatedCount = 0;
                    const feesMap = {};
                    
                    fees.forEach(fee => {
                        const key = `${fee.house_number}-${fee.year}`;
                        if (!feesMap[key]) feesMap[key] = [];
                        feesMap[key].push(fee);
                    });

                    for (const house of allHouseData) {
                        const key = `${house.house_numbe}-${house.year}`;
                        const houseFees = feesMap[key];
                        
                        if (houseFees && houseFees.length > 0) {
                            houseFees.sort((a, b) => new Date(a.reported_at) - new Date(b.reported_at));
                            let updates = {}; let hasChange = false;

                            houseFees.forEach(fee => {
                                const monthCol = monthMap[fee.month];
                                if (monthCol) {
                                    const currentStatus = house[monthCol];
                                    const isPending = (fee.status.includes('รอ') || fee.status.includes('ตรวจสอบ') || fee.status.includes('กำลังดำเนินการ')) && !fee.status.includes('แล้ว');
                                    const isPaid = fee.status.includes('ตรวจสอบแล้ว') || fee.status.includes('อนุมัติ') || fee.status.includes('ถูกต้อง');

                                    if (isPending && currentStatus !== 'รอตรวจสอบ') { 
                                        updates[monthCol] = 'รอตรวจสอบ'; hasChange = true; 
                                    } else if (isPaid && currentStatus !== 'จ่ายแล้ว') { 
                                        updates[monthCol] = 'จ่ายแล้ว'; hasChange = true; 
                                    }
                                }
                            });

                            if (hasChange) {
                                await supabase.from('house_payments').update(updates).eq('house_numbe', house.house_numbe).eq('year', house.year);
                                updatedCount++;
                            }
                        }
                    }
                    
                    if (!silent) setResultModal({ isOpen: true, type: 'success', message: `ซิงค์ข้อมูลเรียบร้อยแล้ว อัปเดตสถานะให้ตรงกับสลิปจำนวน ${updatedCount} รายการ` });
                    if(updatedCount > 0) await fetchData();

                } catch (err) {
                    console.error("Global Sync Error:", err);
                    if (!silent) setResultModal({ isOpen: true, type: 'error', message: 'เกิดข้อผิดพลาดในการซิงค์ข้อมูล: ' + err.message });
                } finally {
                    if (!silent) setIsGlobalSyncing(false);
                }
            };

            // Existing Logics...
            const saveConfig = async () => {
                if (!supabase) return;
                setIsSaving(true);
                try {
                    const { error } = await supabase.from('app_settings').upsert({ id: 1, config: localConfig });
                    if (error) throw error;
                    setAppConfig(localConfig);
                    setResultModal({ isOpen: true, type: 'success', message: 'บันทึกการตั้งค่าการแสดงผลหน้าบ้านสำเร็จ' });
                } catch (err) {
                    setResultModal({ isOpen: true, type: 'error', message: 'บันทึกการตั้งค่าไม่สำเร็จ: ' + err.message });
                } finally { setIsSaving(false); }
            };

            const toggleYear = (yearStr) => {
                const y = parseInt(yearStr);
                const newManualYears = localConfig.manualYears?.includes(y) ? localConfig.manualYears.filter(item => item !== y) : [...(localConfig.manualYears || []), y];
                setLocalConfig({ ...localConfig, manualYears: newManualYears });
            };

            const handleAdminUpdateStatus = async () => {
                if (!supabase || !updateTargetYear || !updateTargetMonth) return;
                setIsSaving(true); 
                try {
                    let rowsToUpdate = []; let page = 0; const pageSize = 1000; let hasMore = true;
                    while (hasMore) {
                        const { data: pageData, error: fetchError } = await supabase.from('house_payments').select('*').eq('year', updateTargetYear).range(page * pageSize, (page + 1) * pageSize - 1);
                        if (fetchError) throw fetchError;
                        if (pageData && pageData.length > 0) { rowsToUpdate = [...rowsToUpdate, ...pageData]; if (pageData.length < pageSize) hasMore = false; } else { hasMore = false; }
                        page++;
                    }
                    let updatedCount = 0;
                    for (const row of rowsToUpdate) {
                        const currentStatus = row[updateTargetMonth];
                        const statusToCheck = currentStatus ? String(currentStatus).trim() : '';
                        if (!statusToCheck || statusToCheck === 'รอข้อมูล' || statusToCheck === '-') {
                            const { error: updateError } = await supabase.from('house_payments').update({ [updateTargetMonth]: 'ยังไม่จ่าย' }).eq('house_numbe', row.house_numbe).eq('year', updateTargetYear);
                            if (!updateError) updatedCount++;
                        }
                    }
                    setResultModal({ isOpen: true, type: 'success', message: `อัปเดตสถานะเรียบร้อยแล้ว จำนวน ${updatedCount} รายการ` });
                    fetchData();
                } catch (err) { setResultModal({ isOpen: true, type: 'error', message: 'เกิดข้อผิดพลาด: ' + err.message }); } finally { setIsSaving(false); }
            };

            const handleGenerateNewYearData = async () => {
                if (!supabase || !newYearTarget) return;
                setIsSaving(true);
                try {
                    const { count, error: checkError } = await supabase.from('house_payments').select('*', { count: 'exact', head: true }).eq('year', newYearTarget);
                    if (checkError) throw checkError;
                    if (count > 0) { if(!confirm(`ปี ${newYearTarget} มีข้อมูลอยู่แล้ว ${count} รายการ ต้องการสร้างทับซ้อนหรือไม่?`)) { setIsSaving(false); return; } }

                    const maxYear = Math.max(...availableYears.map(Number)).toString();
                    let baseHouses = []; let page = 0; const pageSize = 1000; let hasMore = true;
                    while (hasMore) {
                        const { data: pageData, error: fetchError } = await supabase.from('house_payments').select('house_numbe, owner_name, soi').eq('year', maxYear).range(page * pageSize, (page + 1) * pageSize - 1);
                        if (fetchError) throw fetchError;
                        if (pageData && pageData.length > 0) { baseHouses = [...baseHouses, ...pageData]; if (pageData.length < pageSize) hasMore = false; } else { hasMore = false; }
                        page++;
                    }

                    const uniqueHouses = []; const houseSet = new Set();
                    for (const h of baseHouses) { if (!houseSet.has(h.house_numbe)) { houseSet.add(h.house_numbe); uniqueHouses.push(h); } }

                    const baseYear = 2566; const yearPrefix = parseInt(newYearTarget) > baseYear ? parseInt(newYearTarget) - baseYear : 1;
                    const newRecords = uniqueHouses.map((h, index) => {
                        return {
                            house_numbe: h.house_numbe, owner_name: h.owner_name, soi: h.soi, year: newYearTarget, sequence_no: `INV${yearPrefix}${String(index + 1).padStart(3, '0')}`,
                            jan: 'รอข้อมูล', feb: 'รอข้อมูล', mar: 'รอข้อมูล', apr: 'รอข้อมูล', may: 'รอข้อมูล', jun: 'รอข้อมูล', jul: 'รอข้อมูล', aug: 'รอข้อมูล', sep: 'รอข้อมูล', oct: 'รอข้อมูล', nov: 'รอข้อมูล', dec: 'รอข้อมูล', status: 'รอข้อมูล'
                        };
                    });
                    const { error: insertError } = await supabase.from('house_payments').insert(newRecords);
                    if (insertError) throw insertError;
                    setResultModal({ isOpen: true, type: 'success', message: `สร้างข้อมูลปี ${newYearTarget} สำเร็จ จำนวน ${newRecords.length} หลัง` });
                    await fetchData();
                } catch (err) { setResultModal({ isOpen: true, type: 'error', message: 'เกิดข้อผิดพลาด: ' + err.message }); } finally { setIsSaving(false); }
            };

            useEffect(() => {
                if (isAuthenticated && supabase) {
                    const initData = async () => { setLoading(true); await fetchConfig(); await fetchData(); };
                    initData();
                }
            }, [isAuthenticated, supabase]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (pin === ADMIN_PIN) { setIsAuthenticated(true); localStorage.setItem('admin_auth', 'true'); localStorage.setItem('adminName', 'Admin'); setPinError(''); } else { setPinError('รหัส PIN ไม่ถูกต้อง'); }
            };
            const handleLogout = () => { setIsAuthenticated(false); localStorage.removeItem('admin_auth'); setPin(''); };

            const availableYears = useMemo(() => [...new Set(data.map(d => d.year))].sort((a,b) => b-a), [data]);

            const handleViewSlipFromGrid = (houseNumber, year, monthKey) => {
                const thaiMonth = Object.keys(monthMap).find(key => monthMap[key] === monthKey);
                if (!thaiMonth) return alert('เกิดข้อผิดพลาด: ไม่พบข้อมูลเดือนที่ตรงกัน');

                // Search in GAS memory array directly
                const slipRecord = allTransactions.find(f => f.house_number === houseNumber && f.year.toString() === year.toString() && f.month === thaiMonth && f.image_url);
                if (slipRecord) { setSelectedImageUrl(slipRecord.image_url); setImageModalOpen(true); } 
                else { alert('ไม่พบรูปสลิปในระบบ หรือผู้ใช้ไม่ได้แนบรูปมาครับ'); }
            };

            // Filter Logics
            const filteredData = useMemo(() => {
                let filtered = [...data];
                if (yearFilter && yearFilter !== 'all') filtered = filtered.filter(item => item.year.toString() === yearFilter);
                if (searchQuery) {
                    const q = searchQuery.toLowerCase().trim();
                    filtered = filtered.filter(item => (item.house_numbe && item.house_numbe.toLowerCase() === q) || (item.owner_name && item.owner_name.toLowerCase().includes(q)) || (item.soi && item.soi.toLowerCase().includes(q)));
                }
                if (filterStatus !== 'all') {
                    filtered = filtered.filter(item => { const totals = calculateHouseTotal(item); if (filterStatus === 'overdue') return totals.unpaid > 0; if (filterStatus === 'waiting') return totals.waiting > 0; return true; });
                }
                filtered.sort((a, b) => {
                    const houseCompare = String(a.house_numbe || '').localeCompare(String(b.house_numbe || ''), 'th', { numeric: true });

                    return parseInt(b.year || 0) - parseInt(a.year || 0);

                return filtered;

                    months.forEach((m, idx) => {

                        else if (status.includes('รอตรวจสอบ') || status.includes('รอข้อมูล')) { monthlyData[idx].waiting += 300; totalWaitingOverall += 300; }
                    });

                return { monthlyData, maxMonthlyAmount: Math.max(...monthlyData.map(d => d.paid + d.unpaid + d.waiting), 1), totalPaidOverall, totalUnpaidOverall, totalWaitingOverall, totalOverall: totalPaidOverall + totalUnpaidOverall + totalWaitingOverall, soiRanking: Object.entries(soiMap).map(([name, amount]) => ({ name, amount })).sort((a, b) => b.amount - a.amount).slice(0, 10) };

                        summaryMap[item.house_numbe].totalOverdueMonths += overdueCount; summaryMap[item.house_numbe].totalOverdueAmount += (overdueCount * 300);

                return Object.values(summaryMap).sort((a, b) => b.totalOverdueMonths - a.totalOverdueMonths);

                const csvContent = "\uFEFF" + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
                const encodedUri = encodeURI("data:text/csv;charset=utf-8," + csvContent);
                const link = document.createElement("a"); link.setAttribute("href", encodedUri); link.setAttribute("download", filename);

                // ใช้ Clipboard API

                                            <div className="flex justify-center py-20"><Loader2 size={40} className="animate-spin text-orange-500" /></div>
                                        ) : pendingFees.length === 0 ? (
                                            <div className="text-center py-20 text-slate-500 flex flex-col items-center gap-3"><CheckCircle size={48} className="text-green-400" /><p className="text-lg font-medium text-slate-600">ไม่มีรายการรอตรวจสอบในขณะนี้</p></div>
                                        ) : (
                                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                                {pendingFees.map(fee => (
                                                    <div key={fee.id} className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                                                        <div className="bg-gradient-to-r from-orange-400 to-orange-500 p-3 flex justify-between items-center text-white">
                                                            <span className="font-bold flex items-center gap-2"><Home size={16}/> บ้านเลขที่ {fee.house_number}</span>
                                                            <span className="text-xs bg-white/20 px-2 py-1 rounded-full font-semibold backdrop-blur-sm shadow-sm">ปี {fee.year}</span>
                                                        </div>
                                                        <div className="p-5 space-y-3">
                                                            <div className="flex justify-between items-center text-sm border-b border-slate-100 pb-2"><span className="text-slate-500 flex items-center gap-1.5"><Calendar size={14}/> รอบเดือน:</span><span className="font-bold text-slate-700 bg-slate-100 px-2 py-0.5 rounded">{fee.month}</span></div>
                                                            <div className="flex justify-between items-center text-sm border-b border-slate-100 pb-2"><span className="text-slate-500 flex items-center gap-1.5"><Coins size={14}/> ยอดชำระ:</span><span className="font-extrabold text-green-600 text-base">฿{fee.amount?.toLocaleString() || '0'}</span></div>
                                                            <div className="flex justify-between items-center text-sm pb-1"><span className="text-slate-500 flex items-center gap-1.5"><Clock size={14}/> วันที่แจ้ง:</span><span className="text-slate-600 font-medium text-xs">{(fee.reported_at && fee.reported_at !== '-') ? new Date(fee.reported_at).toLocaleDateString('th-TH') : '-'}</span></div>
                                                            <div className="pt-4 mt-2">
                                                                {fee.image_url ? (
                                                                    <button onClick={() => { setSelectedImageUrl(fee.image_url); setImageModalOpen(true); }} className="w-full py-2.5 bg-indigo-50 text-indigo-600 font-bold rounded-lg hover:bg-indigo-600 hover:text-white transition-all duration-300 flex items-center justify-center gap-2 text-sm shadow-sm"><ImageIcon size={18} /> กดเพื่อดูรูปสลิป</button>
                                                                ) : (<div className="text-center text-xs text-slate-400 py-3 bg-slate-50 rounded-lg border border-dashed border-slate-200">ไม่มีรูปสลิปแนบมา</div>)}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    {/* Image Modal */}
                    {imageModalOpen && selectedImageUrl && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm" onClick={() => setImageModalOpen(false)}>
                            <div className="relative w-full max-w-4xl h-full max-h-[90vh] flex flex-col items-center justify-center animate-in fade-in zoom-in-95 duration-200" onClick={(e) => e.stopPropagation()}>
                            <button onClick={() => setImageModalOpen(false)} className="absolute -top-12 right-0 text-white/80 hover:text-white p-2 rounded-full hover:bg-white/10 transition-colors"><X size={32} /></button>
                            <img src={selectedImageUrl} alt="Payment Slip" className="max-w-full max-h-full object-contain rounded-lg shadow-2xl"/>
                            <div className="absolute -bottom-12 left-0 right-0 flex justify-center gap-4">
                                <a href={selectedImageUrl} target="_blank" rel="noreferrer" className="text-white/80 hover:text-white text-sm flex items-center gap-2 bg-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition-colors"><ExternalLink size={16} /> เปิดรูปต้นฉบับ</a>
                            </div>
                            </div>
                        </div>
                    )}

                    {/* Enhanced Result Alert Modal (รองรับ Loading Progress) */}
                    {resultModal.isOpen && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 animate-in fade-in duration-200">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => !resultModal.isLoading && setResultModal({ isOpen: false, type: '', message: '', isLoading: false })}></div>
                            <div className={`relative bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl border-2 ${resultModal.type === 'success' ? 'border-green-100' : resultModal.type === 'info' ? 'border-blue-100' : 'border-red-100'}`}>
                                <div className="text-center">
                                    <div className={`mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-4 ${resultModal.type === 'success' ? 'bg-green-100 text-green-600' : resultModal.type === 'info' ? 'bg-blue-100 text-blue-600' : 'bg-red-100 text-red-600'}`}>
                                        {resultModal.isLoading ? <Loader2 size={32} className="animate-spin" /> : 
                                         resultModal.type === 'success' ? <CheckCircle size={32} /> : 
                                         resultModal.type === 'info' ? <Info size={32} /> : <AlertTriangle size={32} />}
                                    </div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-2">
                                        {resultModal.isLoading ? 'กำลังดำเนินการ...' : resultModal.type === 'success' ? 'สำเร็จ' : resultModal.type === 'info' ? 'ข้อมูลระบบ' : 'แจ้งเตือน'}
                                    </h3>
                                    <p className="text-slate-500 text-sm mb-6 font-medium">{resultModal.message}</p>
                                    {!resultModal.isLoading && (
                                        <button 
                                            onClick={() => setResultModal({ isOpen: false, type: '', message: '', isLoading: false })}
                                            className={`px-6 py-2 rounded-lg font-bold shadow-md transition-colors text-white w-full ${resultModal.type === 'success' ? 'bg-green-600 hover:bg-green-700' : resultModal.type === 'info' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-red-600 hover:bg-red-700'}`}
                                        >
                                            ตกลง
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
