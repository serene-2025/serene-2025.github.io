<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบลงเวลา รปภ.</title>
    <!-- Tailwind CSS สำหรับจัด UI มือถือ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 สำหรับแจ้งเตือนสวยๆ -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* ฟอนต์ภาษาไทยและปรับแต่ง UI */
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .loader { border-top-color: #1DB446; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col relative pb-20">

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-white/80 z-50 flex flex-col items-center justify-center hidden">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-16 w-16 mb-4"></div>
        <p id="loading-text" class="text-lg font-medium text-gray-700">กำลังโหลดข้อมูล...</p>
    </div>

    <!-- Header -->
    <header class="bg-[#1DB446] text-white p-4 shadow-md rounded-b-2xl sticky top-0 z-10">
        <div class="flex items-center justify-between">
            <h1 class="text-xl font-semibold"><i class="fa-solid fa-shield-halved mr-2"></i>ระบบลงเวลาทำงาน</h1>
            <img id="profile-img" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full border-2 border-white object-cover shadow-sm hidden">
        </div>
    </header>

    <main class="flex-1 p-4 space-y-4">
        
        <!-- ข้อมูลพนักงาน -->
        <div class="glass-card rounded-2xl p-4 shadow-sm border border-gray-100">
            <p class="text-xs text-gray-500 mb-1 uppercase tracking-wide">ข้อมูลพนักงาน</p>
            <div class="flex items-center">
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xl mr-3">
                    <i class="fa-solid fa-user-tie"></i>
                </div>
                <div>
                    <!-- ในระบบจริงดึงจาก DB -->
                    <h2 id="guard-name" class="text-lg font-semibold">สมชาย ใจสู้</h2>
                    <p id="guard-id" class="text-sm text-gray-500">รหัส: G-001</p>
                </div>
            </div>
        </div>

        <!-- สถานะปัจจุบัน -->
        <div class="glass-card rounded-2xl p-4 shadow-sm border border-gray-100 flex flex-col space-y-3">
            <div class="flex justify-between items-center border-b pb-2">
                <span class="text-sm text-gray-500"><i class="fa-regular fa-clock mr-1"></i>เวลาปัจจุบัน</span>
                <span id="current-time" class="text-lg font-bold text-gray-800">--:-- น.</span>
            </div>
            <div class="flex justify-between items-center border-b pb-2">
                <span class="text-sm text-gray-500"><i class="fa-solid fa-calendar-day mr-1"></i>กะการทำงาน</span>
                <select id="shift-select" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-[#1DB446] focus:border-[#1DB446] block p-2">
                    <option value="1">กะเช้า (07:00-19:00)</option>
                    <option value="2">กะดึก (19:00-07:00)</option>
                </select>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-sm text-gray-500"><i class="fa-solid fa-location-dot mr-1"></i>พิกัด GPS</span>
                <span id="gps-status" class="text-sm font-medium text-orange-500">กำลังค้นหา...</span>
            </div>
        </div>

        <!-- ส่วนอัปโหลดรูปภาพ -->
        <div class="glass-card rounded-2xl p-4 shadow-sm border border-gray-100 text-center">
            <p class="text-sm text-gray-500 mb-3"><i class="fa-solid fa-camera mr-1"></i>ถ่ายภาพหน้าป้อมยามเพื่อยืนยัน</p>
            
            <!-- ซ่อน input file ของจริงไว้ -->
            <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden">
            
            <!-- ปุ่มกดถ่ายรูป UI -->
            <button onclick="document.getElementById('camera-input').click()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-4 rounded-xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center transition-colors">
                <i class="fa-solid fa-image text-3xl mb-2 text-gray-400"></i>
                <span id="photo-label">แตะเพื่อถ่ายรูป</span>
            </button>

            <!-- แสดงตัวอย่างรูปภาพที่บีบอัดแล้ว -->
            <div id="preview-container" class="mt-4 hidden relative">
                <img id="photo-preview" class="w-full h-48 object-cover rounded-xl border border-gray-200 shadow-sm" src="">
                <button onclick="clearPhoto()" class="absolute top-2 right-2 bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
        </div>

    </main>

    <!-- ปุ่ม Action ด้านล่างสุด -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] flex space-x-3 z-10">
        <button id="btn-check-in" onclick="processAction('check_in')" class="flex-1 bg-[#1DB446] text-white font-semibold py-3.5 rounded-xl shadow-md disabled:opacity-50 disabled:bg-gray-400">
            <i class="fa-solid fa-sign-in-alt mr-1"></i> เข้างาน
        </button>
        <button id="btn-check-out" onclick="processAction('check_out')" class="flex-1 bg-red-500 text-white font-semibold py-3.5 rounded-xl shadow-md disabled:opacity-50 disabled:bg-gray-400">
            <i class="fa-solid fa-sign-out-alt mr-1"></i> ออกงาน
        </button>
    </div>

    <!-- Script ควบคุมระบบทั้งหมด -->
    <script>
        // ==========================================
        // การตั้งค่าระบบ (ใส่ค่าของคุณที่นี่)
        // ==========================================
        const LIFF_ID = "2009449342-yVPOB6Pb";
        const SUPABASE_URL = "https://jyfmvreupoywrtexhvzb.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5Zm12cmV1cG95d3J0ZXhodnpiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjUxMTA0NywiZXhwIjoyMDg4MDg3MDQ3fQ.S4Mkc_Uex4qKyis_M7cDMEjytuAmWVZi8-09B9KAytE";
        const EDGE_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/check-in-handler`;

        // Mock Data รปภ. (ของจริงดึงจาก DB โดยใช้ Line User ID)
        const GUARD_DATA = { id: "00000000-0000-0000-0000-000000000001", employeeId: "G-001", name: "สมชาย ใจสู้", phone: "081-123-4567" };

        let currentLat = null;
        let currentLng = null;
        let compressedPhotoBlob = null;
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // 1. การเริ่มต้นระบบ (Initialize)
        // ==========================================
        window.onload = async function() {
            updateClock();
            setInterval(updateClock, 1000);
            
            // ปรับกะอัตโนมัติตามเวลา
            const hour = new Date().getHours();
            document.getElementById('shift-select').value = (hour >= 7 && hour < 19) ? "1" : "2";

            getLocation();

            /* Uncomment เพื่อใช้งาน LIFF ของจริง
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('profile-img').src = profile.pictureUrl;
                    document.getElementById('profile-img').classList.remove('hidden');
                }
            } catch (err) {
                console.error('LIFF Init Error:', err);
            }
            */
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}) + ' น.';
        }

        // ==========================================
        // 2. ระบบ GPS
        // ==========================================
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentLat = position.coords.latitude;
                        currentLng = position.coords.longitude;
                        document.getElementById('gps-status').innerHTML = `<span class="text-green-600"><i class="fa-solid fa-check-circle"></i> พร้อมใช้งาน</span>`;
                    },
                    (error) => {
                        document.getElementById('gps-status').innerHTML = `<span class="text-red-500"><i class="fa-solid fa-triangle-exclamation"></i> ไม่พบสัญญาณ</span>`;
                        Swal.fire('ข้อผิดพลาด', 'กรุณาเปิดการเข้าถึงตำแหน่งที่ตั้ง (GPS)', 'error');
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            }
        }

        // ==========================================
        // 3. ระบบจัดการรูปภาพและบีบอัด (Client-side Compression)
        // ==========================================
        document.getElementById('camera-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            showLoading('กำลังบีบอัดรูปภาพ...');
            try {
                // บีบอัดให้กว้างสุด 800px และคุณภาพ 0.6 เพื่อให้ไฟล์เล็กมาก (< 100kb)
                compressedPhotoBlob = await compressImage(file, { maxWidth: 800, maxHeight: 800, quality: 0.6 });
                
                // แสดงรูปตัวอย่าง
                const previewUrl = URL.createObjectURL(compressedPhotoBlob);
                document.getElementById('photo-preview').src = previewUrl;
                document.getElementById('preview-container').classList.remove('hidden');
                document.getElementById('photo-label').innerText = "แตะเพื่อถ่ายรูปใหม่";
            } catch (error) {
                Swal.fire('ผิดพลาด', 'ไม่สามารถประมวลผลรูปภาพได้', 'error');
            } finally {
                hideLoading();
            }
        });

        function clearPhoto() {
            document.getElementById('camera-input').value = "";
            compressedPhotoBlob = null;
            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('photo-label').innerText = "แตะเพื่อถ่ายรูป";
        }

        function compressImage(file, { maxWidth, maxHeight, quality }) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                        } else {
                            if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        }

        // ==========================================
        // 4. กระบวนการหลัก (เช็คอิน/เช็คเอาท์)
        // ==========================================
        async function processAction(actionType) {
            // Validate
            if (!currentLat || !currentLng) return Swal.fire('แจ้งเตือน', 'กรุณารอค้นหาพิกัด GPS ก่อน', 'warning');
            if (!compressedPhotoBlob) return Swal.fire('แจ้งเตือน', 'กรุณาถ่ายรูปหน้าป้อมยามเพื่อยืนยัน', 'warning');

            const actionName = actionType === 'check_in' ? 'เข้างาน' : 'ออกงาน';
            
            // ยืนยันก่อนดำเนินการ
            const result = await Swal.fire({
                title: `ยืนยันการ${actionName}?`,
                text: "โปรดตรวจสอบข้อมูลให้ถูกต้องก่อนกดบันทึก",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#1DB446',
                confirmButtonText: 'บันทึกข้อมูล',
                cancelButtonText: 'ยกเลิก'
            });

            if (!result.isConfirmed) return;

            showLoading(`กำลังบันทึกข้อมูล${actionName}...`);

            try {
                // 4.1 อัปโหลดรูปภาพไปยัง Supabase Storage
                const fileName = `${GUARD_DATA.employeeId}_${Date.now()}.jpg`;
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('attendance_photos')
                    .upload(fileName, compressedPhotoBlob, { contentType: 'image/jpeg' });

                if (uploadError) throw new Error("ไม่สามารถอัปโหลดรูปภาพได้");

                // ดึง Public URL ของภาพ
                const { data: urlData } = supabase.storage.from('attendance_photos').getPublicUrl(fileName);
                const photoPublicUrl = urlData.publicUrl;

                // 4.2 เรียก API Edge Function เพื่อตรวจสอบ GPS และบันทึกลง Database
                const shiftId = document.getElementById('shift-select').value;
                const shiftName = document.getElementById('shift-select').options[document.getElementById('shift-select').selectedIndex].text;
                
                // จำลองการเรียก API (ในระบบจริงต้องยิง fetch ไปที่ EDGE_FUNCTION_URL)
                // const apiResponse = await fetch(EDGE_FUNCTION_URL, {
                //    method: 'POST',
                //    headers: { 'Content-Type': 'application/json' },
                //    body: JSON.stringify({ action: actionType, guardId: GUARD_DATA.id, guardName: GUARD_DATA.name, shiftId, lat: currentLat, lng: currentLng, photoUrl: photoPublicUrl })
                // });
                // const apiData = await apiResponse.json();
                // if (!apiData.success) throw new Error(apiData.message);

                // จำลองว่าสำเร็จ
                const recordedTime = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});

                hideLoading();

                // 4.3 สร้าง Flex Message สำหรับแชร์
                const flexMsg = createFlexMessage(actionName, photoPublicUrl, GUARD_DATA, shiftName, recordedTime, currentLat, currentLng);
                
                // 4.4 เรียก Share Target Picker
                /* Uncomment เมื่อรันใน LIFF จริง
                if (liff.isApiAvailable('shareTargetPicker')) {
                    const shareRes = await liff.shareTargetPicker([flexMsg]);
                    if (shareRes) {
                        Swal.fire({ title: 'สำเร็จ!', text: 'บันทึกและแชร์ข้อมูลลงกลุ่มเรียบร้อย', icon: 'success' }).then(() => liff.closeWindow());
                    } else {
                        Swal.fire('เตือน', 'คุณต้องแชร์ข้อมูลลงกลุ่มหมู่บ้านเพื่อเสร็จสิ้นขั้นตอน', 'warning');
                    }
                }
                */
               
                // สำหรับแสดงผลจำลองในหน้าจอ
                Swal.fire('จำลองสำเร็จ!', 'ในระบบจริงจะเด้งหน้าจอแชร์ LINE Flex Message', 'success').then(() => clearPhoto());

            } catch (error) {
                hideLoading();
                Swal.fire('เกิดข้อผิดพลาด', error.message, 'error');
            }
        }

        // ==========================================
        // 5. สร้าง JSON Flex Message
        // ==========================================
        function createFlexMessage(action, photoUrl, guard, shift, time, lat, lng) {
            const actionColor = action === 'เข้างาน' ? '#1DB446' : '#FF3B30';
            return {
                "type": "flex",
                "altText": `รายงาน${action}: ${guard.name}`,
                "contents": {
                    "type": "bubble",
                    "hero": { "type": "image", "url": photoUrl, "size": "full", "aspectRatio": "4:3", "aspectMode": "cover" },
                    "body": {
                        "type": "box", "layout": "vertical",
                        "contents": [
                            { "type": "text", "text": `✅ บันทึก${action}`, "weight": "bold", "size": "xl", "color": actionColor },
                            { "type": "separator", "margin": "md", "color": "#E0E0E0" },
                            { "type": "box", "layout": "vertical", "margin": "md", "spacing": "sm", "contents": [
                                { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [ { "type": "text", "text": "รหัส รปภ.", "color": "#aaaaaa", "size": "sm", "flex": 2 }, { "type": "text", "text": guard.employeeId, "color": "#333333", "size": "sm", "flex": 5, "weight": "bold" } ] },
                                { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [ { "type": "text", "text": "ชื่อ-สกุล", "color": "#aaaaaa", "size": "sm", "flex": 2 }, { "type": "text", "text": guard.name, "color": "#333333", "size": "sm", "flex": 5 } ] }
                            ]},
                            { "type": "separator", "margin": "md", "color": "#E0E0E0" },
                            { "type": "box", "layout": "vertical", "margin": "md", "spacing": "sm", "contents": [
                                { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [ { "type": "text", "text": "กะทำงาน", "color": "#aaaaaa", "size": "sm", "flex": 2 }, { "type": "text", "text": shift, "color": "#0052CC", "size": "sm", "flex": 5, "weight": "bold" } ] },
                                { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [ { "type": "text", "text": "เวลาบันทึก", "color": "#aaaaaa", "size": "sm", "flex": 2 }, { "type": "text", "text": `${time} น.`, "weight": "bold", "color": actionColor, "size": "sm", "flex": 5 } ] }
                            ]}
                        ]
                    },
                    "footer": {
                        "type": "box", "layout": "vertical", "spacing": "sm",
                        "contents": [
                            { "type": "button", "style": "secondary", "height": "sm", "action": { "type": "uri", "label": "📍 ตรวจสอบพิกัด (แผนที่)", "uri": `https://maps.google.com/?q=${lat},${lng}` } }
                        ]
                    }
                }
            };
        }

        // Utils
        function showLoading(text) {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading').classList.remove('hidden');
        }
        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
        }
    </script>
</body>
</html>
