<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระค่าบริการ - TamBill</title>
    
    <!-- Fonts & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase, Icons & SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#ecfdf5', 500: '#10b981', 600: '#059669', 700: '#047857' },
                        fb: '#1877F2'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .gradient-text {
            background-color: #059669;
            background-image: linear-gradient(45deg, #059669, #10b981);
            background-size: 100%;
            -webkit-background-clip: text;
            -moz-background-clip: text;
            -webkit-text-fill-color: transparent; 
            -moz-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md bg-white min-h-screen sm:min-h-[800px] sm:max-h-[90vh] sm:rounded-3xl sm:shadow-2xl relative overflow-y-auto no-scrollbar flex flex-col">
        
        <!-- Header -->
        <header class="bg-brand-600 text-white p-4 shadow-md sticky top-0 z-10">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-check-double text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-semibold leading-tight tracking-wide">TamBill</h1>
                        <p class="text-xs text-brand-100">บริการแจ้งยอดอัตโนมัติ</p>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-grow flex flex-col relative p-5" id="main-content">
            <!-- Loading View -->
            <div id="view-loading" class="flex-grow flex flex-col items-center justify-center text-gray-400">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-brand-500"></i>
                <p>กำลังโหลดข้อมูลบิล...</p>
            </div>

            <!-- Error View -->
            <div id="view-error" class="hidden flex-grow flex-col items-center justify-center text-center">
                <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mb-4 text-red-500">
                    <i class="fa-solid fa-link-slash text-3xl"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">ไม่พบข้อมูลบิล</h2>
                <p class="text-gray-500 text-sm">ลิงก์อาจหมดอายุ หรือไม่ถูกต้อง<br>กรุณาติดต่อแอดมินเพื่อขอลิงก์ใหม่</p>
            </div>

            <!-- Dashboard View -->
            <div id="view-dashboard" class="hidden flex-col gap-5 animate-fade-in">
                
                <!-- Status Banner -->
                <div id="status-banner"></div>

                <!-- Invoice Details -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <div class="flex justify-between items-center mb-4 pb-4 border-b border-gray-100 text-sm">
                        <div>
                            <span class="text-gray-500 block mb-1">รหัสบิล</span>
                            <span class="font-medium text-gray-800" id="ui-invoice-no">INV-XXXXXX</span>
                        </div>
                        <div class="text-right">
                             <span class="text-gray-500 block mb-1">ลูกค้า</span>
                             <span class="font-medium text-brand-600" id="ui-customer-name">-</span>
                        </div>
                    </div>
                    
                    <div class="mb-2 text-center">
                        <p class="text-gray-500 text-sm mb-2">ยอดที่ต้องชำระ</p>
                        <h2 class="text-5xl font-bold text-gray-800 tracking-tight" id="ui-amount">฿0.00</h2>
                    </div>
                </div>

                <!-- Payment Area (Hide if paid or pending) -->
                <div id="payment-area" class="flex flex-col gap-5">
                    
                    <!-- QR Code Section -->
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 text-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1.5 bg-blue-900"></div>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/PromptPay-logo.png/1200px-PromptPay-logo.png" alt="PromptPay" class="h-6 mx-auto mb-4 mt-2">
                        
                        <!-- PromptPay QR Code Generation -->
                        <div class="bg-gray-50 p-4 rounded-xl inline-block border-2 border-gray-200 mb-4 shadow-inner">
                            <img id="ui-qrcode" src="" alt="QR Code" class="w-56 h-56 rounded-lg mix-blend-multiply">
                        </div>
                        
                        <p class="text-sm font-semibold text-blue-900 mb-1">สแกนเพื่อโอนเงินผ่านแอปธนาคาร</p>
                        <p class="text-xs text-gray-500">ชื่อบัญชี: <span id="ui-acc-name" class="font-medium">โหลดข้อมูล...</span></p>
                        <p class="text-xs text-gray-500">พร้อมเพย์: <span id="ui-acc-no" class="font-medium">...</span></p>

                        <button onclick="copyAccountNo()" class="mt-4 text-brand-500 text-sm font-medium hover:underline flex items-center justify-center gap-1.5 mx-auto">
                            <i class="fa-regular fa-copy"></i> คัดลอกเลขบัญชี
                        </button>
                    </div>

                    <!-- Slip Upload Section -->
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6" id="upload-section">
                        <h3 class="font-bold text-gray-800 mb-4 flex items-center">
                            <div class="w-8 h-8 bg-brand-50 rounded-lg text-brand-500 flex items-center justify-center mr-2">
                                <i class="fa-solid fa-camera"></i>
                            </div>
                            แนบสลิปการโอนเงิน
                        </h3>
                        
                        <input type="file" id="slip-input" class="hidden" accept="image/*" onchange="previewSlip(event)">
                        
                        <label for="slip-input" id="dropzone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 flex flex-col items-center justify-center text-gray-500 cursor-pointer hover:bg-brand-50 hover:border-brand-500 hover:text-brand-600 transition-all group">
                            <i class="fa-solid fa-cloud-arrow-up text-4xl mb-3 text-gray-400 group-hover:text-brand-500 transition-colors"></i>
                            <span class="text-sm font-medium">แตะเพื่อเลือกรูปภาพสลิป</span>
                            <span class="text-xs text-gray-400 mt-1">รองรับ JPG, PNG</span>
                        </label>

                        <div id="preview-area" class="hidden mt-4">
                            <div class="relative inline-block w-full text-center bg-gray-50 p-2 rounded-xl border border-gray-200 shadow-sm">
                                <img id="slip-preview" src="" alt="Slip Preview" class="mx-auto max-h-72 object-contain rounded-lg">
                                <button onclick="removeSlip()" class="absolute top-4 right-4 bg-red-500/90 backdrop-blur text-white w-8 h-8 rounded-full flex items-center justify-center shadow-md hover:bg-red-600 transition-colors">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                            <button onclick="submitSlip()" class="w-full mt-5 bg-brand-500 hover:bg-brand-600 text-white font-medium py-3.5 px-4 rounded-xl shadow-lg shadow-brand-500/30 transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-paper-plane"></i> ยืนยันการชำระเงิน
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Script -->
    <script>
        const SUPABASE_URL = 'https://gitakkqrobkwrucdyjjh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpdGFra3Fyb2Jrd3J1Y2R5ampoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjc0MjQsImV4cCI6MjA5OTcwMzQyNH0.l2Wvjdh5wYvcrTtLWNVMz8ZbhIXUR36_PF2hwY2l-Gk';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentBill = null;
        let storeSettings = null;
        let base64Slip = null;

        function showView(viewId) {
            ['view-loading', 'view-error', 'view-dashboard'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
                document.getElementById(id).classList.remove('flex');
            });
            document.getElementById(viewId).classList.remove('hidden');
            document.getElementById(viewId).classList.add('flex');
        }

        async function initApp() {
            // ดึง Parameter จาก URL (ตัวอย่าง: ?inv=INV-xxx&token=yyy)
            const urlParams = new URLSearchParams(window.location.search);
            const inv = urlParams.get('inv');
            const token = urlParams.get('token');

            if (!inv || !token) {
                // สำหรับการทดสอบ (ถ้าเปิดเว็บตรงๆ ไม่มี URL params) จะดึงบิลล่าสุดมาโชว์
                console.log("No URL params, fetching latest bill for demo...");
                const { data } = await supabaseClient.from('bills').select('*').limit(1).order('created_at', {ascending: false});
                if(data && data.length > 0) {
                    currentBill = data[0];
                    await loadStoreSettings();
                } else {
                    showView('view-error');
                }
                return;
            }

            // ค้นหาบิลจาก Supabase ด้วย Invoice No และ Token
            const { data, error } = await supabaseClient
                .from('bills')
                .select('*')
                .eq('invoice_no', inv)
                .eq('token', token)
                .single();

            if (error || !data) {
                showView('view-error');
            } else {
                currentBill = data;
                await loadStoreSettings(); // โหลดข้อมูลตั้งค่าร้านค้าต่อ
            }
        }

        // ดึงข้อมูลพร้อมเพย์จากหน้าแอดมินมาใช้
        async function loadStoreSettings() {
            const { data, error } = await supabaseClient.from('store_settings').select('*').eq('id', 1).single();
            if (!error && data) {
                storeSettings = data;
            } else {
                // ค่าตั้งต้นเผื่อแอดมินยังไม่ได้ตั้งค่า
                storeSettings = { promptpay_no: '0000000000', account_name: 'ยังไม่ตั้งค่าบัญชี' };
            }
            renderDashboard();
        }

        function renderDashboard() {
            showView('view-dashboard');
            
            // นำข้อมูลลง UI
            document.getElementById('ui-invoice-no').innerText = currentBill.invoice_no;
            document.getElementById('ui-customer-name').innerText = currentBill.customer_name;
            document.getElementById('ui-amount').innerText = `฿${Number(currentBill.amount).toLocaleString()}`;
            
            document.getElementById('ui-acc-name').innerText = storeSettings.account_name;
            document.getElementById('ui-acc-no').innerText = storeSettings.promptpay_no;
            
            // สร้าง QR Code พร้อมเพย์ตามยอดเงิน (ดึงเบอร์จาก Store Settings)
            const qrUrl = `https://promptpay.io/${storeSettings.promptpay_no}/${currentBill.amount}.png`;
            document.getElementById('ui-qrcode').src = qrUrl;

            // จัดการแสดงผลตามสถานะบิล
            const banner = document.getElementById('status-banner');
            const paymentArea = document.getElementById('payment-area');

            if (currentBill.status === 'unpaid') {
                banner.innerHTML = `
                    <div class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-2xl flex items-start gap-4 shadow-sm">
                        <div class="bg-amber-100 text-amber-600 p-2 rounded-full flex-shrink-0">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-amber-800">รอการชำระเงิน</p>
                            <p class="text-xs text-amber-600 mt-0.5">กรุณาชำระยอดและอัปโหลดสลิปที่ด้านล่าง</p>
                        </div>
                    </div>`;
                paymentArea.classList.remove('hidden');
            } 
            else if (currentBill.status === 'pending_slip') {
                banner.innerHTML = `
                    <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-2xl flex items-start gap-4 shadow-sm">
                        <div class="bg-blue-100 text-blue-600 p-2 rounded-full flex-shrink-0 animate-pulse">
                            <i class="fa-solid fa-clock-rotate-left"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-blue-800">รอดำเนินการตรวจสอบ</p>
                            <p class="text-xs text-blue-600 mt-0.5">ระบบได้รับสลิปของท่านแล้ว แอดมินกำลังตรวจสอบความถูกต้อง</p>
                        </div>
                    </div>`;
                paymentArea.classList.add('hidden'); // ซ่อนส่วน QR และอัปโหลด
            }
            else if (currentBill.status === 'paid') {
                banner.innerHTML = `
                    <div class="bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-r-2xl flex items-start gap-4 shadow-sm">
                        <div class="bg-emerald-100 text-emerald-600 p-2 rounded-full flex-shrink-0">
                            <i class="fa-solid fa-check"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-emerald-800">ชำระเงินเรียบร้อยแล้ว</p>
                            <p class="text-xs text-emerald-600 mt-0.5">ขอบคุณที่ใช้บริการค่ะ</p>
                        </div>
                    </div>`;
                paymentArea.classList.add('hidden');
            }
        }

        // คัดลอกเลขบัญชี
        function copyAccountNo() {
            if (!storeSettings || !storeSettings.promptpay_no) return;
            navigator.clipboard.writeText(storeSettings.promptpay_no).then(() => {
                Swal.fire({
                    toast: true,
                    position: 'top',
                    icon: 'success',
                    title: 'คัดลอกเลขบัญชีแล้ว',
                    showConfirmButton: false,
                    timer: 2000
                });
            });
        }

        // ระบบแปลงไฟล์สลิปเป็นรูปภาพ Base64
        function previewSlip(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    base64Slip = e.target.result; // เก็บข้อมูลรูปไว้เตรียมส่ง
                    document.getElementById('slip-preview').src = base64Slip;
                    document.getElementById('dropzone').classList.add('hidden');
                    document.getElementById('preview-area').classList.remove('hidden');
                }
                reader.readAsDataURL(file); // แปลงไฟล์เป็น Base64
            }
        }

        function removeSlip() {
            document.getElementById('slip-input').value = "";
            base64Slip = null;
            document.getElementById('dropzone').classList.remove('hidden');
            document.getElementById('preview-area').classList.add('hidden');
        }

        // ส่งสลิปขึ้น Supabase
        async function submitSlip() {
            if (!base64Slip) return;

            Swal.fire({ title: 'กำลังส่งข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            // อัปเดตข้อมูลใน Supabase 
            const { error } = await supabaseClient
                .from('bills')
                .update({ 
                    status: 'pending_slip',
                    slip_url: base64Slip
                })
                .eq('invoice_no', currentBill.invoice_no);

            if (error) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถส่งสลิปได้ โปรดลองอีกครั้ง', 'error');
                return;
            }

            // ถ้าส่งผ่าน อัปเดตสถานะที่หน้าจอ
            currentBill.status = 'pending_slip';

            Swal.fire({
                icon: 'success',
                title: 'ส่งหลักฐานสำเร็จ',
                text: 'แอดมินจะตรวจสอบยอดเงินของท่านเร็วๆ นี้',
                confirmButtonColor: '#10b981'
            }).then(() => {
                renderDashboard(); // โหลดหน้าใหม่
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
