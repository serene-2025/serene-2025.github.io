<!DOCTYPE html>
<html lang="th">
<head>

    <!-- ฟอนต์ภาษาไทย Noto Sans Thai -->

    <!-- กำหนดสี Custom Theme สำหรับ Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '25%': { transform: 'translateX(-5px)' },
                            '75%': { transform: 'translateX(5px)' }
                        }
                    },
                    colors: {
                        golden: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                        }
                    },
                    fontFamily: {
                        sans: ['Noto Sans Thai', 'sans-serif'],

    <style>
        body {
            background-color: #fffbeb;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* อนิเมชันสำหรับ Modal */
        .modal-enter { opacity: 0; transform: scale(0.95) translateY(10px); }
        .modal-enter-active { opacity: 1; transform: scale(1) translateY(0); transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-exit { opacity: 1; transform: scale(1) translateY(0); }
        .modal-exit-active { opacity: 0; transform: scale(0.95) translateY(10px); transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1); }

        /* ลูกเล่นพลิกบัตร 3 มิติ (3D Flip) */
        .flip-card { perspective: 1000px; }
        .flip-inner {
            transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            width: 100%; height: 100%;
        }
        .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            backface-visibility: hidden;
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 14px;
        }
        .flip-back { transform: rotateY(180deg); }

        /* สไตล์ Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="text-gray-800 antialiased selection:bg-golden-400 selection:text-white">

    <!-- โค้ด JavaScript จัดการ Supabase -->
    <script>
        // ==========================================
        // ตั้งค่าการเชื่อมต่อ Supabase ของจริง
        // ==========================================
        const SUPABASE_URL = 'https://kiumelolsilduqnvrekf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpdW1lbG9sc2lsZHVxbnZyZWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwODUyNzYsImV4cCI6MjA3MjY2MTI3Nn0.3hCFJiDrkgNJQEggS8MkRnxlhvqIMAax_a73NJq14gU';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ตัวแปร State เก็บข้อมูล
        let loggedInLineUid = null;
        let currentHouseData = null;
        let currentKeycards = [];
        
        // สำหรับหน้ายืนยัน
        let targetCardIdToConfirm = null; 
        let currentCapturedPhoto = null; 

        // ==========================================
        // ฟังก์ชันจัดรูปแบบหมายเลขคีย์การ์ดตามโครงสร้างใหม่
        // ==========================================
        function formatKeycardNumber(frontNumber, backNumber) {
            if (!frontNumber) return "ไม่พบข้อมูลบัตร";
            let part2 = backNumber || '';
            // ถ้า backNumber มีความยาวมากกว่า 5 ให้ใส่ลูกน้ำเพื่อความสวยงาม
            if (part2.length > 5) {
                part2 = part2.slice(0, -5) + ',' + part2.slice(-5);
            }
            return part2 ? `${frontNumber} ${part2}` : frontNumber;
        }

        // ฟังก์ชันจัดรูปแบบวันที่ให้อ่านง่าย
        function formatDateThai(dateString) {
            if (!dateString) return "-";
            const date = new Date(dateString);
            return date.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        // ==========================================
        // ฟังก์ชันดึงข้อมูลจาก Supabase (ตาราง userhome และ rfid)
        // ==========================================
        async function fetchHouseDataFromSupabase(lineUid) {
            // 1. ค้นหาข้อมูลผู้ใช้และบ้านจากตาราง userhome
            const { data: userRecord, error: userError } = await supabaseClient
                .from('userhome')
                .select('*')
                .eq('uid', lineUid)
                .maybeSingle(); 

            if (userError) {
                console.error("Supabase userhome Error:", userError);
                throw new Error("เกิดข้อผิดพลาดจากฐานข้อมูล userhome: " + userError.message);
            }

            // ถ้าไม่มี UID นี้ในระบบ ให้โยน Error ไปเข้าเงื่อนไข Redirect หน้าลงทะเบียน
            if (!userRecord || !userRecord.house_no) {
                throw "USER_NOT_FOUND";
            }

            // ใช้ house_no เต็มๆ (เช่น '998/392') ไปค้นในตาราง rfid ได้เลย ไม่ต้อง split แล้ว
            const houseNo = userRecord.house_no.trim();

            // 2. ค้นหาคีย์การ์ดของบ้านนั้นจากตาราง rfid
            const { data: cardsRecord, error: cardsError } = await supabaseClient
                .from('rfid')
                .select('*')
                .eq('house_number', houseNo)
                .order('created_at', { ascending: false });

            if (cardsError) {
                console.error("Supabase rfid Error:", cardsError);
                throw new Error("เกิดข้อผิดพลาดในการดึงข้อมูลคีย์การ์ด: " + cardsError.message);
            }

            // 3. จัดเตรียมข้อมูลส่งกลับให้หน้าเว็บแสดงผล
            const houseData = {
                house_number: userRecord.house_no,
                owner_name: userRecord.fullname || '-',
                phone: userRecord.phone || '-',
                members_count: userRecord.member_count || 1
            };

            const mappedCards = (cardsRecord || []).map(c => {
                return {
                    id: c.id,          
                    front_number: c.front_number,      
                    back_number: c.back_number,      
                    holder_name: c.holder_name || 'สมาชิกบ้าน', 
                    status: c.status || 'pending',
                    img: c.img,
                    start_date: c.start_date,
                    expire_date: c.expire_date
                };
            });

            return { house: houseData, keycards: mappedCards };
        }

        // ==========================================
        // การเริ่มต้นระบบ (เชื่อมข้อมูลจริง 100%)
        // ==========================================
        async function initializeApp() {
            try {
                const liffId = "2009673010-dVamuq1v"; 
                
                // 1. ตรวจสอบและบังคับให้ผู้ใช้ล็อกอินผ่าน LINE
                await liff.init({ liffId: liffId });
                
                if (!liff.isLoggedIn()) {
                    liff.login(); // บังคับล็อกอินถ้ายังไม่ได้ล็อกอิน
                    return; // หยุดการทำงานรอการ Redirect กลับมา
                }
                
                // 2. ดึง UID ผู้ใช้งานจาก LINE
                const profile = await liff.getProfile();
                loggedInLineUid = profile.userId;
                
                // 3. ดึงข้อมูลจากฐานข้อมูล Supabase โดยใช้ UID จริง
                const data = await fetchHouseDataFromSupabase(loggedInLineUid);
                
                // 4. เตรียมข้อมูลแสดงผล
                currentHouseData = data.house;
                currentKeycards = data.keycards;
                
                renderHouseInfo();
                renderKeycards();
                showMainApp();

            } catch (err) {
                console.error("App Initialization Error:", err);
                
                // หาก UID ผู้ใช้นี้ยังไม่มีในฐานข้อมูล userhome จะย้ายไปหน้าลงทะเบียน
                if (err === "USER_NOT_FOUND") {
                    document.getElementById('loadingText').textContent = "ไม่พบข้อมูลของท่าน กำลังพาไปหน้าลงทะเบียน...";
                    document.getElementById('loadingScreen').style.display = 'flex';
                    document.getElementById('errorScreen').style.display = 'none';
                    
                    setTimeout(() => {
                        window.location.replace("https://liff.line.me/2000143615-Y8AQVAaq");
                    }, 500);
                } else {
                    let errorMsg = err.message || JSON.stringify(err) || "ไม่สามารถเชื่อมต่อได้";
                    showError(errorMsg);
                }
            }
        }

        // ==========================================
        // UI & Render Functions
        // ==========================================
        function showMainApp() {
            document.getElementById('loadingScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loadingScreen').style.display = 'none';
                const mainApp = document.getElementById('mainApp');
                mainApp.classList.remove('hidden');
                mainApp.style.opacity = '1';
            }, 500);
        }

        function showError(msg) {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('errorMessage').textContent = msg;
            document.getElementById('errorScreen').style.display = 'flex';
            lucide.createIcons();
        }

        function renderHouseInfo() {
            document.getElementById('headerHouseNumber').textContent = `บ้านเลขที่ ${currentHouseData.house_number}`;
            
            const infoContainer = document.getElementById('houseInfoDisplay');
            infoContainer.innerHTML = `
                <div class="flex items-center">
                    <div class="w-8 flex justify-center"><i data-lucide="user" class="w-4 h-4 text-gray-400"></i></div>
                    <div class="flex-1 text-sm text-gray-600">เจ้าบ้าน:</div>
                    <div class="font-semibold text-gray-900">${currentHouseData.owner_name}</div>
                </div>
                <div class="flex items-center">
                    <div class="w-8 flex justify-center"><i data-lucide="phone" class="w-4 h-4 text-gray-400"></i></div>
                    <div class="flex-1 text-sm text-gray-600">เบอร์โทร:</div>
                    <div class="font-semibold text-gray-900">${currentHouseData.phone || '-'}</div>
                </div>
                <div class="flex items-center">
                    <div class="w-8 flex justify-center"><i data-lucide="users" class="w-4 h-4 text-gray-400"></i></div>
                    <div class="flex-1 text-sm text-gray-600">สมาชิก:</div>
                    <div class="font-semibold text-gray-900">${currentHouseData.members_count} ท่าน</div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderKeycards() {
            const container = document.getElementById('keycardContainer');
            document.getElementById('keycardCount').textContent = `${currentKeycards.length} ใบ`;
            container.innerHTML = '';

            currentKeycards.forEach((card) => {
                let statusConfig;
                if(card.status === 'active') statusConfig = { text: 'ใช้งานปกติ', badgeClass: 'bg-green-100 text-green-700', icon: 'check-circle-2' };
                else if(card.status === 'pending') statusConfig = { text: 'รอการยืนยัน', badgeClass: 'bg-golden-100 text-golden-700 animate-pulse', icon: 'clock' };
                else statusConfig = { text: 'ระงับการใช้งาน', badgeClass: 'bg-red-100 text-red-600', icon: 'ban' };
                
                const displayCardId = formatKeycardNumber(card.front_number, card.back_number);
                const backImgSrc = card.img ? card.img : "https://lh3.googleusercontent.com/d/1W7zkZILECqtfY73b1fEawCSoA4CVkp54";

                // จัดการแสดงผลวันที่ เริ่มและหมดอายุ
                let dateInfoHTML = '';
                if (card.start_date || card.expire_date) {
                    dateInfoHTML = `
                        <div class="mt-2 text-[10px] text-gray-500 bg-gray-50 px-2 py-1.5 rounded-md border border-gray-100 flex gap-2 w-full justify-between sm:justify-start">
                            <span><i data-lucide="calendar" class="w-3 h-3 inline mr-1 text-gray-400"></i>เริ่ม: ${formatDateThai(card.start_date)}</span>
                            <span><i data-lucide="calendar-clock" class="w-3 h-3 inline mr-1 text-gray-400"></i>หมดอายุ: ${formatDateThai(card.expire_date)}</span>
                        </div>
                    `;
                }

                let cardHTML = `
                    <div class="glass-card rounded-[24px] p-4 shadow-sm border border-gray-100 relative overflow-hidden transition-all duration-300 hover:shadow-md hover:border-golden-200">
                        <div class="flip-card mx-auto mb-4 w-full max-w-[320px] aspect-[85/54] cursor-pointer group/card" onclick="this.classList.toggle('flipped')">
                            <div class="flip-inner relative w-full h-full shadow-[0_8px_16px_rgba(0,0,0,0.06)] rounded-[14px] transition-transform duration-500">
                                <!-- Front -->
                                <div class="flip-front bg-gradient-to-br from-[#ffffff] to-[#f4f5f7] border border-gray-200 overflow-hidden">
                                    <div class="absolute top-3 right-3 bg-white/80 backdrop-blur rounded-full p-1.5 shadow-sm text-gray-400 group-hover/card:text-golden-500 transition-colors z-10">
                                        <i data-lucide="rotate-cw" class="w-4 h-4"></i>
                                    </div>
                                    <div class="absolute left-3 top-1/2 -translate-y-1/2 w-2.5 h-12 bg-gray-100/80 rounded-full shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)] border border-gray-200"></div>
                                    <div class="absolute top-4 left-8 text-golden-600/20 font-bold text-lg tracking-wider">SERENE</div>
                                    <div class="absolute bottom-4 right-4 text-gray-700 font-semibold tracking-widest text-[13px] sm:text-sm drop-shadow-sm opacity-90" style="font-family: 'Courier New', Courier, monospace; letter-spacing: 0.15em;">
                                        ${displayCardId}
                                    </div>
                                </div>
                                <!-- Back -->
                                <div class="flip-back border border-gray-200 overflow-hidden bg-white shadow-inner">
                                    <img src="${backImgSrc}" alt="ด้านหลังบัตร" class="w-full h-full object-cover">
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col border-t border-gray-100 pt-3 px-1">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-1">
                                <div>
                                    <div class="text-[11px] text-gray-400 uppercase tracking-wider mb-0.5">ผู้ถือบัตร / Card Holder</div>
                                    <div class="font-bold text-gray-900 text-base flex items-center gap-2">${card.holder_name}</div>
                                </div>
                `;

                if (card.status === 'pending') {
                    cardHTML += `
                        <button onclick="openConfirmModal('${card.id}', '${displayCardId}', '${card.holder_name}')" class="w-full sm:w-auto flex items-center justify-center px-4 py-2 bg-golden-50 text-golden-600 hover:bg-golden-500 hover:text-white rounded-xl text-sm font-bold transition-colors duration-300 border border-golden-200 hover:border-transparent mt-2 sm:mt-0">
                            <i data-lucide="shield-alert" class="w-4 h-4 mr-1.5"></i>ยืนยันสิทธิ์
                        </button>
                    </div>`;
                } else {
                    cardHTML += `
                        <div class="flex flex-col items-start sm:items-end mt-2 sm:mt-0">
                            <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-semibold ${statusConfig.badgeClass}">
                                <i data-lucide="${statusConfig.icon}" class="w-3.5 h-3.5 mr-1.5"></i>${statusConfig.text}
                            </span>
                        </div>
                    </div>`;
                }
                
                cardHTML += dateInfoHTML; // แสดงวันที่เริ่ม/หมดอายุ ถ้ามี
                cardHTML += `</div></div>`;
                
                container.innerHTML += cardHTML;
            });
            lucide.createIcons();
        }

        // ==========================================
        // ระบบบีบอัดรูปภาพและอัปโหลด (Supabase Storage)
        // ==========================================
        async function compressImage(file, maxWidth = 800, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scaleSize = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scaleSize;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                        }, 'image/jpeg', quality);
                    };
                };
            });
        }

        function openConfirmModal(cardDbId, displayCardId, holderName) {
            targetCardIdToConfirm = cardDbId; 
            document.getElementById('modalCardId').textContent = displayCardId; 
            document.getElementById('modalCardHolder').textContent = holderName;
            
            // รีเซ็ตฟอร์มกล้อง
            currentCapturedPhoto = null;
            document.getElementById('keycardPhotoInput').value = '';
            document.getElementById('photoPreviewContainer').classList.add('hidden');
            document.getElementById('btnTakePhoto').classList.remove('hidden');
            document.getElementById('photoErrorMsg').classList.add('hidden');
            
            toggleModal('confirmModal', 'modalContent', true);
        }

        function closeConfirmModal() {
            toggleModal('confirmModal', 'modalContent', false);
            targetCardIdToConfirm = null;
            currentCapturedPhoto = null;
        }

        function previewKeycardPhoto(event) {
            const file = event.target.files[0];
            if (file) {
                currentCapturedPhoto = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('photoPreview').src = e.target.result;
                    document.getElementById('photoPreviewContainer').classList.remove('hidden');
                    document.getElementById('btnTakePhoto').classList.add('hidden');
                    document.getElementById('photoErrorMsg').classList.add('hidden');
                    lucide.createIcons(); 
                };
                reader.readAsDataURL(file);
            }
        }

        async function confirmVerification() {
            if (!targetCardIdToConfirm) return;

            if (!currentCapturedPhoto) {
                document.getElementById('photoErrorMsg').classList.remove('hidden');
                const modalContent = document.getElementById('modalContent');
                modalContent.classList.add('animate-[shake_0.4s_ease-in-out]');
                setTimeout(() => modalContent.classList.remove('animate-[shake_0.4s_ease-in-out]'), 400);
                return;
            }

            const btn = document.getElementById('btnConfirmCard');
            btn.innerHTML = '<div class="flex items-center justify-center"><div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"></div>อัปโหลดและยืนยัน...</div>';
            btn.classList.add('pointer-events-none');

            try {
                // 1. บีบอัดรูปภาพด้วย Canvas
                const compressedFile = await compressImage(currentCapturedPhoto, 800, 0.7);

                // 2. โยนไฟล์ขึ้น Storage ของ Supabase (ตรวจสอบให้แน่ใจว่าสร้าง Bucket ชื่อ 'keycard_images' แล้ว)
                const fileName = `keycard_${targetCardIdToConfirm}_${Date.now()}.jpg`;
                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('keycard_images')
                    .upload(fileName, compressedFile);

                if (uploadError) throw uploadError;

                // 3. ดึงลิงก์ URL รูปภาพแบบ Public
                const { data: publicUrlData } = supabaseClient.storage
                    .from('keycard_images')
                    .getPublicUrl(fileName);
                const imageUrl = publicUrlData.publicUrl;

                // 4. Update สถานะและรูปภาพในตาราง rfid แทนตารางเดิม
                const { error: updateError } = await supabaseClient
                    .from('rfid')
                    .update({ 
                        status: 'active', // อัปเดตโครงสร้างใหม่
                        img: imageUrl 
                    })
                    .eq('id', targetCardIdToConfirm);

                if (updateError) throw updateError;

                // อัปเดตข้อมูลบนหน้าจอ
                const cardIndex = currentKeycards.findIndex(c => c.id === targetCardIdToConfirm);
                if(cardIndex !== -1) {
                    currentKeycards[cardIndex].status = 'active';
                    currentKeycards[cardIndex].img = imageUrl;
                }

                closeConfirmModal();
                renderKeycards();

            } catch (error) {
                console.error('Confirm Verification Error:', error);
                alert("เกิดข้อผิดพลาดในการยืนยันสิทธิ์ หรืออัปโหลดรูปภาพ กรุณาลองใหม่");
            } finally {
                btn.innerHTML = 'ยืนยันสิทธิ์ทันที';
                btn.classList.remove('pointer-events-none');
            }
        }

        // ==========================================
        // ระบบ Update ข้อมูลบ้าน (userhome)
        // ==========================================
        function openEditInfoModal() {
            document.getElementById('inputOwnerName').value = currentHouseData.owner_name;
            document.getElementById('inputPhone').value = currentHouseData.phone;
            document.getElementById('inputMembers').value = currentHouseData.members_count;
            toggleModal('editInfoModal', 'editModalContent', true);
        }

        function closeEditInfoModal() {
            toggleModal('editInfoModal', 'editModalContent', false);
        }

        async function saveHouseInfo() {
            const btn = document.getElementById('btnSaveHouse');
            btn.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin mx-auto"></div>';

            const newName = document.getElementById('inputOwnerName').value || '-';
            const newPhone = document.getElementById('inputPhone').value || '-';
            const newCount = document.getElementById('inputMembers').value || 1;

            try {
                // อัปเดตตาราง userhome จริงใน Supabase
                const { error } = await supabaseClient
                    .from('userhome')
                    .update({
                        fullname: newName,
                        phone: newPhone,
                        member_count: newCount
                    })
                    .eq('uid', loggedInLineUid);

                if (error) throw error;

                // อัปเดตข้อมูลบนหน้าจอ
                currentHouseData.owner_name = newName;
                currentHouseData.phone = newPhone;
                currentHouseData.members_count = newCount;
                
                closeEditInfoModal();
                renderHouseInfo();

            } catch (error) {
                console.error("Save House Info Error:", error);
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองใหม่");
            } finally {
                btn.innerHTML = 'บันทึกข้อมูล';
            }
        }

        function toggleModal(modalId, contentId, isShow) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(contentId);
            if (isShow) {
                modal.classList.remove('hidden');
                setTimeout(() => { content.classList.remove('modal-enter'); content.classList.add('modal-enter-active'); }, 10);
            } else {
                content.classList.remove('modal-enter-active'); content.classList.add('modal-exit-active');
                setTimeout(() => { modal.classList.add('hidden'); content.classList.remove('modal-exit-active'); content.classList.add('modal-enter'); }, 200);
            }
        }

        // เริ่มต้นการทำงาน
        window.onload = () => {
            lucide.createIcons();
            initializeApp();
        };
    </script>
