
<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ข้อมูลบ้าน - โกลเด้นแลนด์ ซีรีน</title>
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- ฟอนต์ภาษาไทย Noto Sans Thai -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- โหลด LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <!-- โหลด Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ตรวจสอบธีมเบื้องต้นเพื่อกันการกระพริบหน้าจอ -->
    <script>
        if (localStorage.theme === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>

    <!-- กำหนดสี Custom Theme สำหรับ Tailwind -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '25%': { transform: 'translateX(-5px)' },
                            '75%': { transform: 'translateX(5px)' }
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' }
                        }
                    },
                    animation: {
                        blob: "blob 7s infinite",
                    },
                    colors: {
                        golden: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                        },
                        darkslate: {
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    },
                    fontFamily: {
                        sans: ['Noto Sans Thai', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* อนิเมชันสำหรับ Modal */
        .modal-enter { opacity: 0; transform: scale(0.95) translateY(10px); }
        .modal-enter-active { opacity: 1; transform: scale(1) translateY(0); transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-exit { opacity: 1; transform: scale(1) translateY(0); }
        .modal-exit-active { opacity: 0; transform: scale(0.95) translateY(10px); transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1); }

        /* ลูกเล่นพลิกบัตร 3 มิติ (3D Flip) */
        .flip-card { perspective: 1000px; }
        .flip-inner {
            transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            width: 100%; height: 100%;
        }
        .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            backface-visibility: hidden;
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 14px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        
        /* เพิ่มกล่องสำหรับ Card ด้านหน้าให้รองรับ Light Mode ด้วย */
        .card-front-light {
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .card-front-dark {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .flip-back { transform: rotateY(180deg); }

        /* สไตล์ Glassmorphism รองรับ Light/Dark */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
        }
        .dark .glass-card {
            background: rgba(30, 41, 59, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #1e293b;
        }
        .dark .glass-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .glass-input:focus {
            border-color: #fbbf24;
            outline: none;
        }
        .dark .glass-input:focus {
            box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2);
        }
        
        /* สไตล์กล่องข้อมูลบ้าน (มิติใหม่สำหรับ Light Mode) */
        .info-box-light {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 10px -2px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] text-slate-800 dark:text-e2e8f0 antialiased selection:bg-golden-500 selection:text-white relative min-h-screen transition-colors duration-500">

    <!-- พื้นหลังแสง Glowing Effect -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none transition-opacity duration-500">
        <div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-amber-400/30 dark:bg-amber-500/20 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[80px] dark:blur-[100px] animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-72 h-72 bg-blue-400/20 dark:bg-blue-500/20 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[80px] dark:blur-[100px] animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-purple-400/20 dark:bg-purple-500/10 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[80px] dark:blur-[100px] animate-blob animation-delay-4000"></div>
    </div>

    <!-- หน้าจอโหลดดิ้ง (Loading Screen) -->
    <div id="loadingScreen" class="fixed inset-0 z-[100] bg-white/90 dark:bg-darkslate-900/90 backdrop-blur-md flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative w-20 h-20 flex justify-center items-center mb-6">
            <div class="absolute inset-0 border-4 border-slate-200 dark:border-slate-700 border-t-golden-500 rounded-full animate-spin"></div>
            <i data-lucide="home" class="w-8 h-8 text-golden-500 dark:text-golden-400 animate-pulse"></i>
        </div>
        <p id="loadingText" class="text-slate-600 dark:text-slate-300 font-medium animate-pulse text-center px-4 text-lg">กำลังดึงข้อมูลส่วนตัวของคุณ... ✨</p>
    </div>

    <!-- หน้าจอแจ้งเตือนข้อผิดพลาด (Error Screen) -->
    <div id="errorScreen" class="fixed inset-0 z-[90] bg-white/95 dark:bg-darkslate-900/95 backdrop-blur-lg hidden flex-col items-center justify-center p-6 text-center">
        <div class="w-24 h-24 bg-red-50 dark:bg-red-500/10 border border-red-100 dark:border-red-500/20 text-red-500 dark:text-red-400 rounded-full flex items-center justify-center mb-6 shadow-lg dark:shadow-[0_0_30px_rgba(239,68,68,0.2)]">
            <i data-lucide="alert-triangle" class="w-12 h-12"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-2" id="errorTitle">เกิดข้อผิดพลาด 🚫</h2>
        <p class="text-slate-500 dark:text-slate-400 mb-8 text-sm break-words w-full max-w-sm whitespace-pre-line" id="errorMessage">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</p>
        <button onclick="window.location.reload()" class="px-8 py-3.5 bg-gradient-to-r from-slate-700 to-slate-800 border border-slate-600 text-white rounded-xl font-bold hover:from-slate-600 hover:to-slate-700 transition-all shadow-lg active:scale-95 flex items-center">
            <i data-lucide="refresh-cw" class="w-5 h-5 mr-2"></i> ลองใหม่อีกครั้ง
        </button>
    </div>

    <main id="mainApp" class="max-w-md mx-auto min-h-screen relative z-10 hidden opacity-0 transition-opacity duration-500">
        
        <!-- ส่วนหัว (Header) -->
        <header class="pt-10 pb-20 px-6 rounded-b-[40px] relative overflow-hidden bg-gradient-to-b from-white to-slate-100 dark:from-darkslate-950 dark:to-darkslate-900 border-b border-slate-200 dark:border-white/5 shadow-xl dark:shadow-2xl transition-colors duration-500">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-5 dark:opacity-10"></div>
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-golden-500 to-transparent opacity-50"></div>
            
            <div class="relative z-10 flex justify-between items-center mt-2">
                <div>
                    <p class="text-golden-500 dark:text-golden-400 text-sm font-bold mb-1 tracking-wide uppercase text-[10px]">✨ ยินดีต้อนรับกลับบ้าน</p>
                    <h1 class="text-2xl font-bold text-slate-800 dark:text-white tracking-wide drop-shadow-sm dark:drop-shadow-md flex items-center gap-2" id="headerHouseNumber">
                        ...
                    </h1>
                    <p class="text-slate-500 dark:text-slate-400 text-xs mt-1.5 flex items-center font-medium">
                        <i data-lucide="map-pin" class="w-3 h-3 mr-1 text-golden-500"></i> โกลเด้นแลนด์ ซีรีน
                    </p>
                </div>
                
                <div class="flex items-center">
                    <!-- ปุ่มสลับธีม -->
                    <button onclick="toggleTheme()" class="mr-4 p-2.5 rounded-full bg-white/80 dark:bg-slate-800/50 backdrop-blur-md border border-slate-200 dark:border-white/10 shadow-sm hover:scale-105 transition-all" title="สลับโหมดสว่าง/มืด">
                        <i id="themeIcon" data-lucide="moon" class="w-5 h-5 text-slate-600 dark:text-golden-400 transition-colors"></i>
                    </button>

                    <!-- รูปโปรไฟล์ -->
                    <div class="bg-white/80 dark:bg-white/5 backdrop-blur-md p-1.5 rounded-full border border-slate-200 dark:border-white/10 shadow-md">
                        <img id="profileImage" src="" alt="Profile" class="w-14 h-14 rounded-full object-cover hidden border border-slate-100 dark:border-slate-700">
                        <div id="defaultProfileIcon" class="w-14 h-14 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center border border-slate-200 dark:border-slate-700">
                            <i data-lucide="user" class="w-6 h-6 text-slate-400 dark:text-slate-500"></i>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- เนื้อหาหลัก -->
        <div class="px-5 -mt-12 relative z-20 pb-24 h-full">
            
            <!-- การ์ดข้อมูลส่วนบุคคล (House Info Card) -->
            <section class="glass-card rounded-3xl p-5 mb-6 group hover:border-golden-400/50 dark:hover:border-white/20 transition-colors duration-300">
                <div class="flex justify-between items-center mb-4 border-b border-slate-200 dark:border-white/5 pb-3">
                    <h2 class="text-lg font-bold text-slate-800 dark:text-white flex items-center">
                        <span class="bg-golden-50 dark:bg-golden-500/20 p-1.5 rounded-lg mr-2 border border-golden-100 dark:border-golden-500/20">
                            <i data-lucide="home" class="w-4 h-4 text-golden-500 dark:text-golden-400"></i>
                        </span>
                        ข้อมูลบ้าน 🏠
                    </h2>
                    <button onclick="openEditInfoModal()" class="text-golden-600 dark:text-golden-400 hover:text-golden-500 hover:bg-slate-50 dark:hover:bg-white/5 p-2 rounded-xl transition-all flex items-center text-xs font-bold border border-transparent hover:border-slate-200 dark:hover:border-white/10">
                        <i data-lucide="edit-3" class="w-3.5 h-3.5 mr-1"></i> แก้ไข
                    </button>
                </div>
                
                <!-- ข้อมูลบ้านแบบมีกรอบแบ่งชัดเจน -->
                <div class="space-y-3" id="houseInfoDisplay">
                    <!-- ข้อมูลจะถูกเติมด้วย JavaScript -->
                </div>
            </section>

            <!-- ส่วนคีย์การ์ด -->
            <section>
                <div class="flex justify-between items-end mb-4 px-1">
                    <h2 class="text-lg font-bold text-slate-800 dark:text-white flex items-center">
                        <span class="bg-blue-50 dark:bg-blue-500/20 p-1.5 rounded-lg mr-2 border border-blue-100 dark:border-blue-500/20">
                            <i data-lucide="credit-card" class="w-4 h-4 text-blue-500 dark:text-blue-400"></i>
                        </span>
                        คีย์การ์ดของคุณ 💳
                    </h2>
                    <span class="text-xs font-bold text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-1 rounded-full shadow-sm dark:shadow-inner" id="keycardCount">0 ใบ</span>
                </div>

                <div id="keycardContainer" class="space-y-5">
                    <!-- รายการคีย์การ์ดจะถูกสร้างด้วย JavaScript -->
                </div>
            </section>
        </div>
    </main>

    <!-- Modal ยืนยันสิทธิ์ / แก้ไข พร้อมถ่ายภาพ -->
    <div id="confirmModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-slate-900/60 dark:bg-darkslate-950/80 backdrop-blur-md px-4 transition-opacity duration-300">
        <div id="modalContent" class="bg-white dark:bg-slate-900 rounded-[28px] w-full max-w-sm overflow-hidden shadow-2xl dark:shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-slate-100 dark:border-slate-700 modal-enter max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="p-6 relative">
                <button onclick="closeConfirmModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-white bg-slate-50 dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 p-1.5 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                
                <div class="w-16 h-16 bg-golden-50 dark:bg-golden-500/10 border border-golden-100 dark:border-golden-500/20 text-golden-500 dark:text-golden-400 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner rotate-3">
                    <i data-lucide="shield-check" class="w-8 h-8 -rotate-3"></i>
                </div>
                
                <h3 id="confirmModalTitle" class="text-xl font-bold text-center text-slate-800 dark:text-white mb-2">ยืนยันการใช้งานคีย์การ์ด</h3>
                <p class="text-center text-slate-500 dark:text-slate-400 mb-5 text-sm leading-relaxed">
                    คีย์การ์ดหมายเลข<br>
                    <span id="modalCardId" class="font-mono font-bold text-golden-600 dark:text-golden-400 text-base bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 px-3 py-1 rounded-lg mt-1.5 inline-block tracking-wider"></span>
                </p>

                <div class="space-y-4 mb-6 text-left">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wide">สถานะผู้ถือบัตร 👤</label>
                        <select id="selectCardHolder" class="w-full px-4 py-3.5 rounded-xl glass-input appearance-none cursor-pointer font-medium">
                            <option value="เจ้าบ้าน" class="dark:bg-slate-800">👑 เจ้าบ้าน</option>
                            <option value="สมาชิกในบ้าน" class="dark:bg-slate-800">👨‍👩‍👧‍👦 สมาชิกในบ้าน</option>
                            <option value="ผู้เช่า" class="dark:bg-slate-800">🔑 ผู้เช่า</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wide">ภาพถ่ายด้านหลังคีย์การ์ด 📸</label>
                        <input type="file" id="keycardPhotoInput" accept="image/*" capture="environment" class="hidden" onchange="previewKeycardPhoto(event)">
                        
                        <div id="photoPreviewContainer" class="hidden relative rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 mb-2 shadow-inner group">
                            <img id="photoPreview" src="" alt="ภาพถ่ายคีย์การ์ด" class="w-full h-44 object-cover opacity-90 group-hover:opacity-100 transition-opacity">
                            <div class="absolute inset-0 bg-slate-900/40 dark:bg-darkslate-950/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 backdrop-blur-sm">
                                <button onclick="document.getElementById('keycardPhotoInput').click()" class="bg-white/90 dark:bg-white/10 text-slate-800 dark:text-white border border-transparent dark:border-white/20 px-5 py-2.5 rounded-xl text-sm font-bold flex items-center hover:bg-white dark:hover:bg-white/20 transition-all transform hover:scale-105 shadow-md">
                                    <i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i> ถ่ายภาพใหม่
                                </button>
                            </div>
                        </div>

                        <button id="btnTakePhoto" onclick="document.getElementById('keycardPhotoInput').click()" class="w-full flex flex-col items-center justify-center py-8 bg-slate-50 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-golden-600 dark:hover:text-golden-400 rounded-xl text-sm font-bold transition-all border border-slate-200 dark:border-slate-700 border-dashed group">
                            <div class="bg-white dark:bg-slate-900 p-3.5 rounded-full shadow-sm dark:shadow-inner mb-3 group-hover:scale-110 dark:group-hover:bg-slate-950 transition-all border border-slate-100 dark:border-slate-800">
                                <i data-lucide="camera" class="w-6 h-6 text-golden-500"></i>
                            </div>
                            <span id="takePhotoText">แตะเพื่อถ่ายภาพคีย์การ์ด</span>
                        </button>
                        
                        <p id="photoErrorMsg" class="text-red-500 dark:text-red-400 text-xs text-center mt-2.5 hidden bg-red-50 dark:bg-red-500/10 py-1.5 rounded-lg border border-red-100 dark:border-red-500/20 font-medium">
                            <i data-lucide="alert-circle" class="w-3.5 h-3.5 inline mr-1 -mt-0.5"></i>กรุณาถ่ายภาพคีย์การ์ดเพื่อยืนยันสิทธิ์
                        </p>
                    </div>
                </div>
                
                <button id="btnConfirmCard" onclick="confirmVerification()" class="w-full bg-gradient-to-r from-golden-400 to-amber-500 dark:from-golden-500 dark:to-amber-600 text-white font-bold py-4 px-4 rounded-xl shadow-md hover:shadow-lg dark:hover:shadow-[0_0_20px_rgba(245,158,11,0.4)] active:scale-[0.98] transition-all duration-200 border border-transparent dark:border-amber-400/50">
                    บันทึกข้อมูล
                </button>
            </div>
        </div>
    </div>

    <!-- Modal แก้ไขข้อมูลบ้าน -->
    <div id="editInfoModal" class="fixed inset-0 z-50 hidden flex flex-col justify-end sm:items-center sm:justify-center bg-slate-900/60 dark:bg-darkslate-950/80 backdrop-blur-md transition-opacity duration-300">
        <div id="editModalContent" class="bg-white dark:bg-slate-900 w-full max-w-md rounded-t-[32px] sm:rounded-[28px] overflow-hidden shadow-[0_-10px_40px_rgba(0,0,0,0.1)] dark:shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border border-slate-100 dark:border-slate-700 modal-enter transform transition-transform">
            <div class="px-6 pt-6 pb-3 flex justify-between items-center border-b border-slate-100 dark:border-slate-800">
                <h3 class="text-lg font-bold text-slate-800 dark:text-white flex items-center">
                    <span class="bg-golden-50 dark:bg-golden-500/20 p-1.5 rounded-lg mr-2 border border-golden-100 dark:border-golden-500/20">
                        <i data-lucide="edit" class="w-4 h-4 text-golden-500 dark:text-golden-400"></i>
                    </span>
                    แก้ไขข้อมูลบ้าน ✏️
                </h3>
                <button onclick="closeEditInfoModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-white bg-slate-50 dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 p-1.5 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto max-h-[70vh]">
                <form id="editInfoForm" class="space-y-4 text-left">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wide">ชื่อ-นามสกุล เจ้าบ้าน</label>
                        <input type="text" id="inputOwnerName" class="w-full px-4 py-3.5 rounded-xl glass-input transition-all font-medium">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wide">เบอร์โทรศัพท์ติดต่อ</label>
                        <input type="tel" id="inputPhone" class="w-full px-4 py-3.5 rounded-xl glass-input transition-all font-medium">

        async function fetchHouseDataFromSupabase(lineUid) {
            // 1. ค้นหาข้อมูลผู้ใช้จากตาราง userhome ตามที่ถูกต้อง
            const { data: userRecords, error: userError } = await supabaseClient
                .from('userhome') 
                .select('*')
                .eq('uid', lineUid)
                .limit(1);

            if (userError) throw new Error("ฐานข้อมูล userhome: " + userError.message);

            const userRecord = userRecords && userRecords.length > 0 ? userRecords[0] : null;

            if (!userRecord || !userRecord.house_no) throw "USER_NOT_FOUND";

            const houseNo = userRecord.house_no.trim();

            const { data: cardsRecord, error: cardsError } = await supabaseClient
                .from('rfid') 
                .select('*')
                .eq('house_number', houseNo)
                .order('created_at', { ascending: false });

            if (cardsError) throw new Error("ฐานข้อมูล rfid: " + cardsError.message);

                    img: c.img,

        async function compressImage(file, maxWidth = 800, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scaleSize = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scaleSize;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                        }, 'image/jpeg', quality);
                    };
                };
            });
        }

            }

            document.getElementById('confirmModalTitle').innerHTML = isEdit ? 'แก้ไขข้อมูลคีย์การ์ด ✏️' : 'ยืนยันการใช้งานคีย์การ์ด ✨';
            const btnConfirm = document.getElementById('btnConfirmCard');
            btnConfirm.innerHTML = isEdit ? '<i data-lucide="save" class="w-5 h-5 inline mr-1.5 -mt-0.5"></i> บันทึกการแก้ไข' : '<i data-lucide="send" class="w-5 h-5 inline mr-1.5 -mt-0.5"></i> ยืนยันสิทธิ์และส่งตรวจสอบ';
            btnConfirm.classList.remove('pointer-events-none'); 
            
            currentCapturedPhoto = null;
            document.getElementById('keycardPhotoInput').value = '';
            document.getElementById('photoErrorMsg').classList.add('hidden');

            const cardIndex = currentKeycards.findIndex(c => c.id === cardDbId);
            const existingImg = cardIndex !== -1 ? currentKeycards[cardIndex].img : null;

            if (isEdit && existingImg) {
                document.getElementById('photoPreview').src = existingImg;
                document.getElementById('photoPreviewContainer').classList.remove('hidden');
                document.getElementById('btnTakePhoto').classList.add('hidden');
            } else {
                document.getElementById('photoPreviewContainer').classList.add('hidden');
                document.getElementById('btnTakePhoto').classList.remove('hidden');
                document.getElementById('takePhotoText').textContent = isEdit ? 'แตะเพื่อถ่ายภาพใหม่' : 'แตะเพื่อถ่ายภาพคีย์การ์ด';
            }
            
            toggleModal('confirmModal', 'modalContent', true);
            lucide.createIcons();
        }

        function closeConfirmModal() {
            toggleModal('confirmModal', 'modalContent', false);
            targetCardIdToConfirm = null;
            currentCapturedPhoto = null;
        }

        function previewKeycardPhoto(event) {
            const file = event.target.files[0];
            if (file) {
                currentCapturedPhoto = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('photoPreview').src = e.target.result;
                    document.getElementById('photoPreviewContainer').classList.remove('hidden');
                    document.getElementById('btnTakePhoto').classList.add('hidden');
                    document.getElementById('photoErrorMsg').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        async function confirmVerification() {
            if (!targetCardIdToConfirm) return;

            const cardIndex = currentKeycards.findIndex(c => c.id === targetCardIdToConfirm);
            if (cardIndex === -1) return;
            const currentCard = currentKeycards[cardIndex];

            if (!isEditCardMode && !currentCapturedPhoto) {
                document.getElementById('photoErrorMsg').classList.remove('hidden');
                const modalContent = document.getElementById('modalContent');
                modalContent.classList.add('animate-[shake_0.4s_ease-in-out]');
                setTimeout(() => modalContent.classList.remove('animate-[shake_0.4s_ease-in-out]'), 400);
                return;
            }

            const btn = document.getElementById('btnConfirmCard');
            btn.innerHTML = '<div class="flex items-center justify-center"><div class="w-5 h-5 border-2 border-slate-900 border-t-transparent rounded-full animate-spin mr-2"></div>กำลังบันทึกข้อมูล...</div>';
            btn.classList.add('pointer-events-none');

            try {
                let imageUrl = currentCard.img;

                if (currentCapturedPhoto) {
                    const compressedFile = await compressImage(currentCapturedPhoto, 800, 0.7);
                    const fileName = `keycard_${targetCardIdToConfirm}_${Date.now()}.jpg`;
                    
                    const { data: uploadData, error: uploadError } = await supabaseClient.storage
                        .from('keycard_images')
                        .upload(fileName, compressedFile, { upsert: true });

                    if (uploadError) {
                        console.error("Storage Error: ", uploadError);
                        throw new Error("ระบบเก็บรูปภาพมีปัญหา: " + uploadError.message);
                    }

                    const { data: publicUrlData } = supabaseClient.storage
                        .from('keycard_images')
                        .getPublicUrl(fileName);
                    imageUrl = publicUrlData.publicUrl;
                }

                const selectedRole = document.getElementById('selectCardHolder').value;

                // อัปเดตตาราง rfid
                const { error: updateError } = await supabaseClient
                    .from('rfid')
                    .update({ 
                        status: 'reviewing',
                        holder_name: selectedRole,
                        img: imageUrl 
                    })
                    .eq('id', targetCardIdToConfirm);

                if (updateError) {
                    console.error("DB Update Error: ", updateError);
                    throw new Error("ระบบฐานข้อมูลมีปัญหา: " + updateError.message);
                }

                currentKeycards[cardIndex].status = 'reviewing';
                currentKeycards[cardIndex].holder_name = selectedRole;
                currentKeycards[cardIndex].img = imageUrl;

                closeConfirmModal();
                renderKeycards();

            } catch (error) {
                console.error('Confirm Verification Catch:', error);
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล\n\nสาเหตุ: " + error.message);
            } finally {
                btn.innerHTML = isEditCardMode ? '<i data-lucide="save" class="w-5 h-5 inline mr-1.5 -mt-0.5"></i> บันทึกการแก้ไข' : '<i data-lucide="send" class="w-5 h-5 inline mr-1.5 -mt-0.5"></i> ยืนยันสิทธิ์และส่งตรวจสอบ';
                btn.classList.remove('pointer-events-none');
                lucide.createIcons();
            }
        }

        // ==========================================
        // ยกเลิกบัตร / ระบุไม่ใช้งาน
        // ==========================================
        async function cancelCard(cardId, type) {
            const confirmMessage = type === 'reject' 
                ? "คุณต้องการระบุว่า 'ไม่ใช้งาน' บัตรใบนี้ใช่หรือไม่?\n(ระบบจะเปลี่ยนสถานะเป็นระงับการใช้งาน)" 
                : "คุณต้องการ 'แจ้งยกเลิก' การใช้งานบัตรใบนี้ใช่หรือไม่?\n(ระบบจะเปลี่ยนสถานะเป็นระงับการใช้งาน)";
                
            if(!confirm(confirmMessage)) return;

            document.getElementById('loadingText').textContent = "กำลังดำเนินการ...";
            document.getElementById('loadingScreen').style.display = 'flex';

            try {
                const { error } = await supabaseClient
                    .from('rfid')
                    .update({ 
                        status: 'suspended'
                    })
                    .eq('id', cardId);

                if (error) throw error;

                const cardIndex = currentKeycards.findIndex(c => c.id === cardId);
                if(cardIndex !== -1) {
                    currentKeycards[cardIndex].status = 'suspended';
                }

                renderKeycards();
            } catch (error) {
                console.error('Cancel Card Error:', error);
                alert("เกิดข้อผิดพลาดในการดำเนินการ\nสาเหตุ: " + error.message);
            } finally {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('loadingText').textContent = "กำลังดึงข้อมูลส่วนตัวของคุณ... ✨";
            }
        }

        // ==========================================
        // ระบบ Update ข้อมูลบ้าน (userhome)
        // ==========================================
        function openEditInfoModal() {
            document.getElementById('inputOwnerName').value = currentHouseData.owner_name;
            document.getElementById('inputPhone').value = currentHouseData.phone;
            document.getElementById('inputMembers').value = currentHouseData.members_count;
            toggleModal('editInfoModal', 'editModalContent', true);
        }

        function closeEditInfoModal() {
            toggleModal('editInfoModal', 'editModalContent', false);
        }

        async function saveHouseInfo() {
            const btn = document.getElementById('btnSaveHouse');
            btn.innerHTML = '<div class="flex justify-center items-center"><div class="w-5 h-5 border-2 border-slate-50 dark:border-slate-900 border-t-transparent rounded-full animate-spin mr-2"></div>กำลังบันทึก...</div>';
            btn.classList.add('pointer-events-none'); 

            const newName = document.getElementById('inputOwnerName').value || '-';
            const newPhone = document.getElementById('inputPhone').value || '-';
            const newCount = document.getElementById('inputMembers').value || 1;

            try {
                // อัปเดตตาราง userhome
                const { error } = await supabaseClient
                    .from('userhome')
                    .update({
                        fullname: newName,
                        phone: newPhone,
                        member_count: newCount
                    })
                    .eq('uid', loggedInLineUid);

                if (error) {
                    console.error("Save House Info DB Error: ", error);
                    throw new Error(error.message);
                }

                currentHouseData.owner_name = newName;
                currentHouseData.phone = newPhone;
                currentHouseData.members_count = newCount;
                
                closeEditInfoModal();
                renderHouseInfo();

            } catch (error) {
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูลบ้าน\nสาเหตุ: " + error.message);
            } finally {
                btn.innerHTML = 'บันทึกข้อมูล';
                btn.classList.remove('pointer-events-none');
            }
        }

        function toggleModal(modalId, contentId, isShow) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(contentId);
            if (isShow) {
                modal.classList.remove('hidden');
                setTimeout(() => { content.classList.remove('modal-enter'); content.classList.add('modal-enter-active'); }, 10);
            } else {
                content.classList.remove('modal-enter-active'); content.classList.add('modal-exit-active');
                setTimeout(() => { modal.classList.add('hidden'); content.classList.remove('modal-exit-active'); content.classList.add('modal-enter'); }, 200);
            }
        }

        window.onload = () => {
            lucide.createIcons();
            initializeApp();
        };
    </script>
</body>
</html>
