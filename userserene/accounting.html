    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes toastSlideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastSlideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
        .toast-in { animation: toastSlideIn 0.3s ease-out forwards; }
        .toast-out { animation: toastSlideOut 0.3s ease-in forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-content-in { animation: modalFadeIn 0.2s ease-out forwards; }
        .budget-bar { position: relative; height: 24px; background: #f1f5f9; border-radius: 12px; overflow: hidden; }
        .budget-bar-fill { position: absolute; inset: 0 auto 0 0; transition: width 0.5s ease-out; border-radius: 12px; }
        .budget-bar-fill.safe { background: linear-gradient(90deg, #10b981, #059669); }
        .budget-bar-fill.warning { background: linear-gradient(90deg, #f59e0b, #d97706); }
        .budget-bar-fill.danger { background: linear-gradient(90deg, #ef4444, #b91c1c); }
        .public-badge { background: linear-gradient(135deg, #10b981, #047857); }
        @media print {
            body { background-color: #ffffff; margin: 0; padding: 0; }
            @page { margin: 10mm; size: A4 portrait; }
            .print-exact { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .print-hide { display: none !important; }
        }
    </style>
</head>
<body class="text-gray-800 pb-10 h-screen overflow-y-auto">

    <script>
    'use strict';
    // ============================================================
    // CONFIG & STATE
    // ============================================================
    const SUPABASE_URL = 'https://kiumelolsilduqnvrekf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpdW1lbG9sc2lsZHVxbnZyZWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwODUyNzYsImV4cCI6MjA3MjY2MTI3Nn0.3hCFJiDrkgNJQEggS8MkRnxlhvqIMAax_a73NJq14gU';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const MAX_FILE_SIZE_BYTES = 10 * 1024 * 1024;
    const STORAGE_BUCKET = 'gls_receipts'; // ใช้ bucket เดิมสำหรับทุกไฟล์

    // Global data
    let categories = { income: [], expense_fixed: [], expense_irregular: [] };
    let allTransactions = [];
    let budgets = [], assets = [], contracts = [], users = [], menuPerms = [];
    let settings = {}; // key-value
    let currentUser = null; // { username, display_name, role }
    let currentFilterCategory = 'all';
    let barChartInstance = null, donutChartInstance = null;
    let pnlState = { incomeGroups: [], expenseGroups: [] };
    let currentTab = 'dashboard';

    // role_to_permission mapping (client-side derivation)
    function rolePermissions(role) {
        if (role === 'admin')      return { can_edit: true,  can_delete: true,  can_set_budget: true,  can_manage_users: true, can_view_audit: true };
        if (role === 'accountant') return { can_edit: true,  can_delete: false, can_set_budget: false, can_manage_users: false, can_view_audit: false };
        return { can_edit: false, can_delete: false, can_set_budget: false, can_manage_users: false, can_view_audit: false };
    }

    // ============================================================
    // UTILITIES
    // ============================================================
    function escapeHtml(s) {
        if (s === null || s === undefined) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    const escapeAttr = escapeHtml;

    async function sha256(text) {
        const buf = new TextEncoder().encode(text);
        const hash = await crypto.subtle.digest('SHA-256', buf);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function fmtBaht(n) { return new Intl.NumberFormat('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2}).format(n || 0); }
    function fmtDate(d) { if (!d) return '-'; return new Date(d).toLocaleDateString('th-TH', {day:'2-digit', month:'short', year:'numeric'}); }
    function fmtDateTime(d) { if (!d) return '-'; return new Date(d).toLocaleString('th-TH', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'}); }
    function generateId() { return Math.random().toString(36).slice(2, 11); }

    function showToast(msg, type='info', duration=3500) {
        const container = document.getElementById('toastContainer');
        const id = 'toast_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
        const config = ({
            success: {bg:'bg-emerald-600', icon:'ph-check-circle'},
            error:   {bg:'bg-red-600', icon:'ph-x-circle'},
            warning: {bg:'bg-amber-500', icon:'ph-warning-circle'},
            info:    {bg:'bg-blue-600', icon:'ph-info'}
        })[type] || {bg:'bg-gray-700', icon:'ph-info'};
        const t = document.createElement('div');
        t.id = id;
        t.className = `${config.bg} text-white rounded-xl shadow-2xl px-4 py-3 flex items-center gap-3 min-w-[280px] max-w-sm toast-in pointer-events-auto`;
        t.innerHTML = `<i class="ph ${config.icon} text-2xl shrink-0"></i><span class="text-sm font-medium flex-1">${escapeHtml(msg)}</span><button onclick="document.getElementById('${id}').remove()" class="opacity-70 hover:opacity-100 shrink-0"><i class="ph ph-x text-lg"></i></button>`;
        container.appendChild(t);
        setTimeout(() => { t.classList.replace('toast-in','toast-out'); setTimeout(() => t.remove(), 300); }, duration);
    }

    function customConfirm(msg, title='ยืนยัน', okText='ยืนยัน', isDanger=true) {
        return new Promise(resolve => {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = msg;
            const okBtn = document.getElementById('confirmOkBtn');
            okBtn.textContent = okText;
            okBtn.className = isDanger
                ? 'flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700 shadow-md'
                : 'flex-1 py-3 rounded-xl bg-emerald-600 text-white font-bold hover:bg-emerald-700 shadow-md';
            const modal = document.getElementById('confirmModal');
            modal.classList.remove('hidden');
            const close = (r) => { modal.classList.add('hidden'); okBtn.onclick = null; document.getElementById('confirmCancelBtn').onclick = null; resolve(r); };
            okBtn.onclick = () => close(true);
            document.getElementById('confirmCancelBtn').onclick = () => close(false);
        });
    }

    function customPrompt(msg, def='', title='แก้ไข', isPassword=false) {
        return new Promise(resolve => {
            document.getElementById('promptTitle').textContent = title;
            document.getElementById('promptMessage').textContent = msg;
            const input = document.getElementById('promptInput');
            input.type = isPassword ? 'password' : 'text';
            input.value = def;
            const modal = document.getElementById('promptModal');
            modal.classList.remove('hidden');
            setTimeout(() => input.focus(), 50);
            const okBtn = document.getElementById('promptOkBtn');
            const cancelBtn = document.getElementById('promptCancelBtn');
            const close = (r) => { modal.classList.add('hidden'); okBtn.onclick = null; cancelBtn.onclick = null; input.onkeydown = null; resolve(r); };
            okBtn.onclick = () => close(input.value.trim());
            cancelBtn.onclick = () => close(null);
            input.onkeydown = (e) => { if (e.key==='Enter'){e.preventDefault();close(input.value.trim());} else if (e.key==='Escape') close(null); };
        });
    }

    function customFormModal(title, innerHTML, okText='บันทึก') {
        return new Promise(resolve => {
            const bg = document.createElement('div');
            bg.className = 'fixed inset-0 bg-black/60 z-[150] flex items-center justify-center backdrop-blur-sm px-4 print:hidden overflow-y-auto py-8';
            bg.innerHTML = `<div class="bg-white w-full max-w-md rounded-2xl overflow-hidden shadow-2xl modal-content-in my-auto"><div class="p-6"><h3 class="text-lg font-bold text-gray-800 mb-5">${escapeHtml(title)}</h3><div>${innerHTML}</div><div class="flex gap-3 mt-6"><button data-act="cancel" class="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-bold hover:bg-gray-200">ยกเลิก</button><button data-act="ok" class="flex-1 py-3 rounded-xl bg-emerald-600 text-white font-bold hover:bg-emerald-700">${escapeHtml(okText)}</button></div></div></div>`;
            document.body.appendChild(bg);
            const close = v => { document.body.removeChild(bg); resolve(v); };
            bg.querySelector('[data-act="ok"]').onclick = () => close(true);
            bg.querySelector('[data-act="cancel"]').onclick = () => close(false);
        });
    }

    function showLoading() { document.getElementById('loadingOverlay').classList.remove('hidden','opacity-0'); }
    function hideLoading() { const el = document.getElementById('loadingOverlay'); el.classList.add('opacity-0'); setTimeout(() => el.classList.add('hidden'), 300); }

    // ============================================================
    // PERMISSIONS
    // ============================================================
    function currentRole() {
        return currentUser ? currentUser.role : 'public';
    }
    function hasPermission(perm) {
        const r = currentRole();
        return !!rolePermissions(r)[perm];
    }
    function canSeeMenu(menuKey) {
        const r = currentRole();
        // admin ต้องเห็นทุกเมนูเสมอ (ห้ามโดน DB ล็อกตัวเองออก)
        if (r === 'admin') return true;
        const defaults = {
            public: ['dashboard','pnl','balanceSheet','cashflow','budget','assets','contracts','reports'],
            viewer: ['dashboard','pnl','balanceSheet','cashflow','budget','assets','contracts','reports'],
            accountant: ['dashboard','pnl','balanceSheet','cashflow','budget','admin','manage','assets','contracts','recon','reports'],
            admin: ['dashboard','pnl','balanceSheet','cashflow','budget','admin','manage','assets','contracts','recon','reports','audit','settings']
        };
        // ลองหา row ใน DB ก่อน
        const p = menuPerms.find(x => x.role === r && x.menu_key === menuKey);
        if (p) return p.is_visible;
        // ถ้า row ไม่เจอ → ใช้ default
        return (defaults[r] || []).includes(menuKey);
    }
    function requirePermission(perm, msg) {
        if (!hasPermission(perm)) { showToast(msg || 'คุณไม่มีสิทธิ์ในการดำเนินการนี้', 'error'); return false; }
        return true;
    }
    function updateNavVisibility() {
        document.querySelectorAll('#mainNavBar button[data-tab]').forEach(btn => {
            const key = btn.dataset.tab;
            btn.style.display = canSeeMenu(key) ? '' : 'none';
        });
    }

    // ============================================================
    // TELEGRAM NOTIFICATIONS (FEATURE v3 #8)
    // ============================================================
    async function sendTelegram(message) {
        if (settings.telegram_enabled !== 'true') return;
        const token = settings.telegram_token;
        const chatId = settings.telegram_chat_id;
        if (!token || !chatId) return;
        try {
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'HTML' })
            });
        } catch (err) { console.warn('Telegram failed:', err); }
    }

    function notifyAction(action, tableName, summary) {
        // check which action to notify
        const keyMap = { INSERT:'notify_on_insert', UPDATE:'notify_on_update', DELETE:'notify_on_delete' };
        const key = keyMap[action];
        if (key && settings[key] !== 'true') return;
        const emoji = { INSERT:'🟢', UPDATE:'🟡', DELETE:'🔴' }[action] || 'ℹ️';
        const actor = currentUser ? `${currentUser.display_name} (${currentUser.username})` : 'unknown';
        const time = new Date().toLocaleString('th-TH', {dateStyle:'short', timeStyle:'short'});

    async function logAudit(tableName, recordId, action, oldValues, newValues, notes) {
        try {
            const changedFields = [];
            if (action === 'UPDATE' && oldValues && newValues) {
                for (const k of Object.keys(newValues)) {
                    if (JSON.stringify(oldValues[k]) !== JSON.stringify(newValues[k])) changedFields.push(k);
                }
            }
            await supabaseClient.from('gls_audit_log').insert([{
                table_name: tableName,
                record_id: String(recordId),
                action: action,
                actor_role: currentUser ? currentUser.role : 'public',
                actor_user: currentUser ? currentUser.username : null,
                old_values: oldValues || null,
                new_values: newValues || null,
                changed_fields: changedFields.length > 0 ? changedFields : null,
                user_agent: navigator.userAgent.substring(0, 200),
                notes: notes || null
            }]);
        } catch (err) { console.warn('Audit log failed:', err); }
    }

    function validateFile(file) {
        if (!file) return;
        if (file.size > MAX_FILE_SIZE_BYTES) throw new Error('ไฟล์ใหญ่เกินไป (สูงสุด 10 MB)');
        const allowed = ['image/jpeg','image/png','image/gif','image/webp','application/pdf'];
        if (!allowed.includes(file.type)) throw new Error('ประเภทไฟล์ไม่รองรับ');
    }

    function validateTx({amount, date, categoryName}) {
        const amt = parseFloat(amount);
        if (isNaN(amt) || amt <= 0) throw new Error('จำนวนเงินต้องมากกว่า 0');
        if (amt > 999999999) throw new Error('จำนวนเงินเกินขีดจำกัด');
        if (!date) throw new Error('กรุณาระบุวันที่');
        const d = new Date(date);
        if (isNaN(d.getTime())) throw new Error('วันที่ไม่ถูกต้อง');
        const maxF = new Date(); maxF.setFullYear(maxF.getFullYear() + 1);
        if (d > maxF) throw new Error('ไม่สามารถบันทึกวันที่ในอนาคตเกิน 1 ปี');
        if (!categoryName || !categoryName.trim()) throw new Error('กรุณาระบุหมวดหมู่');
    }

    function extractStorageFileName(url) {
        if (!url || typeof url !== 'string') return null;
        try { const m = url.match(/\/storage\/v1\/object\/public\/[^/]+\/(.+)$/); return m ? decodeURIComponent(m[1]) : null; } catch { return null; }
    }

    async function uploadFileAndGetUrl(file, oldUrl=null) {
        validateFile(file);
        const ext = file.name.split('.').pop().toLowerCase();
        const fname = `${Date.now()}_${Math.random().toString(36).substring(2,10)}.${ext}`;
        const { error: upErr } = await supabaseClient.storage.from(STORAGE_BUCKET).upload(fname, file);
        if (upErr) throw new Error('อัปโหลดล้มเหลว: ' + upErr.message);
        const { data: urlData } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(fname);
        if (oldUrl) {
            const old = extractStorageFileName(oldUrl);
            if (old) supabaseClient.storage.from(STORAGE_BUCKET).remove([old]).catch(e => console.warn(e));
        }
        return urlData.publicUrl;
    }

    async function uploadMultipleFiles(files) {
        const urls = [];
        for (const f of files) {
            const url = await uploadFileAndGetUrl(f);
            urls.push(url);
        }
        return urls;
    }

    async function handleCategoryCreation(type, name) {
        const clean = name.trim();
        if (!clean) throw new Error('ชื่อหมวดหมู่ว่าง');
        if (clean.length > 100) throw new Error('ชื่อหมวดหมู่ยาวเกินไป');
        const existing = categories[type].find(c => c.name.toLowerCase() === clean.toLowerCase());
        if (existing) return existing.id;
        const { data, error } = await supabaseClient.from('gls_categories').insert([{type, name:clean}]).select();
        if (error) throw new Error('สร้างหมวดหมู่ล้มเหลว: ' + error.message);
        await logAudit('gls_categories', data[0].id, 'INSERT', null, data[0], 'auto-created');
        await loadCategories();
        return data[0].id;
    }

    function csvEscape(val) {
        if (val === null || val === undefined) return '';
        const s = String(val);
        if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) return '"' + s.replace(/"/g, '""') + '"';
        return s;
    }
    function parseCSVLine(line) {
        const r = []; let cur = ''; let inQ = false;
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
            else if (c === ',' && !inQ) { r.push(cur); cur = ''; }
            else cur += c;
        }
        r.push(cur); return r.map(s => s.trim());
    }
    function downloadCSV(filename, content) {
        const blob = new Blob(['\uFEFF' + content], {type:'text/csv;charset=utf-8;'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function updateDashboardStats(filteredTxs, sM, sY) {
        let ti=0, te=0;
        const expCat = {};
        const monthly = {income:Array(12).fill(0), expense:Array(12).fill(0)};
        const daily = {};
        filteredTxs.forEach(tx => {
            const a = parseFloat(tx.amount) || 0;
            const d = new Date(tx.transaction_date);
            const mi = d.getMonth(), day = d.getDate();
            if (tx.transaction_type === 'income') { ti += a; monthly.income[mi] += a; if (!daily[day]) daily[day]={income:0,expense:0}; daily[day].income += a; }
            else { te += a; monthly.expense[mi] += a; const cn = tx.gls_categories ? tx.gls_categories.name : 'อื่นๆ'; expCat[cn] = (expCat[cn]||0)+a; if (!daily[day]) daily[day]={income:0,expense:0}; daily[day].expense += a; }
        });
        const si = document.getElementById('sumIncome'); if (si) si.textContent = fmtBaht(ti);
        const se = document.getElementById('sumExpense'); if (se) se.textContent = fmtBaht(te);
        const sn = document.getElementById('sumNet'); if (sn) sn.textContent = fmtBaht(ti - te);
        if (barChartInstance) {
            const titleEl = document.getElementById('barChartTitle');
            if (sM !== 'all' && sY !== 'all') {
                const dim = new Date(parseInt(sY), parseInt(sM), 0).getDate();
                const labels=[], incA=[], expA=[];
                for (let d=1; d<=dim; d++) { labels.push(d); incA.push(daily[d]?daily[d].income:0); expA.push(daily[d]?daily[d].expense:0); }
                barChartInstance.data.labels = labels;
                barChartInstance.data.datasets[0].data = incA;
                barChartInstance.data.datasets[1].data = expA;
                if (titleEl) titleEl.textContent = 'สรุปรายวัน (บาท)';
            } else {
                barChartInstance.data.labels = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
                barChartInstance.data.datasets[0].data = monthly.income;
                barChartInstance.data.datasets[1].data = monthly.expense;
                if (titleEl) titleEl.textContent = 'สรุปรายเดือน (บาท)';
            }
            barChartInstance.update();
        }
        if (donutChartInstance) {
            donutChartInstance.data.labels = Object.keys(expCat);
            donutChartInstance.data.datasets[0].data = Object.values(expCat);
            donutChartInstance.data.datasets[0].backgroundColor = Object.keys(expCat).map((_,i) => {
                const colors = ['#f59e0b','#059669','#10b981','#f97316','#047857','#fbbf24','#ef4444','#8b5cf6','#ec4899','#14b8a6'];
                return colors[i % colors.length];
            });
            donutChartInstance.update();
        }
    }

    function generateBalanceSheet() {
        const asOf = document.getElementById('bsDate').value || new Date().toISOString().split('T')[0];
        document.getElementById('bsSubtitle').textContent = `ณ วันที่ ${fmtDate(asOf)}`;
        let cash = 0;
        allTransactions.forEach(tx => { if (tx.transaction_date <= asOf) { const a = parseFloat(tx.amount)||0; if (tx.transaction_type==='income') cash += a; else cash -= a; } });
        let totalAV = 0;
        const details = [];
        assets.forEach(a => {
            if (a.status === 'disposed' || a.status === 'lost') return;
            if (!a.purchase_date || !a.purchase_cost) return;
            const pd = new Date(a.purchase_date);
            if (pd > new Date(asOf)) return;
            const cost = parseFloat(a.purchase_cost) || 0;
            const salvage = parseFloat(a.salvage_value) || 0;
            const years = a.useful_life_years || 0;
            let bv = cost;
            if (years > 0) {
                const ageYrs = (new Date(asOf) - pd) / (365.25 * 86400000);
                const annualDep = (cost - salvage) / years;
                bv = Math.max(cost - Math.min(cost - salvage, annualDep * ageYrs), salvage);
            }
            totalAV += bv;
            details.push({name: a.name, bookValue: bv});
        });
        const totalLiab = 0;
        const totalAssets = cash + totalAV;
        const equity = totalAssets - totalLiab;

    function generateCashflow() {
        const year = document.getElementById('cfYear').value;
        document.getElementById('cfSubtitle').textContent = `สำหรับปี ${year}`;
        let begin = 0;
        allTransactions.forEach(tx => { if (tx.transaction_date < `${year}-01-01`) { const a = parseFloat(tx.amount)||0; if (tx.transaction_type==='income') begin += a; else begin -= a; } });
        let opIn=0, opOut=0, invOut=0;
        allTransactions.forEach(tx => { if (!tx.transaction_date.startsWith(year)) return; const a = parseFloat(tx.amount)||0; if (tx.transaction_type==='income') opIn += a; else opOut += a; });
        assets.forEach(a => { if (a.purchase_date && a.purchase_date.startsWith(year)) invOut += parseFloat(a.purchase_cost||0); });
        const opNet = opIn - opOut;
        const invNet = -invOut;
        const netChange = opNet + invNet;
        const end = begin + netChange;
        const fmtP = v => v >= 0 ? fmtBaht(v) : '(' + fmtBaht(Math.abs(v)) + ')';
        document.getElementById('cfContent').innerHTML = `<table class="w-full text-sm"><tr class="font-bold bg-emerald-50 print-exact" style="background-color:#ecfdf5;"><td class="py-2 px-2">1. กิจกรรมดำเนินงาน</td><td class="py-2 px-2 text-right"></td></tr><tr class="border-b border-gray-100"><td class="py-1.5 px-2 pl-6">รายรับ</td><td class="py-1.5 px-2 text-right">${fmtBaht(opIn)}</td></tr><tr class="border-b border-gray-100"><td class="py-1.5 px-2 pl-6">รายจ่าย</td><td class="py-1.5 px-2 text-right text-red-600">(${fmtBaht(opOut)})</td></tr><tr class="border-y border-gray-300 font-bold"><td class="py-2 px-2">เงินสดสุทธิจากกิจกรรมดำเนินงาน</td><td class="py-2 px-2 text-right ${opNet>=0?'text-emerald-700':'text-red-600'}">${fmtP(opNet)}</td></tr><tr class="font-bold bg-blue-50 print-exact" style="background-color:#eff6ff;"><td class="py-2 px-2 pt-4">2. กิจกรรมลงทุน</td><td></td></tr><tr class="border-b border-gray-100"><td class="py-1.5 px-2 pl-6">ซื้อทรัพย์สินถาวร</td><td class="py-1.5 px-2 text-right text-red-600">${invOut>0?'('+fmtBaht(invOut)+')':'-'}</td></tr><tr class="border-y border-gray-300 font-bold"><td class="py-2 px-2">เงินสดสุทธิจากกิจกรรมลงทุน</td><td class="py-2 px-2 text-right ${invNet>=0?'text-emerald-700':'text-red-600'}">${fmtP(invNet)}</td></tr><tr class="font-bold bg-amber-50 print-exact" style="background-color:#fef3c7;"><td class="py-2 px-2 pt-4">3. กิจกรรมจัดหาเงิน</td><td></td></tr><tr class="border-b border-gray-100"><td class="py-1.5 px-2 pl-6 text-gray-500 text-xs">(ยังไม่มีในระบบ)</td><td class="py-1.5 px-2 text-right">-</td></tr><tr class="border-y border-gray-300 font-bold"><td class="py-2 px-2">เงินสดสุทธิจากกิจกรรมจัดหาเงิน</td><td class="py-2 px-2 text-right">0.00</td></tr><tr class="border-y-2 border-black font-bold print-exact" style="background-color:#f8fafc;"><td class="py-3 px-2">เงินสดเพิ่มขึ้น/(ลดลง) สุทธิ</td><td class="py-3 px-2 text-right ${netChange>=0?'text-emerald-700':'text-red-600'}">${fmtP(netChange)}</td></tr><tr class="border-b border-gray-300"><td class="py-2 px-2">เงินสดต้นปี</td><td class="py-2 px-2 text-right">${fmtBaht(begin)}</td></tr><tr class="border-y-4 border-double border-black font-bold bg-emerald-100 print-exact" style="background-color:#d1fae5;"><td class="py-3 px-2">เงินสดปลายปี</td><td class="py-3 px-2 text-right text-emerald-800">${fmtBaht(end)}</td></tr></table>`;
    }

    function refreshBudgetView() {
        const year = parseInt(document.getElementById('budgetYearSelector').value);
        const yb = budgets.filter(b => b.fiscal_year === year);
        const actualByCat = {};
        allTransactions.forEach(tx => { if (!tx.transaction_date.startsWith(String(year))) return; actualByCat[tx.category_id] = (actualByCat[tx.category_id]||0) + (parseFloat(tx.amount)||0); });
        let tBudget=0, tActual=0;
        yb.forEach(b => { tBudget += parseFloat(b.budget_amount)||0; tActual += actualByCat[b.category_id]||0; });
        const remaining = tBudget - tActual;
        const pct = tBudget > 0 ? (tActual / tBudget)*100 : 0;
        document.getElementById('budgetSummary').innerHTML = `<div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500"><p class="text-xs text-gray-500 font-medium mb-1">งบทั้งหมด</p><p class="text-xl font-bold text-gray-800">${fmtBaht(tBudget)} ฿</p></div><div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-500"><p class="text-xs text-gray-500 font-medium mb-1">ใช้ไปแล้ว</p><p class="text-xl font-bold text-gray-800">${fmtBaht(tActual)} ฿</p></div><div class="bg-white p-4 rounded-xl shadow-sm border-l-4 ${remaining>=0?'border-emerald-500':'border-red-500'}"><p class="text-xs text-gray-500 font-medium mb-1">คงเหลือ</p><p class="text-xl font-bold ${remaining>=0?'text-emerald-700':'text-red-600'}">${fmtBaht(remaining)} ฿</p></div><div class="bg-gradient-to-br from-emerald-700 to-emerald-900 p-4 rounded-xl shadow-sm text-white"><p class="text-xs text-emerald-200 font-medium mb-1">ความคืบหน้า</p><p class="text-xl font-bold text-amber-400">${pct.toFixed(1)}%</p></div>`;
        const list = document.getElementById('budgetList');
        if (yb.length === 0) { list.innerHTML = `<div class="p-10 text-center text-gray-400"><i class="ph ph-chart-pie-slice text-5xl block mb-2"></i><p>ยังไม่มีการตั้งงบสำหรับปี ${year}</p></div>`; return; }
        list.innerHTML = '';
        const canSet = hasPermission('can_set_budget');
        yb.forEach(b => {
            const actual = actualByCat[b.category_id] || 0;
            const p = b.budget_amount > 0 ? (actual/b.budget_amount)*100 : 0;
            const cls = p >= 100 ? 'danger' : (p >= 80 ? 'warning' : 'safe');
            const catName = b.gls_categories ? b.gls_categories.name : '-';
            const catType = b.gls_categories ? b.gls_categories.type : '';
            const typeLabel = catType==='income'?'รายรับ':(catType==='expense_fixed'?'จ่ายประจำ':'จ่ายไม่ประจำ');
            const typeBg = catType==='income'?'bg-emerald-100 text-emerald-700':'bg-orange-100 text-orange-700';
            list.innerHTML += `<div class="p-4 hover:bg-gray-50"><div class="flex justify-between items-start gap-3 mb-2"><div class="min-w-0 flex-1"><div class="flex items-center gap-2 mb-1 flex-wrap"><span class="font-bold text-sm text-gray-800">${escapeHtml(catName)}</span><span class="text-[10px] px-2 py-0.5 rounded-full font-medium ${typeBg}">${typeLabel}</span></div>${b.notes ? `<p class="text-xs text-gray-500">${escapeHtml(b.notes)}</p>` : ''}</div><div class="text-right shrink-0"><p class="text-sm font-bold text-gray-800">${fmtBaht(actual)} / ${fmtBaht(b.budget_amount)}</p><p class="text-xs ${p>=100?'text-red-600 font-bold':'text-gray-500'}">${p.toFixed(1)}%</p></div>${canSet ? `<div class="flex gap-1 shrink-0"><button onclick="editBudget('${escapeAttr(b.id)}')" class="p-1.5 text-blue-500 hover:bg-blue-50 rounded-lg"><i class="ph ph-pencil-simple"></i></button><button onclick="deleteBudget('${escapeAttr(b.id)}')" class="p-1.5 text-red-500 hover:bg-red-50 rounded-lg"><i class="ph ph-trash"></i></button></div>` : ''}</div><div class="budget-bar"><div class="budget-bar-fill ${cls}" style="width:${Math.min(p,100)}%"></div></div></div>`;
        });
    }

    async function openAddBudgetModal() {
        if (!requirePermission('can_set_budget')) return;
        const year = parseInt(document.getElementById('budgetYearSelector').value);
        const allCats = [...categories.income, ...categories.expense_fixed, ...categories.expense_irregular];
        const existIds = new Set(budgets.filter(b => b.fiscal_year === year).map(b => b.category_id));
        const available = allCats.filter(c => !existIds.has(c.id));
        if (available.length === 0) { showToast('ตั้งงบครบทุกหมวดแล้ว', 'warning'); return; }
        const html = `<div class="mb-4"><label class="block text-sm font-semibold mb-2">หมวดหมู่ *</label><select id="_bgCat" class="w-full border border-gray-300 rounded-xl p-3 text-sm">${available.map(c => { const tl = c.type==='income'?'รายรับ':(c.type==='expense_fixed'?'จ่ายประจำ':'จ่ายไม่ประจำ'); return `<option value="${escapeAttr(c.id)}">[${tl}] ${escapeHtml(c.name)}</option>`; }).join('')}</select></div><div class="mb-4"><label class="block text-sm font-semibold mb-2">จำนวนงบ (บาท) *</label><input type="number" id="_bgAmt" step="0.01" min="0" max="999999999" class="w-full border border-gray-300 rounded-xl p-3 text-sm"></div><div><label class="block text-sm font-semibold mb-2">หมายเหตุ</label><input type="text" id="_bgNotes" maxlength="200" class="w-full border border-gray-300 rounded-xl p-3 text-sm"></div>`;
        const ok = await customFormModal(`ตั้งงบประมาณปี ${year}`, html);
        if (!ok) return;
        const catId = document.getElementById('_bgCat').value;
        const amt = parseFloat(document.getElementById('_bgAmt').value);
        const notes = document.getElementById('_bgNotes').value.trim();
        if (!catId || isNaN(amt) || amt < 0) { showToast('ข้อมูลไม่ครบ', 'warning'); return; }
        try {
            const { data, error } = await supabaseClient.from('gls_budgets').insert([{fiscal_year:year, category_id:catId, budget_amount:amt, notes:notes||null}]).select();
            if (error) throw error;
            await logAudit('gls_budgets', data[0].id, 'INSERT', null, data[0]);
            const catName = allCats.find(c => c.id === catId)?.name || '-';
            notifyAction('INSERT', 'gls_budgets', `หมวด: ${catName}\nงบปี ${year}: ${fmtBaht(amt)} ฿`);
            showToast('ตั้งงบเรียบร้อย', 'success');
            await loadBudgets(); refreshBudgetView();
        } catch (err) { showToast('ผิดพลาด: ' + err.message, 'error'); }
    }

    async function editBudget(id) {
        if (!requirePermission('can_set_budget')) return;
        const b = budgets.find(x => x.id === id);
        if (!b) return;
        const newAmt = await customPrompt(`งบปัจจุบัน: ${fmtBaht(b.budget_amount)}\nใส่ค่าใหม่:`, String(b.budget_amount), 'แก้ไขงบประมาณ');
        if (newAmt === null) return;
        const amt = parseFloat(newAmt);
        if (isNaN(amt) || amt < 0) { showToast('ค่าไม่ถูกต้อง', 'warning'); return; }
        try {
            const { data, error } = await supabaseClient.from('gls_budgets').update({budget_amount:amt}).eq('id', id).select();
            if (error) throw error;
            await logAudit('gls_budgets', id, 'UPDATE', b, data[0]);
            notifyAction('UPDATE', 'gls_budgets', `หมวด: ${b.gls_categories?.name || '-'}\nงบเก่า: ${fmtBaht(b.budget_amount)}\nงบใหม่: ${fmtBaht(amt)}`);
            showToast('อัปเดตแล้ว', 'success');
            await loadBudgets(); refreshBudgetView();
        } catch (err) { showToast('ผิดพลาด: ' + err.message, 'error'); }
    }

    async function deleteBudget(id) {
        if (!requirePermission('can_set_budget')) return;
        const c = await customConfirm('ลบงบประมาณนี้?', 'ยืนยัน', 'ลบ', true);
        if (!c) return;
        try {
            const b = budgets.find(x => x.id === id);
            const { error } = await supabaseClient.from('gls_budgets').delete().eq('id', id);
            if (error) throw error;
            await logAudit('gls_budgets', id, 'DELETE', b, null);
            notifyAction('DELETE', 'gls_budgets', `หมวด: ${b?.gls_categories?.name || '-'}\nจำนวน: ${fmtBaht(b?.budget_amount||0)}`);
            showToast('ลบแล้ว', 'success');
            await loadBudgets(); refreshBudgetView();
        } catch (err) { showToast('ผิดพลาด: ' + err.message, 'error'); }
    }

    async function handleRecordSubmit(e) {

    function exportCSV() {

        allTransactions.forEach(tx => {

        });

    async function importCSV(event) {
        if (!requirePermission('can_edit')) return;
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                let text = e.target.result;
                if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
                const lines = text.split(/\r?\n/).filter(l => l.trim());
                if (lines.length < 2) { showToast('ไฟล์ว่างเปล่า', 'error'); event.target.value = ''; return; }
                const validTypes = ['income','expense_fixed','expense_irregular'];
                const toInsert = [];
                const toCreate = new Map();
                let skipCount = 0;
                showLoading();
                await loadCategories();
                for (let i=1; i<lines.length; i++) {
                    const cols = parseCSVLine(lines[i]);
                    if (cols.length < 4) { skipCount++; continue; }
                    const [date, type, catName, amtRaw, det=''] = cols;
                    if (!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) { skipCount++; continue; }
                    if (!validTypes.includes(type)) { skipCount++; continue; }
                    const amt = parseFloat(amtRaw.replace(/,/g, ''));
                    if (isNaN(amt) || amt <= 0) { skipCount++; continue; }
                    if (!catName) { skipCount++; continue; }
                    let catId = null;
                    const found = categories[type].find(c => c.name.toLowerCase() === catName.toLowerCase());
                    if (found) catId = found.id;
                    else toCreate.set(`${type}::${catName}`, {type, name:catName});
                    toInsert.push({transaction_date:date, transaction_type:type, category_id:catId, _key:catId?null:`${type}::${catName}`, amount:amt, details:det||null});
                }
                hideLoading();
                if (toInsert.length === 0) { showToast(`ไม่พบข้อมูล (ข้าม ${skipCount})`, 'error', 5000); event.target.value = ''; return; }
                const newCount = toCreate.size;
                const ok = await customConfirm(`นำเข้า ${toInsert.length} รายการ\nสร้างหมวดหมู่ใหม่ ${newCount}\nข้าม ${skipCount} บรรทัด\n\nดำเนินการต่อ?`, 'ยืนยันการนำเข้า', 'นำเข้า', false);
                if (!ok) { event.target.value = ''; return; }
                showLoading();
                try {
                    if (newCount > 0) {
                        const arr = Array.from(toCreate.values());
                        const { data: created, error: catErr } = await supabaseClient.from('gls_categories').insert(arr).select();
                        if (catErr) throw new Error('สร้างหมวดหมู่ล้มเหลว: ' + catErr.message);
                        (created||[]).forEach(c => toCreate.set(`${c.type}::${c.name}`, {...toCreate.get(`${c.type}::${c.name}`), id:c.id}));
                        toInsert.forEach(r => { if (r._key) { const cat = toCreate.get(r._key); if (cat?.id) r.category_id = cat.id; } delete r._key; });
                    } else toInsert.forEach(r => delete r._key);
                    const BATCH = 500;
                    for (let i=0; i<toInsert.length; i+=BATCH) {
                        const { error } = await supabaseClient.from('gls_transactions').insert(toInsert.slice(i, i+BATCH));
                        if (error) throw error;
                    }
                    await logAudit('gls_transactions', 'bulk_import', 'INSERT', null, {count:toInsert.length, newCategories:newCount}, 'CSV bulk import');
                    notifyAction('INSERT', 'gls_transactions', `นำเข้า CSV\nจำนวน: ${toInsert.length} รายการ`);
                    showToast(`นำเข้าสำเร็จ ${toInsert.length} รายการ`, 'success', 4500);
                    await loadTransactions();
                    renderManageList();
                } catch (err) { showToast('ผิดพลาด: ' + err.message, 'error', 6000); }
                finally { hideLoading(); event.target.value = ''; }
            } catch (err) { hideLoading(); showToast('ไฟล์ไม่ถูกต้อง: ' + err.message, 'error'); event.target.value = ''; }
        };
        reader.readAsText(file, 'UTF-8');
    }

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100"><h3 class="text-base font-bold mb-5 pb-3 border-b border-gray-100 flex items-center gap-2"><i class="ph ph-check-square-offset text-emerald-500 text-xl"></i> ผลการตรวจสอบ</h3><div class="space-y-4"><div class="flex justify-between items-center bg-gray-50 p-4 rounded-xl"><div><p class="text-xs font-bold text-gray-500 uppercase">ระบบ</p><p class="text-sm text-gray-600">ยอดสะสม</p></div><span id="reconSysBalance" class="text-xl font-bold">0.00 ฿</span></div><div class="flex justify-between items-center bg-blue-50 p-4 rounded-xl"><div><p class="text-xs font-bold text-blue-500 uppercase">Bank</p><p class="text-sm text-blue-700">ยอดที่กรอก</p></div><span id="reconBankDisp" class="text-xl font-bold text-blue-800">0.00 ฿</span></div><div class="border-t border-gray-200 pt-4 flex justify-between items-end"><span class="text-sm font-bold">ผลต่าง</span><span id="reconVariance" class="text-3xl font-bold text-gray-300">0.00 ฿</span></div><div id="reconStatus" class="p-4 rounded-xl text-center font-bold bg-gray-100 text-gray-500 flex items-center justify-center gap-2"><i class="ph ph-dots-three-circle text-2xl"></i> รอการประมวลผล</div></div></div>
            </div></div>`;
        document.getElementById('reconDate').valueAsDate = new Date();

    function calculateRecon() {
        const bank = parseFloat(document.getElementById('reconBankBalance').value);
        const date = document.getElementById('reconDate').value;
        if (!date || isNaN(bank)) { showToast('กรอกข้อมูลให้ครบ', 'warning'); return; }
        let sys = 0;
        allTransactions.forEach(tx => { if (tx.transaction_date <= date) { const a = parseFloat(tx.amount)||0; if (tx.transaction_type==='income') sys += a; else sys -= a; } });
        document.getElementById('reconSysBalance').textContent = fmtBaht(sys) + ' ฿';
        document.getElementById('reconBankDisp').textContent = fmtBaht(bank) + ' ฿';
        const v = bank - sys;
        const vEl = document.getElementById('reconVariance');
        const sEl = document.getElementById('reconStatus');
        vEl.textContent = fmtBaht(Math.abs(v)) + ' ฿';
        if (Math.abs(v) < 0.01) { vEl.className = 'text-3xl font-bold text-emerald-600'; sEl.className = 'p-4 rounded-xl text-center font-bold bg-emerald-50 text-emerald-600 flex items-center justify-center gap-2'; sEl.innerHTML = '<i class="ph ph-check-circle text-2xl"></i> ยอดตรงกัน'; }
        else { vEl.className = 'text-3xl font-bold text-red-500'; sEl.className = 'p-4 rounded-xl text-center font-bold bg-red-50 text-red-500 flex flex-col items-center justify-center gap-1'; sEl.innerHTML = `<div class="flex items-center gap-2"><i class="ph ph-warning-circle text-2xl"></i> ยอดไม่ตรง</div><span class="text-xs">(${v>0?'Bank > ระบบ':'ระบบ > Bank'})</span>`; }
    }

    function renderAssetsList() {
        const canEdit = hasPermission('can_edit');
        const canDelete = hasPermission('can_delete');
        let totalCost = 0, totalBV = 0, active = 0, maintenance = 0;
        const today = new Date();
        assets.forEach(a => {
            if (a.status === 'active') active++;
            if (a.status === 'maintenance') maintenance++;
            const cost = parseFloat(a.purchase_cost) || 0;
            totalCost += cost;
            if (a.purchase_date && a.useful_life_years > 0) {
                const salvage = parseFloat(a.salvage_value) || 0;
                const ageYrs = Math.max(0, (today - new Date(a.purchase_date)) / (365.25 * 86400000));
                const annualDep = (cost - salvage) / a.useful_life_years;
                totalBV += Math.max(cost - Math.min(cost - salvage, annualDep * ageYrs), salvage);
            } else totalBV += cost;
        });
        document.getElementById('assetsStats').innerHTML = `<div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-indigo-500"><p class="text-xs text-gray-500">ทั้งหมด</p><p class="text-lg font-bold">${assets.length}</p></div><div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-emerald-500"><p class="text-xs text-gray-500">ใช้งาน</p><p class="text-lg font-bold text-emerald-700">${active}</p></div><div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-amber-500"><p class="text-xs text-gray-500">ซ่อม</p><p class="text-lg font-bold text-amber-700">${maintenance}</p></div><div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-blue-500"><p class="text-xs text-gray-500">มูลค่าสุทธิ</p><p class="text-lg font-bold text-blue-700">${fmtBaht(totalBV)}</p></div>`;
        const list = document.getElementById('assetsList');
        document.getElementById('assetsCount').textContent = `${assets.length} รายการ`;
        if (assets.length === 0) { list.innerHTML = `<div class="p-10 text-center text-gray-400"><i class="ph ph-buildings text-5xl block mb-2"></i><p>ยังไม่มีทรัพย์สิน</p></div>`; return; }
        list.innerHTML = '';
        assets.forEach(a => {
            const statusMap = { active:{t:'ใช้งาน',c:'bg-emerald-100 text-emerald-700'}, maintenance:{t:'ซ่อม',c:'bg-amber-100 text-amber-700'}, disposed:{t:'จำหน่าย',c:'bg-red-100 text-red-700'}, lost:{t:'สูญหาย',c:'bg-red-100 text-red-700'} };
            const st = statusMap[a.status] || {t:a.status,c:'bg-gray-100 text-gray-700'};
            const imgs = Array.isArray(a.image_urls) ? a.image_urls : [];
            const thumb = imgs.length > 0 ? `<img src="${escapeAttr(imgs[0])}" alt="" class="w-16 h-16 object-cover rounded-lg shrink-0" onerror="this.style.display='none'">` : `<div class="w-16 h-16 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-500 shrink-0"><i class="ph ph-buildings text-2xl"></i></div>`;
            list.innerHTML += `<div class="p-4 hover:bg-gray-50 flex items-start gap-3">${thumb}<div class="flex-1 min-w-0"><div class="flex items-start justify-between gap-2 flex-wrap"><div class="min-w-0 flex-1"><p class="font-bold text-sm text-gray-800 truncate">${escapeHtml(a.name)} ${a.asset_code ? `<span class="text-xs text-gray-500">(${escapeHtml(a.asset_code)})</span>` : ''}</p><p class="text-xs text-gray-500">${escapeHtml(a.category || '')} ${a.location ? '• ' + escapeHtml(a.location) : ''}</p><p class="text-xs text-gray-500 mt-1">ซื้อ ${fmtDate(a.purchase_date)} • ${fmtBaht(a.purchase_cost||0)} ฿${imgs.length > 1 ? ` • <span class="text-indigo-600"><i class="ph ph-images"></i> ${imgs.length} รูป</span>` : ''}</p></div><div class="flex flex-col items-end gap-1"><span class="text-xs px-2 py-0.5 rounded-full font-bold ${st.c}">${st.t}</span><div class="flex gap-1">${canEdit ? `<button onclick="openAssetModal('${escapeAttr(a.id)}')" class="p-1.5 text-blue-500 hover:bg-blue-50 rounded-lg"><i class="ph ph-pencil-simple"></i></button>` : ''}${canDelete ? `<button onclick="deleteAsset('${escapeAttr(a.id)}')" class="p-1.5 text-red-500 hover:bg-red-50 rounded-lg"><i class="ph ph-trash"></i></button>` : ''}</div></div></div></div></div>`;
        });
    }

                <div><label class="text-xs font-medium">ที่ตั้ง</label><input type="text" id="_aLoc" maxlength="200" value="${escapeAttr(a?.location || '')}" class="w-full border rounded-lg p-2 text-sm"></div>

            </div>
            <div><label class="text-xs font-medium">ผู้ขาย</label><input type="text" id="_aSupp" maxlength="200" value="${escapeAttr(a?.supplier || '')}" class="w-full border rounded-lg p-2 text-sm"></div>

            for (const url of window._removedAssetImages || []) {
                const fn = extractStorageFileName(url);
                if (fn) supabaseClient.storage.from(STORAGE_BUCKET).remove([fn]).catch(e => console.warn(e));

                const { data, error } = await supabaseClient.from('gls_assets').update(payload).eq('id', id).select();

            } else {
                const { data, error } = await supabaseClient.from('gls_assets').insert([payload]).select();
                if (error) throw error;
                await logAudit('gls_assets', data[0].id, 'INSERT', null, data[0]);
                notifyAction('INSERT', 'gls_assets', `ชื่อ: ${name}\nราคา: ${fmtBaht(purCost||0)}`);
                showToast('เพิ่มเรียบร้อย', 'success');
            }
            delete window._pendingAssetImages;
            delete window._removedAssetImages;
            await loadAssets();
            renderAssetsList();
        } catch (err) { showToast('ผิดพลาด: ' + err.message, 'error'); }
    }

    window.removeAssetImage = function(idx) {
        const arr = window._pendingAssetImages || [];
        if (idx >= 0 && idx < arr.length) {
            const removed = arr.splice(idx, 1);
            window._removedAssetImages = (window._removedAssetImages || []).concat(removed);
            // re-render modal content
            showToast('จะลบรูปเมื่อบันทึก', 'info', 1500);
            // update UI: find the img element and remove parent
            const modals = document.querySelectorAll('.fixed.bg-black\\/60');
            const last = modals[modals.length-1];
            if (last) {
                const imgs = last.querySelectorAll('.relative.group');
                if (imgs[idx]) imgs[idx].style.display = 'none';
            }
        }
    };

    async function deleteAsset(id) {
        if (!requirePermission('can_delete')) return;
        const a = assets.find(x => x.id === id);
        if (!a) return;
        const c = await customConfirm(`ลบ "${a.name}"?\nไม่สามารถกู้คืนได้`, 'ยืนยันการลบ', 'ลบ', true);
        if (!c) return;
        try {
            if (Array.isArray(a.image_urls)) {
                for (const url of a.image_urls) { const fn = extractStorageFileName(url); if (fn) supabaseClient.storage.from(STORAGE_BUCKET).remove([fn]).catch(e => console.warn(e)); }
            }
            const { error } = await supabaseClient.from('gls_assets').delete().eq('id', id);
            if (error) throw error;
            await logAudit('gls_assets', id, 'DELETE', a, null);
            notifyAction('DELETE', 'gls_assets', `ชื่อ: ${a.name}`);
            showToast('ลบแล้ว', 'success');
            await loadAssets();
            renderAssetsList();
        } catch (err) { showToast('ผิดพลาด: ' + err.message, 'error'); }
    }

    function renderContractsView(host) {

        renderContractsList();
    }

    function renderContractsList() {
        const canEdit = hasPermission('can_edit');
        const canDelete = hasPermission('can_delete');
        const today = new Date();
        let active = 0, expired = 0, expSoon = 0, monthlyTotal = 0;
        contracts.forEach(c => {
            if (c.status === 'active') active++;
            if (c.status === 'expired') expired++;
            const dl = Math.ceil((new Date(c.end_date) - today) / 86400000);
            if ((c.status === 'active' || c.status === 'pending_renewal') && dl >= 0 && dl <= 90) expSoon++;
            if (c.status === 'active') monthlyTotal += parseFloat(c.monthly_cost) || 0;
        });
        document.getElementById('contractsStats').innerHTML = `<div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-emerald-500"><p class="text-xs text-gray-500">ใช้งาน</p><p class="text-lg font-bold text-emerald-700">${active}</p></div><div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-amber-500"><p class="text-xs text-gray-500">ใกล้หมด</p><p class="text-lg font-bold text-amber-700">${expSoon}</p></div><div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-gray-400"><p class="text-xs text-gray-500">หมดแล้ว</p><p class="text-lg font-bold text-gray-500">${expired}</p></div><div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-cyan-500"><p class="text-xs text-gray-500">รายเดือน</p><p class="text-lg font-bold text-cyan-700">${fmtBaht(monthlyTotal)}</p></div>`;
        const list = document.getElementById('contractsList');
        document.getElementById('contractsCount').textContent = `${contracts.length} รายการ`;
        if (contracts.length === 0) { list.innerHTML = `<div class="p-10 text-center text-gray-400"><i class="ph ph-file-text text-5xl block mb-2"></i><p>ยังไม่มีสัญญา</p></div>`; return; }
        list.innerHTML = '';
        contracts.forEach(c => {
            const statusMap = { active:{t:'ใช้งาน',c:'bg-emerald-100 text-emerald-700'}, expired:{t:'หมดอายุ',c:'bg-gray-200 text-gray-600'}, terminated:{t:'ยกเลิก',c:'bg-red-100 text-red-700'}, pending_renewal:{t:'รอต่อ',c:'bg-amber-100 text-amber-700'} };
            const st = statusMap[c.status] || {t:c.status,c:'bg-gray-100 text-gray-700'};
            const dl = Math.ceil((new Date(c.end_date) - today) / 86400000);
            const urgent = (c.status==='active' || c.status==='pending_renewal') && dl >= 0 && dl <= 90;
            const atts = Array.isArray(c.attachment_urls) ? c.attachment_urls : [];
            list.innerHTML += `<div class="p-4 hover:bg-gray-50 ${urgent?'bg-amber-50/30':''}"><div class="flex items-start justify-between gap-3 flex-wrap"><div class="min-w-0 flex-1"><p class="font-bold text-sm text-gray-800 truncate">${escapeHtml(c.vendor_name)} ${c.contract_number ? `<span class="text-xs text-gray-500">(${escapeHtml(c.contract_number)})</span>` : ''}</p><p class="text-xs text-gray-500">${escapeHtml(c.contract_type)} ${c.vendor_contact ? '• ' + escapeHtml(c.vendor_contact) : ''}</p><p class="text-xs mt-1 ${urgent?'text-amber-700 font-bold':'text-gray-500'}">${fmtDate(c.start_date)} - ${fmtDate(c.end_date)} ${urgent ? `• เหลือ ${dl} วัน` : ''}</p>${atts.length > 0 ? `<p class="text-xs text-cyan-600 mt-1"><i class="ph ph-paperclip"></i> แนบ ${atts.length} ไฟล์: ${atts.slice(0,3).map((url,i)=>`<a href="${escapeAttr(url)}" target="_blank" class="underline hover:text-cyan-800">ไฟล์${i+1}</a>`).join(', ')}${atts.length>3?'...':''}</p>` : ''}</div><div class="flex flex-col items-end gap-1"><span class="text-xs px-2 py-0.5 rounded-full font-bold ${st.c}">${st.t}</span>${c.monthly_cost ? `<span class="text-xs font-bold text-gray-600">${fmtBaht(c.monthly_cost)} / เดือน</span>` : ''}<div class="flex gap-1">${canEdit ? `<button onclick="openContractModal('${escapeAttr(c.id)}')" class="p-1.5 text-blue-500 hover:bg-blue-50 rounded-lg"><i class="ph ph-pencil-simple"></i></button>` : ''}${canDelete ? `<button onclick="deleteContract('${escapeAttr(c.id)}')" class="p-1.5 text-red-500 hover:bg-red-50 rounded-lg"><i class="ph ph-trash"></i></button>` : ''}</div></div></div></div>`;
        });
    }

    async function openContractModal(id) {
        if (!requirePermission('can_edit')) return;
        const c = id ? contracts.find(x => x.id === id) : null;
        const existingAtts = c && Array.isArray(c.attachment_urls) ? c.attachment_urls : [];
        const html = `<div class="space-y-3 max-h-[70vh] overflow-y-auto pr-1">
            <div class="grid grid-cols-2 gap-2">
                <div><label class="text-xs font-medium">เลขสัญญา</label><input type="text" id="_cNum" maxlength="50" value="${escapeAttr(c?.contract_number || '')}" class="w-full border rounded-lg p-2 text-sm"></div>
                <div><label class="text-xs font-medium">สถานะ</label><select id="_cStatus" class="w-full border rounded-lg p-2 text-sm"><option value="active" ${c?.status==='active'?'selected':''}>ใช้งาน</option><option value="expired" ${c?.status==='expired'?'selected':''}>หมดอายุ</option><option value="terminated" ${c?.status==='terminated'?'selected':''}>ยกเลิก</option><option value="pending_renewal" ${c?.status==='pending_renewal'?'selected':''}>รอต่อ</option></select></div>
            </div>
            <div><label class="text-xs font-medium">ประเภทสัญญา *</label><input type="text" id="_cType" maxlength="100" value="${escapeAttr(c?.contract_type || '')}" placeholder="เช่น รปภ., แม่บ้าน" class="w-full border rounded-lg p-2 text-sm" required></div>
            <div><label class="text-xs font-medium">ชื่อผู้รับเหมา/บริษัท *</label><input type="text" id="_cVendor" maxlength="200" value="${escapeAttr(c?.vendor_name || '')}" class="w-full border rounded-lg p-2 text-sm" required></div>
            <div><label class="text-xs font-medium">ผู้ติดต่อ</label><input type="text" id="_cContact" maxlength="200" value="${escapeAttr(c?.vendor_contact || '')}" class="w-full border rounded-lg p-2 text-sm"></div>
            <div class="grid grid-cols-2 gap-2">
                <div><label class="text-xs font-medium">เริ่ม *</label><input type="date" id="_cStart" value="${c?.start_date || ''}" class="w-full border rounded-lg p-2 text-sm" required></div>
                <div><label class="text-xs font-medium">สิ้นสุด *</label><input type="date" id="_cEnd" value="${c?.end_date || ''}" class="w-full border rounded-lg p-2 text-sm" required></div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div><label class="text-xs font-medium">ราคา/เดือน</label><input type="number" id="_cMonthly" step="0.01" min="0" value="${c?.monthly_cost || ''}" class="w-full border rounded-lg p-2 text-sm"></div>
                <div><label class="text-xs font-medium">ราคารวม</label><input type="number" id="_cTotal" step="0.01" min="0" value="${c?.total_cost || ''}" class="w-full border rounded-lg p-2 text-sm"></div>
            </div>
            <div><label class="text-xs font-medium">เงื่อนไขชำระ</label><input type="text" id="_cPayTerms" maxlength="200" value="${escapeAttr(c?.payment_terms || '')}" placeholder="เช่น ทุกวันที่ 5" class="w-full border rounded-lg p-2 text-sm"></div>
            <div class="flex items-center gap-2"><input type="checkbox" id="_cAutoRenew" ${c?.auto_renew?'checked':''} class="w-4 h-4"><label for="_cAutoRenew" class="text-sm">ต่ออายุอัตโนมัติ</label></div>
            <div><label class="text-xs font-medium">หมายเหตุ</label><textarea id="_cNotes" rows="2" maxlength="500" class="w-full border rounded-lg p-2 text-sm">${escapeHtml(c?.notes || '')}</textarea></div>
            ${existingAtts.length > 0 ? `<div><label class="text-xs font-medium">ไฟล์แนบปัจจุบัน (${existingAtts.length})</label><div class="space-y-1 mt-1">${existingAtts.map((url,i) => `<div class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg text-xs"><i class="ph ph-file-text text-cyan-600 text-lg"></i><a href="${escapeAttr(url)}" target="_blank" class="flex-1 truncate underline text-cyan-700">ไฟล์ ${i+1}</a><button type="button" onclick="removeContractAttachment(${i})" class="text-red-500 hover:bg-red-50 p-1 rounded"><i class="ph ph-x"></i></button></div>`).join('')}</div></div>` : ''}
            <div><label class="text-xs font-medium">แนบไฟล์/รูป (เลือกได้หลายไฟล์)</label><input type="file" id="_cAttFiles" accept="image/*,.pdf" multiple class="w-full text-xs mt-1"><p class="text-[10px] text-gray-500 mt-1">รูป/PDF ไฟล์ละไม่เกิน 10 MB</p></div>
        </div>`;
        window._pendingContractAtts = existingAtts.slice();
        window._removedContractAtts = [];
        const ok = await customFormModal(id ? 'แก้ไขสัญญา' : 'เพิ่มสัญญา', html);
        if (!ok) { delete window._pendingContractAtts; delete window._removedContractAtts; return; }
        try {
            const vendor = document.getElementById('_cVendor').value.trim();
            const ctype = document.getElementById('_cType').value.trim();
            const startD = document.getElementById('_cStart').value;
            const endD = document.getElementById('_cEnd').value;
            if (!vendor) throw new Error('ใส่ชื่อผู้รับเหมา');
            if (!ctype) throw new Error('ใส่ประเภทสัญญา');
            if (!startD || !endD) throw new Error('ใส่ช่วงสัญญา');
            if (new Date(endD) < new Date(startD)) throw new Error('วันสิ้นสุดต้องหลังเริ่ม');
            const fileInput = document.getElementById('_cAttFiles');
            let newAtts = [...(window._pendingContractAtts || [])];
            if (fileInput.files.length > 0) {
                for (const f of fileInput.files) validateFile(f);
                const uploaded = await uploadMultipleFiles(Array.from(fileInput.files));
                newAtts = newAtts.concat(uploaded);
            }
            const payload = {
                contract_number: document.getElementById('_cNum').value.trim() || null,
                contract_type: ctype,
                vendor_name: vendor,
                vendor_contact: document.getElementById('_cContact').value.trim() || null,
                start_date: startD,
                end_date: endD,
                monthly_cost: parseFloat(document.getElementById('_cMonthly').value) || null,
                total_cost: parseFloat(document.getElementById('_cTotal').value) || null,
                payment_terms: document.getElementById('_cPayTerms').value.trim() || null,
                status: document.getElementById('_cStatus').value,
                auto_renew: document.getElementById('_cAutoRenew').checked,
                notes: document.getElementById('_cNotes').value.trim() || null,
                attachment_urls: newAtts.length > 0 ? newAtts : null
            };
            for (const url of window._removedContractAtts || []) {
                const fn = extractStorageFileName(url);
                if (fn) supabaseClient.storage.from(STORAGE_BUCKET).remove([fn]).catch(e => console.warn(e));
            }
            if (id) {
                const { data, error } = await supabaseClient.from('gls_contracts').update(payload).eq('id', id).select();
                if (error) throw error;
                await logAudit('gls_contracts', id, 'UPDATE', c, data[0]);
                notifyAction('UPDATE', 'gls_contracts', `ผู้รับเหมา: ${vendor}\nประเภท: ${ctype}`);
                showToast('อัปเดตเรียบร้อย', 'success');
            } else {
                const { data, error } = await supabaseClient.from('gls_contracts').insert([payload]).select();
                if (error) throw error;
                await logAudit('gls_contracts', data[0].id, 'INSERT', null, data[0]);
                notifyAction('INSERT', 'gls_contracts', `ผู้รับเหมา: ${vendor}\nประเภท: ${ctype}\nระยะ: ${startD} - ${endD}`);
                showToast('เพิ่มเรียบร้อย', 'success');
            }
            delete window._pendingContractAtts;
            delete window._removedContractAtts;
            await loadContracts();
            renderContractsList();
        } catch (err) { showToast('ผิดพลาด: ' + err.message, 'error'); }
    }

    window.removeContractAttachment = function(idx) {
        const arr = window._pendingContractAtts || [];
        if (idx >= 0 && idx < arr.length) {
            const removed = arr.splice(idx, 1);
            window._removedContractAtts = (window._removedContractAtts || []).concat(removed);
            showToast('จะลบไฟล์เมื่อบันทึก', 'info', 1500);
            const modals = document.querySelectorAll('.fixed.bg-black\\/60');
            const last = modals[modals.length-1];
            if (last) {
                const items = last.querySelectorAll('.space-y-1 > div');
                if (items[idx]) items[idx].style.display = 'none';
            }
        }
    };

    async function deleteContract(id) {
        if (!requirePermission('can_delete')) return;
        const c = contracts.find(x => x.id === id);
        if (!c) return;
        const ok = await customConfirm(`ลบสัญญา "${c.vendor_name}"?`, 'ยืนยันการลบ', 'ลบ', true);
        if (!ok) return;
        try {
            if (Array.isArray(c.attachment_urls)) {
                for (const url of c.attachment_urls) { const fn = extractStorageFileName(url); if (fn) supabaseClient.storage.from(STORAGE_BUCKET).remove([fn]).catch(e => console.warn(e)); }
            }
            const { error } = await supabaseClient.from('gls_contracts').delete().eq('id', id);
            if (error) throw error;
            await logAudit('gls_contracts', id, 'DELETE', c, null);
            notifyAction('DELETE', 'gls_contracts', `ผู้รับเหมา: ${c.vendor_name}`);
            showToast('ลบแล้ว', 'success');
            await loadContracts();
            renderContractsList();
        } catch (err) { showToast('ผิดพลาด: ' + err.message, 'error'); }
    }

    function generateReport() {
        const year = parseInt(document.getElementById('repYear').value);
        document.getElementById('repSubtitle').textContent = `ประจำปี ${year} (เปรียบเทียบ ${year-4} - ${year})`;
        const years = [year-4, year-3, year-2, year-1, year];
        const data = years.map(y => {
            let inc=0, exp=0;
            allTransactions.forEach(tx => { if (!tx.transaction_date.startsWith(String(y))) return; const a = parseFloat(tx.amount)||0; if (tx.transaction_type==='income') inc += a; else exp += a; });
            return { year:y, inc, exp, net:inc-exp };
        });
        const rows = data.map(d => `<tr class="border-b border-gray-100 ${d.year===year?'bg-amber-50 font-bold print-exact':'' }" ${d.year===year?'style="background-color:#fef3c7;"':''}><td class="py-2 px-3">${d.year}</td><td class="py-2 px-3 text-right text-emerald-700">${fmtBaht(d.inc)}</td><td class="py-2 px-3 text-right text-orange-700">${fmtBaht(d.exp)}</td><td class="py-2 px-3 text-right ${d.net>=0?'text-emerald-700':'text-red-600'}">${fmtBaht(d.net)}</td></tr>`).join('');
        // breakdown ปัจจุบัน
        const yTx = allTransactions.filter(t => t.transaction_date.startsWith(String(year)));
        const byCat = {};
        yTx.forEach(t => { if (t.transaction_type==='income') return; const cn = t.gls_categories?.name || 'อื่นๆ'; byCat[cn] = (byCat[cn]||0) + (parseFloat(t.amount)||0); });
        const sortedCat = Object.entries(byCat).sort((a,b) => b[1]-a[1]);
        const catRows = sortedCat.length > 0 ? sortedCat.map(([n,v]) => `<tr class="border-b border-gray-100"><td class="py-1.5 px-3">${escapeHtml(n)}</td><td class="py-1.5 px-3 text-right">${fmtBaht(v)}</td></tr>`).join('') : `<tr><td colspan="2" class="py-3 text-center text-gray-400 text-xs">ไม่มีข้อมูล</td></tr>`;
        document.getElementById('repContent').innerHTML = `<h4 class="font-bold mb-2 text-sm">สรุปยอดรวม 5 ปี</h4><table class="w-full text-sm mb-8 border border-gray-200"><thead><tr class="bg-gray-50 border-b border-gray-300 print-exact" style="background-color:#f9fafb;"><th class="py-2 px-3 text-left">ปี</th><th class="py-2 px-3 text-right">รายรับ</th><th class="py-2 px-3 text-right">รายจ่าย</th><th class="py-2 px-3 text-right">สุทธิ</th></tr></thead><tbody>${rows}</tbody></table><h4 class="font-bold mb-2 text-sm">แยกรายจ่ายตามหมวด (ปี ${year})</h4><table class="w-full text-sm border border-gray-200"><thead><tr class="bg-gray-50 border-b border-gray-300 print-exact" style="background-color:#f9fafb;"><th class="py-2 px-3 text-left">หมวด</th><th class="py-2 px-3 text-right">จำนวน (บาท)</th></tr></thead><tbody>${catRows}</tbody></table>`;
    }

        </div>`;

    async function refreshAuditLog() {
        const list = document.getElementById('auditList');
        const countEl = document.getElementById('auditCount');
        if (!list) return;
        list.innerHTML = `<div class="p-10 text-center"><i class="ph ph-spinner-gap animate-spin text-3xl text-pink-500"></i></div>`;
        try {
            let q = supabaseClient.from('gls_audit_log').select('*').order('created_at', {ascending:false}).limit(500);
            const tbl = document.getElementById('auditTable').value;
            const act = document.getElementById('auditAction').value;
            const d = document.getElementById('auditDate').value;
            if (tbl !== 'all') q = q.eq('table_name', tbl);
            if (act !== 'all') q = q.eq('action', act);
            if (d) { q = q.gte('created_at', d+'T00:00:00').lte('created_at', d+'T23:59:59'); }
            const { data, error } = await q;
            if (error) throw error;
            countEl.textContent = `แสดง ${data.length} รายการล่าสุด`;
            if (data.length === 0) { list.innerHTML = `<div class="p-10 text-center text-gray-400"><i class="ph ph-file-dashed text-5xl block mb-2"></i><p>ไม่พบบันทึก</p></div>`; return; }
            const actionMap = { INSERT:{t:'เพิ่ม',c:'bg-emerald-100 text-emerald-700',i:'ph-plus'}, UPDATE:{t:'แก้ไข',c:'bg-amber-100 text-amber-700',i:'ph-pencil-simple'}, DELETE:{t:'ลบ',c:'bg-red-100 text-red-700',i:'ph-trash'} };
            const tableMap = { gls_transactions:'รายการบัญชี', gls_categories:'หมวดหมู่', gls_budgets:'งบประมาณ', gls_assets:'ทรัพย์สิน', gls_contracts:'สัญญา', gls_users:'ผู้ใช้งาน', login:'Login', logout:'Logout', gls_settings:'ตั้งค่า' };
            list.innerHTML = '';
            data.forEach(log => {
                const ac = actionMap[log.action] || {t:log.action,c:'bg-gray-100 text-gray-700',i:'ph-info'};
                const tn = tableMap[log.table_name] || log.table_name;
                const fields = log.changed_fields && log.changed_fields.length ? `<p class="text-xs text-amber-700 mt-1">เปลี่ยน: ${log.changed_fields.map(f=>escapeHtml(f)).join(', ')}</p>` : '';
                const actor = log.actor_user || log.actor_role || 'unknown';
                list.innerHTML += `<div class="p-4 hover:bg-gray-50"><div class="flex items-start gap-3"><div class="w-8 h-8 rounded-full ${ac.c} flex items-center justify-center shrink-0"><i class="ph ${ac.i} text-sm"></i></div><div class="min-w-0 flex-1"><div class="flex items-center gap-2 flex-wrap"><span class="text-xs font-bold ${ac.c} px-2 py-0.5 rounded-full">${ac.t}</span><span class="text-sm font-medium">${tn}</span><span class="text-xs text-gray-400">• ${fmtDateTime(log.created_at)}</span></div><p class="text-xs text-gray-600 mt-1">ผู้ทำ: ${escapeHtml(actor)} • ID: ${escapeHtml(String(log.record_id).substring(0,12))}...</p>${fields}${log.notes ? `<p class="text-xs text-gray-500 mt-1 italic">${escapeHtml(log.notes)}</p>` : ''}</div></div></div>`;
            });
        } catch (err) { list.innerHTML = `<div class="p-10 text-center text-red-500">ผิดพลาด: ${escapeHtml(err.message)}</div>`; }
    }

    function switchSettingsTab(tab) {
        settingsTab = tab;
        document.querySelectorAll('.stab').forEach(b => {
            if (b.dataset.stab === tab) { b.classList.add('border-emerald-600','text-emerald-700'); b.classList.remove('border-transparent','text-gray-500'); }
            else { b.classList.remove('border-emerald-600','text-emerald-700'); b.classList.add('border-transparent','text-gray-500'); }
        });
        const host = document.getElementById('settingsContent');
        if (!host) return;
        if (tab === 'categories') renderCategoriesSettings(host);
        else if (tab === 'users') renderUsersSettings(host);
        else if (tab === 'perms') renderPermsSettings(host);
        else if (tab === 'telegram') renderTelegramSettings(host);
        else if (tab === 'village') renderVillageSettings(host);
    }

    async function addCategory(type) {
        const name = await customPrompt('ชื่อหมวดหมู่ใหม่:', '', 'เพิ่มหมวดหมู่');
        if (!name) return;
        try {
            await handleCategoryCreation(type, name);

            showToast('เพิ่มหมวดหมู่แล้ว', 'success');
            renderCategoriesSettings(document.getElementById('settingsContent'));
        } catch (err) { showToast(err.message, 'error'); }
    }

    async function editCategory(id, type, oldName) {
        const name = await customPrompt('แก้ไขชื่อหมวดหมู่:', oldName, 'แก้ไขหมวดหมู่');
        if (!name || name === oldName) return;
        try {
            const { data, error } = await supabaseClient.from('gls_categories').update({name}).eq('id', id).select();

            renderCategoriesSettings(document.getElementById('settingsContent'));
        } catch (err) { showToast(err.message, 'error'); }

    async function openUserModal(id) {
        const u = id ? users.find(x => x.id === id) : null;
        const html = `<div class="space-y-3">
            <div><label class="text-xs font-medium">Username * (ภาษาอังกฤษ/ตัวเลข)</label><input type="text" id="_uName" maxlength="50" value="${escapeAttr(u?.username || '')}" ${id?'readonly':''} class="w-full border rounded-lg p-2 text-sm ${id?'bg-gray-100':''}" pattern="[a-zA-Z0-9_]+"></div>
            <div><label class="text-xs font-medium">ชื่อแสดงผล *</label><input type="text" id="_uDisplay" maxlength="100" value="${escapeAttr(u?.display_name || '')}" class="w-full border rounded-lg p-2 text-sm"></div>
            <div><label class="text-xs font-medium">บทบาท *</label><select id="_uRole" class="w-full border rounded-lg p-2 text-sm"><option value="admin" ${u?.role==='admin'?'selected':''}>🔴 คณะกรรมการ (Admin)</option><option value="accountant" ${u?.role==='accountant'?'selected':''}>🟡 ผู้ทำบัญชี (Accountant)</option><option value="viewer" ${u?.role==='viewer'?'selected':''}>🟢 ผู้ดู (Viewer)</option></select></div>
            ${!id ? `<div><label class="text-xs font-medium">PIN เริ่มต้น * (4-6 หลัก)</label><input type="password" id="_uPin" maxlength="6" pattern="[0-9]+" class="w-full border rounded-lg p-2 text-sm" placeholder="เช่น 1234"></div>` : ''}
        </div>`;
        const ok = await customFormModal(id ? 'แก้ไขผู้ใช้' : 'เพิ่มผู้ใช้ใหม่', html);
        if (!ok) return;
        try {
            const username = document.getElementById('_uName').value.trim();
            const display = document.getElementById('_uDisplay').value.trim();
            const role = document.getElementById('_uRole').value;
            if (!username || !display) throw new Error('กรอกข้อมูลไม่ครบ');
            if (!/^[a-zA-Z0-9_]+$/.test(username)) throw new Error('Username ใช้ได้เฉพาะ a-z, 0-9, _');
            if (id) {
                const { data, error } = await supabaseClient.from('gls_users').update({display_name:display, role}).eq('id', id).select();
                if (error) throw error;
                await logAudit('gls_users', id, 'UPDATE', u, data[0]);
                notifyAction('UPDATE', 'gls_users', `ผู้ใช้: ${username}`);
                showToast('อัปเดตแล้ว', 'success');
            } else {
                const pin = document.getElementById('_uPin').value;
                if (!pin || pin.length < 4) throw new Error('PIN ต้องอย่างน้อย 4 หลัก');
                const hash = await sha256(pin);
                const { data, error } = await supabaseClient.from('gls_users').insert([{username, display_name:display, role, pin_hash:hash}]).select();
                if (error) throw error;
                await logAudit('gls_users', data[0].id, 'INSERT', null, {username, role});
                notifyAction('INSERT', 'gls_users', `ผู้ใช้ใหม่: ${username} (${role})`);
                showToast('เพิ่มผู้ใช้แล้ว', 'success');
            }
            await loadUsers();
            renderUsersSettings(document.getElementById('settingsContent'));
        } catch (err) { showToast('ผิดพลาด: ' + err.message, 'error'); }
    }

    async function changeUserPin(id, username) {
        const pin = await customPrompt(`ตั้ง PIN ใหม่สำหรับ ${username} (4-6 หลัก):`, '', 'เปลี่ยน PIN', true);
        if (!pin) return;
        if (!/^\d{4,6}$/.test(pin)) { showToast('PIN ต้องเป็นตัวเลข 4-6 หลัก', 'warning'); return; }
        try {
            const hash = await sha256(pin);
            const { error } = await supabaseClient.from('gls_users').update({pin_hash:hash}).eq('id', id);
            if (error) throw error;
            await logAudit('gls_users', id, 'UPDATE', null, null, 'PIN changed');
            notifyAction('UPDATE', 'gls_users', `เปลี่ยน PIN: ${username}`);
            showToast('เปลี่ยน PIN แล้ว', 'success');
        } catch (err) { showToast(err.message, 'error'); }
    }

    async function deleteUser(id, username) {
        if (currentUser && currentUser.username === username) { showToast('ไม่สามารถลบผู้ใช้ที่กำลังใช้งานอยู่', 'warning'); return; }

        if (!ok) return;
        try {
            const u = users.find(x => x.id === id);
            const { error } = await supabaseClient.from('gls_users').delete().eq('id', id);
            if (error) throw error;
            await logAudit('gls_users', id, 'DELETE', u, null);
            notifyAction('DELETE', 'gls_users', `ลบผู้ใช้: ${username}`);
            showToast('ลบแล้ว', 'success');
            await loadUsers();
            renderUsersSettings(document.getElementById('settingsContent'));
        } catch (err) { showToast(err.message, 'error'); }
    }

    async function toggleMenuPerm(role, menuKey, isVisible) {
        try {
            const existing = menuPerms.find(x => x.role===role && x.menu_key===menuKey);
            if (existing) {
                const { error } = await supabaseClient.from('gls_menu_perms').update({is_visible:isVisible}).eq('id', existing.id);
                if (error) throw error;
                existing.is_visible = isVisible;
            } else {
                const { data, error } = await supabaseClient.from('gls_menu_perms').insert([{role, menu_key:menuKey, is_visible:isVisible}]).select();
                if (error) throw error;
                if (data[0]) menuPerms.push(data[0]);
            }
            await logAudit('gls_menu_perms', `${role}-${menuKey}`, 'UPDATE', null, {is_visible:isVisible});
            updateNavVisibility();
            showToast(`${isVisible?'เปิด':'ปิด'}สิทธิ์เมนูแล้ว`, 'success', 1500);
        } catch (err) { showToast(err.message, 'error'); }
    }

    async function saveSetting(key, value) {
        const existing = settings[key] !== undefined;
        if (existing) {
            const { error } = await supabaseClient.from('gls_settings').update({setting_value:String(value)}).eq('setting_key', key);
            if (error) throw error;
        } else {
            const { error } = await supabaseClient.from('gls_settings').insert([{setting_key:key, setting_value:String(value)}]);
            if (error) throw error;
        }
        settings[key] = String(value);
    }

    async function saveTelegramSettings() {
        try {
            await saveSetting('telegram_enabled', document.getElementById('_tgEnabled').checked);
            await saveSetting('telegram_token', document.getElementById('_tgToken').value.trim());
            await saveSetting('telegram_chat_id', document.getElementById('_tgChat').value.trim());
            await saveSetting('notify_on_insert', document.getElementById('_tgIns').checked);
            await saveSetting('notify_on_update', document.getElementById('_tgUpd').checked);
            await saveSetting('notify_on_delete', document.getElementById('_tgDel').checked);
            await logAudit('gls_settings', 'telegram', 'UPDATE', null, null, 'Telegram settings updated');
            showToast('บันทึกเรียบร้อย', 'success');
        } catch (err) { showToast('ผิดพลาด: ' + err.message, 'error'); }
    }

    async function testTelegram() {
        const token = document.getElementById('_tgToken').value.trim();
        const chatId = document.getElementById('_tgChat').value.trim();
        if (!token || !chatId) { showToast('กรอก Token และ Chat ID', 'warning'); return; }
        showToast('กำลังส่ง...', 'info', 1500);
        try {
            const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({chat_id:chatId, text:`✅ <b>ทดสอบการแจ้งเตือน</b>\n\nระบบบัญชีโกลเด้นแลนด์ ซีรีน\nเวลา: ${new Date().toLocaleString('th-TH')}`, parse_mode:'HTML'})
            });
            const r = await res.json();
            if (r.ok) showToast('ส่งสำเร็จ! ตรวจสอบที่ Telegram', 'success', 4000);
            else throw new Error(r.description || 'ส่งไม่สำเร็จ');
        } catch (err) { showToast('ผิดพลาด: ' + err.message, 'error', 5000); }
    }

        host.innerHTML = `<div class="space-y-5 max-w-2xl">
            <div><label class="text-xs font-bold">ชื่อนิติบุคคล (ไทย)</label><input type="text" id="_vName" maxlength="200" value="${escapeAttr(settings.village_name_th || '')}" class="w-full border rounded-lg p-2.5 text-sm"></div>
            <div><label class="text-xs font-bold">ที่อยู่</label><textarea id="_vAddr" rows="2" maxlength="500" class="w-full border rounded-lg p-2.5 text-sm">${escapeHtml(settings.village_address || '')}</textarea></div>
            <div><label class="text-xs font-bold">เลขประจำตัวผู้เสียภาษี</label><input type="text" id="_vTax" maxlength="30" value="${escapeAttr(settings.village_tax_id || '')}" class="w-full border rounded-lg p-2.5 text-sm"></div>
            <div><label class="text-xs font-bold">URL โลโก้หมู่บ้าน</label><input type="text" id="_vLogo" value="${escapeAttr(settings.logo_url || '')}" class="w-full border rounded-lg p-2.5 text-sm font-mono text-xs"><p class="text-xs text-gray-500 mt-1">ใช้ URL รูปภาพที่เข้าถึงได้จากภายนอก (เช่น Google Drive แบบ public)</p>${settings.logo_url ? `<div class="mt-2 p-3 bg-gray-50 rounded-lg"><p class="text-xs text-gray-500 mb-1">ตัวอย่าง:</p><img src="${escapeAttr(settings.logo_url)}" alt="logo" class="w-20 h-20 object-contain" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><p style="display:none" class="text-xs text-red-600">โหลดรูปไม่ได้</p></div>` : ''}</div>
            <button onclick="saveVillageSettings()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-lg text-sm font-bold"><i class="ph ph-floppy-disk"></i> บันทึก</button>
        </div>`;
    }

    async function saveVillageSettings() {
        try {
            await saveSetting('village_name_th', document.getElementById('_vName').value.trim());
            await saveSetting('village_address', document.getElementById('_vAddr').value.trim());
            await saveSetting('village_tax_id', document.getElementById('_vTax').value.trim());
            await saveSetting('logo_url', document.getElementById('_vLogo').value.trim());
            await logAudit('gls_settings', 'village', 'UPDATE', null, null, 'Village settings updated');
            applyLogoToHeader();
            showToast('บันทึกแล้ว', 'success');
            renderVillageSettings(document.getElementById('settingsContent'));
        } catch (err) { showToast('ผิดพลาด: ' + err.message, 'error'); }
    }

    // ============================================================
    // BOOTSTRAP — DOM READY
    // ============================================================
    document.addEventListener('DOMContentLoaded', async () => {
        // login PIN Enter key
        const pinInput = document.getElementById('loginPin');
        if (pinInput) pinInput.addEventListener('keydown', e => { if (e.key==='Enter'){ e.preventDefault(); verifyLogin(); } });
        // close confirm/prompt on ESC
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                const cm = document.getElementById('confirmModal'); if (cm && !cm.classList.contains('hidden')) { document.getElementById('confirmCancelBtn').click(); return; }
                const pm = document.getElementById('promptModal'); if (pm && !pm.classList.contains('hidden')) { document.getElementById('promptCancelBtn').click(); return; }
                const lm = document.getElementById('loginModal'); if (lm && !lm.classList.contains('hidden')) closeLoginModal();
            }
        });
        try {
            await loadAll();
        } catch (err) {
            console.error('Load failed:', err);
            showToast('โหลดข้อมูลผิดพลาด: ' + err.message, 'error', 8000);
        }
        updateHeaderForUser();
        updateNavVisibility();
        switchTab('dashboard');
        hideLoading();
    });
    </script>
</body>
</html>
