<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ลงทะเบียนรถ - นิติบุคคลหมู่บ้าน</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            max-w: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            position: relative;
            padding-bottom: 80px;
        }
        .header-bg {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }
        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 1.2rem;
        }
        .custom-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 16px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Prompt', sans-serif;
            background-color: #f9fafb;
        }
        .custom-input:focus {
            border-color: #8b5cf6;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-around;
            padding: 0.5rem 0;
            z-index: 50;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #9ca3af;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .nav-item.active { color: #6366f1; }
        .nav-item i { margin-bottom: 2px; }
        
        /* File Upload */
        .file-upload-box {
            border: 2px dashed #c4b5fd;
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            background: #f5f3ff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-upload-box:hover { background: #ede9fe; }
    </style>
</head>
<body class="text-slate-800">

    <div class="app-container" id="app">
        <!-- Header -->
        <div class="header-bg pt-12 pb-16 px-6 text-center text-white relative">
            <h1 class="text-xl font-bold mb-1">ระบบลงทะเบียนรถ</h1>
            <p class="text-sm text-indigo-100">นิติบุคคลหมู่บ้าน</p>
        </div>

        <!-- Form Section -->
        <div id="viewForm" class="px-6 -mt-8 relative z-10">
            <div class="bg-white rounded-3xl p-6 shadow-lg shadow-indigo-100/50">
                <div class="flex items-center gap-2 mb-6 justify-center">
                    <span class="text-2xl">📝</span>
                    <h2 class="text-lg font-bold text-slate-800">ลงทะเบียนรถใหม่</h2>
                </div>

                <form id="registrationForm" onsubmit="submitForm(event)">
                    
                    <label class="block text-sm font-medium text-slate-700 mb-1">👤 ชื่อ-สกุล <span class="text-red-500">*</span></label>
                    <div class="input-group">
                        <span class="input-icon">✍️</span>
                        <input type="text" id="fullname" required class="custom-input" placeholder="เช่น ทดสอบ อนุชา">
                    </div>

                    <label class="block text-sm font-medium text-slate-700 mb-1">🏠 บ้านเลขที่ <span class="text-red-500">*</span></label>
                    <div class="input-group">
                        <span class="input-icon">🏘️</span>
                        <input type="text" id="house_number" required class="custom-input" placeholder="เช่น 998/5">
                    </div>

                    <label class="block text-sm font-medium text-slate-700 mb-1">📱 เบอร์ติดต่อ <span class="text-red-500">*</span></label>
                    <div class="input-group">
                        <span class="input-icon">☎️</span>
                        <input type="tel" id="phone" required class="custom-input" placeholder="เช่น 0812345678">
                    </div>

                    <label class="block text-sm font-medium text-slate-700 mb-1">🚙 ประเภทรถ <span class="text-red-500">*</span></label>
                    <div class="input-group">
                        <span class="input-icon">🚗</span>
                        <select id="car_type" required class="custom-input appearance-none">
                            <option value="">เลือกประเภทรถ</option>
                            <option value="รถยนต์">รถยนต์</option>
                            <option value="รถจักรยานยนต์">รถจักรยานยนต์</option>
                        </select>
                        <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                    </div>

                    <label class="block text-sm font-medium text-slate-700 mb-1">🔢 ทะเบียนรถ <span class="text-red-500">*</span></label>
                    <div class="input-group">
                        <span class="input-icon">🏷️</span>
                        <input type="text" id="plate_number" required class="custom-input uppercase" placeholder="เช่น กข1234">
                    </div>

                    <label class="block text-sm font-medium text-slate-700 mb-1">📍 จังหวัดป้ายทะเบียน <span class="text-red-500">*</span></label>
                    <div class="input-group">
                        <span class="input-icon">🗺️</span>
                        <input type="text" id="province" list="provinceOptions" required class="custom-input" placeholder="พิมพ์ค้นหา หรือเลือกจังหวัด">
                        <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                        <datalist id="provinceOptions">
                            <option value="กรุงเทพมหานคร"></option>
                            <option value="กระบี่"></option>
                            <option value="กาญจนบุรี"></option>
                            <option value="กาฬสินธุ์"></option>
                            <option value="กำแพงเพชร"></option>
                            <option value="ขอนแก่น"></option>
                            <option value="จันทบุรี"></option>
                            <option value="ฉะเชิงเทรา"></option>
                            <option value="ชลบุรี"></option>
                            <option value="ชัยนาท"></option>
                            <option value="ชัยภูมิ"></option>
                            <option value="ชุมพร"></option>
                            <option value="เชียงราย"></option>
                            <option value="เชียงใหม่"></option>
                            <option value="ตรัง"></option>
                            <option value="ตราด"></option>
                            <option value="ตาก"></option>
                            <option value="นครนายก"></option>
                            <option value="นครปฐม"></option>
                            <option value="นครพนม"></option>
                            <option value="นครราชสีมา"></option>
                            <option value="นครศรีธรรมราช"></option>
                            <option value="นครสวรรค์"></option>
                            <option value="นนทบุรี"></option>
                            <option value="นราธิวาส"></option>
                            <option value="น่าน"></option>
                            <option value="บึงกาฬ"></option>
                            <option value="บุรีรัมย์"></option>
                            <option value="ปทุมธานี"></option>
                            <option value="ประจวบคีรีขันธ์"></option>
                            <option value="ปราจีนบุรี"></option>
                            <option value="ปัตตานี"></option>
                            <option value="พระนครศรีอยุธยา"></option>
                            <option value="พะเยา"></option>
                            <option value="พังงา"></option>
                            <option value="พัทลุง"></option>
                            <option value="พิจิตร"></option>
                            <option value="พิษณุโลก"></option>
                            <option value="เพชรบุรี"></option>
                            <option value="เพชรบูรณ์"></option>
                            <option value="แพร่"></option>
                            <option value="ภูเก็ต"></option>
                            <option value="มหาสารคาม"></option>
                            <option value="มุกดาหาร"></option>
                            <option value="แม่ฮ่องสอน"></option>
                            <option value="ยโสธร"></option>
                            <option value="ยะลา"></option>
                            <option value="ร้อยเอ็ด"></option>
                            <option value="ระนอง"></option>
                            <option value="ระยอง"></option>
                            <option value="ราชบุรี"></option>
                            <option value="ลพบุรี"></option>
                            <option value="ลำปาง"></option>
                            <option value="ลำพูน"></option>
                            <option value="เลย"></option>
                            <option value="ศรีสะเกษ"></option>
                            <option value="สกลนคร"></option>
                            <option value="สงขลา"></option>
                            <option value="สตูล"></option>
                            <option value="สมุทรปราการ"></option>
                            <option value="สมุทรสงคราม"></option>
                            <option value="สมุทรสาคร"></option>
                            <option value="สระแก้ว"></option>
                            <option value="สระบุรี"></option>
                            <option value="สิงห์บุรี"></option>
                            <option value="สุโขทัย"></option>
                            <option value="สุพรรณบุรี"></option>
                            <option value="สุราษฎร์ธานี"></option>
                            <option value="สุรินทร์"></option>
                            <option value="หนองคาย"></option>
                            <option value="หนองบัวลำภู"></option>
                            <option value="อ่างทอง"></option>
                            <option value="อำนาจเจริญ"></option>
                            <option value="อุดรธานี"></option>
                            <option value="อุตรดิตถ์"></option>
                            <option value="อุทัยธานี"></option>
                            <option value="อุบลราชธานี"></option>
                        </datalist>
                    </div>

                    <label class="block text-sm font-medium text-slate-700 mb-1 mt-4">📸 อัปโหลดรูปภาพรถ <span class="text-red-500">*</span></label>
                    <p class="text-xs text-slate-500 mb-2">เพื่อให้รปภ. ตรวจสอบความถูกต้อง</p>
                    
                    <input type="file" id="car_image" accept="image/*" class="hidden" onchange="previewImage(event)">
                    <div class="file-upload-box mb-6" onclick="document.getElementById('car_image').click()" id="uploadBox">
                        <div id="uploadPlaceholder">
                            <i data-lucide="camera" class="w-8 h-8 text-indigo-400 mx-auto mb-2"></i>
                            <p class="text-sm font-medium text-indigo-600">แตะเพื่อถ่ายรูป หรือ เลือกรูปภาพ</p>
                        </div>
                        <img id="imagePreview" class="hidden w-full h-40 object-cover rounded-xl mx-auto shadow-sm">
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 active:scale-95 transition-all text-lg">
                        ส่งข้อมูลลงทะเบียน
                    </button>
                </form>
            </div>
        </div>

        <!-- Status Section (Hidden by default) -->
        <div id="viewStatus" class="px-6 mt-6 hidden">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                <h2 class="text-lg font-bold text-slate-800 mb-4 text-center">📋 ตรวจสอบสถานะ</h2>
                
                <div class="flex gap-2 mb-6">
                    <input type="text" id="searchHouse" placeholder="ระบุบ้านเลขที่ของคุณ..." class="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-sm">
                    <button onclick="checkStatus()" class="bg-indigo-100 text-indigo-600 px-4 py-3 rounded-xl font-bold text-sm active:scale-95 transition-all">ค้นหา</button>
                </div>

                <div id="statusList" class="space-y-4">
                    <div class="text-center text-slate-400 text-sm py-10">
                        <i data-lucide="search" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>
                        ระบุบ้านเลขที่เพื่อดูสถานะรถของคุณ
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
            <button onclick="switchTab('form')" id="navForm" class="nav-item active p-2 w-full">
                <i data-lucide="edit" class="w-6 h-6"></i>
                <span>ลงทะเบียน</span>
            </button>
            <button onclick="switchTab('status')" id="navStatus" class="nav-item p-2 w-full">
                <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                <span>รายการที่ลง</span>
            </button>
        </div>
    </div>

    <script>
        // Configuration
        const supabaseUrl = 'https://kiumelolsilduqnvrekf.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpdW1lbG9sc2lsZHVxbnZyZWtmIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc1NzA4NTI3NiwiZXhwIjoyMDcyNjYxMjc2fQ.z6q6bRj0I6joXx5sTLtjHkZEVUF1osZLavfYrniH-cI';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Telegram Bot Configuration
        const TELEGRAM_BOT_TOKEN = '7899944770:AAFmmc9f8l19WqqBfQhg2XDsp9DDd7Wy9WY';
        const TELEGRAM_CHAT_ID = '-4574041962';

        lucide.createIcons();

        // Image Preview
        let selectedFile = null;
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreview').classList.remove('hidden');
                    document.getElementById('uploadPlaceholder').classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        // Tab Switching
        function switchTab(tab) {
            document.getElementById('navForm').classList.remove('active');
            document.getElementById('navStatus').classList.remove('active');
            document.getElementById('viewForm').classList.add('hidden');
            document.getElementById('viewStatus').classList.add('hidden');

            if (tab === 'form') {
                document.getElementById('navForm').classList.add('active');
                document.getElementById('viewForm').classList.remove('hidden');
            } else {
                document.getElementById('navStatus').classList.add('active');
                document.getElementById('viewStatus').classList.remove('hidden');
                lucide.createIcons();
            }
        }

        // Form Submission
        async function submitForm(e) {
            e.preventDefault();
            
            if (!selectedFile) {
                return Swal.fire('แจ้งเตือน', 'กรุณาอัปโหลดรูปภาพรถ', 'warning');
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin mx-auto"></i> กำลังส่งข้อมูล...';
            lucide.createIcons();

            try {
                // 1. Upload Image
                const fileExt = selectedFile.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                
                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('car_images')
                    .upload(`public/${fileName}`, selectedFile);

                if (uploadError) throw uploadError;

                // Get public URL
                const { data: publicUrlData } = supabaseClient.storage
                    .from('car_images')
                    .getPublicUrl(`public/${fileName}`);
                
                const imageUrl = publicUrlData.publicUrl;

                // 2. Save Data to Database
                const payload = {
                    fullname: document.getElementById('fullname').value.trim(),
                    house_number: document.getElementById('house_number').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    car_type: document.getElementById('car_type').value,
                    plate_number: document.getElementById('plate_number').value.trim().toUpperCase(),
                    province: document.getElementById('province').value.trim(),
                    image_url: imageUrl,
                    status: 'pending'
                };

                const { error: dbError } = await supabaseClient
                    .from('car_registrations')
                    .insert([payload]);

                if (dbError) throw dbError;

                // 3. Send Notification to Telegram Group (Admin)
                const messageCaption = `🚨 *มีคำขอลงทะเบียนรถใหม่* 🚨\n\n🏠 *บ้านเลขที่:* ${payload.house_number}\n👤 *ชื่อ:* ${payload.fullname}\n📱 *โทร:* ${payload.phone}\n🚙 *ประเภท:* ${payload.car_type}\n🔢 *ทะเบียน:* ${payload.plate_number}\n📍 *จังหวัด:* ${payload.province}\n\nกรุณาเข้าสู่ระบบ Admin เพื่อตรวจสอบและพิจารณาอนุมัติ`;

                try {
                    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM_CHAT_ID,
                            photo: imageUrl,
                            caption: messageCaption,
                            parse_mode: 'Markdown'
                        })
                    });
                } catch (tgError) {
                    console.error("Telegram Notification Error:", tgError);
                    // ปล่อยผ่าน หากแจ้งเตือนมีปัญหา แต่ข้อมูลส่งเข้า DB เรียบร้อยแล้ว
                }

                // แสดงข้อความสำเร็จ
                Swal.fire({
                    icon: 'success',
                    title: 'ส่งคำขอสำเร็จ',
                    text: 'ข้อมูลของคุณถูกส่งไปยังนิติบุคคลเรียบร้อยแล้ว กรุณารอการอนุมัติ',
                    confirmButtonColor: '#6366f1'
                }).then(() => {
                    document.getElementById('registrationForm').reset();
                    document.getElementById('imagePreview').classList.add('hidden');
                    document.getElementById('uploadPlaceholder').classList.remove('hidden');
                    selectedFile = null;
                    document.getElementById('searchHouse').value = payload.house_number;
                    switchTab('status');
                    checkStatus();
                });

            } catch (err) {
                console.error(err);
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่อีกครั้ง', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'ส่งข้อมูลลงทะเบียน';
            }
        }

        // Check Status
        async function checkStatus() {
            const house = document.getElementById('searchHouse').value.trim();
            const listDiv = document.getElementById('statusList');
            
            if (!house) return;

            listDiv.innerHTML = '<div class="text-center py-4"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto text-indigo-500"></i></div>';
            lucide.createIcons();

            try {
                const { data, error } = await supabaseClient
                    .from('car_registrations')
                    .select('*')
                    .eq('house_number', house)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data.length === 0) {
                    listDiv.innerHTML = '<div class="text-center text-slate-500 text-sm py-4">ไม่พบข้อมูลของบ้านเลขที่นี้</div>';
                    return;
                }

                listDiv.innerHTML = '';
                data.forEach(item => {
                    let statusHtml = '';
                    if (item.status === 'pending') statusHtml = '<span class="bg-amber-100 text-amber-600 px-2 py-1 rounded text-[10px] font-bold">⏳ รอตรวจสอบ</span>';
                    else if (item.status === 'approved') statusHtml = '<span class="bg-emerald-100 text-emerald-600 px-2 py-1 rounded text-[10px] font-bold">✅ อนุมัติแล้ว</span>';
                    else if (item.status === 'rejected') statusHtml = '<span class="bg-rose-100 text-rose-600 px-2 py-1 rounded text-[10px] font-bold">❌ ไม่อนุมัติ</span>';

                    const date = new Date(item.created_at).toLocaleDateString('th-TH');

                    listDiv.innerHTML += `
                        <div class="border border-slate-100 rounded-xl p-3 flex gap-3 items-center bg-slate-50">
                            <img src="${item.image_url}" class="w-16 h-16 rounded-lg object-cover border border-slate-200">
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <div class="font-bold text-sm text-slate-800">${item.plate_number}</div>
                                    ${statusHtml}
                                </div>
                                <div class="text-xs text-slate-500">${item.province}</div>
                                <div class="text-[10px] text-slate-400 mt-1">ส่งเมื่อ: ${date}</div>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                listDiv.innerHTML = '<div class="text-center text-rose-500 text-sm py-4">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
            }
        }
    </script>
</body>
</html>
