<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Gate - ระบบจัดการรถ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#151e2e', 900: '#0f172a' }
                    },
                    fontFamily: {
                        prompt: ['Prompt', 'sans-serif'],
                        sarabun: ['Sarabun', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f4f8;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
        }
        html.dark body {
            background-color: #0f172a;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
        }
        .font-prompt { font-family: 'Prompt', sans-serif; }
        .plate-box {
            font-family: 'Sarabun', sans-serif;
            font-weight: 700;
            background: #fff;
            border: 2px solid #1e293b;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
            background-image: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
            color: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            line-height: 1;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
        .dark .glass-nav {
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }
        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(15px);
        }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        .click-scale:active { transform: scale(0.95); }
        .house-cars-scroll::-webkit-scrollbar { height: 4px; }
        .house-cars-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        .dark .house-cars-scroll::-webkit-scrollbar-thumb { background: #475569; }

        /* Custom Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #4f46e5;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #4f46e5;
        }
    </style>
</head>
<body class="pb-32 text-slate-800 dark:text-slate-100 transition-colors duration-300">

    <!-- Navbar -->
    <nav class="glass-nav sticky top-0 z-40 shadow-sm transition-all duration-300">
        <div class="max-w-4xl mx-auto px-4 sm:px-6">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="bg-gradient-to-br from-blue-600 to-indigo-600 p-2 rounded-xl shadow-lg shadow-blue-500/20 text-white">
                        <i data-lucide="scan-line" class="h-6 w-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold font-prompt text-slate-800 dark:text-white leading-tight">Smart Gate</h1>
                        <p class="text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-widest">Admin Control (Optimized)</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <!-- Status Indicator -->
                    <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-emerald-50 dark:bg-emerald-900/30 rounded-full border border-emerald-100 dark:border-emerald-800 shadow-sm" id="systemStatus">
                        <span class="relative flex h-2.5 w-2.5">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                        </span>
                        <span class="text-[10px] font-bold text-emerald-600 dark:text-emerald-400">Cloud Auto: Active</span>
                    </div>

                    <!-- Settings Button (Admin) -->
                    <button onclick="switchView('admin')" class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-2.5 rounded-xl text-slate-500 dark:text-slate-400 hover:text-indigo-500 dark:hover:text-indigo-400 hover:border-indigo-200 dark:hover:border-indigo-900 transition-all click-scale shadow-sm">
                        <i data-lucide="settings" class="w-5 h-5"></i>
                    </button>

                    <button id="theme-toggle" onclick="toggleTheme()" class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-2.5 rounded-xl text-slate-500 dark:text-slate-400 hover:text-amber-500 dark:hover:text-yellow-400 hover:border-amber-200 dark:hover:border-yellow-900 transition-all click-scale shadow-sm">
                        <span id="icon-moon" class="block dark:hidden"><i data-lucide="moon" class="w-5 h-5"></i></span>
                        <span id="icon-sun" class="hidden dark:block"><i data-lucide="sun" class="w-5 h-5"></i></span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-6 space-y-6">
        
        <!-- Dashboard Card -->
        <div id="dashboardCard" class="relative overflow-hidden rounded-3xl bg-gradient-to-br from-indigo-600 to-violet-700 p-6 sm:p-8 text-white shadow-2xl shadow-indigo-500/30 transition-all duration-500">
            <div class="absolute top-0 right-0 -mr-12 -mt-12 w-48 h-48 rounded-full bg-white/10 blur-3xl"></div>
            <div class="absolute bottom-0 left-0 -ml-12 -mb-12 w-32 h-32 rounded-full bg-white/10 blur-2xl"></div>
            <div class="relative z-10">
                <div class="flex flex-col sm:flex-row justify-between items-end gap-6">
                    <div>
                        <div class="flex items-center gap-2 mb-2 text-indigo-100/80">
                            <i data-lucide="database" class="w-4 h-4"></i>
                            <span class="text-xs font-bold uppercase tracking-wider" id="dashboardTitle">ฐานข้อมูลรถในระบบ</span>
                        </div>
                        <h2 class="text-5xl font-bold font-prompt tracking-tighter" id="totalCount">0</h2>
                        <p class="text-indigo-100 text-sm mt-1 font-medium opacity-90" id="dashboardSubtitle">รายการที่ลงทะเบียนทั้งหมด</p>
                    </div>
                    <div class="flex gap-3 w-full sm:w-auto" id="statsContainer">
                        <div class="flex-1 sm:flex-none bg-white/10 backdrop-blur-md px-4 py-3 rounded-2xl border border-white/10 text-center min-w-[100px]">
                            <span class="block text-2xl font-bold" id="allowCount">-</span>
                            <span class="text-[10px] text-emerald-300 font-bold uppercase tracking-wide">อนุญาต</span>
                        </div>
                        <div class="flex-1 sm:flex-none bg-white/10 backdrop-blur-md px-4 py-3 rounded-2xl border border-white/10 text-center min-w-[100px]">
                            <span class="block text-2xl font-bold" id="blockCount">-</span>
                            <span class="text-[10px] text-rose-300 font-bold uppercase tracking-wide">ระงับ</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="flex flex-col sm:flex-row gap-3 items-center w-full" id="searchContainer">
            <div class="relative flex-1 w-full group">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-hover:text-indigo-500 transition-colors"></i>
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="ค้นหาทะเบียน, บ้านเลขที่..." 
                    class="w-full pl-10 pr-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-base transition-all text-slate-800 dark:text-white dark:placeholder-slate-500">
            </div>
            <button onclick="refreshCurrentView()" class="w-full sm:w-auto p-3 bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm hover:bg-indigo-50 dark:hover:bg-slate-700 transition-all click-scale flex items-center justify-center gap-2">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                <span class="font-bold">โหลดข้อมูลล่าสุด</span>
            </button>
        </div>
        
        <!-- Permission Check Tool -->
        <div id="permissionTool" class="hidden w-full bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm animate-fade-in-up">
            <div class="flex flex-col sm:flex-row gap-3 items-end">
                <div class="w-full">
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">บ้านเลขที่ หรือ UserID</label>
                    <div class="flex gap-2">
                        <input type="text" id="permCheckInput" placeholder="เช่น 998/123 หรือ U123..." class="flex-1 px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-900 text-sm focus:ring-2 focus:ring-indigo-500">
                        <button onclick="checkPermissionManual()" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold rounded-lg shadow-sm transition-colors">ตรวจสอบ</button>
                    </div>
                </div>
            </div>
            <div id="permResult" class="mt-4 hidden p-4 rounded-xl border text-sm shadow-inner transition-all"></div>
        </div>

        <!-- Admin Auth Container -->
        <div id="adminAuthContainer" class="hidden w-full flex flex-col items-center justify-center py-8 animate-fade-in-up">
            <div class="glass-panel p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700 text-center max-w-sm w-full">
                <div class="bg-rose-100 dark:bg-rose-900/50 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-rose-600 dark:text-rose-400">
                    <i data-lucide="lock" class="w-8 h-8"></i>
                </div>
                <h2 class="text-xl font-bold text-slate-800 dark:text-white mb-2">ตั้งค่าผู้ดูแลระบบ</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">กรุณายืนยันรหัสผ่านเพื่อเข้าถึงเครื่องมือจัดการระบบ</p>
                <button onclick="unlockAdminTools()" class="w-full py-3 bg-slate-800 hover:bg-slate-900 dark:bg-slate-700 dark:hover:bg-slate-600 text-white rounded-xl font-bold transition-all flex items-center justify-center gap-2 click-scale">
                    <i data-lucide="key" class="w-5 h-5"></i>
                    กรอกรหัสผ่าน (PIN)
                </button>
            </div>
        </div>

        <!-- Admin Tools -->
        <div id="adminTools" class="hidden w-full grid grid-cols-1 sm:grid-cols-2 gap-4 animate-fade-in-up">
             <!-- Import CSV -->
             <button onclick="document.getElementById('csvInput').click()" class="glass-panel p-5 flex flex-col items-center justify-center gap-2 hover:border-indigo-400 transition-all group click-scale rounded-2xl text-center">
                <div class="bg-indigo-100 dark:bg-indigo-900/50 p-3 rounded-full text-indigo-600 dark:text-indigo-300 group-hover:scale-110 transition-transform">
                    <i data-lucide="upload-cloud" class="w-8 h-8"></i>
                </div>
                <div>
                    <h3 class="font-bold text-slate-700 dark:text-slate-200">นำเข้า CSV</h3>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Import Data</p>
                </div>
            </button>
            <input type="file" id="csvInput" accept=".csv" class="hidden" onchange="handleImport(this)">

            <!-- Export CSV -->
            <button onclick="handleExport()" class="glass-panel p-5 flex flex-col items-center justify-center gap-2 hover:border-emerald-400 transition-all group click-scale rounded-2xl text-center">
                <div class="bg-emerald-100 dark:bg-emerald-900/50 p-3 rounded-full text-emerald-600 dark:text-emerald-300 group-hover:scale-110 transition-transform">
                    <i data-lucide="download-cloud" class="w-8 h-8"></i>
                </div>
                <div>
                    <h3 class="font-bold text-slate-700 dark:text-slate-200">ส่งออก CSV</h3>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Export Data</p>
                </div>
            </button>

            <!-- Auto Block Manual Button -->
            <button onclick="handleAutoBlockDebtors()" class="glass-panel p-5 flex flex-col items-center justify-center gap-2 hover:border-amber-400 transition-all group click-scale rounded-2xl text-center">
                <div class="bg-amber-100 dark:bg-amber-900/50 p-3 rounded-full text-amber-600 dark:text-amber-300 group-hover:scale-110 transition-transform">
                    <i data-lucide="shield-alert" class="w-8 h-8"></i>
                </div>
                <div>
                    <h3 class="font-bold text-slate-700 dark:text-slate-200">สั่งบล็อกลูกหนี้</h3>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Manual Block (ค้าง 3 งวดขึ้นไป)</p>
                </div>
            </button>

            <!-- Auto Unlock Manual Button -->
            <button onclick="handleAutoUnlockDebtors()" class="glass-panel p-5 flex flex-col items-center justify-center gap-2 hover:border-blue-400 transition-all group click-scale rounded-2xl text-center">
                <div class="bg-blue-100 dark:bg-blue-900/50 p-3 rounded-full text-blue-600 dark:text-blue-300 group-hover:scale-110 transition-transform">
                    <i data-lucide="unlock" class="w-8 h-8"></i>
                </div>
                <div>
                    <h3 class="font-bold text-slate-700 dark:text-slate-200">สั่งปลดบล็อกลูกหนี้</h3>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Manual Unlock</p>
                </div>
            </button>

            <!-- Remove Duplicates Button (NEW) -->
            <button onclick="handleRemoveDuplicates()" class="glass-panel p-5 flex flex-col items-center justify-center gap-2 hover:border-purple-400 transition-all group click-scale rounded-2xl text-center col-span-1 sm:col-span-2">
                <div class="bg-purple-100 dark:bg-purple-900/50 p-3 rounded-full text-purple-600 dark:text-purple-300 group-hover:scale-110 transition-transform">
                    <i data-lucide="copy-minus" class="w-8 h-8"></i>
                </div>
                <div>
                    <h3 class="font-bold text-purple-700 dark:text-purple-400">ลบข้อมูลทะเบียนซ้ำ</h3>
                    <p class="text-xs text-purple-500 dark:text-purple-500">Find & Remove Duplicates</p>
                </div>
            </button>

            <!-- Force Clean Stuck Data Button (NEW) -->
            <button onclick="handleCleanStuckPending()" class="glass-panel p-5 flex flex-col items-center justify-center gap-2 hover:border-orange-400 transition-all group click-scale rounded-2xl text-center col-span-1 sm:col-span-2">
                <div class="bg-orange-100 dark:bg-orange-900/50 p-3 rounded-full text-orange-600 dark:text-orange-300 group-hover:scale-110 transition-transform">
                    <i data-lucide="eraser" class="w-8 h-8"></i>
                </div>
                <div>
                    <h3 class="font-bold text-orange-700 dark:text-orange-400">เคลียร์คิวลบที่ค้าง</h3>
                    <p class="text-xs text-orange-500 dark:text-orange-500">Force Clean pending_delete</p>
                </div>
            </button>

            <!-- Clear Data -->
            <button onclick="handleClearData()" class="glass-panel p-5 flex flex-col items-center justify-center gap-2 hover:border-rose-400 transition-all group click-scale rounded-2xl text-center col-span-1 sm:col-span-2">
                <div class="bg-rose-100 dark:bg-rose-900/50 p-3 rounded-full text-rose-600 dark:text-rose-300 group-hover:scale-110 transition-transform">
                    <i data-lucide="trash-2" class="w-8 h-8"></i>
                </div>
                <div>
                    <h3 class="font-bold text-rose-700 dark:text-rose-400">ล้างข้อมูลทั้งหมด</h3>
                    <p class="text-xs text-rose-500 dark:text-rose-500">Delete All Records</p>
                </div>
            </button>
        </div>

        <!-- Sticky Tabs -->
        <div class="sticky top-16 z-30 -mx-4 sm:-mx-6 px-4 sm:px-6 py-3 bg-slate-50/95 dark:bg-[#0f172a]/95 backdrop-blur-md border-b border-slate-200/60 dark:border-slate-800/60 shadow-sm transition-all duration-300">
            <div class="flex p-1 bg-slate-200 dark:bg-slate-800 rounded-xl w-full overflow-x-auto no-scrollbar">
                <button onclick="switchView('active')" id="tabActive" class="flex-shrink-0 flex-1 px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-sm bg-white dark:bg-slate-700 text-indigo-600 dark:text-white whitespace-nowrap">
                    รายการปัจจุบัน
                </button>
                <button onclick="switchView('members')" id="tabMembers" class="flex-shrink-0 flex-1 px-4 py-2 rounded-lg text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all whitespace-nowrap">
                    สมาชิก
                </button>
                <button onclick="switchView('house_stats')" id="tabHouseStats" class="flex-shrink-0 flex-1 px-4 py-2 rounded-lg text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all whitespace-nowrap">
                    ตรวจสอบจำนวนรถ
                </button>
                <button onclick="switchView('permission_check')" id="tabPermissionCheck" class="flex-shrink-0 flex-1 px-4 py-2 rounded-lg text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all whitespace-nowrap">
                    เช็คสิทธิ์
                </button>
                <button onclick="switchView('visitor_history')" id="tabVisitorHistory" class="flex-shrink-0 flex-1 px-4 py-2 rounded-lg text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all whitespace-nowrap">
                    ประวัติผู้มาติดต่อ
                </button>
                <button onclick="switchView('deleted')" id="tabDeleted" class="flex-shrink-0 flex-1 px-4 py-2 rounded-lg text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all whitespace-nowrap">
                    ประวัติที่ถูกลบ
                </button>
                <!-- NEW TAB: Pending Requests -->
                <button onclick="switchView('pending_requests')" id="tabPendingRequests" class="flex-shrink-0 flex-1 px-4 py-2 rounded-lg text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all whitespace-nowrap relative">
                    คำขอลงทะเบียน <span id="pendingBadge" class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] px-1.5 rounded-full hidden">0</span>
                </button>
            </div>
        </div>

        <!-- List Container -->
        <div id="carList" class="grid grid-cols-1 gap-4">
            <!-- Skeleton -->
            <div class="animate-pulse space-y-4">
                <div class="h-32 bg-white dark:bg-slate-800 rounded-2xl shadow-sm"></div>
                <div class="h-32 bg-white dark:bg-slate-800 rounded-2xl shadow-sm"></div>
            </div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <div id="fabContainer" class="fixed bottom-8 right-6 z-40 transition-all duration-300">
        <button onclick="openModal()" 
            class="group relative flex items-center justify-center w-14 h-14 sm:w-16 sm:h-16 bg-gradient-to-tr from-indigo-600 to-purple-600 text-white rounded-2xl shadow-lg shadow-indigo-600/40 hover:shadow-indigo-600/60 hover:-translate-y-1 transition-all duration-300 click-scale">
            <i data-lucide="plus" class="w-8 h-8"></i>
        </button>
    </div>

    <!-- Car Form Modal -->
    <div id="carModal" class="fixed inset-0 z-50 hidden transition-opacity duration-300" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
        <div class="fixed inset-0 z-10 overflow-y-auto">
            <div class="flex min-h-full items-center justify-center p-4">
                <div class="relative transform overflow-hidden rounded-3xl bg-white dark:bg-slate-850 text-left shadow-2xl transition-all w-full max-w-lg scale-100 opacity-100">
                    
                    <div class="bg-gradient-to-r from-slate-50 to-white dark:from-slate-800 dark:to-slate-850 px-6 py-5 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="bg-indigo-100 dark:bg-indigo-900/50 p-2 rounded-xl text-indigo-600 dark:text-indigo-400">
                                <i data-lucide="file-edit" class="w-5 h-5"></i>
                            </div>
                            <h3 class="text-lg font-bold text-slate-800 dark:text-white font-prompt" id="modalTitle">ลงทะเบียนรถ</h3>
                        </div>
                        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300 bg-slate-100 dark:bg-slate-800 p-2 rounded-full transition-all">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <div class="px-6 py-6 space-y-6">
                        <form id="modalForm">
                            <input type="hidden" id="editId">
                            <input type="hidden" id="originalDeletedId">
                            
                            <div class="bg-slate-50 dark:bg-slate-800/50 p-5 rounded-2xl border border-slate-100 dark:border-slate-700">

        async function handleAutoBlockDebtors() {
            const { value: confirm } = await Swal.fire({ 
                title: 'สั่งบล็อกลูกหนี้ทันที?', 
                html: `ระบบจะทำการตรวจสอบและทยอยระงับสิทธิ์รถทีละคัน<br><span class="text-xs text-rose-500">(หน่วงเวลาเพื่อป้องกันกล้อง Error)</span>`, 
                icon: 'warning', 
                showCancelButton: true, 
                confirmButtonColor: '#f59e0b', 
                confirmButtonText: 'เริ่มตรวจสอบ' 
            });
            if (!confirm) return;

            Swal.fire({ title: 'กำลังดึงข้อมูลเพื่อคำนวณ...', didOpen: () => Swal.showLoading() });

            try {
                // 1. โหลดข้อมูลรถปัจจุบันที่ยังไม่ถูกลบ
                const { data: activeCars, error: err1 } = await supabaseClient.from('allowed_cars').select('*').neq('status', 'pending_delete').eq('list_type', 'allowlist');
                if (err1) throw err1;

                // 2. โหลดข้อมูลโหมดลูกบ้าน (VIP)
                const { data: users, error: errUser } = await supabaseClient.from('userhome').select('house_no, check_mode');
                if (errUser) throw errUser;

                // 3. โหลดข้อมูลจ่ายเงิน
                const { data: payments, error: err2 } = await supabaseClient.from('house_payments').select('*');
                if (err2) throw err2;

                const getUnpaidCount = (houseNum) => {
                    if (!houseNum) return 0;
                    const h = houseNum.trim();
                    const pRecs = payments.filter(p => p.house_numbe && p.house_numbe.trim() === h);
                    let c = 0;
                    const months = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
                    pRecs.forEach(p => {
                        months.forEach(m => { if (p[m] && p[m].trim() === 'ยังไม่จ่าย') c++; });
                    });
                    return c;
                };

                const carsToBlock = [];
                for (const car of activeCars) {
                    if (!car.house_number || car.house_number.trim() === '' || car.house_number.trim() === '-') continue;
                    const houseNo = car.house_number.trim();
                    
                    const user = users.find(u => u.house_no && u.house_no.trim() === houseNo);
                    if (user && user.check_mode === 'เมนวน') continue; // ข้ามบ้านโหมด Manual (VIP)

                    if (getUnpaidCount(houseNo) >= 3) {
                        carsToBlock.push(car);
                    }
                }

                if (carsToBlock.length === 0) {
                    return Swal.fire('ปกติ', 'ไม่พบรถที่ต้องถูกบล็อก (ไม่มีบ้านที่ค้างชำระตั้งแต่ 3 งวดขึ้นไป)', 'success');
                }

                let successCount = 0;
                let errorCount = 0;

                Swal.fire({
                    title: 'กำลังระงับสิทธิ์...',
                    html: `ดำเนินการไปแล้ว <b>0</b> / ${carsToBlock.length}<br><span class="text-sm text-slate-500">กำลังจัดคิวทยอยส่งคำสั่งลบเข้ากล้อง...</span>`,
                    allowOutsideClick: false,
                    showConfirmButton: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                for (let i = 0; i < carsToBlock.length; i++) {
                    const car = carsToBlock[i];
                    try {
                        const isMoto = car.province && car.province.includes('(มอไซค์)');
                        
                        const payload = {
                            plate_number: car.plate_number, province: car.province, house_number: car.house_number,
                            list_type: 'blocklist', start_date: car.start_date, end_date: car.end_date,
                            line_user_id: car.line_user_id, line_display_name: car.line_display_name, line_picture_url: car.line_picture_url
                        };
                        
                        const { error: insErr } = await supabaseClient.from('deleted_cars').insert([payload]);
                        if (insErr) throw insErr;

                        if (isMoto) {
                            await supabaseClient.from('allowed_cars').delete().eq('id', car.id);
                        } else {
                            await supabaseClient.from('allowed_cars').update({ status: 'pending_delete' }).eq('id', car.id);
                        }
                        
                        successCount++;
                    } catch (e) {
                        console.error("Block Error:", e);
                        errorCount++;
                    }
                    Swal.update({ html: `ดำเนินการไปแล้ว <b>${successCount}</b> / ${carsToBlock.length}<br><span class="text-sm text-slate-500">ทะเบียน: ${car.plate_number}</span>` });
                    await new Promise(res => setTimeout(res, 400)); // หน่วงเวลา
                }

                Swal.fire('เสร็จสิ้น!', `ระงับสิทธิ์สำเร็จ <b>${successCount}</b> คัน<br>${errorCount > 0 ? `ล้มเหลว ${errorCount} คัน` : ''}`, 'success');
                refreshCurrentView();

            } catch (err) {
                console.error(err);
                Swal.fire('Error', err.message, 'error');
            }
        }

        // --- IMPORT, EXPORT, CLEAR DATA (FIXED REFERENCE ERROR) ---
        window.handleExport = () => {

                return Swal.fire('ไม่มีข้อมูล', 'ไม่มีข้อมูลในระบบสำหรับส่งออก', 'info');
            }
            
            // ใช้ PapaParse ในการแปลงเป็น CSV
            const csv = Papa.unparse(allCarsData);
            
            // เพิ่ม BOM (Byte Order Mark) เพื่อให้ Excel เปิดภาษาไทยได้โดยไม่เพี้ยน
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            link.setAttribute("href", url);
            link.setAttribute("download", `smart_gate_export_${getThaiYMD()}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // --- FIND AND REMOVE DUPLICATES (NEW) ---
        window.handleRemoveDuplicates = async () => {
            try {
                // ดึงข้อมูลรถที่ยัง Active อยู่ทั้งหมด
                const { data: activeCars, error } = await supabaseClient
                    .from('allowed_cars')
                    .select('*')
                    .neq('status', 'pending_delete');

                if (error) throw error;

                // จัดกลุ่มตามเลขทะเบียนรถ
                const groupedByPlate = {};
                activeCars.forEach(car => {
                    const plate = car.plate_number.trim().toUpperCase();
                    if (!groupedByPlate[plate]) groupedByPlate[plate] = [];
                    groupedByPlate[plate].push(car);
                });

                let carsToDelete = [];
                Object.values(groupedByPlate).forEach(group => {
                    if (group.length > 1) {
                        // เรียงลำดับตามวันที่สร้าง (อันใหม่สุดอยู่บน)
                        group.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                        // เก็บอันแรกไว้ (อันใหม่สุด) แล้วนำอันที่เหลือไปใส่ลิสต์รอตัวลบ
                        carsToDelete.push(...group.slice(1));
                    }
                });

                if (carsToDelete.length === 0) {
                    return Swal.fire('เยี่ยมมาก!', 'ไม่พบข้อมูลเลขทะเบียนซ้ำในระบบเลยครับ', 'success');
                }

                const { value: pin } = await Swal.fire({
                    title: 'พบข้อมูลทะเบียนซ้ำ!',
                    html: `ระบบพบทะเบียนที่ลงซ้ำกันจำนวน <b>${carsToDelete.length}</b> รายการ<br><span class="text-sm text-slate-500">(ระบบจะเก็บข้อมูลล่าสุดไว้ และลบอันเก่าออกไปที่ประวัติถูกลบ)</span>`,
                    input: 'password',
                    inputPlaceholder: 'รหัสผ่านผู้ดูแลระบบ (9999)',
                    showCancelButton: true,
                    confirmButtonColor: '#9333ea',
                    cancelButtonColor: '#ef4444',
                    confirmButtonText: 'ยืนยันเคลียร์ข้อมูลซ้ำ',
                    cancelButtonText: 'ยกเลิก'
                });

                if (pin === '9999') {
                    let successCount = 0;

                    Swal.fire({
                        title: 'กำลังจัดการข้อมูล...',
                        html: `ดำเนินการไปแล้ว <b>0</b> / ${carsToDelete.length}`,
                        allowOutsideClick: false,
                        showConfirmButton: false,
                        didOpen: () => Swal.showLoading()
                    });

                    for (let i = 0; i < carsToDelete.length; i++) {
                        const car = carsToDelete[i];
                        try {
                            // นำไปสำรองไว้ในประวัติที่ถูกลบ
                            await supabaseClient.from('deleted_cars').insert([{...car}]);
                            // เปลี่ยนสถานะในฐานข้อมูลหลักให้ลบเข้ากล้อง
                            await supabaseClient.from('allowed_cars').update({status: 'pending_delete'}).eq('id', car.id);
                            
                            successCount++;
                        } catch (e) {
                            console.error('Error removing duplicate:', car.plate_number, e);
                        }
                        Swal.update({ html: `ดำเนินการไปแล้ว <b>${successCount}</b> / ${carsToDelete.length}` });
                        await new Promise(resolve => setTimeout(resolve, 150));
                    }

                    Swal.fire('เสร็จสิ้น!', `ลบข้อมูลซ้ำเรียบร้อยแล้วจำนวน <b>${successCount}</b> รายการ`, 'success');
                    refreshCurrentView();

                } else if (pin) {
                    Swal.fire('รหัสไม่ถูกต้อง', 'ไม่สามารถดำเนินการได้', 'error');
                }

            } catch (err) {
                console.error(err);
                Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
            }
        };

        // --- FETCH & RENDER ---
        async function fetchCars() {
            try {
                let query;
                if (currentView === 'active' || currentView === 'house_stats') query = supabaseClient.from('allowed_cars').select('*').neq('status', 'pending_delete').order('created_at', { ascending: false });
                else if (currentView === 'visitor_history') query = supabaseClient.from('visitor_history').select('*').order('archived_at', { ascending: false });
                else if (currentView === 'deleted') query = supabaseClient.from('deleted_cars').select('*').order('deleted_at', { ascending: false });
                else return;

                const { data, error } = await query;
                if (error) throw error;
                allCarsData = data;
                if (currentView === 'house_stats') renderHouseStats(data); else handleSearch();
            } catch (err) { console.warn(err); }
        }

        function renderHouseStats(data) {
            const houses = {};
            data.forEach(c => { const h = c.house_number?.trim() || 'ไม่ระบุ'; if(!houses[h]) houses[h]=[]; houses[h].push(c); });
            const sorted = Object.entries(houses).filter(([h,c])=>c.length>1 && h!=='ไม่ระบุ').sort((a,b)=>b[1].length-a[1].length);
            totalCountEl.textContent = sorted.length; carList.innerHTML = '';
            if(!sorted.length) { carList.innerHTML = `<div class="text-center py-20 text-slate-400">ปกติ ไม่พบบ้านรถเกิน 1 คัน</div>`; return; }
            sorted.forEach(([h,cs], i) => {
                const plates = cs.map(c=>`<div class="flex justify-between p-2 bg-slate-50 dark:bg-slate-800/50 rounded border border-slate-100 dark:border-slate-700 text-sm"><span class="font-bold">${c.plate_number}</span><span class="text-slate-400">${formatDate(c.end_date)}</span></div>`).join('');
                const div = document.createElement('div'); div.className = "glass-panel rounded-2xl p-5 shadow-sm slide-up border-l-4 border-l-emerald-500";
                div.style.animationDelay = `${Math.min(i*50, 500)}ms`;
                div.innerHTML = `<div class="flex justify-between mb-3"><div class="flex items-center gap-3"><h3 class="text-lg font-bold">${h}</h3></div><div class="bg-emerald-600 text-white font-bold px-3 py-1 rounded-xl">${cs.length}</div></div><div class="space-y-2">${plates}</div>`;
                carList.appendChild(div);
            });
        }

            if (currentView === 'members') {
                filtered = q ? allCarsData.filter(m => (m.fullname||'').toLowerCase().includes(q) || (m.house_no||'').toLowerCase().includes(q) || (m.line_name||'').toLowerCase().includes(q)) : allCarsData;

            } else {
                filtered = q ? allCarsData.filter(c => (c.plate_number||'').toLowerCase().includes(q) || (c.house_number||'').toLowerCase().includes(q)) : allCarsData;
                renderList(filtered);
            }
        }

        async function approveRegistration(req) {
            const d = getThaiDate();
            d.setFullYear(d.getFullYear() + 1);
            const defaultEndDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            const todayStr = getThaiYMD();

            let syncStatus = 'pending'; 
            let finalProvince = req.province;

            if (req.car_type === 'รถจักรยานยนต์') {
                syncStatus = 'ignore_sync';
                finalProvince = req.province + ' (มอไซค์)';
            }

            const { value: confirm } = await Swal.fire({
                title: 'ยืนยันการอนุมัติ?',
                html: `ต้องการอนุมัติ <b>${req.plate_number}</b> หรือไม่?<br>${req.car_type === 'รถจักรยานยนต์' ? '<span class="text-sm text-slate-500">(ระบบจะบันทึกประวัติไว้แต่<b>ไม่ส่งเข้ากล้อง</b>)</span>' : ''}`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#4f46e5',
                confirmButtonText: 'อนุมัติ'
            });

            if(!confirm) return;
            Swal.fire({ title: 'กำลังบันทึกข้อมูล...', didOpen: () => Swal.showLoading() });

            try {
                const payload = {
                    plate_number: req.plate_number,
                    province: finalProvince,
                    house_number: req.house_number,
                    list_type: 'allowlist',
                    start_date: todayStr,
                    end_date: defaultEndDate,
                    status: syncStatus 
                };
                
                const { error: insertError } = await supabaseClient.from('allowed_cars').insert([payload]);
                if (insertError) throw insertError;

                await supabaseClient.from('car_registrations').update({ status: 'approved' }).eq('id', req.id);

                Swal.fire('อนุมัติสำเร็จ', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success');
                fetchPendingRequests(); 

            } catch(err) {
                Swal.fire('Error', err.message, 'error');
            }
        }

                fetchPendingRequests();
            } catch(err) {
                console.error(err);
            }
        }

                didOpen: () => Swal.showLoading()
            });

            for (let i = 0; i < carsToUpdate.length; i++) {
                const car = carsToUpdate[i];
                const isMoto = car.province && car.province.includes('(มอไซค์)');
                
                try {
                    const { error } = await supabaseClient
                        .from('allowed_cars')
                        .update({ 
                            end_date: selectedDate,
                            status: isMoto ? 'ignore_sync' : 'pending_update'
                        })
                        .eq('id', car.id);
                    
                    if (error) throw error;
                    successCount++;
                } catch (err) {
                    console.error('Error updating expiry for car', car.plate_number, err);
                    errorCount++;
                }

                Swal.update({ html: `อัปเดตไปแล้ว <b>${i + 1}</b> / ${carsToUpdate.length}<br><span class="text-sm text-slate-500">กำลังดำเนินการ: ${car.plate_number}</span>` });
            }

            Swal.fire({
                title: 'เสร็จสิ้น!',
                html: `ต่ออายุสำเร็จ <b>${successCount}</b> รายการ<br>${errorCount > 0 ? `ล้มเหลว <b class="text-red-500">${errorCount}</b> รายการ` : ''}`,
                icon: errorCount > 0 ? 'warning' : 'success',
                confirmButtonText: 'ตกลง'
            });
            refreshCurrentView();
        };

        // --- UPDATE ALL ACTIVE CARS (SYNC ALL - THROTTLED) ---
        window.updateAllActiveCars = async () => {
            // กรองเอามอเตอร์ไซค์ออกก่อน (จะได้ไม่ส่งไปหากล้อง)
            const carsToUpdate = allCarsData.filter(car => !(car.province && car.province.includes('(มอไซค์)')));

            if (!carsToUpdate || carsToUpdate.length === 0) {
                return Swal.fire('ข้อมูลว่างเปล่า', 'ไม่มีรายการรถยนต์ให้อัปเดตในขณะนี้', 'info');
            }

            const { value: confirm } = await Swal.fire({
                title: 'ยืนยันอัปเดตข้อมูลทั้งหมด?',
                html: `ระบบจะทำการทยอยส่งคำสั่ง Sync จำนวน <b>${carsToUpdate.length}</b> คัน<br><span class="text-xs text-rose-500">(ระบบจะหน่วงเวลาทีละคัน เพื่อป้องกันกล้องค้าง/Error)</span>`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#4f46e5',
                cancelButtonColor: '#ef4444',
                confirmButtonText: 'เริ่มอัปเดตเลย',
                cancelButtonText: 'ยกเลิก'
            });

            if (!confirm) return;

            let successCount = 0;
            let errorCount = 0;

            Swal.fire({
                title: 'กำลังซิงค์ข้อมูล...',
                html: `อัปเดตไปแล้ว <b>0</b> / ${carsToUpdate.length}<br><span class="text-sm text-slate-500">กำลังจัดคิวทยอยส่งคำสั่งเข้ากล้อง...</span>`,
                allowOutsideClick: false,
                showConfirmButton: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                // เปลี่ยนมาใช้ลูปส่งทีละคันแทน RPC
                for (let i = 0; i < carsToUpdate.length; i++) {
                    const car = carsToUpdate[i];
                    
                    try {
                        const { error } = await supabaseClient
                            .from('allowed_cars')
                            .update({ status: 'pending_update' })
                            .eq('id', car.id);
                        
                        if (error) throw error;
                        successCount++;
                    } catch (err) {
                        console.error('Error updating sync for car', car.plate_number, err);
                        errorCount++;
                    }

                    Swal.update({ html: `อัปเดตไปแล้ว <b>${successCount}</b> / ${carsToUpdate.length}<br><span class="text-sm text-slate-500">กำลังซิงค์: ${car.plate_number}</span>` });
                    
                    // ⚠️ สำคัญ: หน่วงเวลา 400 มิลลิวินาที ต่อคัน (ลดภาระ sync.js และป้องกันกล้อง Error)
                    await new Promise(resolve => setTimeout(resolve, 400)); 
                }

                Swal.fire({
                    title: 'เสร็จสิ้น!',
                    html: `ส่งคำสั่งซิงค์สำเร็จ <b>${successCount}</b> รายการ<br>${errorCount > 0 ? `ล้มเหลว <b class="text-red-500">${errorCount}</b> รายการ` : ''}`,
                    icon: errorCount > 0 ? 'warning' : 'success',
                    confirmButtonText: 'ตกลง'
                });
                refreshCurrentView();

            } catch (err) {
                console.error(err);
                Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
            }
        };

        // --- SILENT AUTO SYNC (THROTTLED) ---
        window.toggleAutoSync = (isEnabled) => {
            isAutoSyncEnabled = isEnabled;
            localStorage.setItem('autoSyncEnabled', isEnabled);
            
            if (isEnabled) {
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'เปิดระบบ Auto Sync แล้ว', text: 'ระบบจะดึงข้อมูลไปอัปเดตอัตโนมัติทุก 1 ชั่วโมง', showConfirmButton: false, timer: 2500 });
                if (autoSyncInterval) clearInterval(autoSyncInterval);
                autoSyncInterval = setInterval(silentSyncAllCars, 3600000);
            } else {
                Swal.fire({ toast: true, position: 'top-end', icon: 'info', title: 'ปิดระบบ Auto Sync แล้ว', showConfirmButton: false, timer: 2000 });
                if (autoSyncInterval) clearInterval(autoSyncInterval);
            }
        };

        async function silentSyncAllCars() {
            console.log("Running silent auto sync in background...");
            try {
                // กรองมอเตอร์ไซค์ออก และทยอยหน่วงเวลาส่งคำสั่งเช่นกัน
                const carsToUpdate = allCarsData.filter(car => !(car.province && car.province.includes('(มอไซค์)')));
                for (let i = 0; i < carsToUpdate.length; i++) {
                    await supabaseClient.from('allowed_cars').update({ status: 'pending_update' }).eq('id', carsToUpdate[i].id);
                    await new Promise(resolve => setTimeout(resolve, 400)); // หน่วงเวลา 0.4 วินาที
                }
                console.log("Silent auto sync completed.");
            } catch (err) {
                console.error("Silent Sync Error:", err);
            }
        }

        // --- RESTORE ALL DELETED CARS ---
        window.restoreAllDeletedCars = async () => {
            const carsToRestore = allCarsData;
            if (!carsToRestore || carsToRestore.length === 0) {
                return Swal.fire('ข้อมูลว่างเปล่า', 'ไม่มีรายการรถให้กู้คืน', 'info');
            }

            const { value: pin } = await Swal.fire({
                title: 'ยืนยันกู้คืนทั้งหมด?',
                html: `ต้องการกู้คืนข้อมูลรถทั้ง <b>${carsToRestore.length}</b> คันหรือไม่?<br><span class="text-sm text-slate-500">ข้อมูลจะถูกย้ายกลับไปที่รายการปัจจุบัน</span>`,
                input: 'password',
                inputPlaceholder: 'รหัสผ่านผู้ดูแลระบบ (9999)',
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#ef4444',
                confirmButtonText: 'กู้คืนทั้งหมด',
                cancelButtonText: 'ยกเลิก'
            });

            if (pin === '9999') {
                let successCount = 0;
                let errorCount = 0;

                Swal.fire({
                    title: 'กำลังกู้คืนข้อมูล...',
                    html: `กู้คืนไปแล้ว <b>0</b> / ${carsToRestore.length}<br><span class="text-sm text-slate-500">เตรียมการ...</span>`,
                    allowOutsideClick: false,
                    showConfirmButton: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                for (let i = 0; i < carsToRestore.length; i++) {
                    const car = carsToRestore[i];
                    try {
                        const isMoto = car.province && car.province.includes('(มอไซค์)');
                        const payload = {
                            plate_number: car.plate_number,
                            province: car.province,
                            house_number: car.house_number,
                            list_type: car.list_type || 'allowlist',
                            start_date: car.start_date,
                            end_date: car.end_date,
                            status: isMoto ? 'ignore_sync' : 'pending',
                            line_user_id: car.line_user_id,
                            line_display_name: car.line_display_name,
                            line_picture_url: car.line_picture_url
                        };
                        
                        // 1. Insert to allowed_cars
                        const { error: insertErr } = await supabaseClient.from('allowed_cars').insert([payload]);
                        if (insertErr) throw insertErr;

                        // 2. Delete from deleted_cars
                        const { error: deleteErr } = await supabaseClient.from('deleted_cars').delete().eq('id', car.id);
                        if (deleteErr) throw deleteErr;

                        successCount++;
                    } catch (err) {
                        console.error('Error restoring car', car.plate_number, err);
                        errorCount++;
                    }

                    Swal.update({ html: `กู้คืนไปแล้ว <b>${i + 1}</b> / ${carsToRestore.length}<br><span class="text-sm text-slate-500">กำลังดำเนินการ: ${car.plate_number}</span>` });
                    await new Promise(resolve => setTimeout(resolve, 150)); 
                }

                Swal.fire({
                    title: 'เสร็จสิ้น!',
                    html: `กู้คืนสำเร็จ <b>${successCount}</b> รายการ<br>${errorCount > 0 ? `ล้มเหลว <b class="text-red-500">${errorCount}</b> รายการ` : ''}`,
                    icon: errorCount > 0 ? 'warning' : 'success',
                    confirmButtonText: 'ตกลง'
                });
                refreshCurrentView();

            } else if (pin) {
                Swal.fire('รหัสไม่ถูกต้อง', 'ไม่สามารถกู้คืนข้อมูลได้', 'error');
            }
        };

        // CRUD
        function openModal(isEdit=false, data=null, isRestore=false) {
            modalTitle.textContent = isEdit ? (isRestore ? 'กู้คืนข้อมูล' : 'แก้ไขข้อมูล') : 'ลงทะเบียนใหม่';
            modalSaveBtn.textContent = isEdit ? (isRestore ? 'บันทึกและกู้คืน' : 'อัปเดต') : 'บันทึกข้อมูล';
            modalForm.reset(); editIdInput.value=''; originalDeletedIdInput.value=''; listTypeInput.value='allowlist'; setDefaultDates();
            carTypeInput.value = 'car';
            if(isEdit) {
                const isMoto = data.province && data.province.includes('(มอไซค์)');
                carTypeInput.value = isMoto ? 'motorcycle' : 'car';
                
                plateInput.value=data.plate_number; 
                provinceInput.value = isMoto ? data.province.replace(' (มอไซค์)', '').trim() : (data.province||''); 
                houseInput.value=data.house_number||'';
                listTypeInput.value=data.list_type||'allowlist'; startDateInput.value=data.start_date; endDateInput.value=data.end_date;
                editIdInput.value=isRestore?'':data.id; originalDeletedIdInput.value=isRestore?data.id:'';
            }
            carModal.classList.remove('hidden');
        }
        
        function closeModal() { carModal.classList.add('hidden'); }
        function openSettingsModal() { settingsModal.classList.remove('hidden'); }
        function closeSettingsModal() { settingsModal.classList.add('hidden'); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); }
        function formatDate(d) { return d ? new Date(d).toLocaleDateString('th-TH', {day:'numeric', month:'short', year:'2-digit'}) : '-'; }
        
        async function saveData() {
            const plate = plateInput.value.trim().toUpperCase();
            if(!plate) return Swal.fire('Alert', 'ระบุทะเบียนรถ', 'warning');
            
            let finalProvince = provinceInput.value.trim();
            let finalStatus = 'pending';

            if(carTypeInput.value === 'motorcycle') {
                if(!finalProvince.includes('(มอไซค์)')) finalProvince += ' (มอไซค์)';
                finalStatus = 'ignore_sync'; // สำหรับบันทึกใหม่
            }

            const payload = {
                plate_number: plate, province: finalProvince, house_number: houseInput.value.trim(),
                list_type: listTypeInput.value, start_date: startDateInput.value, end_date: endDateInput.value
            };
            
            // Handle Blocklist
            if (payload.list_type === 'blocklist') {
                const {value:pin} = await Swal.fire({title:'ยืนยันระงับ', input:'password', showCancelButton:true});
                if(pin!=='9999') return;
                await supabaseClient.from('deleted_cars').insert([payload]);
                if(editIdInput.value) await supabaseClient.from('allowed_cars').update({status:'pending_delete'}).eq('id', editIdInput.value);
                else await supabaseClient.from('allowed_cars').insert([{...payload, status:'pending_delete'}]);
            } else {
                // Allowlist
                if(editIdInput.value) {
                    await supabaseClient.from('allowed_cars').update({...payload, status: (carTypeInput.value === 'motorcycle' ? 'ignore_sync' : 'pending_update')}).eq('id', editIdInput.value);
                } else {
                    const {data} = await supabaseClient.from('allowed_cars').select('id').eq('plate_number', plate).neq('status', 'pending_delete').maybeSingle();
                    if(data) return Swal.fire('Error', 'ทะเบียนซ้ำ', 'error');
                    await supabaseClient.from('allowed_cars').insert([{...payload, status: finalStatus}]);
                }
            }
            
            if(originalDeletedIdInput.value && currentView !== 'visitor_history') { // Don't delete history log
                 if(currentView === 'deleted') await supabaseClient.from('deleted_cars').delete().eq('id', originalDeletedIdInput.value);
            }
            
            closeModal(); Swal.fire('สำเร็จ', 'บันทึกเรียบร้อย', 'success'); refreshCurrentView();
        }

        window.handleEdit = (d) => openModal(true, d, false);
        window.handleRestoreModal = (d) => openModal(true, d, true);
        window.handleDelete = async (id, plate) => {
            const {value:pin} = await Swal.fire({title:'ยืนยันลบ', input:'password', showCancelButton:true});
            if(pin==='9999') {
                const {data} = await supabaseClient.from('allowed_cars').select('*').eq('id', id).single();
                if(data) await supabaseClient.from('deleted_cars').insert([{...data}]);
                await supabaseClient.from('allowed_cars').update({status:'pending_delete'}).eq('id', id);
                refreshCurrentView();
            }
        };

        window.handlePermanentDelete = async (id, plate) => {
            const {value:pin} = await Swal.fire({
                title: 'ยืนยันลบข้อมูลถาวร?', 
                html: `ต้องการลบทะเบียน <b>${plate}</b> ออกจากฐานข้อมูลประวัติหรือไม่?<br><span class="text-sm text-red-500">การกระทำนี้ไม่สามารถย้อนกลับได้</span>`,
                input: 'password', 
                inputPlaceholder: 'รหัสผ่านผู้ดูแลระบบ (9999)',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'ลบถาวร',
                cancelButtonText: 'ยกเลิก'
            });
            
            if(pin === '9999') {
                try {
                    Swal.fire({ title: 'กำลังลบข้อมูล...', didOpen: () => Swal.showLoading() });
                    const { error } = await supabaseClient.from('deleted_cars').delete().eq('id', id);
                    if(error) throw error;
                    
                    Swal.fire('สำเร็จ', 'ลบข้อมูลถาวรเรียบร้อยแล้ว', 'success');
                    refreshCurrentView();
                } catch(err) {
                    Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
                }
            } else if (pin) {
                Swal.fire('รหัสไม่ถูกต้อง', 'ไม่สามารถลบข้อมูลได้', 'error');
            }
        };

        // --- ปิดการใช้งาน Real-time Listener เพื่อลดภาระของ Supabase ---
        // const debouncedFetch = debounce(fetchCars, 1000);
        // supabaseClient.channel('public:allowed_cars').on('postgres_changes', { event: '*', schema: 'public', table: 'allowed_cars' }, debouncedFetch).subscribe();
        
        // Start
        startBackgroundSystem();
        fetchCars();
        fetchPendingRequests(); // Fetch badge count on load
    </script>
</body>
</html>
