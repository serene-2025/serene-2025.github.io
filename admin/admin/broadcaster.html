<!DOCTYPE html>
<html lang="th" class=""> 
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>🚀 LINE Broadcaster (API Version)</title>

  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>

  <!-- === NEW: Load flex2html CSS สำหรับวาด UI ของ Flex === -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/PamornT/flex2html@main/css/flex2html.css">

  <script>
    tailwind.config = {
      darkMode: 'class', 
      theme: {
        extend: {
          colors: {
            line: { DEFAULT: '#06C755', '50': '#f0fdf6', '100': '#dcfceb', '200': '#bbf7d6', '300': '#8cf0b9', '400': '#56e594', '500': '#2dd470', '600': '#06C755', '700': '#05a546', '800': '#07823a', '900': '#066931', '950': '#03381a'},
          }
        }
      }
    }
  </script>
  
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    #btn-send .btn-text { display: inline-flex; align-items: center; }
    #btn-send .btn-spinner { display: none; animation: spin 1s linear infinite; }
    #btn-send:disabled .btn-text { display: none; }
    #btn-send:disabled .btn-spinner { display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    #loader-overlay { transition: opacity 0.3s ease-in-out; }
    #loader-overlay[aria-busy="false"] { opacity: 0; pointer-events: none; }
    #loader-overlay[aria-busy="true"] { opacity: 1; pointer-events: all; }

    .choices { margin-bottom: 0; }
    .choices__inner { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid rgb(203 213 225); border-radius: 0.5rem; background-color: white; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); font-size: 1rem; min-height: auto; }
    .dark .choices__inner { background-color: rgb(51 65 85); border-color: rgb(71 85 105); }
    .choices.is-focused .choices__inner, .choices.is-open .choices__inner { border-color: #06C755; box-shadow: 0 0 0 2px #06C755; }
    .choices__list--dropdown { border-radius: 0.5rem; border: 1px solid rgb(226 232 240); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-top: 0.25rem; }
    .dark .choices__list--dropdown { background-color: rgb(30 41 59); border-color: rgb(51 65 85); }
    .choices__list--dropdown .choices__item--selectable.is-highlighted { background-color: #f0fdf6; color: #066931; }
    .dark .choices__list--dropdown .choices__item--selectable.is-highlighted { background-color: rgba(6, 199, 85, 0.1); color: #bbf7d6; }
    .choices__input { background-color: white; color: rgb(15 23 42); font-size: 1rem; }
    .dark .choices__input { background-color: rgb(51 65 85); color: white; }
    .choices[data-type*="select-multiple"] .choices__item { background-color: #eef2ff; border: 1px solid #c7d2fe; color: #3730a3; font-weight: 500; border-radius: 0.375rem; padding: 0.25rem 0.5rem; }
    .dark .choices[data-type*="select-multiple"] .choices__item { background-color: rgb(30, 41, 59); border-color: rgb(71, 85, 105); color: rgb(199, 210, 254); }

    .modal { transition: opacity 0.3s ease-in-out; }
    .modal[aria-hidden="true"] { opacity: 0; pointer-events: none; }
    .modal[aria-hidden="false"] { opacity: 1; pointer-events: all; }

    .phone-mockup { width: 100%; max-width: 320px; height: 550px; background-color: #111; border-radius: 30px; padding: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .dark .phone-mockup { background-color: #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .phone-screen { width: 100%; height: 100%; background-color: #E5DDD5; border-radius: 18px; display: flex; flex-direction: column; overflow: hidden; }
    .dark .phone-screen { background-color: #0d1a26; }
    .phone-header { display: flex; align-items: center; gap: 10px; padding: 10px 15px; background-color: #f0f2f5; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
    .dark .phone-header { background-color: #1f2937; border-bottom-color: #334155; color: #f1f5f9; }
    .phone-chat-body { flex-grow: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; }
    .phone-footer { display: flex; align-items: center; padding: 8px 12px; background-color: #f0f2f5; flex-shrink: 0; }
    .dark .phone-footer { background-color: #1f2937; }
    .fake-input { flex-grow: 1; background-color: #fff; border: 1px solid #e0e0e0; border-radius: 20px; padding: 6px 12px; color: #a0a0a0; }
    .dark .fake-input { background-color: #334155; border-color: #475569; color: #94a3b8; }

    .chat-bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; word-wrap: break-word; white-space: pre-wrap; align-self: flex-end; background-color: #DCF8C6; border-bottom-right-radius: 4px; }
    .dark .chat-bubble { background-color: #056064; color: #e2e8f0; }
    .chat-bubble-flex, .chat-bubble-location { background-color: #fff; border: 1px solid #e0e0e0; padding: 0; overflow: hidden; width: 250px; max-width: 100%; }
    .dark .chat-bubble-flex, .dark .chat-bubble-location { background-color: #1e293b; border-color: #334155; }
    .chat-flex-placeholder { padding: 10px 12px; border-bottom: 1px dashed #e0e0e0; font-weight: 600; }
    .dark .chat-flex-placeholder { border-color: #334155; color: #cbd5e1; }
    .chat-location-placeholder { padding: 10px 12px; }
    .dark .chat-location-placeholder { color: #cbd5e1; }
  </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900">

  <div id="loader-overlay" aria-busy="true" class="fixed inset-0 bg-white/70 dark:bg-slate-900/70 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="w-12 h-12 border-4 border-line-600 border-t-transparent rounded-full animate-spin"></div>
  </div>
  
  <div class="container max-w-5xl mx-auto p-4 md:p-8">

    <section class="mb-6">
      <label for="token-select" class="block text-lg font-bold text-slate-800 dark:text-slate-100 mb-2">🚀 1. เลือกช่อง (Account) ที่จะส่ง</label>
      <select id="token-select" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white shadow-sm focus:ring-2 focus:ring-line-500 focus:border-transparent transition">
        <option value="">-- กำลังโหลดข้อมูล... --</option>
      </select>
    </section>
    
    <header class="flex items-center gap-2 sm:gap-4 bg-white dark:bg-slate-800 p-4 md:p-6 rounded-xl shadow-md dark:shadow-slate-700/50 mb-6 transition-all duration-300">
      <img id="channel-icon" src="https://placehold.co/80x80/e0e0e0/7f7f7f?text=OA" alt="Channel Icon" class="w-14 h-14 md:w-16 md:h-16 rounded-full object-cover border-4 border-slate-200 dark:border-slate-700 flex-shrink-0">
      <div class="flex-grow">
        <h2 id="channel-name" class="text-xl md:text-2xl font-bold text-slate-800 dark:text-slate-100 truncate">รอการเชื่อมต่อ...</h2>
        <p id="channel-quota" class="text-sm text-slate-500 dark:text-slate-400">Quota: -</p>
      </div>
      <button id="btn-check-quota" class="flex-shrink-0 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-200 text-sm font-medium py-2 px-4 rounded-lg shadow-sm hover:bg-slate-50 dark:hover:bg-slate-600 transition-all">
        🔄 Check Quota
      </button>
      <button id="dark-mode-toggle" class="flex-shrink-0 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-200 text-sm font-medium p-2 rounded-lg shadow-sm hover:bg-slate-50 dark:hover:bg-slate-600 transition-all">
        <svg id="theme-icon-light" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        <svg id="theme-icon-dark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
      </button>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <section class="bg-white dark:bg-slate-800 rounded-xl shadow-lg dark:shadow-slate-700/50 overflow-hidden transition-all duration-300">
        <nav class="flex border-b border-slate-200 dark:border-slate-700">
          <button class="tab-link flex-1 py-4 px-2 flex items-center justify-center gap-1 text-sm font-semibold border-b-2" data-tab="text">✍️ ข้อความ (Text)</button>
          <button class="tab-link flex-1 py-4 px-2 flex items-center justify-center gap-1 text-sm font-semibold border-b-2" data-tab="flex">🎨 Flex (JSON)</button>
          <button class="tab-link flex-1 py-4 px-2 flex items-center justify-center gap-1 text-sm font-semibold border-b-2" data-tab="location">📍 Location</button>
        </nav>
        <div class="p-6">
          <div id="tab-text" class="tab-pane space-y-4">
            <form id="form-text" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">เลือกข้อความที่บันทึกไว้</label>
                <select id="text-select" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white"><option value="">-- พิมพ์ใหม่ --</option></select>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">ชื่อข้อความ</label>
                <input type="text" id="text-title" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white">
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">เนื้อหาข้อความ</label>
                <textarea id="text-content" class="w-full p-3 h-32 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white"></textarea>
              </div>
              <div class="flex gap-4">
                <button type="button" onclick="saveCurrentMessage('text')" class="py-2 px-4 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 shadow-sm hover:bg-slate-200 transition">💾 บันทึก</button>
                <button type="button" onclick="addMessageToQueue('text')" class="py-2 px-4 rounded-lg bg-line-600 text-white shadow-sm hover:bg-line-700 transition">➕ เพิ่มลงคิว</button>
              </div>
            </form>
          </div>
          
          <div id="tab-flex" class="tab-pane space-y-4" hidden>
            <form id="form-flex" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">เลือก Flex</label>
                <select id="flex-select" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white"><option value="">-- พิมพ์ใหม่ --</option></select>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">ชื่อ Flex</label>
                <input type="text" id="flex-title" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white">
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">Flex JSON</label>
                <textarea id="flex-json" class="w-full p-3 h-48 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white font-mono text-sm"></textarea>
              </div>
              <div class="flex gap-4">
                <button type="button" onclick="saveCurrentMessage('flex')" class="py-2 px-4 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 shadow-sm hover:bg-slate-200 transition">💾 บันทึก</button>
                <button type="button" onclick="addMessageToQueue('flex')" class="py-2 px-4 rounded-lg bg-line-600 text-white shadow-sm hover:bg-line-700 transition">➕ เพิ่มลงคิว</button>
              </div>
            </form>
          </div>
          
          <div id="tab-location" class="tab-pane space-y-4" hidden>
            <form id="form-location" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">เลือกสถานที่</label>
                <select id="location-select" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white"><option value="">-- พิมพ์ใหม่ --</option></select>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">ชื่อสถานที่</label>
                <input type="text" id="location-title" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white">
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">ที่อยู่</label>
                <input type="text" id="location-address" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white">
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">Latitude</label>
                  <input type="number" step="any" id="location-lat" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white">
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">Longitude</label>
                  <input type="number" step="any" id="location-long" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white">
                </div>
              </div>
              <div class="flex gap-4">
                <button type="button" onclick="saveCurrentMessage('location')" class="py-2 px-4 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 shadow-sm hover:bg-slate-200 transition">💾 บันทึก</button>
                <button type="button" onclick="addMessageToQueue('location')" class="py-2 px-4 rounded-lg bg-line-600 text-white shadow-sm hover:bg-line-700 transition">➕ เพิ่มลงคิว</button>
              </div>
            </form>
          </div>
        </div>
      </section>

      <section class="bg-white dark:bg-slate-800 rounded-xl shadow-lg dark:shadow-slate-700/50 p-6 transition-all duration-300">
        <div class="flex justify-between items-center mb-4">
          <h5 class="text-xl font-bold text-slate-800 dark:text-slate-100">📱 3. พรีวิวข้อความ</h5>
          <button onclick="clearQueue()" class="text-sm font-medium text-slate-500 hover:text-red-500 transition">ล้างทั้งหมด</button>
        </div>
        <div class="phone-mockup mx-auto">
          <div class="phone-screen">
            <div class="phone-header">
              <img id="phone-header-icon" src="https://placehold.co/40x40/e0e0e0/7f7f7f?text=OA" class="w-8 h-8 rounded-full">
              <span id="phone-header-name" class="font-semibold text-slate-800 dark:text-slate-100">Your Channel</span>
            </div>
            <div id="message-preview-area" class="phone-chat-body">
              <div id="queue-empty-preview" class="m-auto text-center text-slate-500 dark:text-slate-400">
                <p class="mt-2 text-sm">เพิ่มข้อความ...<br>พรีวิวจะแสดงที่นี่</p>
              </div>
            </div>
            <div class="phone-footer">
              <span class="fake-input">Aa</span>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="bg-white dark:bg-slate-800 rounded-xl shadow-lg dark:shadow-slate-700/50 p-6 md:p-8 mt-6 transition-all duration-300">
      <h4 class="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-6">⚙️ 2. ตั้งค่าการส่ง</h4>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">รูปแบบการส่ง</label>
          <select id="endpoint-type" onchange="updateTargetInputs()" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white">
            <option value="broadcast">Broadcast (ส่งทุกคน)</option>
            <option value="multicast">Multicast (ส่งตามแท็กชีต)</option>
            <option value="narrowcast">Narrowcast (ส่งตาม Audience LINE)</option>
            <option value="push">Push (ส่งหา 1 คน)</option>
          </select>
        </div>
        
        <div class="target-input-group">
          <div id="target-push-group">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">เป้าหมาย (เลือกจากชีต Users)</label>
            <div class="flex items-center gap-2">
              <input type="text" id="push-target-display" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-700 cursor-pointer text-slate-600 dark:text-slate-200" placeholder="คลิกเพื่อค้นหาผู้ใช้..." readonly onclick="openPushSearchModal()">
              <input type="hidden" id="push-target-uid">
              <button type="button" onclick="clearPushTarget()" class="bg-slate-100 dark:bg-slate-700 p-3 rounded-lg hover:bg-slate-200">❌</button>
            </div>
          </div>
          
          <div id="target-multicast-group" hidden>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">เป้าหมาย (แท็กหรือ UID)</label>
            <div class="flex items-center gap-2"> 
              <div class="flex-grow"><select id="multicast-targets" multiple></select></div>
              <button type="button" onclick="showMulticastPreview()" class="bg-line-100 text-line-700 p-3 rounded-lg">🔍</button>
            </div>
          </div>

          <div id="target-narrowcast-group" hidden>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">เป้าหมาย (Audience Group ID)</label>
            <input type="text" id="narrowcast-target" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white">
          </div>

          <div id="target-broadcast-group" hidden>
             <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">เป้าหมาย</label>
             <input type="text" value="ส่งผู้ติดตามทั้งหมด" disabled class="w-full p-3 border border-slate-200 rounded-lg bg-slate-50 text-slate-500 dark:bg-slate-700/50 dark:border-slate-700">
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">Alt Text</label>
          <input type="text" id="alt-text" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-200 mb-1">Sender Profile</label>
          <select id="sender-profile" class="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white">
            <option value="">-- ไม่ใช้ (ค่าเริ่มต้น) --</option>
          </select>
          <div id="sender-preview" class="hidden mt-3 flex items-center p-3 bg-indigo-50 border border-indigo-200 rounded-lg dark:bg-indigo-900/50 dark:border-indigo-700/50">
            <img id="sender-preview-icon" src="" class="w-12 h-12 rounded-full border-2 border-white shadow-md">
            <div class="ml-3">
              <p id="sender-preview-name" class="font-bold text-indigo-800 dark:text-indigo-100">Name</p>
            </div>
          </div>
        </div>
      </div>

      <div class="flex flex-col md:flex-row items-center gap-4">
        <button id="btn-send" onclick="sendMessages()" class="w-full md:w-auto bg-line-600 hover:bg-line-700 disabled:bg-slate-400 text-white text-lg font-bold py-3 px-8 rounded-lg shadow-md transition">
          <span class="btn-text">🚀 3. ส่งข้อความ</span>
          <span class="btn-spinner">🔄</span>
        </button>
        <div id="status-log" class="flex-grow w-full p-4 rounded-lg bg-slate-100 dark:bg-slate-700/50 font-medium">รอการสั่งงาน...</div>
      </div>
    </footer>
  </div>

  <!-- Modals (Multicast & Push Search) - Similar structure to original just simplified for length -->
  <div id="user-preview-modal" aria-hidden="true" class="modal fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4" onclick="closeModal('user-preview-modal')">
    <div onclick="event.stopPropagation()" class="bg-white dark:bg-slate-800 w-full max-w-2xl rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
      <header class="p-4 border-b border-slate-200 flex justify-between"><h5 class="text-xl font-bold dark:text-white">👥 รายชื่อผู้รับ</h5><button onclick="closeModal('user-preview-modal')">❌</button></header>
      <main class="p-6 overflow-y-auto"><table class="w-full"><tbody id="modal-user-list"></tbody></table></main>
    </div>
  </div>

  <div id="push-search-modal" aria-hidden="true" class="modal fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4" onclick="closeModal('push-search-modal')">
    <div onclick="event.stopPropagation()" class="bg-white dark:bg-slate-800 w-full max-w-2xl rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
      <header class="p-4 border-b border-slate-200">
        <div class="flex justify-between mb-2"><h5 class="text-xl font-bold dark:text-white">👤 ค้นหาผู้รับ</h5><button onclick="closeModal('push-search-modal')">❌</button></div>
        <input type="search" id="modal-push-search" oninput="renderPushSearchList()" placeholder="พิมพ์ค้นหา..." class="w-full p-2 border rounded">
      </header>
      <main class="p-6 overflow-y-auto"><table class="w-full"><tbody id="modal-push-list"></tbody></table></main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  
  <!-- === NEW: Load flex2html JS === -->
  <script src="https://cdn.jsdelivr.net/gh/PamornT/flex2html@main/js/flex2html.min.js"></script>

  <script>
    // --- API CORE (Replaces google.script.run) ---
    async function callGoogleApi(action, data = {}) {
      const url = 'https://script.google.com/macros/s/AKfycbysQw-YnCd_ipRBBByoRSdVMJd6v7t7vLqodIfkfCYHBhxdpZrNh2blErvzuyeJcyds/exec';
      
      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Prevent CORS Preflight issues in GAS
          body: JSON.stringify({ action: action, data: data })
        });
        const result = await response.json();
        if (!result.success) throw new Error(result.message);
        return result.data;
      } catch (error) {
        throw new Error("การเชื่อมต่อ API ล้มเหลว: " + error.message);
      }
    }

    let messageQueue = [], initialData = {};
    const MAX_QUEUE_SIZE = 5;
    let multicastTagSelect = null;

    document.addEventListener('DOMContentLoaded', () => {
      initApp();
      setupUIListeners();
    });

    async function initApp() {
      showGlobalLoader(true);
      logStatus('🔄 กำลังเชื่อมต่อ API และโหลดข้อมูล...', '');
      try {
        const data = await callGoogleApi('getInitialData');
        onInitialDataSuccess(data);
      } catch (error) {
        showGlobalLoader(false);
        logStatus(error.message, 'error');
      }
    }

    function onInitialDataSuccess(data) {
      initialData = data;
      populateTokenSelect('token-select', data.allAccessTokens, data.accessToken);
      updateHeaderChannel(data.channelName, data.channelPictureUrl);
      
      document.getElementById('endpoint-type').value = data.endpointType || 'broadcast';
      document.getElementById('narrowcast-target').value = data.narrowcastTarget || '';
      document.getElementById('alt-text').value = data.altText || '';
      
      populateSelect('text-select', data.textMessages, 'title');
      populateSelect('flex-select', data.flexMessages, 'title');
      populateSelect('location-select', data.locations, 'title');
      populateSelect('sender-profile', data.senderProfiles, 'title');
      
      if (multicastTagSelect) multicastTagSelect.destroy();
      const tagChoices = (data.availableTags || []).map(tag => ({ value: tag, label: tag }));
      multicastTagSelect = new Choices('#multicast-targets', { removeItemButton: true, choices: tagChoices });
      
      updateTargetInputs();
      showGlobalLoader(false);
      
      // Auto check quota
      document.getElementById('btn-check-quota').click();
      logStatus('✨ เชื่อมต่อสำเร็จ! พร้อมใช้งาน', 'success');
    }

    async function onTokenChange(e) {
      const selectedToken = e.target.value;
      if(!selectedToken) return;
      showGlobalLoader(true);
      initialData.accessToken = selectedToken;
      try {
        const info = await callGoogleApi('getChannelAndQuotaInfo', { accessToken: selectedToken });
        updateHeaderChannel(info.channelName, info.channelPictureUrl);
        document.getElementById('channel-quota').textContent = info.quota !== null ? `Quota Used: ${info.quota.toLocaleString()}` : `Quota: -`;
        logStatus('✅ เปลี่ยนช่องสำเร็จ!', 'success');
      } catch(error) {
        logStatus(error.message, 'error');
      }
      showGlobalLoader(false);
    }

    function updateHeaderChannel(name, iconUrl) {
      document.getElementById('channel-name').textContent = name;
      document.getElementById('phone-header-name').textContent = name;
      const finalIcon = iconUrl || 'https://placehold.co/80x80/e0e0e0/7f7f7f?text=OA';
      document.getElementById('channel-icon').src = finalIcon;
      document.getElementById('phone-header-icon').src = finalIcon;
    }

    function setupUIListeners() {
      // Tab Listeners
      const tabs = document.querySelectorAll('.tab-link'), panes = document.querySelectorAll('.tab-pane');
      tabs.forEach(tab => {
        tab.addEventListener('click', (e) => {
          e.preventDefault();
          panes.forEach(pane => pane.hidden = true);
          tabs.forEach(t => { t.classList.remove('border-line-600', 'text-line-600'); t.classList.add('border-transparent'); });
          document.getElementById(`tab-${tab.dataset.tab}`).hidden = false;
          tab.classList.add('border-line-600', 'text-line-600');
        });
      });
      if(tabs[0]) tabs[0].click();

      // Check Quota
      document.getElementById('btn-check-quota').addEventListener('click', async () => {
        setSendButtonLoading(true);
        try {
          const res = await callGoogleApi('getUsageConsumption', { accessToken: initialData.accessToken });
          if(res && res.consumption) document.getElementById('channel-quota').textContent = `Quota Used: ${res.consumption.totalUsage.toLocaleString()}`;
        } catch(e) { logStatus(e.message, 'error'); }
        setSendButtonLoading(false);
      });

      // Dark mode toggle
      document.getElementById('dark-mode-toggle').addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
      });

      document.getElementById('token-select').addEventListener('change', onTokenChange);
      document.getElementById('sender-profile').addEventListener('change', (e) => updateSenderPreview(e.target.value));
      
      // Auto-fill forms
      document.getElementById('text-select').addEventListener('change', (e) => {
        const item = initialData.textMessages.find(m => m.title === e.target.value);
        if(item) { document.getElementById('text-title').value = item.title; document.getElementById('text-content').value = item.content; }
      });
      document.getElementById('flex-select').addEventListener('change', (e) => {
        const item = initialData.flexMessages.find(m => m.title === e.target.value);
        if(item) { document.getElementById('flex-title').value = item.title; document.getElementById('flex-json').value = item.content; }
      });
      document.getElementById('location-select').addEventListener('change', (e) => {
        const item = initialData.locations.find(m => m.title === e.target.value);
        if(item) { 
          document.getElementById('location-title').value = item.title; document.getElementById('location-address').value = item.address;
          document.getElementById('location-lat').value = item.latitude; document.getElementById('location-long').value = item.longitude;
        }
      });
    }

    function updateTargetInputs() {
      const val = document.getElementById('endpoint-type').value;
      ['push', 'multicast', 'narrowcast', 'broadcast'].forEach(t => document.getElementById(`target-${t}-group`).hidden = val !== t);
    }

    function updateSenderPreview(val) {
      const card = document.getElementById('sender-preview');
      const profile = (initialData.senderProfiles || []).find(p => p.title === val);
      if (profile) {
        document.getElementById('sender-preview-icon').src = profile.iconUrl || 'https://placehold.co/48/e0e0e0/7f7f7f';
        document.getElementById('sender-preview-name').textContent = profile.name;
        card.classList.remove('hidden');
      } else card.classList.add('hidden');
    }

    function populateSelect(id, items = [], key) {
      const sel = document.getElementById(id);
      sel.innerHTML = '<option value="">-- เลือก --</option>';
      items.forEach(i => sel.insertAdjacentHTML('beforeend', `<option value="${i[key]}">${i[key]}</option>`));
    }

    function populateTokenSelect(id, tokens = [], def) {
      const sel = document.getElementById(id);
      sel.innerHTML = '';
      if(tokens.length === 0) sel.insertAdjacentHTML('beforeend', '<option value="">ไม่พบ Token ในระบบ</option>');
      tokens.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.token; opt.textContent = t.title;
        if(t.token === def) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    // Queue logic
    function addMessageToQueue(type) {
      if(messageQueue.length >= MAX_QUEUE_SIZE) return alert("คิวเต็ม");
      let msg, title;
      try {
        if(type === 'text') {
          title = document.getElementById('text-title').value;
          msg = { type: 'text', text: document.getElementById('text-content').value };
        } else if(type === 'flex') {
          title = document.getElementById('flex-title').value;
          msg = { type: 'flex', altText: document.getElementById('alt-text').value || title, contents: JSON.parse(document.getElementById('flex-json').value) };
        } else if(type === 'location') {
          title = document.getElementById('location-title').value;
          msg = { type: 'location', title: title, address: document.getElementById('location-address').value, latitude: parseFloat(document.getElementById('location-lat').value), longitude: parseFloat(document.getElementById('location-long').value) };
        }
        if(!title) throw new Error("ใส่ข้อมูลไม่ครบ");
        messageQueue.push({title, type, message: msg});
        renderQueue();
      } catch(e) { alert(e.message); }
    }

    function clearQueue() { messageQueue = []; renderQueue(); }

    function renderQueue() {
      const area = document.getElementById('message-preview-area');
      area.innerHTML = '';
      if(messageQueue.length === 0) {
        area.innerHTML = '<div class="m-auto text-center text-slate-500 dark:text-slate-400"><svg class="w-12 h-12 mx-auto mb-2 text-slate-400 dark:text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg><p class="text-sm">เพิ่มข้อความ...<br>พรีวิวจะแสดงที่นี่</p></div>';
        return;
      }
      messageQueue.forEach((q, index) => {
        const div = document.createElement('div');
        
        if(q.type === 'text') {
          div.className = 'chat-bubble';
          div.innerText = q.message.text;
          area.appendChild(div);
        }
        else if(q.type === 'flex') {
          // ไม่ต้องใช้พื้นหลังสีเขียวของ Text Bubble
          div.className = 'self-end mb-2 max-w-[85%] bg-transparent';
          const flexId = `flex-preview-container-${index}`;
          div.innerHTML = `<div id="${flexId}" class="rounded-xl overflow-hidden shadow-sm bg-white"></div>`;
          area.appendChild(div);
          
          // เรียกใช้ flex2html เพื่อแปลง JSON เป็น UI (ใช้ setTimeout เพื่อรอให้ DOM สร้างเสร็จก่อน)
          setTimeout(() => {
            try {
              if (typeof flex2html !== 'undefined') {
                flex2html(flexId, q.message);
              } else {
                document.getElementById(flexId).innerHTML = `<div class="p-2 font-bold border-b text-slate-800">[Flex] ${q.title}</div>`;
              }
            } catch(e) {
              console.error('Flex render error:', e);
              document.getElementById(flexId).innerHTML = `<div class="p-3 bg-red-50 text-red-600 text-xs rounded-xl border border-red-200">⚠️ ไม่สามารถพรีวิวได้: รูปแบบ JSON ขาดองค์ประกอบบางอย่าง</div>`;
            }
          }, 50);
        }
        else if(q.type === 'location') {
          div.className = 'chat-bubble chat-bubble-location';
          div.innerHTML = `<div class="chat-location-placeholder"><span class="title font-bold">📍 ${q.title}</span><br><span class="text-sm text-slate-500">${q.message.address}</span></div>`;
          area.appendChild(div);
        }
      });
      area.scrollTop = area.scrollHeight;
    }

    // Save & Send via API
    async function saveCurrentMessage(type) {
      let data = {};
      try {
        if(type === 'text') data = { title: document.getElementById('text-title').value, content: document.getElementById('text-content').value };
        else if(type === 'flex') { JSON.parse(document.getElementById('flex-json').value); data = { title: document.getElementById('flex-title').value, content: document.getElementById('flex-json').value }; }
        else if(type === 'location') data = { title: document.getElementById('location-title').value, address: document.getElementById('location-address').value, latitude: document.getElementById('location-lat').value, longitude: document.getElementById('location-long').value };
        
        setSendButtonLoading(true);
        await callGoogleApi('saveMessageData', { type: type, data: data });
        logStatus('✅ บันทึกสำเร็จ', 'success');
        initApp(); // reload data
      } catch(e) { logStatus(e.message, 'error'); setSendButtonLoading(false); }
    }

    async function sendMessages() {
      if(messageQueue.length === 0) return alert("ไม่มีข้อความในคิว");
      const endpointType = document.getElementById('endpoint-type').value;
      let rawUids = '';
      
      if(endpointType === 'push') rawUids = document.getElementById('push-target-uid').value;
      else if(endpointType === 'multicast') rawUids = multicastTagSelect.getValue(true).join(',');
      else if(endpointType === 'narrowcast') rawUids = document.getElementById('narrowcast-target').value;
      
      let msgs = messageQueue.map(q => q.message);
      const sp = document.getElementById('sender-profile').value;
      if(sp) {
        const prof = initialData.senderProfiles.find(p => p.title === sp);
        if(prof) msgs = msgs.map(m => ({...m, sender: {name: prof.name, iconUrl: prof.iconUrl}}));
      }

      setSendButtonLoading(true);
      try {
        const res = await callGoogleApi('sendLineMessage', { 
          config: { accessToken: initialData.accessToken, endpointType, rawUids, senderProfileName: sp }, 
          messages: msgs 
        });
        logStatus('✅ ส่งสำเร็จ', 'success');
        clearQueue();
      } catch(e) { logStatus(e.message, 'error'); }
      setSendButtonLoading(false);
    }

    // UI Helpers
    function showGlobalLoader(show) { document.getElementById('loader-overlay').setAttribute('aria-busy', show ? 'true' : 'false'); }
    function setSendButtonLoading(isLoading) { document.getElementById('btn-send').disabled = isLoading; }
    function logStatus(msg, type) { 
      const el = document.getElementById('status-log'); 
      el.textContent = msg; 
      el.className = `flex-grow w-full p-4 rounded-lg font-medium transition ${type==='error'?'bg-red-100 text-red-700': type==='success'?'bg-green-100 text-green-700':'bg-slate-100 text-slate-700'}`; 
    }
    
    function openModal(id) { document.getElementById(id).setAttribute('aria-hidden', 'false'); }
    function closeModal(id) { document.getElementById(id).setAttribute('aria-hidden', 'true'); }

    // Minimal Search implementations for demo
    function openPushSearchModal() { renderPushSearchList(); openModal('push-search-modal'); }
    function renderPushSearchList() {
      const q = document.getElementById('modal-push-search').value.toLowerCase();
      const list = document.getElementById('modal-push-list');
      list.innerHTML = '';
      (initialData.allUsers || []).filter(u => u.displayName.toLowerCase().includes(q) || u.houseNumber.includes(q)).forEach(u => {
        list.insertAdjacentHTML('beforeend', `<tr class="border-b cursor-pointer hover:bg-slate-50" onclick="selectPush('${u.uid}','${u.displayName.replace(/'/g,"\\'")}','${u.houseNumber}')"><td class="p-2"><img src="${u.pictureUrl||''}" class="w-8 h-8 rounded-full inline mr-2">${u.displayName}</td><td class="p-2">${u.houseNumber}</td></tr>`);
      });
    }
    function selectPush(uid, name, hn) {
      document.getElementById('push-target-uid').value = uid;
      document.getElementById('push-target-display').value = `[${hn}] ${name}`;
      closeModal('push-search-modal');
    }
    function clearPushTarget() { document.getElementById('push-target-uid').value = ''; document.getElementById('push-target-display').value = ''; }
    
    function showMulticastPreview() {
      const uids = multicastTagSelect.getValue(true);
      const list = document.getElementById('modal-user-list'); list.innerHTML = '';
      const matched = (initialData.allUsers || []).filter(u => uids.includes(u.uid) || (u.tags && u.tags.split(',').some(t=>uids.includes(t.trim()))));
      matched.forEach(u => {
        list.insertAdjacentHTML('beforeend', `<tr class="border-b"><td class="p-2"><img src="${u.pictureUrl||''}" class="w-8 h-8 rounded-full"></td><td class="p-2">${u.houseNumber}</td><td class="p-2">${u.displayName}</td></tr>`);
      });
      openModal('user-preview-modal');
    }
  </script>
</body>
</html>
