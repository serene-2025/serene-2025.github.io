        let currentBucket = null;
        let currentFolderPath = [];

        async function renderStorageTable() {
            const content = document.getElementById('content-area');
            content.innerHTML = `
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-800 font-display">จัดการรูปภาพ (Storage)</h2>
                        <p class="text-sm text-slate-500 mt-1">สำรวจ โฟลเดอร์ ค้นหา และลบไฟล์บน Storage</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="relative w-full md:w-64">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                            <input type="text" id="storage-searcher" class="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm shadow-sm transition-all" placeholder="ค้นหาชื่อไฟล์..." oninput="handleSearch(this.value)">
                        </div>
                    </div>
                </div>
                
                <div class="mb-5 flex flex-col md:flex-row md:items-end gap-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">เลือก Bucket</label>
                        <div class="relative w-full md:w-64">
                            <select id="bucket-selector" onchange="changeBucket(this.value)" class="w-full appearance-none rounded-xl border border-slate-200 p-3.5 pr-10 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white shadow-sm font-medium text-slate-700">
                                <option value="">กำลังโหลด...</option>
                            </select>
                            <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-50 p-3.5 rounded-xl border border-slate-200 shadow-sm text-sm overflow-x-auto whitespace-nowrap hidden w-full md:w-auto" id="storage-breadcrumbs">
                    </div>
                </div>

                <div id="storage-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-6 pb-12">
                    <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-400">
                        <i data-lucide="loader-2" class="w-8 h-8 animate-spin mb-4 text-indigo-400"></i>
                        กำลังโหลด...
                    </div>
                </div>
            `;
            lucide.createIcons();
            
            const searchInput = document.getElementById('storage-searcher');
            if (searchInput) searchInput.value = searchQuery;

            if (!currentBucket) {
                const { data: buckets, error } = await supabaseClient.storage.listBuckets();
                if (error) { showToast(error.message, 'error'); return; }
                const selectList = document.getElementById('bucket-selector');
                if (buckets && buckets.length > 0) {
                    selectList.innerHTML = buckets.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
                    currentBucket = buckets[0].id;
                } else {
                    selectList.innerHTML = '<option value="">ไม่มี Bucket</option>';
                    document.getElementById('storage-grid').innerHTML = '<div class="col-span-full text-center py-16 text-slate-400 font-medium bg-slate-50/50 rounded-[2rem] border border-slate-100 shadow-inner">ไม่พบ Bucket</div>';
                    return;
                }
            } else {
                const { data: buckets } = await supabaseClient.storage.listBuckets();
                if (buckets) {
                    document.getElementById('bucket-selector').innerHTML = buckets.map(b => `<option value="${b.id}" ${b.id === currentBucket ? 'selected' : ''}>${b.name}</option>`).join('');
                }
            }
            
            await fetchAndRenderFiles();
        }

        async function changeBucket(bucketId) {
            if (!bucketId) return;
            currentBucket = bucketId;
            searchQuery = "";
            currentFolderPath = [];
            document.getElementById('storage-searcher').value = "";
            renderStorageTable();
        }

        function navigateToSubfolder(folderName) {
            currentFolderPath.push(folderName);
            searchQuery = "";
            document.getElementById('storage-searcher').value = "";
            fetchAndRenderFiles();
        }

        function navigateToFolder(index) {
            if (index === -1) {
                currentFolderPath = [];
            } else {
                currentFolderPath = currentFolderPath.slice(0, index + 1);
            }
            searchQuery = "";
            document.getElementById('storage-searcher').value = "";
            fetchAndRenderFiles();
        }

        function jumpToFolder(bucketId, fullPath) {
            currentBucket = bucketId;
            const selector = document.getElementById('bucket-selector');
            if (selector) selector.value = bucketId;
            
            currentFolderPath = fullPath.split('/').filter(p => p !== '');
            searchQuery = "";
            document.getElementById('storage-searcher').value = "";
            fetchAndRenderFiles();
        }

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024, dm = decimals < 0 ? 0 : decimals, sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'], i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        async function fetchAndRenderFiles() {
            const gridContainer = document.getElementById('storage-grid');
            if (!gridContainer) return;
            
            gridContainer.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center py-16 text-gray-500"><i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4 text-indigo-500"></i><p class="font-medium animate-pulse">กำลังสืบค้นข้อมูล...</p></div>';
            lucide.createIcons();

            let allFiles = [];

            if (searchQuery) {
                const { data: buckets } = await supabaseClient.storage.listBuckets();
                if (buckets) {
                    for (const b of buckets) {
                        const { data: files } = await supabaseClient.storage.from(b.id).list('', { 
                            limit: 200, 
                            offset: 0, 
                            sortBy: { column: 'name', order: 'asc' },
                            search: searchQuery 
                        });
                        if (files) {
                            files.forEach(f => {
                                if (f.name === '.emptyFolderPlaceholder') return;
                                f.bucketId = b.id;
                                allFiles.push(f);
                            });
                        }
                    }
                }
                const bcContainer = document.getElementById('storage-breadcrumbs');
                bcContainer.innerHTML = `<span class="text-slate-500 font-bold flex items-center gap-1.5"><i data-lucide="search" class="w-4 h-4"></i> ผลการค้นหา "${searchQuery}" ทั่วทั้งระบบ</span>`;
                bcContainer.classList.remove('hidden');
            } else {
                if (!currentBucket) return;
                const pathStr = currentFolderPath.join('/');
                const opts = { limit: 1000, offset: 0, sortBy: { column: 'name', order: 'asc' } };

                const { data: files, error } = await supabaseClient.storage.from(currentBucket).list(pathStr, opts);

                if (error) {
                    gridContainer.innerHTML = `<div class="col-span-full text-center py-12 text-rose-500 font-medium bg-rose-50/50 rounded-2xl">Error: ${error.message}</div>`;
                    return;
                }
                
                if (files) {
                    files.forEach(f => {
                        if (f.name === '.emptyFolderPlaceholder') return;
                        f.bucketId = currentBucket;
                        allFiles.push(f);
                    });
                }

                const bcContainer = document.getElementById('storage-breadcrumbs');
                if (currentFolderPath.length > 0) {
                    bcContainer.classList.remove('hidden');
                    let bcHtml = `<button onclick="navigateToFolder(-1)" class="text-slate-500 hover:text-indigo-600 font-bold flex items-center gap-1.5 transition-colors"><i data-lucide="folder-tree" class="w-4 h-4"></i> Root</button>`;
                    currentFolderPath.forEach((f, i) => {
                        bcHtml += ` <i data-lucide="chevron-right" class="w-3 h-3 text-slate-300"></i> `;
                        bcHtml += `<button onclick="navigateToFolder(${i})" class="text-slate-600 hover:text-indigo-600 font-medium">${f}</button>`;
                    });
                    bcContainer.innerHTML = bcHtml;
                } else {
                    bcContainer.classList.add('hidden');
                }
            }

            if (!allFiles || allFiles.length === 0) {
               gridContainer.innerHTML = '<div class="col-span-full text-center py-16 text-slate-400 font-medium bg-slate-50/50 rounded-[2rem] border border-slate-100 shadow-inner">ไม่พบไฟล์หรือโฟลเดอร์</div>';
               return;
            }

            let html = '';
            
            allFiles.forEach(f => {
                const isFolder = f.id === null || !f.id || !f.metadata;
                let icon = isFolder ? 'folder' : 'image';
                const isImage = f.name.match(/\.(jpg|jpeg|png|webp|gif|svg)$/i);
                if (!isFolder && !isImage) icon = 'file';
                
                const pathStr = currentFolderPath.join('/');
                const finalPath = searchQuery ? f.name : (pathStr ? `${pathStr}/${f.name}` : f.name);
                const publicUrlRes = !isFolder ? supabaseClient.storage.from(f.bucketId).getPublicUrl(finalPath) : null;
                const pUrl = publicUrlRes?.data?.publicUrl;
                const shortName = f.name.split('/').pop() || f.name;

                html += `
                <div class="group relative bg-white rounded-2xl border border-slate-200/60 shadow-sm hover:shadow-xl hover:-translate-y-1 hover:border-indigo-200 transition-all duration-300 overflow-hidden flex flex-col ${isFolder || pUrl ? 'cursor-pointer' : ''}"
                    ${isFolder ? (searchQuery ? `onclick="jumpToFolder('${f.bucketId}', '${f.name}')"` : `onclick="navigateToSubfolder('${shortName}')"`) : pUrl ? `onclick="window.open('${pUrl}', '_blank')"` : ''}>
                    
                    <!-- Thumbnail Area -->
                    <div class="aspect-square bg-slate-50 relative flex items-center justify-center overflow-hidden w-full ${isFolder ? 'group-hover:bg-amber-50' : 'group-hover:bg-indigo-50/30'} transition-colors">
                        ${!isFolder && pUrl && isImage ? 
                            `<img src="${pUrl}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy" />` : 
                            `<div class="p-3.5 sm:p-4 rounded-3xl ${isFolder ? 'bg-amber-100 text-amber-500' : 'bg-indigo-100 text-indigo-500'} shadow-sm transform group-hover:scale-110 transition-transform duration-300">
                                <i data-lucide="${icon}" class="w-8 h-8 sm:w-10 sm:h-10 ${isFolder ? 'fill-amber-100' : ''}"></i>
                             </div>`
                        }
                        
                        ${!isFolder ? 
                            `<button onclick="event.stopPropagation(); deleteStorageFile('${finalPath}', '${f.bucketId}')" 
                                class="absolute top-2 right-2 p-2 bg-white/90 backdrop-blur-md rounded-xl text-slate-400 hover:text-rose-500 hover:bg-rose-50 shadow-md opacity-100 md:opacity-0 md:group-hover:opacity-100 transform md:translate-y-2 md:group-hover:translate-y-0 transition-all duration-200 border border-slate-100 hover:border-rose-100 active:scale-95 z-10" 
                                title="ลบไฟล์">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>` 
                        : ''}
                    </div>

                    <!-- Details Area -->
                    <div class="p-3.5 border-t border-slate-100 bg-white/80 backdrop-blur flex-1 flex flex-col justify-between">
                        <div class="flex items-start justify-between gap-2 mb-2">
                            <h3 class="font-bold text-slate-700 text-[13px] sm:text-[14px] leading-tight line-clamp-2 w-full break-all group-hover:text-indigo-600 transition-colors" title="${f.name}">${shortName}</h3>
                        </div>
                        <div class="flex items-center justify-between mt-auto gap-2">
                             <div class="text-[9px] sm:text-[10px] font-bold px-2 py-0.5 rounded-lg tracking-wide ${isFolder ? 'bg-amber-50 text-amber-600 border border-amber-100' : 'bg-indigo-50/50 text-indigo-500 border border-indigo-100 uppercase'} truncate max-w-[65%]">
                                ${isFolder ? 'FOLDER' : (searchQuery ? f.bucketId : (f.metadata?.mimetype?.split('/')[1] || 'FILE'))}
                             </div>
                             ${!isFolder ? `<span class="text-[10px] sm:text-xs text-slate-400 font-medium font-mono bg-slate-50 px-1.5 py-0.5 rounded border border-slate-100">${formatBytes(f.metadata?.size, 0)}</span>` : ''}
                        </div>
                    </div>
                </div>
                `;
            });
            
            gridContainer.innerHTML = html;
            lucide.createIcons();
        }

        function deleteStorageFile(filePath, bucketId) {
            const fileName = filePath.split('/').pop();
            const targetBucket = bucketId || currentBucket;
            showConfirmModal('ลบไฟล์ (Delete File)', `คุณแน่ใจหรือไม่ที่ต้องการลบไฟล์ <b class="font-mono text-rose-500">${fileName}</b> จาก <b>${targetBucket}</b> ? การลบนี้จะไม่สามารถกู้คืนได้`, async () => {
                showToast('กำลังลบไฟล์...', 'loading');
                const { error } = await supabaseClient.storage.from(targetBucket).remove([filePath]);
                if (error) {
                    showToast(`ข้อผิดพลาด: ${error.message}`, 'error');
                } else {
                    showToast('ลบไฟล์เรียบร้อยแล้ว', 'success');
                    fetchAndRenderFiles();
                }
            });
        }

        window.addEventListener('resize', () => {
            const isMobile = window.innerWidth < 768;
            const msgContainer = document.getElementById('chat-messages-container');
            const listPanel = document.getElementById('users-list-panel');
            const emptyState = document.getElementById('chat-empty-state');

            if (!listPanel || !msgContainer) return;

            if (isMobile) {
                if (activeChatUserId) {
                    listPanel.style.display = 'none';
                    msgContainer.style.display = 'flex';
                } else {
                    listPanel.style.display = 'flex';
                    msgContainer.style.display = 'none';
                    // on mobile we don't show empty state typically, but we made it hidden md:flex 
                }
            } else {
                listPanel.style.display = 'flex';
                if (activeChatUserId) {
                    msgContainer.style.display = 'flex';
                } else {
                    msgContainer.style.display = 'none';
                }
            }
        });

        // ==============================================
        // 🧠 2. คลังความรู้ AI (DataAI)
        // ==============================================
        async function renderDataAIView() {
            const from = (currentPage - 1) * ITEMS_PER_PAGE;
            const to = from + ITEMS_PER_PAGE - 1;

            let query = supabaseClient.from('dataai').select('*', { count: 'exact' }).order('created_at', { ascending: false });
            if (searchQuery) query = query.ilike('content', `%${searchQuery}%`);
            query = query.range(from, to);

            const { data, error, count } = await query;
            if (error) { showToast(error.message, 'error'); return; }

            const totalPages = Math.ceil(count / ITEMS_PER_PAGE);
            const hasPrev = currentPage > 1;
            const hasNext = currentPage < totalPages;

            let html = `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 slide-in">
                    <div>
                        <h1 class="text-3xl font-bold text-slate-800 flex items-center gap-3 font-display">
                            <span class="bg-fuchsia-100 text-fuchsia-600 p-2.5 rounded-2xl shadow-sm"><i data-lucide="brain" class="w-8 h-8"></i></span>
                            คลังความรู้ AI (DataAI)
                        </h1>
                        <p class="text-slate-500 mt-2 ml-1 text-sm font-medium">เพิ่มข้อมูลให้บอท AI อ่านและเรียนรู้ เพื่อใช้ตอบคำถามลูกบ้าน</p>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                        <div class="flex gap-2">
                            <div class="relative group">
                                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                                <input type="text" placeholder="ค้นหาเนื้อหา..." onkeydown="if(event.key === 'Enter') handleSearch(this.value)" value="${searchQuery}"
                                    class="pl-12 pr-5 py-3 border-0 rounded-2xl w-full sm:w-60 bg-white/70 shadow-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-fuchsia-500 outline-none" />
                            </div>
                            <button onclick="handleSearch(document.querySelector('input[placeholder=\\'ค้นหาเนื้อหา...\\']').value)" class="px-4 py-3 bg-fuchsia-50 text-fuchsia-600 rounded-2xl font-semibold hover:bg-fuchsia-100 transition-colors"><i data-lucide="search" class="w-5 h-5"></i></button>
                        </div>
                        <button onclick="openDataAIModal()" class="bg-fuchsia-600 hover:bg-fuchsia-700 text-white px-6 py-3 rounded-2xl flex items-center justify-center gap-2 font-bold shadow-lg transition-all active:scale-95 whitespace-nowrap">
                            <i data-lucide="plus" class="w-5 h-5"></i> เพิ่มความรู้
                        </button>
                    </div>
                </div>

                <div class="glass rounded-3xl overflow-hidden slide-in border-0 shadow-xl">
                    <div class="hidden md:block overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-gray-200/50 bg-slate-50/50">
                                    <th class="px-8 py-5 text-xs font-bold text-slate-500 uppercase">เนื้อหาความรู้ (Content)</th>
                                    <th class="px-6 py-5 text-xs font-bold text-slate-500 uppercase w-48 text-right">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100/50">
            `;

            if (!data || data.length === 0) {
                html += `<tr><td colspan="2"><div class="flex flex-col items-center justify-center py-20 text-slate-400"><div class="bg-fuchsia-50 p-6 rounded-full mb-4"><i data-lucide="database" class="w-12 h-12 text-fuchsia-300"></i></div><p class="font-bold text-xl">ไม่พบข้อมูลความรู้ AI</p></div></td></tr>`;
            } else {
                data.forEach(item => {
                    const shortText = item.content.length > 150 ? escapeHtml(item.content.substring(0, 150)) + '...' : escapeHtml(item.content);
                    const fullTextStr = encodeURIComponent(JSON.stringify(item));
                    html += `
                        <tr class="table-row-hover transition-all hover:bg-fuchsia-50/30 cursor-pointer" onclick="openDataAIModal('${fullTextStr}')">
                            <td class="px-8 py-5">
                                <div class="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed">${shortText}</div>
                                <div class="text-[10px] text-slate-400 mt-2 font-mono flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> อัปเดตเมื่อ: ${formatThaiDateTime(item.created_at)}</div>
                            </td>
                            <td class="px-6 py-5 text-right align-top">
                                <button onclick="event.stopPropagation(); deleteDataAI(${item.id})" class="p-2 text-rose-500 bg-rose-50/50 rounded-xl hover:bg-rose-100 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </td>
                        </tr>`;
                });
            }

            html += `</tbody></table></div>`;
            
            html += `<div class="md:hidden grid grid-cols-1 divide-y divide-gray-100">`;
            if (data) {
                data.forEach(item => {
                    const shortText = item.content.length > 100 ? escapeHtml(item.content.substring(0, 100)) + '...' : escapeHtml(item.content);
                    const fullTextStr = encodeURIComponent(JSON.stringify(item));
                    html += `
                        <div class="p-5 bg-white hover:bg-gray-50 transition-colors" onclick="openDataAIModal('${fullTextStr}')">
                            <div class="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed mb-3">${shortText}</div>
                            <div class="flex justify-between items-center border-t border-gray-50 pt-3">
                                <span class="text-[10px] text-slate-400">${formatThaiDateTime(item.created_at)}</span>
                                <button onclick="event.stopPropagation(); deleteDataAI(${item.id})" class="text-xs font-bold text-rose-600 px-3 py-1.5 bg-rose-50 rounded-lg"><i data-lucide="trash-2" class="w-3 h-3 inline"></i> ลบ</button>
                            </div>
                        </div>`;
                });
            }
            html += `</div>`;

            html += `
                <div class="px-8 py-5 border-t border-gray-100/50 bg-slate-50/30 flex justify-between items-center text-sm">
                    <span class="text-slate-500">Showing ${count > 0 ? from + 1 : 0} - ${Math.min(to + 1, count)} of ${count}</span>
                    <div class="flex gap-2">
                        <button onclick="changePage(-1)" ${!hasPrev ? 'disabled' : ''} class="px-4 py-2 bg-white shadow-sm rounded-xl">Prev</button>
                        <span class="px-4 py-2 font-bold bg-white/50 rounded-xl">${currentPage}</span>
                        <button onclick="changePage(1)" ${!hasNext ? 'disabled' : ''} class="px-4 py-2 bg-white shadow-sm rounded-xl">Next</button>
                    </div>
                </div>
            </div>`;
            document.getElementById('content-area').innerHTML = html;
            lucide.createIcons();
        }

        function openDataAIModal(encodedData = null) {
            editingDataAiId = null;
            let content = '';
            let title = 'เพิ่มคลังความรู้ใหม่';

            if (encodedData) {
                const data = JSON.parse(decodeURIComponent(encodedData));
                editingDataAiId = data.id;
                content = data.content;
                title = 'แก้ไขคลังความรู้';
            }

            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerHTML = `
                <form id="dataaiForm" class="space-y-4">
                    <div class="p-4 bg-fuchsia-50/50 border border-fuchsia-100 rounded-2xl text-sm text-fuchsia-800 flex gap-3 shadow-sm mb-4">
                        <i data-lucide="info" class="w-5 h-5 shrink-0"></i>
                        <div>พิมพ์ข้อมูล ข้อบังคับ หรือประกาศที่ต้องการให้ AI จดจำ เพื่อใช้ตอบคำถามลูกบ้าน</div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">เนื้อหาความรู้</label>
                        <textarea name="content" required rows="10" class="w-full rounded-xl border border-slate-200 p-4 focus:ring-2 focus:ring-fuchsia-500 bg-white shadow-sm text-sm outline-none" placeholder="ใส่ข้อมูลที่นี่...">${escapeHtml(content)}</textarea>
                    </div>
                    <div class="flex justify-end gap-3 pt-4 border-t border-gray-100/50 mt-6">
                        <button type="button" onclick="closeModal()" class="px-6 py-3 bg-white text-slate-600 rounded-xl hover:bg-slate-50 font-bold border border-slate-200 shadow-sm">ยกเลิก</button>
                        <button type="submit" class="px-6 py-3 bg-fuchsia-600 hover:bg-fuchsia-700 text-white rounded-xl shadow-lg flex items-center gap-2 font-bold transition-all">
                            <i data-lucide="save" class="w-4 h-4"></i> บันทึกข้อมูล
                        </button>
                    </div>
                </form>
            `;
            document.getElementById('dataaiForm').onsubmit = handleDataAISubmit;
            openModal();
            lucide.createIcons();
        }

        async function handleDataAISubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            setBtnLoading(btn, true);

            const content = e.target.content.value.trim();
            let error;
            if (editingDataAiId) {
                const { error: err } = await supabaseClient.from('dataai').update({ content }).eq('id', editingDataAiId);
                error = err;
            } else {
                const { error: err } = await supabaseClient.from('dataai').insert([{ content }]);
                error = err;
            }

            if (error) { showToast(error.message, 'error'); setBtnLoading(btn, false); } 
            else { showToast('บันทึกความรู้ AI สำเร็จ', 'success'); closeModal(); renderDataAIView(); }
        }

        async function deleteDataAI(id) {
            showConfirmModal('⚠️ ลบข้อมูลความรู้?', 'การลบข้อมูลนี้จะลบออกจากฐานข้อมูลอย่างถาวร ยืนยันหรือไม่?', async () => {
                showToast('กำลังลบ...', 'loading');
                const { error } = await supabaseClient.from('dataai').delete().eq('id', id);
                if (error) showToast(error.message, 'error');
                else { showToast('ลบข้อมูลสำเร็จ'); renderDataAIView(); }
            });
        }
        //*********************
  </script>

</body>

</html>
