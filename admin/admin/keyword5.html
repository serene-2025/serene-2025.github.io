        function navigateToSubfolder(folderName) {
            currentFolderPath.push(folderName);
            searchQuery = "";
            document.getElementById('storage-searcher').value = "";
            fetchAndRenderFiles();
        }

        function navigateToFolder(index) {
            if (index === -1) {
                currentFolderPath = [];
            } else {
                currentFolderPath = currentFolderPath.slice(0, index + 1);
            }
            searchQuery = "";
            document.getElementById('storage-searcher').value = "";
            fetchAndRenderFiles();
        }

        function jumpToFolder(bucketId, fullPath) {
            currentBucket = bucketId;
            const selector = document.getElementById('bucket-selector');
            if (selector) selector.value = bucketId;
            
            currentFolderPath = fullPath.split('/').filter(p => p !== '');

            document.getElementById('storage-searcher').value = "";
            fetchAndRenderFiles();
        }

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024, dm = decimals < 0 ? 0 : decimals, sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'], i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        async function fetchAndRenderFiles() {
            const gridContainer = document.getElementById('storage-grid');
            if (!gridContainer) return;
            
            gridContainer.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center py-16 text-gray-500"><i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4 text-indigo-500"></i><p class="font-medium animate-pulse">กำลังสืบค้นข้อมูล...</p></div>';
            lucide.createIcons();

            let allFiles = [];

            if (searchQuery) {
                const { data: buckets } = await supabaseClient.storage.listBuckets();
                if (buckets) {
                    for (const b of buckets) {
                        const { data: files } = await supabaseClient.storage.from(b.id).list('', { 
                            limit: 200, 
                            offset: 0, 
                            sortBy: { column: 'name', order: 'asc' },
                            search: searchQuery 
                        });
                        if (files) {
                            files.forEach(f => {
                                if (f.name === '.emptyFolderPlaceholder') return;
                                f.bucketId = b.id;
                                allFiles.push(f);
                            });
                        }
                    }
                }
                const bcContainer = document.getElementById('storage-breadcrumbs');
                bcContainer.innerHTML = `<span class="text-slate-500 font-bold flex items-center gap-1.5"><i data-lucide="search" class="w-4 h-4"></i> ผลการค้นหา "${searchQuery}" ทั่วทั้งระบบ</span>`;
                bcContainer.classList.remove('hidden');
            } else {
                if (!currentBucket) return;
                const pathStr = currentFolderPath.join('/');
                const opts = { limit: 1000, offset: 0, sortBy: { column: 'name', order: 'asc' } };

                const { data: files, error } = await supabaseClient.storage.from(currentBucket).list(pathStr, opts);

                if (error) {
                    gridContainer.innerHTML = `<div class="col-span-full text-center py-12 text-rose-500 font-medium bg-rose-50/50 rounded-2xl">Error: ${error.message}</div>`;
                    return;
                }
                
                if (files) {
                    files.forEach(f => {
                        if (f.name === '.emptyFolderPlaceholder') return;
                        f.bucketId = currentBucket;
                        allFiles.push(f);
                    });
                }

                const bcContainer = document.getElementById('storage-breadcrumbs');
                if (currentFolderPath.length > 0) {
                    bcContainer.classList.remove('hidden');
                    let bcHtml = `<button onclick="navigateToFolder(-1)" class="text-slate-500 hover:text-indigo-600 font-bold flex items-center gap-1.5 transition-colors"><i data-lucide="folder-tree" class="w-4 h-4"></i> Root</button>`;

                    bcContainer.classList.add('hidden');

               return;
            }

            let html = '';
            
            allFiles.forEach(f => {
                const isFolder = f.id === null || !f.id || !f.metadata;
                let icon = isFolder ? 'folder' : 'image';

                if (!isFolder && !isImage) icon = 'file';
                
                const pathStr = currentFolderPath.join('/');
                const finalPath = searchQuery ? f.name : (pathStr ? `${pathStr}/${f.name}` : f.name);
                const publicUrlRes = !isFolder ? supabaseClient.storage.from(f.bucketId).getPublicUrl(finalPath) : null;
                const pUrl = publicUrlRes?.data?.publicUrl;
                const shortName = f.name.split('/').pop() || f.name;

                html += `
                <div class="group relative bg-white rounded-2xl border border-slate-200/60 shadow-sm hover:shadow-xl hover:-translate-y-1 hover:border-indigo-200 transition-all duration-300 overflow-hidden flex flex-col ${isFolder || pUrl ? 'cursor-pointer' : ''}"
                    ${isFolder ? (searchQuery ? `onclick="jumpToFolder('${f.bucketId}', '${f.name}')"` : `onclick="navigateToSubfolder('${shortName}')"`) : pUrl ? `onclick="window.open('${pUrl}', '_blank')"` : ''}>
                    
                    <!-- Thumbnail Area -->

                        ${!isFolder && pUrl && isImage ? 
                            `<img src="${pUrl}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy" />` : 
                            `<div class="p-3.5 sm:p-4 rounded-3xl ${isFolder ? 'bg-amber-100 text-amber-500' : 'bg-indigo-100 text-indigo-500'} shadow-sm transform group-hover:scale-110 transition-transform duration-300">
                                <i data-lucide="${icon}" class="w-8 h-8 sm:w-10 sm:h-10 ${isFolder ? 'fill-amber-100' : ''}"></i>
                             </div>`
                        }
                        
                        ${!isFolder ? 
                            `<button onclick="event.stopPropagation(); deleteStorageFile('${finalPath}', '${f.bucketId}')" 
                                class="absolute top-2 right-2 p-2 bg-white/90 backdrop-blur-md rounded-xl text-slate-400 hover:text-rose-500 hover:bg-rose-50 shadow-md opacity-100 md:opacity-0 md:group-hover:opacity-100 transform md:translate-y-2 md:group-hover:translate-y-0 transition-all duration-200 border border-slate-100 hover:border-rose-100 active:scale-95 z-10" 
                                title="ลบไฟล์">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>` 
                        : ''}
                    </div>

                    <!-- Details Area -->
                    <div class="p-3.5 border-t border-slate-100 bg-white/80 backdrop-blur flex-1 flex flex-col justify-between">
                        <div class="flex items-start justify-between gap-2 mb-2">
                            <h3 class="font-bold text-slate-700 text-[13px] sm:text-[14px] leading-tight line-clamp-2 w-full break-all group-hover:text-indigo-600 transition-colors" title="${f.name}">${shortName}</h3>

                                ${isFolder ? 'FOLDER' : (searchQuery ? f.bucketId : (f.metadata?.mimetype?.split('/')[1] || 'FILE'))}

                        </div>
                    </div>
                </div>
                `;
            });
            
            gridContainer.innerHTML = html;
            lucide.createIcons();
        }

            e.preventDefault();

            let error;
            if (editingDataAiId) {

                error = err;

                const { error: err } = await supabaseClient.from('dataai').insert([{ content }]);

        // 3. 📥 Import / Export Data AI (CSV)
        async function exportDataAiCsv() {
            showToast('กำลังเตรียมไฟล์ CSV...', 'loading');
            const { data } = await supabaseClient.from('dataai').select('content');
            if(!data || data.length === 0) return showToast('ไม่มีข้อมูลให้ Export', 'error');
            
            let csv = '\uFEFFContent\n'; // UTF-8 BOM
            data.forEach(d => { csv += `"${(d.content || '').replace(/"/g, '""')}"\n`; });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `DataAI_Export_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            showToast('ดาวน์โหลดเรียบร้อย', 'success');
        }

        function triggerImportCsv() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    showToast('กำลังนำเข้าข้อมูล กรุณารอสักครู่...', 'loading');
                    const text = event.target.result;
                    const rows = text.split('\n').filter(r => r.trim());
                    let successCount = 0;
                    
                    // Skip header (i=1)
                    for (let i = 1; i < rows.length; i++) {
                        let content = rows[i].replace(/^"|"$/g, '').replace(/""/g, '"').trim();
                        if (content) {
                            await supabaseClient.from('dataai').insert([{ content }]);
                            successCount++;
                        }
                    }
                    showToast(`นำเข้าสำเร็จ ${successCount} รายการ!`, 'success');
                    if (currentView === 'dataai') renderDataAIView();
                };
                reader.readAsText(file);
            };
            input.click();
        }

        async function loadTickets() {
            const { data } = await supabaseClient.from('system_settings').select('value').eq('key', 'kanban_data').maybeSingle();
            kanbanTickets = data?.value?.tickets || [];
            
            document.getElementById('col-todo').innerHTML = '';
            document.getElementById('col-doing').innerHTML = '';
            document.getElementById('col-done').innerHTML = '';
            
            let counts = { todo: 0, doing: 0, done: 0 };

            const priorityConfig = {
                high:   { label: 'สูง',    cls: 'bg-rose-100 text-rose-600 border-rose-200',     dot: 'bg-rose-500',    borderL: 'border-l-rose-500' },
                medium: { label: 'ปานกลาง', cls: 'bg-amber-100 text-amber-600 border-amber-200',   dot: 'bg-amber-400',   borderL: 'border-l-amber-400' },
                low:    { label: 'ต่ำ',    cls: 'bg-emerald-100 text-emerald-600 border-emerald-200', dot: 'bg-emerald-400', borderL: 'border-l-emerald-400' },
            };
            const statusBorder = { todo: 'border-l-rose-500', doing: 'border-l-amber-500', done: 'border-l-emerald-500' };

            kanbanTickets.forEach(t => {
                counts[t.status]++;
                const p = priorityConfig[t.priority] || priorityConfig.medium;
                const borderColor = t.priority ? p.borderL : statusBorder[t.status];
                const dueDateHtml = t.dueDate ? (() => {
                    const diff = Math.ceil((new Date(t.dueDate) - new Date()) / 86400000);
                    const overdue = diff < 0;
                    const soon = diff >= 0 && diff <= 2;
                    const cls = overdue ? 'text-rose-500 bg-rose-50 border-rose-200' : soon ? 'text-amber-600 bg-amber-50 border-amber-200' : 'text-slate-500 bg-slate-50 border-slate-200';
                    const label = overdue ? `เกินกำหนด ${Math.abs(diff)} วัน` : diff === 0 ? 'วันนี้!' : `${diff} วัน`;
                    return `<span class="text-[10px] font-bold px-2 py-0.5 rounded-lg border ${cls} flex items-center gap-1"><i data-lucide="calendar-clock" class="w-3 h-3"></i>${label}</span>`;
                })() : '';

                const el = document.createElement('div');
                el.id = `ticket-${t.id}`;
                el.className = `bg-white dark:bg-slate-700 p-4 rounded-2xl shadow-sm border border-slate-200 cursor-move hover:shadow-lg transition-all relative group active:cursor-grabbing border-l-4 ${borderColor} select-none`;
                el.draggable = true;
                el.ondragstart = (e) => { e.dataTransfer.setData("text/plain", t.id); };
                el.innerHTML = `
                    <div class="flex items-start justify-between gap-2 mb-2">
                        <div class="font-bold text-slate-800 text-sm leading-snug flex-1">${escapeHtml(t.title)}</div>
                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                            <button onclick="editTicket('${t.id}')" class="p-1.5 text-slate-400 hover:text-indigo-500 hover:bg-indigo-50 rounded-lg transition-colors"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
                            <button onclick="deleteTicket('${t.id}')" class="p-1.5 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                        </div>
                    </div>
                    ${t.desc ? `<div class="text-xs text-slate-500 line-clamp-2 mb-3 leading-relaxed">${escapeHtml(t.desc)}</div>` : ''}
                    ${t.assignee ? `<div class="text-xs text-slate-500 flex items-center gap-1.5 mb-2"><div class="w-5 h-5 rounded-full bg-gradient-to-tr from-indigo-400 to-violet-400 flex items-center justify-center text-white text-[9px] font-bold shrink-0">${escapeHtml(t.assignee.charAt(0).toUpperCase())}</div><span class="truncate">${escapeHtml(t.assignee)}</span></div>` : ''}
                    <div class="flex items-center justify-between pt-2.5 border-t border-slate-100 mt-1 gap-2 flex-wrap">
                        <div class="flex items-center gap-1.5 flex-wrap">
                            <span class="text-[10px] text-slate-400 font-mono bg-slate-50 px-1.5 py-0.5 rounded-md border border-slate-100">#${t.id.substring(0,6)}</span>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-lg border ${p.cls} flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full ${p.dot} inline-block"></span>${p.label}</span>
                        </div>
                        ${dueDateHtml}
                    </div>
                `;
                document.getElementById(`col-${t.status}`)?.appendChild(el);
            });

            document.getElementById('count-todo').innerText = counts.todo;
            document.getElementById('count-doing').innerText = counts.doing;
            document.getElementById('count-done').innerText = counts.done;
            lucide.createIcons();
        }

        async function saveTickets() {
            await supabaseClient.from('system_settings').upsert({ key: 'kanban_data', value: { tickets: kanbanTickets } });
        }

        function allowDrop(ev) { ev.preventDefault(); }
        async function dropTicket(ev, newStatus) {
            ev.preventDefault();
            const id = ev.dataTransfer.getData("text/plain");
            const ticket = kanbanTickets.find(t => t.id === id);
            if (ticket && ticket.status !== newStatus) {
                ticket.status = newStatus;
                await saveTickets();
                loadTickets();
            }
        }

        async function saveTicketModal(editId) {
            const btn = document.getElementById('tk-save-btn');
            const title = document.getElementById('tk-title').value.trim();
            if (!title) { document.getElementById('tk-title').classList.add('border-rose-400','ring-2','ring-rose-200'); return; }

            const priority = document.querySelector('input[name="tk-priority"]:checked')?.value || 'medium';
            const status   = document.getElementById('tk-status').value;
            const assignee = document.getElementById('tk-assignee').value.trim();
            const dueDate  = document.getElementById('tk-duedate').value;

            setBtnLoading(btn, true);
            if (editId) {
                const t = kanbanTickets.find(x => x.id === editId);
                if (t) Object.assign(t, { title, desc: document.getElementById('tk-desc').value.trim(), priority, status, assignee, dueDate });
            } else {
                kanbanTickets.push({ id: Date.now().toString(), title, desc: document.getElementById('tk-desc').value.trim(), priority, status, assignee, dueDate });
            }
            await saveTickets();
            await loadTickets();
            closeModal();
        }

        function addNewTicket() { openTicketModal(null); }

        function editTicket(id) {
            const ticket = kanbanTickets.find(t => t.id === id);
            if (ticket) openTicketModal(ticket);
        }

        function deleteTicket(id) {
            showConfirmModal('ลบงาน?', 'แน่ใจหรือไม่ที่ต้องการลบงานนี้?', () => {
                kanbanTickets = kanbanTickets.filter(t => t.id !== id);
                saveTickets().then(loadTickets);
            });
        }

        async function runSandboxTest() {
            const input = document.getElementById('sandbox-input').value.trim();
            if (!input) return;
            
            const btn = document.getElementById('sandbox-btn');
            const output = document.getElementById('sandbox-output');
            
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> กำลังค้นหาข้อมูล...`;
            output.innerHTML = '<div class="flex justify-center items-center h-full"><span class="text-indigo-500 animate-pulse font-bold flex items-center gap-2"><i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> กำลังสแกนฐานข้อมูล (Knowledge Base)...</span></div>';
            lucide.createIcons();

            try {
                // จำลองระบบ RAG (Retrieval-Augmented Generation) ค้นหาคำที่เกี่ยวข้องจาก Supabase
                const keywords = input.split(' ').filter(w => w.length > 2);
                let dbKnowledge = [];

                if (keywords.length > 0) {
                    // ค้นหาคำแรกก่อน
                    const { data } = await supabaseClient.from("dataai").select("content").ilike('content', `%${keywords[0]}%`);
                    if(data) dbKnowledge = data;
                } else {
                    const { data } = await supabaseClient.from("dataai").select("content").limit(3);
                    if(data) dbKnowledge = data;
                }

                setTimeout(() => {
                    if (dbKnowledge && dbKnowledge.length > 0) {
                        let contextHtml = dbKnowledge.map((k, i) => `<div class="bg-indigo-50/50 border border-indigo-100 p-4 rounded-xl mb-3 text-slate-700 shadow-sm relative"><div class="absolute -left-2 -top-2 bg-indigo-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shadow-md">${i+1}</div>${escapeHtml(k.content)}</div>`).join('');
                        output.innerHTML = `
                            <div class="mb-4">
                                <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg text-xs font-bold border border-emerald-200">🔍 พบข้อมูลอ้างอิง ${dbKnowledge.length} รายการ</span>
                            </div>
                            ${contextHtml}
                            <div class="mt-6 pt-4 border-t border-slate-200 text-xs text-slate-400 font-mono">
                                💡 ในระบบจริง AI จะนำ Context ด้านบนนี้ไปเรียบเรียงและตอบคำถาม: "${escapeHtml(input)}"
                            </div>
                        `;
                    } else {
                        output.innerHTML = `
                            <div class="bg-rose-50 border border-rose-100 p-6 rounded-2xl text-center text-rose-600 flex flex-col items-center justify-center">
                                <i data-lucide="database" class="w-10 h-10 mb-3 opacity-50"></i>
                                <p class="font-bold text-lg mb-1">ไม่พบข้อมูลที่เกี่ยวข้อง</p>
                                <p class="text-sm opacity-80">AI จะอยู่ในสถานะ <b>SILENT</b> และส่งเรื่องให้แอดมินมาตอบแทน</p>
                            </div>
                        `;
                    }
                    
                    btn.disabled = false;
                    btn.innerHTML = `<i data-lucide="play" class="w-5 h-5"></i> วิเคราะห์การตอบกลับ`;
                    lucide.createIcons();
                }, 1000); // ดีเลย์เล็กน้อยให้ดูสมจริง

            } catch (err) {
                output.innerHTML = `<div class="text-rose-500 p-4 bg-rose-50 rounded-xl">Error: ${err.message}</div>`;
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="play" class="w-5 h-5"></i> วิเคราะห์การตอบกลับ`;
                lucide.createIcons();
            }
        }

        function filterGaps(status) {
            document.querySelectorAll('.gap-tab').forEach(t => {

            const activeTab = document.getElementById(`gap-tab-${status}`);
            if (activeTab) {
                activeTab.classList.remove('text-slate-500');
                if (status === 'pending') activeTab.classList.add('border-b-2', 'border-rose-500', 'text-rose-600');
                if (status === 'added')   activeTab.classList.add('border-b-2', 'border-emerald-500', 'text-emerald-600');
                if (status === 'wontfix') activeTab.classList.add('border-b-2', 'border-slate-500', 'text-slate-700');
            }

            const filtered = (window._allGaps || []).filter(g => g.status === status);

            if (filtered.length === 0) {
                list.innerHTML = `<div class="p-10 text-center text-slate-400 text-sm">ไม่มีข้อมูล</div>`;

        async function saveGapToKB(gapId, originalQuestion) {
            const btn = document.getElementById('gap-save-btn');
            const answer = document.getElementById('gap-kb-content').value.trim();
            if (!answer) return showToast('กรุณาเขียนคำตอบ', 'warning');
            setBtnLoading(btn, true);

            // รวมคำถาม+คำตอบเป็น content เดียว (dataai มีแค่ column content)
            const content = `Q: ${originalQuestion}\nA: ${answer}`;
            const { error: insErr } = await supabaseClient.from('dataai').insert({ content });
            if (insErr) { setBtnLoading(btn, false); return showToast(insErr.message, 'error'); }

            await supabaseClient.from('ai_gaps').update({ status: 'added' }).eq('id', gapId);
            showToast('เพิ่มลง KB สำเร็จ! แนะนำให้กด Regenerate Embeddings ที่หน้าคลังความรู้', 'success');

            renderAiGapsView();

        function toggleTagChip(btn) {
            const tag = btn.dataset.tag;
            const idx = window._selectedTags.indexOf(tag);
            if (idx === -1) {
                window._selectedTags.push(tag);
                btn.classList.remove('bg-slate-50', 'text-slate-600', 'border-slate-200');
                btn.classList.add('bg-blue-500', 'text-white', 'border-blue-500');
            } else {
                window._selectedTags.splice(idx, 1);
                btn.classList.add('bg-slate-50', 'text-slate-600', 'border-slate-200');
                btn.classList.remove('bg-blue-500', 'text-white', 'border-blue-500');
            }
            document.getElementById('tag-count').innerText = window._selectedTags.length;
            document.getElementById('push-btn').disabled = window._selectedTags.length === 0;
        }

        async function sendTargetedPush() {
            const tags = window._selectedTags || [];
            const message = document.getElementById('push-message').value.trim();
            const match = document.querySelector('input[name="match"]:checked')?.value || 'any';
            if (!message) return showToast('กรุณาพิมพ์ข้อความ', 'warning');

            showConfirmModal('ยืนยันการส่ง?', `จะส่งข้อความไปยัง user ที่มี tags (${match === 'all' ? 'ครบทุก' : 'อย่างน้อย 1'}): ${tags.join(', ')}`, async () => {
                const btn = document.getElementById('push-btn');
                setBtnLoading(btn, true);
                try {
                    const res = await fetch(`${API_BASE_URL}/api/admin/audience/targeted_push`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tags, match, messages: [{ type: 'text', text: message }] })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'ส่งไม่สำเร็จ');
                    showToast(`ส่งสำเร็จ ${data.sent} คน (เลือกได้ ${data.targetedUsers} คน)`, 'success');
                    document.getElementById('push-message').value = '';
                } catch (e) { showToast(e.message, 'error'); }
                finally { setBtnLoading(btn, false); }
            });
        }

        async function saveTier(editId) {
            const btn = document.getElementById('t-save-btn');
            const name = document.getElementById('t-name').value.trim();
            const min = parseInt(document.getElementById('t-min').value);
            const color = document.querySelector('input[name="t-color"]:checked')?.value;
            if (!name || isNaN(min)) return showToast('กรุณากรอกชื่อและคะแนนขั้นต่ำ', 'warning');
            if (!color) return showToast('กรุณาเลือกสี', 'warning');
            setBtnLoading(btn, true);

            const payload = { name, min_points: min, color_theme: color };
            const { error } = editId
                ? await supabaseClient.from('tiers').update(payload).eq('id', editId)
                : await supabaseClient.from('tiers').insert([payload]);

            setBtnLoading(btn, false);
            if (error) return showToast(error.message, 'error');
            showToast(editId ? 'อัปเดตแล้ว' : 'เพิ่ม Level สำเร็จ!', 'success');
            closeModal();
            renderCrmTiersView();
        }

        async function deleteTier(id, name) {
            showConfirmModal(`ลบ Level "${name}"?`, 'การลบไม่สามารถนำกลับได้', async () => {
                const { error } = await supabaseClient.from('tiers').delete().eq('id', id);
                if (error) return showToast(error.message, 'error');
                showToast('ลบแล้ว', 'success');
                renderCrmTiersView();
            });
        }

        // คำนวณ tier จาก points และ tiers list (client-side)
        function getTierByPoints(points) {
            const tiers = window._tiers || [];
            if (tiers.length === 0) return { name: 'Member', color_theme: 'bg-slate-400' };
            const sorted = [...tiers].sort((a, b) => b.min_points - a.min_points);
            return sorted.find(t => (points || 0) >= t.min_points) || tiers[0];
        }

                'bg-violet-600': 'bg-violet-50 text-violet-700 border-violet-200',
                'bg-indigo-600': 'bg-indigo-50 text-indigo-700 border-indigo-200',

                        <div class="flex items-center gap-3">
                            <img src="${m.pictureUrl || 'https://cdn-icons-png.flaticon.com/512/8188/8188362.png'}" class="w-10 h-10 rounded-full border-2 border-white shadow-sm" onerror="this.src='https://cdn-icons-png.flaticon.com/512/8188/8188362.png'">
                            <div class="min-w-0"><div class="font-bold text-slate-800 truncate">${escapeHtml(m.displayName || 'ไม่มีชื่อ')}</div><div class="text-[10px] text-slate-400 font-mono truncate">${m.userId.substring(0, 18)}...</div></div>

        async function syncTierForAll() {
            showConfirmModal('Sync Tier ทั้งระบบ?', 'ระบบจะคำนวณและอัปเดต tier_id ของทุกสมาชิกตาม points ปัจจุบัน', async () => {
                showToast('กำลัง sync...', 'info');
                const { data: members } = await supabaseClient.from('user_profiles').select('userId, points');
                const tiers = window._tiers || [];
                if (tiers.length === 0) return showToast('ยังไม่มี Tier กรุณาสร้างก่อน', 'warning');

                let updated = 0;
                for (const m of (members || [])) {
                    const tier = getTierByPoints(m.points || 0);
                    if (tier?.id) {
                        await supabaseClient.from('user_profiles').update({ tier_id: tier.id }).eq('userId', m.userId);
                        updated++;
                    }
                }
                showToast(`Sync เสร็จ ${updated} คน`, 'success');
                renderCrmMembersView();
            });
        }

        async function submitAdjustPoints(userId) {
            const btn = document.getElementById('pts-save-btn');
            const delta = parseInt(document.getElementById('pts-delta').value);
            if (!delta || isNaN(delta)) return showToast('กรุณากรอกจำนวนแต้ม', 'warning');
            const reason = document.getElementById('pts-reason').value.trim() || 'ปรับโดยแอดมิน';
            setBtnLoading(btn, true);
            try {
                const res = await fetch(`${API_BASE_URL}/api/crm/adjustPoints`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, delta, reason, createdBy: 'admin-panel' })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'ปรับแต้มล้มเหลว');
                showToast(`สำเร็จ! ยอดใหม่ ${d.new_balance} แต้ม (${d.tier_name})`, 'success');
                closeModal();
                renderCrmMembersView();
            } catch (e) { showToast(e.message, 'error'); }
            finally { setBtnLoading(btn, false); }
        }

        async function sendMaintenanceNotify(monthLabel, year) {
            const btn = document.getElementById('m-send-btn');

            showConfirmModal(

                    setBtnLoading(btn, true);
                    try {
                        const res = await fetch(`${API_BASE_URL}/api/admin/audience/maintenance_notify`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ items, monthLabel, year, dueDay, contactPhone })
                        });

                        if (!res.ok) throw new Error(d.error || 'ส่งล้มเหลว');
                        showToast(d.message, 'success');
                    } catch (e) { showToast(e.message, 'error'); }
                    finally { setBtnLoading(btn, false); }
                }
            );
        }

        async function saveAgmEvent(editId) {
            const btn = document.getElementById('agm-save-btn');
            const title = document.getElementById('agm-title').value.trim();
            if (!title) return showToast('กรุณากรอกชื่อ', 'warning');

            const startsAt = localDatetimeToISO(document.getElementById('agm-start').value);
            const endsAt   = localDatetimeToISO(document.getElementById('agm-end').value);
            if (!startsAt || !endsAt) return showToast('กรุณากรอกวันเวลาให้ครบ', 'warning');
            if (new Date(endsAt) <= new Date(startsAt)) return showToast('เวลาปิดต้องหลังเวลาเริ่ม', 'warning');

            setBtnLoading(btn, true);
            const payload = {
                title,
                description: document.getElementById('agm-desc').value.trim(),
                starts_at: startsAt,
                ends_at: endsAt,
                quorum_pct: parseInt(document.getElementById('agm-quorum').value) || 50,
                total_houses: parseInt(document.getElementById('agm-total').value) || null
            };
            // เฉพาะตอนสร้างใหม่ที่ตั้ง status=draft
            if (!editId) payload.status = 'draft';

            const { error } = editId
                ? await supabaseClient.from('agm_events').update(payload).eq('id', editId)
                : await supabaseClient.from('agm_events').insert(payload);
            setBtnLoading(btn, false);
            if (error) {
                if (error.code === '42P01' || (error.message?.includes('relation') && error.message?.includes('agm'))) {
                    return showToast('ตาราง agm_events ไม่มีในฐานข้อมูล — ต้องรัน migration_3features.sql ก่อน', 'error');
                }
                return showToast(error.message, 'error');
            }
            showToast(editId ? 'แก้ไข AGM สำเร็จ' : 'สร้าง AGM สำเร็จ! กดเข้าจัดการเพื่อเพิ่มวาระ', 'success');
            closeModal();
            renderAgmAdminView();
        }

        async function saveAgenda(eventId, editId) {
            const btn = document.getElementById('ag-save-btn');
            const title = document.getElementById('ag-title').value.trim();
            if (!title) return showToast('กรุณากรอกหัวข้อ', 'warning');

            const voteType = document.getElementById('ag-type').value;
            let options;
            if (voteType === 'multi_choice') {
                const lines = document.getElementById('ag-options').value.trim().split('\n').filter(Boolean);
                if (lines.length < 2) return showToast('กรุณากรอกอย่างน้อย 2 ตัวเลือก', 'warning');
                options = lines.map((text, i) => ({ id: 'opt' + (i+1), label: text.trim() }));
            } else {
                options = [{ id: 'yes', label: 'เห็นด้วย' }, { id: 'no', label: 'ไม่เห็นด้วย' }, { id: 'abstain', label: 'งดออกเสียง' }];
            }

            setBtnLoading(btn, true);
            const payload = {
                event_id: eventId,
                order_no: parseInt(document.getElementById('ag-order').value) || 1,
                title,
                description: document.getElementById('ag-desc').value.trim(),
                vote_type: voteType,
                options
            };
            const { error } = editId
                ? await supabaseClient.from('agm_agendas').update(payload).eq('id', editId)
                : await supabaseClient.from('agm_agendas').insert(payload);
            setBtnLoading(btn, false);
            if (error) return showToast(error.message, 'error');
            showToast(editId ? 'แก้ไขวาระสำเร็จ' : 'เพิ่มวาระสำเร็จ', 'success');
            closeModal();
            manageAgmEvent(eventId);
        }

async function loadUserhomeData() {
    document.getElementById('uh-tbody').innerHTML = `<tr><td colspan="9" class="p-12 text-center text-slate-400">กำลังโหลด...</td></tr>`;
    try {
        const { data, error } = await supabaseClient
            .from('userhome')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(2000);
        if (error) throw error;

        userhomeData = data || [];
        renderUserhomeStats(userhomeData);

        // populate ซอย dropdown
        const sois = [...new Set(userhomeData.map(r => r.soi).filter(Boolean))].sort();
        const soiSel = document.getElementById('uh-soi');
        soiSel.innerHTML = '<option value="">ทุกซอย</option>' + sois.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');

        applyUserhomeFilters();
    } catch (e) {
        document.getElementById('uh-tbody').innerHTML = `<tr><td colspan="9" class="p-12 text-center text-rose-500 font-bold">${escapeHtml(e.message)}</td></tr>`;
    }
}

function renderUserhomeStats(list) {
    const total = list.length;
    const owner = list.filter(r => r.living_status === 'เจ้าของบ้าน').length;
    const resident = list.filter(r => r.living_status === 'ผู้อาศัย').length;
    const tenant = list.filter(r => r.living_status === 'ผู้เช่า').length;
    const sevenDaysAgo = Date.now() - 7 * 24 * 3600 * 1000;
    const active = list.filter(r => r.updated_at && new Date(r.updated_at).getTime() > sevenDaysAgo).length;

    document.getElementById('uh-stat-total').innerText = total.toLocaleString();
    document.getElementById('uh-stat-owner').innerText = owner.toLocaleString();
    document.getElementById('uh-stat-resident').innerText = resident.toLocaleString();
    document.getElementById('uh-stat-tenant').innerText = tenant.toLocaleString();
    document.getElementById('uh-stat-active').innerText = active.toLocaleString();
}

function applyUserhomeFilters() {
    const q = (document.getElementById('uh-search')?.value || '').toLowerCase().trim();
    const soi = document.getElementById('uh-soi')?.value || '';
    const status = document.getElementById('uh-status')?.value || '';

    userhomeFiltered = userhomeData.filter(r => {
        if (soi && r.soi !== soi) return false;
        if (status && r.living_status !== status) return false;
        if (q) {
            const haystack = [r.fullname, r.line_name, r.house_no, r.soi, r.phone, r.email, r.line_id, r.uid]
                .filter(Boolean).join(' ').toLowerCase();
            if (!haystack.includes(q)) return false;
        }
        return true;
    });
    userhomePage = 1;
    renderUserhomeTable();
}

async function sendQuickPush(uid, btn) {

    setBtnLoading(btn, true);
    try {
        const res = await fetch(`${API_BASE_URL}/api/admin/audience/targeted_push`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userIds: [uid], messages: [{ type: 'text', text }] })
        });

        if (!res.ok) throw new Error(d.error || 'ส่งไม่สำเร็จ');

    } finally {

                    if (changes.userhome_overwritten)    msg += ` · ทับ userhome ${Object.keys(changes.userhome_overwritten).length} ฟิลด์`;

// ─── Export CSV ───────────────────────────────────────────────
function exportUserhomeCSV() {
    if (userhomeFiltered.length === 0) return showToast('ไม่มีข้อมูลให้ export', 'warning');

    const headers = ['created_at','uid','line_name','fullname','house_no','soi','living_status','member_count','phone','email','line_id','visit_count','updated_at'];
    const csv = [
        headers.join(','),
        ...userhomeFiltered.map(r => headers.map(h => {
            const v = r[h];
            if (v === null || v === undefined) return '';
            const s = String(v).replace(/"/g, '""');
            return /[,"\n]/.test(s) ? `"${s}"` : s;
        }).join(','))
    ].join('\n');

    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `userhome_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`ดาวน์โหลด ${userhomeFiltered.length} รายการ`, 'success');
}

function awToggleAll() {
    const all = document.getElementById('aw-select-all');
    const rows = document.querySelectorAll('.aw-row-check');
    const target = all.checked || ![...rows].every(r => r.checked);
    rows.forEach(r => r.checked = target);
    if (all) all.checked = target;
}

async function sendAwardPoints(monthLabel, year) {
    const btn = document.getElementById('aw-send-btn');
    const checkedIdx = [...document.querySelectorAll('.aw-row-check:checked')].map(c => parseInt(c.dataset.idx));
    if (checkedIdx.length === 0) return showToast('กรุณาเลือกบ้านที่จะให้แต้ม', 'warning');

    const items = checkedIdx.map(i => window._awItems[i]);
    const pointsOnTime = parseInt(document.getElementById('aw-pts-ontime').value) || 100;
    const pointsEarly  = parseInt(document.getElementById('aw-pts-early').value) || 150;
    const eligibleCount = items.flatMap(i => i.registered_users.filter(u => !u.already_awarded)).length;

    showConfirmModal(
        `ยืนยันให้แต้ม?`,
        `จะให้แต้ม <b>${eligibleCount}</b> สมาชิก จาก ${items.length} บ้าน · ${monthLabel} ${year}<br><br>
         จ่ายตรงเวลา = <b class="text-emerald-600">+${pointsOnTime}</b> · ล่วงหน้า = <b class="text-amber-600">+${pointsEarly}</b>`,
        async () => {
            setBtnLoading(btn, true);
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/audience/maintenance_award`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items, monthLabel, year, pointsOnTime, pointsEarly })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'ล้มเหลว');
                showToast(d.message, 'success');
                checkPaidMembers();
            } catch (e) { showToast(e.message, 'error'); }
            finally { setBtnLoading(btn, false); }
        }
    );
}

async function saveCheckInEvent(editId) {
    const btn = document.getElementById('ck-save-btn');
    const name = document.getElementById('ck-name').value.trim();
    const code = document.getElementById('ck-code').value.trim().toUpperCase();
    if (!name) return showToast('กรุณากรอกชื่อกิจกรรม', 'warning');
    if (!code || code.length < 4) return showToast('รหัสต้องมีอย่างน้อย 4 ตัวอักษร', 'warning');

    const startsAt = localDatetimeToISO(document.getElementById('ck-start').value);
    const endsAt   = localDatetimeToISO(document.getElementById('ck-end').value);
    if (!startsAt || !endsAt) return showToast('กรุณากรอกวันเวลาให้ครบ', 'warning');
    if (new Date(endsAt) <= new Date(startsAt)) return showToast('เวลาปิดต้องหลังเวลาเริ่ม', 'warning');

    setBtnLoading(btn, true);
    const payload = {
        name, code,
        icon: document.getElementById('ck-icon').value,
        points: parseInt(document.getElementById('ck-points').value) || 50,
        location: document.getElementById('ck-location').value.trim(),
        starts_at: startsAt,
        ends_at: endsAt,
        max_checkins: parseInt(document.getElementById('ck-max').value) || null
    };
    if (!editId) payload.is_active = true;  // ตอนสร้าง default = active

    const { error } = editId
        ? await supabaseClient.from('events').update(payload).eq('id', editId)
        : await supabaseClient.from('events').insert(payload);
    setBtnLoading(btn, false);
    if (error) {
        if (error.code === '23505') return showToast('รหัสนี้ใช้ไปแล้ว กรุณาเปลี่ยน', 'error');
        if (error.code === '42P01' || (error.message?.includes('relation') && error.message?.includes('events'))) {
            return showToast('ตาราง events ไม่มีในฐานข้อมูล — ต้องรัน migration_events_checkin.sql ก่อน', 'error');
        }
        return showToast(error.message, 'error');
    }

async function deleteCheckInEvent(eventId, name, checkinCount) {
    const warn = (checkinCount > 0)
        ? `<div class="mt-2 text-rose-600 font-bold">⚠️ มีคนเช็คอินแล้ว ${checkinCount} คน</div><div class="text-xs text-slate-500">การลบจะลบ <b>ประวัติเช็คอินทั้งหมด</b> (แต้มที่ให้ไปแล้วไม่ถูกถอน)</div>`
        : '<div class="text-xs text-slate-500">ยังไม่มีใครเช็คอิน ลบได้ปลอดภัย</div>';
    showConfirmModal(
        'ลบ Event?',
        `จะลบ <b>${escapeHtml(name)}</b> ถาวร${warn}`,
        async () => {
            const { error } = await supabaseClient.from('events').delete().eq('id', eventId);
            if (error) return showToast(error.message, 'error');
            showToast('ลบแล้ว', 'success');
            loadActiveEvents();

    );
}

function evPreset(name, points) {
    document.getElementById('ev-name').value = name;
    document.getElementById('ev-points').value = points;
}

function evSelectAll(checked) {
    document.querySelectorAll('.ev-member').forEach(c => {
        if (c.closest('.ev-member-row').style.display !== 'none') c.checked = checked;
    });
    evUpdateCount();
}

function evUpdateCount() {
    const n = document.querySelectorAll('.ev-member:checked').length;
    document.getElementById('ev-count').innerText = `(${n} คน)`;
}

function evFilterMembers() {
    const q = document.getElementById('ev-search').value.toLowerCase();
    document.querySelectorAll('.ev-member-row').forEach(row => {
        const name = (row.dataset.name || '').toLowerCase();
        row.style.display = name.includes(q) ? '' : 'none';
    });
}

async function submitEventAward() {
    const btn = document.getElementById('ev-save-btn');
    const eventName = document.getElementById('ev-name').value.trim();
    const eventDate = document.getElementById('ev-date').value;
    const points = parseInt(document.getElementById('ev-points').value);
    if (!eventName) return showToast('กรุณากรอกชื่อกิจกรรม', 'warning');
    if (!points || points <= 0) return showToast('กรุณากรอกจำนวนแต้ม', 'warning');

    const userIds = [...document.querySelectorAll('.ev-member:checked')].map(c => c.dataset.uid);
    if (userIds.length === 0) return showToast('กรุณาเลือกสมาชิกที่เข้าร่วม', 'warning');

    showConfirmModal(
        'ยืนยันให้แต้ม?',
        `<b>${escapeHtml(eventName)}</b> · ${eventDate}<br>
         ให้แต้ม <b class="text-pink-600">+${points}</b> ต่อคน × <b>${userIds.length}</b> คน
         <br><br>รวม <b class="text-pink-600">${(points * userIds.length).toLocaleString()}</b> แต้ม`,
        async () => {
            setBtnLoading(btn, true);
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/audience/event_award`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        eventName, eventDate, points, userIds,
                        eventCode: `${eventDate}-${eventName.replace(/\s+/g,'-').slice(0,30)}`
                    })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'ล้มเหลว');
                showToast(d.message, 'success');
                closeModal();
                loadEventHistory();
            } catch (e) { showToast(e.message, 'error'); }
            finally { setBtnLoading(btn, false); }
        }
    );
}

async function loadCommonFees() {
    const btn = document.getElementById('cf-load-btn');
    const month  = document.getElementById('cf-month').value;
    const year   = document.getElementById('cf-year').value;
    const status = document.getElementById('cf-status').value;
    const synced = document.getElementById('cf-synced').value;

    const params = new URLSearchParams();
    if (month) params.set('month', month);
    if (year) params.set('year', year);
    if (status) params.set('status', status);
    if (synced) params.set('synced', synced);
    params.set('limit', '300');

    setBtnLoading(btn, true);
    document.getElementById('cf-result').innerHTML = '<div class="glass rounded-3xl p-8 text-center text-slate-400">กำลังโหลด...</div>';

async function runBackfill() {
    const btn = document.getElementById('bf-run-btn');
    const limit = parseInt(document.getElementById('bf-limit').value) || 50;
    const force = document.getElementById('bf-force').checked;

    setBtnLoading(btn, true);
    document.getElementById('bf-result').innerHTML = '<div class="text-center text-slate-400 py-3 text-sm">⚙️ กำลังประมวลผล... อย่าปิดหน้านี้</div>';

    try {
        const res = await fetch(`${API_BASE_URL}/api/admin/audience/common_fees_backfill`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ limit, force })
        });
        const d = await res.json();
        if (!res.ok) throw new Error(d.error || 'backfill fail');

        document.getElementById('bf-result').innerHTML = `
            <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-4">
                <div class="font-bold text-emerald-800 mb-2">✅ ${escapeHtml(d.message)}</div>
                <div class="grid grid-cols-3 gap-2 text-center text-xs">
                    <div class="bg-white rounded-lg p-2"><div class="text-slate-500">ประมวลผล</div><div class="text-xl font-bold text-emerald-600">${d.processed}</div></div>
                    <div class="bg-white rounded-lg p-2"><div class="text-slate-500">ให้แต้ม</div><div class="text-xl font-bold text-blue-600">${d.awarded}</div></div>
                    <div class="bg-white rounded-lg p-2"><div class="text-slate-500">ล้มเหลว</div><div class="text-xl font-bold text-rose-600">${d.failed}</div></div>
                </div>
                <div class="text-center text-sm mt-2">รวมแต้มที่ให้: <b class="text-purple-600">${(d.totalPoints || 0).toLocaleString()}</b> แต้ม</div>
                ${d.errors && d.errors.length > 0 ? `<details class="mt-3"><summary class="text-xs text-rose-600 font-bold cursor-pointer">Error logs (${d.errors.length})</summary><pre class="text-[10px] text-rose-500 mt-2 bg-rose-50 p-2 rounded overflow-x-auto">${d.errors.map(e => escapeHtml(e)).join('\n')}</pre></details>` : ''}
            </div>`;
        showToast(d.message, 'success');
        // refresh list ถ้าเปิดอยู่
        if (typeof loadCommonFees === 'function' && document.getElementById('cf-result')) loadCommonFees();
    } catch (e) {
        document.getElementById('bf-result').innerHTML = `<div class="bg-rose-50 border border-rose-200 rounded-2xl p-4 text-rose-700 font-bold">${e.message}</div>`;
        showToast(e.message, 'error');
    } finally { setBtnLoading(btn, false); }
}

                        rmDrawData.sizeMode = 'half';
                        document.getElementById('rm-adv-size').value = 'half';

            el.innerHTML = `
                <div class="rm-box-label">${i+1}</div>
                <div class="rm-box-del" data-del-id="${b.id}">✕</div>
                <div class="rm-box-handle" data-resize-id="${b.id}"></div>
            `;
            canvas.appendChild(el);
        });
        const cnt = document.getElementById('rm-count');
        if (cnt) cnt.innerText = rmDrawData.boxes.length;
        renderBoxEditor();
    }

    function initDrawEvents() {
        const canvas = document.getElementById('rm-canvas');
        let mode = null, startX, startY, activeBox = null, activeEl = null, origBox = null;

        const getCoords = (e) => {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: Math.max(0, Math.min(cx - rect.left, canvas.offsetWidth)),
                     y: Math.max(0, Math.min(cy - rect.top, canvas.offsetHeight)) };
        };

        const onDown = (e) => {
            if (!rmDrawData.base64) return;
            const target = e.target;
            const c = getCoords(e);

            if (target.classList.contains('rm-box-del')) {
                window.rmRemoveBox(target.dataset.delId);
                return;
            }
            if (target.classList.contains('rm-box-handle')) {
                const id = target.dataset.resizeId;
                activeBox = rmDrawData.boxes.find(b => b.id === id);
                if (!activeBox) return;
                origBox = {...activeBox}; mode = 'resize'; startX = c.x; startY = c.y;
                rmDrawData.selectedBoxId = id; redrawAllBoxes();
                if (e.cancelable) e.preventDefault();
                return;
            }
            if (target.classList.contains('rm-box') || target.parentElement?.classList.contains('rm-box')) {
                const boxEl = target.classList.contains('rm-box') ? target : target.parentElement;
                const id = boxEl.dataset.id;
                activeBox = rmDrawData.boxes.find(b => b.id === id);
                if (!activeBox) return;
                origBox = {...activeBox}; mode = 'drag'; startX = c.x; startY = c.y;
                rmDrawData.selectedBoxId = id; redrawAllBoxes();
                if (e.cancelable) e.preventDefault();
                return;
            }
            if (rmDrawData.boxes.length >= RM_MAX_AREAS) {
                if (window.showToast) showToast(`สูงสุด ${RM_MAX_AREAS} ปุ่มเท่านั้น (LINE limit)`, 'warning');
                return;
            }
            mode = 'draw'; startX = c.x; startY = c.y;
            activeEl = document.createElement('div');
            activeEl.className = 'rm-box selected';
            activeEl.style.left = startX + 'px'; activeEl.style.top = startY + 'px';
            canvas.appendChild(activeEl);
        };

        const onMove = (e) => {
            if (!mode) return;
            if (e.cancelable) e.preventDefault();
            const c = getCoords(e);
            if (mode === 'draw' && activeEl) {
                activeEl.style.width = Math.abs(c.x - startX) + 'px';
                activeEl.style.height = Math.abs(c.y - startY) + 'px';
                activeEl.style.left = Math.min(c.x, startX) + 'px';
                activeEl.style.top = Math.min(c.y, startY) + 'px';
            } else if (mode === 'drag' && activeBox) {
                const dx = c.x - startX, dy = c.y - startY;
                const newPxX = Math.max(0, Math.min(canvas.offsetWidth - origBox.w * canvas.offsetWidth/100, origBox.x * canvas.offsetWidth/100 + dx));
                const newPxY = Math.max(0, Math.min(canvas.offsetHeight - origBox.h * canvas.offsetHeight/100, origBox.y * canvas.offsetHeight/100 + dy));
                activeBox.x = snap(newPxX / canvas.offsetWidth * 100);
                activeBox.y = snap(newPxY / canvas.offsetHeight * 100);
                redrawAllBoxes();
            } else if (mode === 'resize' && activeBox) {
                const dw = (c.x - startX) / canvas.offsetWidth * 100;
                const dh = (c.y - startY) / canvas.offsetHeight * 100;
                activeBox.w = snap(Math.max(5, Math.min(100 - activeBox.x, origBox.w + dw)));
                activeBox.h = snap(Math.max(5, Math.min(100 - activeBox.y, origBox.h + dh)));
                redrawAllBoxes();
            }
        };

        const onUp = () => {
            if (!mode) return;
            if (mode === 'draw' && activeEl) {
                const w = parseInt(activeEl.style.width) || 0;
                const h = parseInt(activeEl.style.height) || 0;
                const x = parseInt(activeEl.style.left) || 0;
                const y = parseInt(activeEl.style.top) || 0;
                if (w >= 20 && h >= 20) {
                    const pct = { x: x/canvas.offsetWidth*100, y: y/canvas.offsetHeight*100,
                                  w: w/canvas.offsetWidth*100, h: h/canvas.offsetHeight*100 };
                    const box = {
                        id: 'box_' + Date.now() + '_' + Math.random().toString(36).slice(2,5),
                        x: snap(pct.x), y: snap(pct.y), w: snap(pct.w), h: snap(pct.h),
                        type: 'message', val: '', label: ''
                    };
                    rmDrawData.boxes.push(box);
                    rmDrawData.selectedBoxId = box.id;
                }
                activeEl.remove(); redrawAllBoxes();
            }
            mode = null; activeBox = null; activeEl = null; origBox = null;
            updatePhonePreview(); updateJSONPreview();
        };

        canvas.addEventListener('mousedown', onDown);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        canvas.addEventListener('touchstart', onDown, { passive: false });
        canvas.addEventListener('touchmove', onMove, { passive: false });
        canvas.addEventListener('touchend', onUp);
    }

    function renderBoxEditor() {
        const wrap = document.getElementById('rm-box-editor');
        if (!wrap) return;
        if (rmDrawData.boxes.length === 0) {
            wrap.innerHTML = '<div class="text-[11px] text-slate-400 text-center py-3 bg-slate-50 rounded-lg">วาดบนรูปหรือเลือก Template เพื่อสร้างปุ่ม</div>';
            return;
        }
        wrap.innerHTML = rmDrawData.boxes.map((b, i) => `
            <div class="bg-white border ${b.id === rmDrawData.selectedBoxId ? 'border-indigo-400 ring-2 ring-indigo-200' : 'border-slate-200'} rounded-xl p-2.5">
                <div class="flex items-center gap-2 text-xs">
                    <span class="font-bold text-indigo-600 w-6 h-6 rounded-full bg-indigo-100 inline-flex items-center justify-center">${i+1}</span>
                    <select onchange="window.rmUpdateBoxField('${b.id}', 'type', this.value)" class="rounded-lg border border-slate-200 px-2 py-1 text-xs">
                        <option value="message" ${b.type==='message'?'selected':''}>💬 ส่งข้อความ</option>
                        <option value="postback" ${b.type==='postback'?'selected':''}>⚡ Postback</option>
                        <option value="uri" ${b.type==='uri'?'selected':''}>🔗 เปิดลิงก์</option>
                        <option value="richmenuswitch" ${b.type==='richmenuswitch'?'selected':''}>🔀 สลับเมนู</option>
                    </select>
                    <input type="text" placeholder="${
                        b.type==='message'?'ข้อความที่ส่ง':
                        b.type==='postback'?'data=action_xxx':
                        b.type==='uri'?'https://...':
                        'rich-menu-alias-id'
                    }" value="${(b.val||'').replace(/"/g,'&quot;')}" oninput="window.rmUpdateBoxField('${b.id}', 'val', this.value)" class="flex-1 rounded-lg border border-slate-200 px-2 py-1 text-xs font-mono">
                    ${b.type === 'richmenuswitch' ? `<input type="text" placeholder="label" value="${(b.label||'').replace(/"/g,'&quot;')}" oninput="window.rmUpdateBoxField('${b.id}', 'label', this.value)" class="w-20 rounded-lg border border-slate-200 px-2 py-1 text-xs">` : ''}
                    <button onclick="window.rmRemoveBox('${b.id}')" class="text-rose-500 hover:bg-rose-50 px-1.5 py-1 rounded text-xs"><i class="fas fa-trash"></i></button>
                </div>
                <div class="text-[10px] text-slate-400 mt-1 font-mono">x:${b.x.toFixed(1)}% y:${b.y.toFixed(1)}% w:${b.w.toFixed(1)}% h:${b.h.toFixed(1)}%</div>
            </div>
        `).join('');
    }

    window.rmUpdateBoxField = function(id, field, value) {
        const b = rmDrawData.boxes.find(x => x.id === id);
        if (!b) return;
        b[field] = value;
        if (field === 'type') renderBoxEditor();
        updateJSONPreview();
    };

    window.rmRemoveBox = function(id) {
        rmDrawData.boxes = rmDrawData.boxes.filter(b => b.id !== id);
        if (rmDrawData.selectedBoxId === id) rmDrawData.selectedBoxId = null;
        redrawAllBoxes(); updatePhonePreview(); updateJSONPreview();
    };

    window.rmClearAll = function() {
        rmDrawData.boxes = []; rmDrawData.selectedBoxId = null;
        redrawAllBoxes(); updatePhonePreview(); updateJSONPreview();
    };

    function updatePhonePreview() {
        const wrap = document.getElementById('rm-preview-rm');
        if (!wrap) return;
        wrap.className = 'rm-phone-rm' + (rmDrawData.sizeMode === 'half' ? ' half' : '');
        wrap.style.position = 'relative';
        wrap.style.backgroundImage = rmDrawData.base64 ? `url(${rmDrawData.base64})` : 'none';
        wrap.style.backgroundSize = '100% 100%';
        wrap.innerHTML = rmDrawData.boxes.map((b, i) => `
            <div style="position:absolute;left:${b.x}%;top:${b.y}%;width:${b.w}%;height:${b.h}%;background:rgba(99,102,241,0.3);border:1px solid #6366f1;display:flex;align-items:center;justify-content:center;color:white;font-size:8px;font-weight:bold;">${i+1}</div>
        `).join('');
    }

    function updateJSONPreview() {
        const payload = buildPayload();
        const el = document.getElementById('rm-json-preview');
        if (el) el.innerText = JSON.stringify(payload, null, 2);
    }

    function buildPayload() {
        const sizeH = targetH();
        return {
            size: { width: 2500, height: sizeH },
            name: document.getElementById('rm-adv-name')?.value?.trim() || 'New Menu',
            chatBarText: (document.getElementById('rm-adv-chatbar')?.value?.trim() || 'เมนู').slice(0, 14),
            selected: !!document.getElementById('rm-set-default')?.checked,
            areas: rmDrawData.boxes.map(b => {
                const bounds = {
                    x: Math.round(b.x/100*2500),
                    y: Math.round(b.y/100*sizeH),
                    width: Math.round(b.w/100*2500),
                    height: Math.round(b.h/100*sizeH)
                };
                let action;
                if (b.type === 'uri')                  action = { type: 'uri', uri: b.val || 'https://' };
                else if (b.type === 'postback')        action = { type: 'postback', data: b.val || 'action=none' };
                else if (b.type === 'richmenuswitch')  action = { type: 'richmenuswitch', richMenuAliasId: b.val || 'alias-id', data: 'switch=' + (b.label || 'tab') };
                else                                   action = { type: 'message', text: b.val || 'Hello' };
                return { bounds, action };
            })
        };
    }

    window.saveAdvancedRichMenu = async function(btn) {
        if (!rmDrawData.base64) { if (window.showToast) showToast('กรุณาอัปโหลดรูปก่อน', 'warning'); return; }
        if (rmDrawData.boxes.length === 0) { if (window.showToast) showToast('กรุณาวาดอย่างน้อย 1 ปุ่ม', 'warning'); return; }
        if (rmDrawData.boxes.length > RM_MAX_AREAS) { if (window.showToast) showToast(`เกิน ${RM_MAX_AREAS} ปุ่ม`, 'error'); return; }

        // ─── 🔍 Auto-detect alias IDs จาก boxes ที่เป็น richmenuswitch ───
        const usedAliases = [...new Set(
            rmDrawData.boxes
                .filter(b => b.type === 'richmenuswitch' && b.val && b.val.trim())
                .map(b => b.val.trim())
        )];

        // ตรวจ alias ที่ยังไม่ได้ register ใน LINE
        let missingAliases = [];
        if (usedAliases.length > 0) {
            try {
                const aliasRes = await fetch(`${API_BASE_URL}/api/admin/richmenus`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'alias_list' })
                });
                const aliasData = await aliasRes.json();
                if (aliasRes.ok) {
                    const existingIds = new Set((aliasData.aliases || []).map(a => a.richMenuAliasId));
                    missingAliases = usedAliases.filter(id => !existingIds.has(id));
                }
            } catch (e) { console.warn('alias_list check failed:', e); }
        }

        // ─── ถ้ามี missing aliases → ถามผู้ใช้ก่อน ───
        let aliasesToCreate = [];
        if (missingAliases.length > 0) {
            const proceed = await new Promise((resolve) => {
                showConfirmModal(
                    '🔀 พบ Alias ที่ยังไม่ได้ register',
                    `<div class="text-left text-sm space-y-2">
                        <div>Builder ตรวจพบปุ่ม <code class="bg-slate-100 px-1 rounded">richmenuswitch</code> ใช้ alias เหล่านี้แต่ยังไม่มีใน LINE:</div>
                        <ul class="bg-amber-50 border border-amber-200 rounded-lg p-3 space-y-1">
                            ${missingAliases.map(id => `<li class="font-mono text-amber-800 text-xs">• ${id}</li>`).join('')}
                        </ul>
                        <div class="text-xs text-slate-600">หลังสร้าง Rich Menu ระบบจะสร้าง alias เหล่านี้ให้ <b>ชี้ไปยัง Rich Menu ใหม่นี้</b> อัตโนมัติ</div>
                        <div class="text-[11px] text-amber-600 bg-amber-50 border border-amber-200 rounded p-2 mt-2">
                            💡 <b>ใช้กรณี Self-loop</b> — เมนูชี้กลับมาตัวเอง เช่น Tab A กดปุ่ม "Tab A" จะ refresh ตัวเอง<br>
                            ⚠️ <b>ถ้าต้องการให้ชี้ไปเมนูอื่น</b> — กดยกเลิก แล้วไปสร้าง alias ผ่านหน้า "จัดการ Aliases" ก่อน
                        </div>
                    </div>`,
                    () => resolve('create'),
                    () => resolve('skip')
                );
            });

            if (proceed === 'create') {
                aliasesToCreate = [...missingAliases];
            } else {
                if (window.showToast) showToast('ยกเลิก — กรุณาสร้าง alias ก่อน หรือเปลี่ยนค่า richmenuswitch', 'info');
                return;
            }
        }

        const payload = buildPayload();
        if (window.setBtnLoading) setBtnLoading(btn, true);
        try {
            const res = await fetch(`${API_BASE_URL}/api/admin/richmenus`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'create',
                    name: payload.name,
                    chatBarText: payload.chatBarText,
                    size: payload.size,
                    selected: payload.selected,
                    areas: payload.areas,
                    base64Image: rmDrawData.base64
                })
            });
            const data = await res.json();
            if (!data.success) throw new Error(data.error || 'สร้างไม่สำเร็จ');

            const newRichMenuId = data.richMenuId;

            // ─── สร้าง aliases ที่ missing ─────────────────────────
            if (aliasesToCreate.length > 0 && newRichMenuId) {
                let aliasOk = 0, aliasFail = 0;
                const aliasErrors = [];
                for (const aliasId of aliasesToCreate) {
                    try {
                        const aRes = await fetch(`${API_BASE_URL}/api/admin/richmenus`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                action: 'alias_create',
                                richMenuAliasId: aliasId,
                                richMenuId: newRichMenuId
                            })
                        });
                        if (aRes.ok) aliasOk++;
                        else {
                            aliasFail++;
                            const aErr = await aRes.json().catch(() => ({}));
                            aliasErrors.push(`${aliasId}: ${aErr.error || 'unknown'}`);
                        }
                    } catch (e) {
                        aliasFail++;
                        aliasErrors.push(`${aliasId}: ${e.message}`);
                    }
                }
                let summary = `✓ สร้าง Rich Menu สำเร็จ`;
                if (aliasOk > 0)   summary += ` · สร้าง alias ${aliasOk} ตัว`;
                if (aliasFail > 0) summary += ` · alias ล้มเหลว ${aliasFail} ตัว`;
                if (window.showToast) showToast(summary, aliasFail > 0 ? 'warning' : 'success');
                if (aliasErrors.length > 0) console.warn('Alias creation errors:', aliasErrors);
            } else {
                if (window.showToast) showToast('สร้าง Rich Menu สำเร็จ!', 'success');
            }
            closeModal();
            if (typeof syncRichMenus === 'function') syncRichMenus();
        } catch (e) {
            if (window.showToast) showToast(e.message, 'error');
        } finally {
            if (window.setBtnLoading) setBtnLoading(btn, false);
        }
    };
})();

        // ชุดโค้ดเปิดระบบ "จัดการ Rich Menu ขั้นสูง (Pro)" แบบหน้าต่างซ้อน (Iframe Modal)
// ============================================================================

`;
document.head.appendChild(proManagerStyle);

    if (!document.getElementById('proManagerModal')) {

            <div id="proManagerModal" class="fixed inset-0 flex items-center justify-center p-2 sm:p-4 bg-slate-900/80 backdrop-blur-sm">
                <div class="pro-modal-content bg-[#0f172a] w-full max-w-7xl h-[95vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-slate-700 relative">
                    
                    <div class="flex justify-between items-center p-4 bg-slate-800/80 border-b border-slate-700">
                        <h3 class="text-white font-bold text-lg flex items-center gap-2">
                            <i data-lucide="layout-dashboard" class="w-5 h-5 text-indigo-400"></i> 
                            ระบบแผงควบคุม Rich Menu ขั้นสูง (Advanced CMS)
                        </h3>
                        <button onclick="closeRichMenuProManager()" class="text-slate-400 hover:text-white bg-slate-700 hover:bg-red-500 rounded-lg p-2 transition-colors" title="ปิดหน้าต่าง">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <div class="flex-1 w-full relative bg-[#0f172a]">
                        <div id="proManagerLoading" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 z-0">
                            <i data-lucide="loader-2" class="w-8 h-8 animate-spin mb-3 text-indigo-500"></i>
                            <p class="font-medium tracking-wide animate-pulse">กำลังโหลดระบบจัดการขั้นสูง...</p>
                        </div>
                        <iframe src="richmenumanager.html" class="w-full h-full border-0 relative z-10" onload="document.getElementById('proManagerLoading').style.display='none'"></iframe>
                    </div>

                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        lucide.createIcons();
    }
    
    // เปิดหน้าต่าง
    document.getElementById('proManagerModal').classList.add('active');
    document.body.style.overflow = 'hidden'; // ล็อคการเลื่อนหน้าจอด้านหลัง
};

window.closeRichMenuProManager = () => {
    const modal = document.getElementById('proManagerModal');
    if (modal) {
        modal.classList.remove('active');
        document.body.style.overflow = ''; // ปลดล็อคหน้าจอ
        // สั่งรีเฟรชตาราง Rich Menu ด้านหลัง เผื่อมีการอัปเดตหรือลบเมนูจากระบบขั้นสูง
        if (typeof syncRichMenus === 'function') syncRichMenus(); 
    }
};
