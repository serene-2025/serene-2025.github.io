        // ==============================================
        //                  CONFIGURATION
        // ==============================================
        const LIFF_ID = "2009815540-mD9OJXZa";
        const SUPABASE_URL = "https://kiumelolsilduqnvrekf.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpdW1lbG9sc2lsZHVxbnZyZWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwODUyNzYsImV4cCI6MjA3MjY2MTI3Nn0.3hCFJiDrkgNJQEggS8MkRnxlhvqIMAax_a73NJq14gU";
        const API_BASE_URL = `${SUPABASE_URL}/functions/v1/line-webhook`;

        // ─── Auto-inject apikey header ทุกครั้งที่เรียก Edge Function ───
        // ป้องกัน "No API key found in request" error
        const _origFetch = window.fetch.bind(window);
        window.fetch = function(input, init = {}) {
            const url = typeof input === 'string' ? input : input.url;
            if (url && url.startsWith(API_BASE_URL)) {
                init.headers = {
                    ...(init.headers || {}),
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                };
            }
            return _origFetch(input, init);
        };

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUserProfile = null;
        let currentView = 'keywords';
        let isSidebarOpen = false;
        let currentKeywords = [];
        let editingDataAiId = null;


        let searchQuery = "";
        let searchTimeout = null;
        let currentPage = 1;
        const ITEMS_PER_PAGE = 50;


        document.addEventListener('DOMContentLoaded', initApp);

        async function initApp() {
        
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        
            renderLoading('กำลังยืนยันตัวตนผ่าน LINE...');

            try {
                await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });
                await liff.ready;

                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }
                // 1. เช็กก่อนว่าผู้ใช้เพิ่ม OA ของเราเป็นเพื่อนหรือยัง
                try {
                    const friendship = await liff.getFriendship();

                    if (!friendship.friendFlag) {
                        // 2. เรียกหน้าต่าง requestFriendship (ต้องครอบ try-catch ป้องกัน API ล้มเหลวในบางอุปกรณ์)
                        if (typeof liff.requestFriendship === 'function') {
                            await liff.requestFriendship();
                        }

                        // 3. เช็กสถานะอีกรอบหลังจากผู้ใช้ปิดหน้าต่าง
                        const verifyFriendship = await liff.getFriendship();
                        if (verifyFriendship.friendFlag) {
                            showToast('ขอบคุณที่เพิ่มเราเป็นเพื่อนครับ!', 'success');
                        } else {
                            showToast('คุณยังไม่ได้เพิ่มเราเป็นเพื่อน (อาจอัปเดตข้อมูลไม่ได้)', 'warning');
                        }
                    }
                } catch (err) {
                    console.warn("Friendship check error:", err);
                }
                const profile = await liff.getProfile();
                currentUserProfile = profile;

                renderLoading('กำลังตรวจสอบสิทธิ์ Admin...');

                const { data: userProfile, error } = await supabaseClient
                    .from('user_profiles')
                    .select('role')
                    .eq('userId', profile.userId)
                    .maybeSingle();

                if (error) {
                    console.error("Database Auth Error:", error);
                    renderAccessDenied(profile);
                    return;
                }

                if (userProfile && userProfile.role === 'admin') {
                    renderMainLayout();
                    loadView('keywords');
                } else {
                    renderAccessDenied(profile);
                }

            } catch (err) {
                console.error(err);
                document.getElementById('app').innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-red-50 p-4 text-red-800 text-center">
                        <div>
                            <h2 class="font-bold text-xl mb-2">เกิดข้อผิดพลาดในการเชื่อมต่อ</h2>
                            <p class="mb-4">${err.message}</p>
                            <button onclick="window.location.reload()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition shadow">ลองใหม่อีกครั้ง</button>
                        </div>
                    </div>`;
            }
        }



        function renderLoading(message = 'กำลังโหลด...') {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
                    <div class="glass p-8 rounded-3xl flex flex-col items-center shadow-2xl slide-in">
                        <div class="relative w-16 h-16 mb-6">
                            <div class="absolute inset-0 border-4 border-indigo-100 rounded-full"></div>
                            <div class="absolute inset-0 border-4 border-indigo-500 rounded-full border-t-transparent animate-spin"></div>
                        </div>
                        <p class="text-slate-600 font-medium animate-pulse font-display text-lg">${message}</p>
                    </div>
                </div>
            `;
        }

        function renderAccessDenied(profile) {
            const app = document.getElementById('app');
            app.innerHTML = `

                        <h1 class="text-3xl font-bold text-slate-800 mb-2 font-display">Access Denied</h1>

                        <div class="bg-white/50 p-4 rounded-2xl border border-white/60 mb-8 text-left flex items-center gap-4 shadow-sm">

                            โหลดหน้าเว็บใหม่
                        </button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

                           <div class="absolute inset-0 bg-white/50 backdrop-blur-[2px] opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <div class="relative z-10">
                                <img src="${currentUserProfile.pictureUrl}" class="w-11 h-11 rounded-full border-2 border-white shadow-md object-cover" alt="" />
                                <div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-emerald-500 border-[2.5px] border-white rounded-full"></div>
                            </div>

                                    <i data-lucide="shield-check" class="w-3 h-3"></i> VERIFIED

            const { data, error, count } = await query;
            if (error) { showToast(error.message, 'error'); return; }

async function updateAllUserProfiles() {
    const { data, error: fetchError } = await supabaseClient
        .from('user_profiles')
        .select('userId', { count: 'exact' });
    
    if (fetchError || !data) {
        showToast('ไม่สามารถโหลดข้อมูลผู้ใช้', 'error');
        return;
    }

    const total = data.length;
    if (total > 100) {
        showToast(`⚠️ มีผู้ใช้มากกว่า 100 คน (${total} คน) ระบบจะใช้เวลาสักครู่`, 'loading');
    }

    let succeeded = 0, failed = 0;
    
    // Sequential updates (ทีละคน) ป้องกัน rate limiting
    for (let i = 0; i < data.length; i++) {
        try {
            const res = await fetch(`${API_BASE_URL}/api/admin/users/updateProfile`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: data[i].userId })
            });
            
            if (res.ok) {
                succeeded++;
            } else {
                failed++;
            }
            
            // เพิ่ม delay เพื่อไม่ให้ server ชอก (100ms ระหว่างแต่ละ request)
            await new Promise(resolve => setTimeout(resolve, 100));
            
            // แสดง progress
            const progress = Math.round(((i + 1) / total) * 100);
            console.log(`Progress: ${progress}%`);
        } catch (err) {
            failed++;
        }
    }
    
    showToast(`✅ สำเร็จ: ${succeeded}, ❌ ล้มเหลว: ${failed}`, 'success');
}

                const { error } = await supabaseClient.from('keywords').delete().eq('id', id);
                if (error) {
                    showModal('ลบไม่สำเร็จ', error.message, 'error');
                } else {
                    showToast('ลบข้อมูลเรียบร้อย');
                    renderKeywordsTable();
                }
            });
        }

        function removeTag(hiddenId, index) {
            const hidden = document.getElementById(hiddenId);
            let tags = hidden.value.split(',').map(s => s.trim()).filter(Boolean);
            tags.splice(index, 1);
            hidden.value = tags.join(',');
            renderTags(hiddenId);
        }


        function processTagInput(inputEl, hiddenId) {
            let val = inputEl.value;
            val = val.replace(/[,]+$/, '').trim();
            if (val) {
                const hidden = document.getElementById(hiddenId);
                if (hidden) {
                    let tags = hidden.value ? hidden.value.split(',').map(s => s.trim()).filter(Boolean) : [];
                    if (!tags.includes(val)) {
                        tags.push(val);
                        hidden.value = tags.join(',');
                        renderTags(hiddenId);
                    }
                }
            }
            inputEl.value = '';
        }

        function handleTagInput(e, hiddenId) {
            const val = e.target.value;
            if (val.includes(',')) {
                const parts = val.split(',');
                const lastPart = parts.pop();
                parts.forEach(part => {
                    const cleanPart = part.trim();
                    if (cleanPart) {
                        e.target.value = cleanPart;
                        processTagInput(e.target, hiddenId);
                    }
                });
                e.target.value = lastPart.trimStart();
            }
        }

        function handleTagKeyup(e, hiddenId) {
            if (e.key === 'Enter' || e.keyCode === 13) {
                e.preventDefault();
                processTagInput(e.target, hiddenId);
            }
        }

        function handleTagKeydown(e, hiddenId) {
            // "Enter" on Android might be "Unidentified" or standard "Enter"
            if (e.key === 'Enter' || e.keyCode === 13 || e.key === ',') {
                e.preventDefault(); // Prevent form submit
                processTagInput(e.target, hiddenId);
            } else if (e.key === 'Backspace' && e.target.value === '') {
                const hidden = document.getElementById(hiddenId);
                if (hidden) {
                    let tags = hidden.value ? hidden.value.split(',').map(s => s.trim()).filter(Boolean) : [];
                    if (tags.length > 0) {
                        tags.pop();
                        hidden.value = tags.join(',');
                        renderTags(hiddenId);
                    }
                }
            }
        }

        function renderTags(hiddenId) {
            const hidden = document.getElementById(hiddenId);
            if (!hidden) return;
            const wrapperId = hiddenId.replace('-hidden', '-tags');
            const wrapper = document.getElementById(wrapperId);
            if (!wrapper) return;
            wrapper.innerHTML = '';
            const val = hidden.value.trim();
            if (!val) return;
            const tags = val.split(',').map(s => s.trim()).filter(Boolean);
            tags.forEach((tag, idx) => {
                const el = document.createElement('span');
                el.className = 'inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-sm font-medium bg-slate-600 text-white shadow-sm';
                el.innerHTML = `${escapeHtml(tag)} <button type="button" onclick="removeTag('${hiddenId}', ${idx})" class="p-0.5 hover:text-red-300 transition-colors focus:outline-none"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>`;
                wrapper.appendChild(el);
            });
            lucide.createIcons();
        }

        function openModal() {
            const overlay = document.getElementById('modal-overlay');
            const container = document.getElementById('modal-container');

            overlay.classList.remove('hidden');

            void overlay.offsetWidth;

            overlay.classList.remove('opacity-0');
            container.classList.remove('scale-95');
            container.classList.add('scale-100');
        }

        async function savePermission(btn) {
            const userId  = (document.getElementById('perm-userId')?.value || '').trim();
            const keyword = (document.getElementById('perm-keyword')?.value || '').trim();
            const errEl   = document.getElementById('perm-error');

            // Validation
            if (!userId) {
                errEl.textContent = '⚠️ กรุณากรอก User ID'; errEl.classList.remove('hidden'); return;
            }
            if (!userId.startsWith('U') || userId.length < 10) {
                errEl.textContent = '⚠️ User ID ไม่ถูกต้อง — ต้องขึ้นต้นด้วย U และยาวอย่างน้อย 10 ตัว'; errEl.classList.remove('hidden'); return;
            }
            if (!keyword) {
                errEl.textContent = '⚠️ กรุณากรอก Keyword'; errEl.classList.remove('hidden'); return;
            }
            errEl.classList.add('hidden');
            setBtnLoading(btn, true);

            try {
                const { error } = await supabaseClient.from('keyword_permissions').insert([{
                    userId, keyword, vip: true
                }]);

                if (error) {
                    if (error.code === '23505') {
                        errEl.textContent = `⚠️ User นี้มีสิทธิ์ Keyword "${keyword}" อยู่แล้ว`;
                        errEl.classList.remove('hidden');
                    } else {
                        errEl.textContent = `❌ ${error.message}`;
                        errEl.classList.remove('hidden');
                    }
                    setBtnLoading(btn, false);
                    return;
                }

                showToast('เพิ่มสิทธิ์ VIP สำเร็จ ✅', 'success');
                closeModal();
                renderPermissionsTable();
            } catch (e) {
                errEl.textContent = `❌ ${e.message}`;
                errEl.classList.remove('hidden');
                setBtnLoading(btn, false);
            }
        }



        function updateContentPlaceholder(type) {
            const label = document.getElementById('contentLabel');
            const textarea = document.getElementById('contentTextarea');
            const input = document.getElementById('contentInput');

            textarea.classList.add('hidden'); input.classList.add('hidden');
            textarea.removeAttribute('required'); input.removeAttribute('required');

            if (type === 'text' || type === 'prompt') {
                label.innerText = type === 'text' ? 'ข้อความตอบกลับ' : 'คำสั่ง Prompt (System Instruction)';
                textarea.classList.remove('hidden'); textarea.setAttribute('required', 'true');
            } else if (type === 'flex' || type === 'template') {
                label.innerText = `JSON Code ของ ${type}`;
                textarea.classList.remove('hidden'); textarea.setAttribute('required', 'true');
                textarea.classList.add('json-editor');
            } else {
                label.innerText = 'URL ของรูปภาพ (https://...)';
                input.classList.remove('hidden'); input.setAttribute('required', 'true');
            }
        }

        function insertPlaceholder(placeholder) {
            const textarea = document.getElementById('contentTextarea');
            const input = document.getElementById('contentInput');
            const target = !textarea.classList.contains('hidden') ? textarea : input;

            if (target) {
                const start = target.selectionStart;
                const end = target.selectionEnd;
                const text = target.value;
                const before = text.substring(0, start);
                const after = text.substring(end, text.length);
                target.value = before + placeholder + after;
                target.selectionStart = target.selectionEnd = start + placeholder.length;
                target.focus();
            }
        }

        function setBtnLoading(btn, isLoading) {
            if (isLoading) {
                btn.dataset.originalContent = btn.innerHTML;
                btn.disabled = true;
                btn.classList.add('cursor-not-allowed', 'opacity-70');
                btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> กำลังบันทึก...`;
                lucide.createIcons();
            } else {
                btn.innerHTML = btn.dataset.originalContent || 'บันทึก';
                btn.disabled = false;
                btn.classList.remove('cursor-not-allowed', 'opacity-70');
                lucide.createIcons();
            }
        }

        async function handleKeywordSubmit(e) {
            e.preventDefault();
            const f = e.target;
            const submitBtn = f.querySelector('button[type="submit"]');

            const keywordInput = document.getElementById('keyword-input');
            const postbackInput = document.getElementById('postback-input');
            if (keywordInput && keywordInput.value.trim()) processTagInput(keywordInput, 'keyword-hidden');
            if (postbackInput && postbackInput.value.trim()) processTagInput(postbackInput, 'postback-hidden');

            const replyType = f.replyType.value;
            let content = (replyType === 'image') ? f.content_input.value : f.content.value;

            if (['flex', 'template'].includes(replyType)) {
                try { JSON.parse(content); } catch (err) { showToast('JSON ไม่ถูกต้อง', 'error'); return; }
            }

            if (!f.keyword.value.trim() && !f.reply_postback.value.trim()) {
                showToast('ต้องระบุ Keyword หรือ Postback อย่างน้อย 1 อย่าง', 'error'); return;
            }

            setBtnLoading(submitBtn, true);

            let richMenuId = f.reply_richmenu.value;
            if (richMenuId === 'CUSTOM_VALUE') {
                richMenuId = document.getElementById('manualRichMenuInput').value.trim();
            }

            const payload = {
                keyword: f.keyword.value.trim() || null,
                reply_postback: f.reply_postback.value.trim() || null,
                startdatetime: f.startdatetime.value || null,
                enddatetime: f.enddatetime.value || null,
                require_vip: f.require_vip.checked,
                reply_richmenu: richMenuId || null,
                reply_text: null, reply_image: null, reply_flex: null, reply_prompt: null, reply_template: null
            };

            payload[`reply_${replyType}`] = content;

            let error;
            if (editingKeywordId) {
                const { error: err } = await supabaseClient.from('keywords').update(payload).eq('id', editingKeywordId);
                error = err;
            } else {
                const { error: err } = await supabaseClient.from('keywords').insert([payload]);
                error = err;
            }

            if (error) {
                showToast(error.message, 'error');
                setBtnLoading(submitBtn, false);
            }
            else {
                showToast('บันทึกสำเร็จ');
                closeModal();
                renderKeywordsTable();

            }
        }

        async function handleUserSubmit(e) {
            e.preventDefault();
            if (!editingUserId) return;
            const f = e.target;
            const submitBtn = f.querySelector('button[type="submit"]');

            setBtnLoading(submitBtn, true);

            const { error } = await supabaseClient.from('user_profiles').update({ role: f.role.value, status: f.status.value }).eq('userId', editingUserId);

            if (error) {
                showToast(error.message, 'error');
                setBtnLoading(submitBtn, false);
            }
            else {
                showToast('อัปเดตผู้ใช้สำเร็จ');
                closeModal();
                renderUsersTable();
            }
        }

        function formatThaiDateTime(isoString) {
            if (!isoString) return '-';
            if (!isoString.endsWith('Z') && !isoString.includes('+')) isoString += 'Z'; // Fallback to UTC assumption
            try {
                const date = new Date(isoString);
                return date.toLocaleString('th-TH', { timeZone: 'Asia/Bangkok', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch (e) { return isoString; }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            let bgClass, icon, iconBg;
            let iconClass = "w-5 h-5";

            if (type === 'error') {
                bgClass = 'bg-white border-l-4 border-rose-500 text-rose-600';
                iconBg = 'bg-rose-100';
                icon = 'alert-circle';
            } else if (type === 'loading') {
                bgClass = 'bg-white border-l-4 border-indigo-500 text-indigo-600';
                iconBg = 'bg-indigo-100';
                icon = 'loader-2';
                iconClass += " animate-spin";
            } else {
                bgClass = 'bg-white border-l-4 border-emerald-500 text-emerald-600';
                iconBg = 'bg-emerald-100';
                icon = 'check-circle2';
            }

            toast.className = `${bgClass} shadow-2xl rounded-xl px-5 py-4 flex items-center gap-3 toast-enter min-w-[300px] border border-gray-100/50 backdrop-blur-3xl`;
            toast.innerHTML = `
                <div class="${iconBg} p-2 rounded-full">
                    <i data-lucide="${icon}" class="${iconClass}"></i>
                </div> 
                <span class="font-semibold text-sm text-slate-700">${message}</span>
            `;

            container.appendChild(toast);
            lucide.createIcons();

            requestAnimationFrame(() => { toast.classList.add('toast-enter-active'); toast.classList.remove('toast-enter'); });



            setTimeout(() => {
                toast.classList.add('toast-exit-active');
                toast.addEventListener('transitionend', () => toast.remove());
            }, 3000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            showToast('คัดลอกเรียบร้อย');
        }

        function escapeHtml(text) {
            if (text === null || text === undefined || text === "") return "";
            const str = String(text);
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // ─── Convert <input type="datetime-local"> value → ISO string with timezone ──
        // input ให้ "2026-04-30T14:00" (no tz) → return "2026-04-30T07:00:00.000Z" (correct UTC)
        function localDatetimeToISO(localStr) {
            if (!localStr) return null;
            // new Date("2026-04-30T14:00") = parsed as LOCAL time (browser timezone)
            // .toISOString() = converts to UTC correctly
            const d = new Date(localStr);
            if (isNaN(d.getTime())) return null;
            return d.toISOString();
        }

                    supabaseClient.from('rich_menus').select('rich_menu_id, name, image_url')

        async function saveAlias(isEdit, btn) {
            const aliasId = document.getElementById('alias-id').value.trim();
            const rmId = document.getElementById('alias-rmid').value.trim();
            if (!aliasId) return showToast('กรุณากรอก Alias ID', 'warning');
            if (!rmId) return showToast('กรุณาเลือก Rich Menu', 'warning');
            if (!isEdit && !/^[a-zA-Z0-9_-]{4,}$/.test(aliasId)) {
                return showToast('Alias ID ต้องเป็น a-z A-Z 0-9 _ - และยาว 4+ ตัว', 'warning');
            }

            setBtnLoading(btn, true);
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/richmenus`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: isEdit ? 'alias_update' : 'alias_create',
                        richMenuAliasId: aliasId,
                        richMenuId: rmId
                    })
                });
                const d = await res.json();
                if (!res.ok) {
                    // Parse common LINE errors
                    let errMsg = d.error || 'บันทึกไม่สำเร็จ';
                    if (errMsg.includes('alias is already used')) errMsg = `Alias "${aliasId}" มีอยู่แล้ว — กดแก้ไขแทน`;
                    else if (errMsg.includes('rich menu not found')) errMsg = 'Rich Menu ที่เลือกไม่มีใน LINE — ลอง Sync from LINE ก่อน';
                    throw new Error(errMsg);
                }
                showToast(isEdit ? 'แก้ไข Alias สำเร็จ' : 'สร้าง Alias สำเร็จ', 'success');
                openAliasManager();   // กลับไปหน้า list
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                setBtnLoading(btn, false);
            }
        }

        async function deleteRichMenu(id) {
            showConfirmModal('ลบ Rich Menu', 'ยืนยันลบ Rich Menu นี้? (ระบบจะลบออกจาก LINE ด้วย)', async () => {
                showToast('กำลังลบจาก LINE...', 'loading');

                const { data: menu, error: fetchError } = await supabaseClient.from('rich_menus').select('rich_menu_id').eq('id', id).single();
                if (fetchError) {
                    showToast('ไม่พบข้อมูล: ' + fetchError.message, 'error');
                    return;
                }

                try {
                    const res = await fetch(`${API_BASE_URL}/api/admin/richmenus`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'delete', richMenuId: menu.rich_menu_id })
                    });
                    const funcData = await res.json();
                    const funcError = !res.ok ? new Error(funcData.error || 'Delete Failed') : null;

                    if (funcError) throw funcError;
                    if (funcData && funcData.error) throw new Error(funcData.error);

                    const { error: deleteError } = await supabaseClient.from('rich_menus').delete().eq('id', id);
                    if (deleteError) throw deleteError;

                    showToast('ลบข้อมูลเรียบร้อย');
                    renderRichMenusTable();

                } catch (err) {
                    console.error(err);
                    showToast('ลบไม่สำเร็จ: ' + err.message, 'error');
                }
            });
        }

        async function handleRichMenuSubmit(e) {
            e.preventDefault();
            const f = e.target;
            const submitBtn = f.querySelector('button[type="submit"]');
            setBtnLoading(submitBtn, true);

            const payload = {
                name: f.name.value.trim(),
                rich_menu_id: f.rich_menu_id.value.trim(),
                image_url: f.image_url.value.trim() || null,
                description: f.description.value.trim() || null
            };

            let error;
            if (editingRichMenuId) {
                const { error: err } = await supabaseClient.from('rich_menus').update(payload).eq('id', editingRichMenuId);
                error = err;
            } else {
                const { error: err } = await supabaseClient.from('rich_menus').insert([payload]);
                error = err;
            }

            if (error) { showToast(error.message, 'error'); setBtnLoading(submitBtn, false); }
            else { showToast('บันทึกสำเร็จ'); closeModal(); renderRichMenusTable(); }
        }

        async function loadBotJoinMessage() {
            try {
                const { data } = await supabaseClient.from('system_settings').select('value').eq('key', 'bot_join_message').maybeSingle();
                const typeEl = document.getElementById('bot-join-message-type');
                const inputEl = document.getElementById('bot-join-message-input');

                if (data && data.value) {
                    if (typeof data.value === 'object' && data.value.type && data.value.content) {
                        if (typeEl) typeEl.value = data.value.type;
                        if (inputEl) inputEl.value = data.value.content;
                    } else if (typeof data.value === 'string') {
                        // Fallback logic for old data string
                        if (typeEl) typeEl.value = "text";
                        if (inputEl) inputEl.value = data.value;
                    }
                } else {
                    if (typeEl) typeEl.value = "text";
                    if (inputEl) inputEl.value = "สวัสดีครับ ขอบคุณที่เชิญบอทเข้ากลุ่ม 🤖";
                }
            } catch (e) {
                console.error("Error loading bot join message:", e);
            }
        }

        async function saveBotJoinMessage() {
            const typeEl = document.getElementById('bot-join-message-type');
            const inputEl = document.getElementById('bot-join-message-input');
            if (!inputEl || !typeEl) return;

            const messageType = typeEl.value;
            const content = inputEl.value.trim();

            if (!content) {
                showToast('กรุณาระบุข้อความ/โค้ด', 'error'); return;
            }

            if (messageType === "flex" || messageType === "template" || messageType === "textV2") {
                try {
                    JSON.parse(content);
                } catch (err) {
                    showToast('รูปแบบ JSON ไม่ถูกต้อง', 'error');
                    return;
                }
            }

            const payload = { type: messageType, content: content };

            showToast('กำลังบันทึก...', 'loading');
            const { error } = await supabaseClient.from('system_settings').upsert({ key: 'bot_join_message', value: payload });

            if (error) {
                showToast(error.message, 'error');
            } else {
                showToast('บันทึกข้อความเรียบร้อย', 'success');
            }
        }

        async function renderGroupMembersPage(page = currentGroupMembersPage) {
            currentGroupMembersPage = page;
            const totalMembers = currentGroupMembersList.length;
            const totalPages = Math.ceil(totalMembers / GROUP_MEMBERS_PER_PAGE);

            if (currentGroupMembersPage > totalPages) currentGroupMembersPage = totalPages;
            if (currentGroupMembersPage < 1) currentGroupMembersPage = 1;

            const startIndex = (currentGroupMembersPage - 1) * GROUP_MEMBERS_PER_PAGE;
            const endIndex = Math.min(startIndex + GROUP_MEMBERS_PER_PAGE, totalMembers);
            const pageMembers = currentGroupMembersList.slice(startIndex, endIndex);

            let html = `
                <div class="mb-4 text-sm font-semibold text-slate-600 flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <div>รวม: <span class="text-indigo-600 font-bold">${totalMembers}</span> คน</div>
                    <div>แสดงอันดับที่ <span class="text-indigo-600 font-bold">${startIndex + 1} - ${endIndex}</span></div>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-6">
            `;

            for (const uId of pageMembers) {
                html += `
                    <div class="bg-white/60 p-3 rounded-xl border border-slate-100 flex items-center gap-3 shadow-sm" id="member-${uId}">
                        <div class="w-10 h-10 rounded-full bg-slate-200 animate-pulse shrink-0"></div>
                        <div class="min-w-0 flex-1">
                            <div class="h-3.5 bg-slate-200 rounded w-full mb-1 animate-pulse"></div>
                            <div class="h-2.5 bg-slate-100 rounded w-2/3 animate-pulse"></div>
                        </div>
                    </div>
                `;
            }
            html += `</div>`;

            // Pagination Controls
            if (totalPages > 1) {
                html += `
                    <div class="flex justify-center items-center gap-2 mt-6 pb-2 border-t border-slate-100 pt-6">
                        <button onclick="renderGroupMembersPage(1)" class="w-8 h-8 flex items-center justify-center rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" ${currentGroupMembersPage === 1 ? 'disabled' : ''}>
                            <i data-lucide="chevrons-left" class="w-4 h-4"></i>
                        </button>
                        <button onclick="renderGroupMembersPage(${currentGroupMembersPage - 1})" class="w-8 h-8 flex items-center justify-center rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" ${currentGroupMembersPage === 1 ? 'disabled' : ''}>
                            <i data-lucide="chevron-left" class="w-4 h-4"></i>
                        </button>
                        
                        <span class="text-sm font-semibold text-slate-600 px-3 py-1 bg-slate-50 rounded-lg border border-slate-100 font-mono">
                            ${currentGroupMembersPage} / ${totalPages}
                        </span>

                        <button onclick="renderGroupMembersPage(${currentGroupMembersPage + 1})" class="w-8 h-8 flex items-center justify-center rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" ${currentGroupMembersPage === totalPages ? 'disabled' : ''}>
                            <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        </button>
                        <button onclick="renderGroupMembersPage(${totalPages})" class="w-8 h-8 flex items-center justify-center rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" ${currentGroupMembersPage === totalPages ? 'disabled' : ''}>
                            <i data-lucide="chevrons-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
            }

            document.getElementById('modal-content').innerHTML = html;
            lucide.createIcons();


            const BATCH_SIZE = 10;
            for (let i = 0; i < pageMembers.length; i += BATCH_SIZE) {
                const batch = pageMembers.slice(i, i + BATCH_SIZE);
                await Promise.all(batch.map(async (uId) => {
                    try {
                        const pRes = await fetch(`${API_BASE_URL}/api/line/group/${currentGroupMembersId}/member/${uId}`);
                        if (pRes.ok) {
                            const pData = await pRes.json();
                            const el = document.getElementById(`member-${uId}`);
                            if (el && pData.displayName) {
                                el.innerHTML = `
                                    <img src="${pData.pictureUrl || 'https://cdn-icons-gif.flaticon.com/8121/8121295.gif'}" class="w-10 h-10 rounded-full border border-slate-100 object-cover shrink-0">
                                    <div class="min-w-0 flex-1">
                                        <div class="text-sm font-bold text-slate-800 truncate" title="${pData.displayName}">${pData.displayName}</div>
                                        <div class="text-[10px] text-slate-400 font-mono truncate">${uId}</div>
                                    </div>
                                `;
                            }
                        }
                    } catch (e) { }
                }));
            }
        }

        async function getPersistentTags() {
            const { data } = await supabaseClient.from('system_settings').select('value').eq('key', 'master_tags').maybeSingle();
            if (data && data.value && Array.isArray(data.value)) {
                // Normalize: Handle both old string format and new object format
                return data.value.map(t => typeof t === 'string' ? { name: t, audienceId: null } : t);
            } else {
                const { data: utags } = await supabaseClient.from('user_tags').select('tag_name');
                const uniqueNames = [...new Set((utags || []).map(t => t.tag_name))];
                const initialTags = uniqueNames.map(name => ({ name, audienceId: null }));
                await supabaseClient.from('system_settings').upsert({ key: 'master_tags', value: initialTags });
                return initialTags;
            }
        }

        async function savePersistentTags(tags) {
            const normalized = (tags || []).map(t => typeof t === 'string' ? { name: t, audienceId: null } : t);
            await supabaseClient.from('system_settings').upsert({ key: 'master_tags', value: normalized });
        }

        async function createAudienceFromTag(tagName) {
            const desc = prompt(`ระบุคำอธิบายสำหรับ Audience Group (Tag: ${tagName}):`, `Audience for Tag ${tagName}`);
            if (!desc) return;

            showToast('กำลังสร้าง Audience Group บน LINE...', 'loading');
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/audience/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: desc, tagName })
                });
                const result = await res.json();
                if (result.error) throw new Error(result.error);

                // พยายามผูก ID กับ Tag โดยพิจารณาตามความเหมาะสม แต่อัปเดต master_tags ให้แน่ใจ
                if (result.audienceGroupId) {
                    const currentTags = await getPersistentTags();
                    const targetTag = currentTags.find(t => t.name === tagName);
                    if (targetTag) {
                        targetTag.audienceId = result.audienceGroupId.toString();
                        await savePersistentTags(currentTags);
                    }
                }

                showToast('สร้าง Audience Group สำเร็จ!', 'success');
                fetchLineAudiences();
                fetchTagsList();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

            } else {
                const { error } = await supabaseClient.from('user_tags').insert({ user_id: userId, tag_name: tagName });
                if (error && error.code !== '23505') { // 23505 is unique violation (already tagged)
                    showToast(error.message, 'error');
                } else {
                    showToast('ติด Tag เรียบร้อย');
                    
                    // บันทึกเข้า Master Tags ทันทีเพื่อให้ชื่อคงอยู่ในระบบ

                    if (!currentTags.some(t => t.name === tagName)) {
                        currentTags.push({ name: tagName, audienceId: null });
                        await savePersistentTags(currentTags);
                    }
                }
            }
            renderUserTags(userId);
            if (currentView === 'tags') fetchTagsList();
        }

        async function fetchAudiencesForSelect() {
            const select = document.getElementById('nc-audience-select');
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/audience/list`);
                const data = await res.json();
                availableAudienceGroups = data.audienceGroups || [];

                availableAudienceGroups.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.audienceGroupId;
                    opt.textContent = `${g.description} (${g.audienceCount} คน) - ${g.status}`;
                    select.appendChild(opt);
                });

                select.onchange = () => {
                    const infoBox = document.getElementById('nc-audience-info');
                    const selected = availableAudienceGroups.find(g => g.audienceGroupId == select.value);
                    if (selected) {
                        document.getElementById('nc-audience-desc').textContent = selected.description;
                        document.getElementById('nc-audience-count').textContent = `จำนวนสมาชิก: ${selected.audienceCount} คน | สถานะ: ${selected.status}`;
                        infoBox.classList.remove('hidden');
                    } else {
                        infoBox.classList.add('hidden');
                    }
                };
            } catch (e) {
                console.error(e);
            }
        }

        function renderNcBalloons() {
            const container = document.getElementById('nc-balloons-container');
            container.innerHTML = narrowcastBalloons.map((b, i) => `
                <div class="bg-slate-50 rounded-2xl p-5 border border-slate-100 relative group animate-in">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <span class="w-6 h-6 rounded-full bg-slate-800 text-white text-[10px] flex items-center justify-center font-bold">#${i + 1}</span>
                            <select onchange="updateNcBalloonType(${i}, this.value)" class="bg-white border border-slate-200 rounded-lg px-2 py-1 text-[11px] font-bold text-slate-600 outline-none">
                                <option value="text" ${b.type === 'text' ? 'selected' : ''}>ข้อความตัวอักษร</option>
                                <option value="image" ${b.type === 'image' ? 'selected' : ''}>รูปภาพ (URL)</option>
                                <option value="json" ${b.type === 'json' ? 'selected' : ''}>Flex / Template (JSON)</option>
                            </select>
                        </div>
                        <button onclick="removeNcBalloon(${i})" class="text-slate-400 hover:text-rose-500 transition-colors ${narrowcastBalloons.length === 1 ? 'hidden' : ''}">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>

                    ${b.type === 'text' ? `
                        <textarea oninput="updateNcBalloonContent(${i}, this.value)" class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm min-h-[80px] focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="พิมพ์ข้อความที่ต้องการส่ง...">${b.content}</textarea>
                    ` : b.type === 'image' ? `
                        <input oninput="updateNcBalloonContent(${i}, this.value)" type="url" class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="วางลิงก์รูปภาพ (https://...)" value="${b.content}">
                    ` : `
                        <textarea oninput="updateNcBalloonContent(${i}, this.value)" class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm font-mono min-h-[120px] focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder='{"type": "flex", ...}'>${b.content}</textarea>
                    `}
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addNcBalloon() {
            if (narrowcastBalloons.length >= 5) {
                showModal('ขีดจำกัดบอลลูน', 'LINE อนุญาตให้ส่งได้สูงสุด 5 บอลลูนต่อการบรอดแคสต์ 1 ครั้งครับ');
                return;
            }
            narrowcastBalloons.push({ type: 'text', content: '' });
            renderNcBalloons();
        }

        function removeNcBalloon(index) {
            narrowcastBalloons.splice(index, 1);
            renderNcBalloons();
        }

        function updateNcBalloonType(index, type) {
            narrowcastBalloons[index].type = type;
            renderNcBalloons();
        }

        function updateNcBalloonContent(index, content) {
            narrowcastBalloons[index].content = content;
        }

        // ─── Push Mode (group / users) ───────────────────────────────
        let pushMode = 'group';   // 'group' | 'users'
        let pushUsersList = [];   // โหลดทั้งหมด
        let pushSelectedUids = new Set();

        function switchPushMode(mode) {
            pushMode = mode;
            ['group', 'users'].forEach(m => {
                const btn = document.getElementById(`pushmode-${m}-btn`);
                const content = document.getElementById(`pushmode-${m}-content`);
                if (m === mode) {
                    btn.classList.add('bg-white', 'text-slate-700', 'shadow-sm');
                    btn.classList.remove('text-slate-500');
                    content.classList.remove('hidden');
                } else {
                    btn.classList.remove('bg-white', 'text-slate-700', 'shadow-sm');
                    btn.classList.add('text-slate-500');
                    content.classList.add('hidden');
                }
            });
            if (mode === 'users' && pushUsersList.length === 0) loadPushUsers();
        }

        async function loadPushUsers() {
            try {
                const { data, error } = await supabaseClient
                    .from('user_profiles')
                    .select('userId, displayName, first_name, last_name, house_no, phone, points')
                    .order('displayName')
                    .limit(2000);
                if (error) throw error;
                pushUsersList = data || [];
                renderPushUserList(pushUsersList);
            } catch (e) {
                document.getElementById('pu-list').innerHTML = `<div class="text-rose-500 text-xs p-3">${e.message}</div>`;
            }
        }

        function renderPushUserList(list) {
            const wrap = document.getElementById('pu-list');
            if (!list || list.length === 0) {
                wrap.innerHTML = '<div class="text-center text-slate-400 text-xs py-6">ไม่พบสมาชิก</div>';
                return;
            }
            wrap.innerHTML = list.map(u => {
                const fullName = u.first_name ? `${u.first_name} ${u.last_name||''}`.trim() : (u.displayName || '—');
                const checked = pushSelectedUids.has(u.userId);
                return `<label class="flex items-center gap-2 px-2.5 py-2 rounded-lg hover:bg-indigo-50 cursor-pointer pu-row" data-search="${escapeHtml((fullName + ' ' + (u.house_no||'') + ' ' + (u.phone||'')).toLowerCase())}">
                    <input type="checkbox" class="pu-checkbox w-4 h-4 accent-indigo-500" data-uid="${escapeHtml(u.userId)}" ${checked ? 'checked' : ''} onchange="onPushUserToggle(this)">
                    <div class="flex-1 min-w-0">
                        <div class="text-xs font-bold text-slate-800 truncate">${escapeHtml(fullName)}</div>
                        <div class="text-[10px] text-slate-400 truncate">${u.house_no ? '🏠 ' + escapeHtml(u.house_no) + ' · ' : ''}${escapeHtml((u.userId||'').slice(-12))}</div>
                    </div>
                    <span class="text-[9px] text-slate-400 font-bold">${(u.points||0).toLocaleString()}</span>
                </label>`;
            }).join('');
            updatePushCount();
        }

        function onPushUserToggle(cb) {
            const uid = cb.dataset.uid;
            if (cb.checked) pushSelectedUids.add(uid);
            else pushSelectedUids.delete(uid);
            updatePushCount();
        }

        function pushSelectAll(check) {
            const visibleRows = document.querySelectorAll('.pu-row:not(.hidden) .pu-checkbox');
            visibleRows.forEach(cb => {
                cb.checked = check;
                const uid = cb.dataset.uid;
                if (check) pushSelectedUids.add(uid);
                else pushSelectedUids.delete(uid);
            });
            updatePushCount();
        }

        function updatePushCount() {
            const el = document.getElementById('pu-count');
            if (el) el.innerText = pushSelectedUids.size;
        }

        function filterPushUsers() {
            const q = document.getElementById('pu-search').value.toLowerCase().trim();
            document.querySelectorAll('.pu-row').forEach(row => {
                const txt = row.dataset.search || '';
                if (!q || txt.includes(q)) row.classList.remove('hidden');
                else row.classList.add('hidden');
            });
        }

        async function sendNarrowcast() {
            const audienceId = document.getElementById('nc-audience-select').value;


            const messages = [];
            for (let b of narrowcastBalloons) {
                if (!b.content.trim()) continue;

                if (b.type === 'text') {
                    messages.push({ type: 'text', text: b.content });
                } else if (b.type === 'image') {
                    messages.push({ type: 'image', originalContentUrl: b.content, previewImageUrl: b.content });
                } else if (b.type === 'json') {
                    let parsed;
                    try {
                        parsed = JSON.parse(b.content);
                    } catch (e) {
                        showModal('JSON ผิดพลาด', `บอลลูนแผ่นที่ ${narrowcastBalloons.indexOf(b) + 1}: ${e.message}`);
                        return;
                    }

                    // ─── Auto-wrap: ถ้า user paste bubble/carousel มาตรงๆ → wrap เป็น flex message ───
                    if (parsed.type === 'bubble' || parsed.type === 'carousel') {
                        // หา altText จาก first text element
                        let altText = 'ข้อความใหม่';
                        try {
                            const firstText = (parsed.body?.contents || []).find(c => c.type === 'text');
                            if (firstText?.text) altText = firstText.text.slice(0, 400);
                        } catch {}
                        messages.push({ type: 'flex', altText, contents: parsed });
                    }
                    // ─── ถ้า user ใส่ flex message format ครบแล้ว → ใช้ตรงๆ ───
                    else if (parsed.type === 'flex') {
                        if (!parsed.altText) parsed.altText = 'ข้อความใหม่';
                        if (!parsed.contents) {
                            showModal('JSON ผิดพลาด', 'flex message ต้องมี contents (bubble หรือ carousel)');
                            return;
                        }
                        messages.push(parsed);
                    }
                    // ─── รองรับ template, image, sticker, audio, video ที่ paste มาตรงๆ ───
                    else if (['text', 'image', 'video', 'audio', 'location', 'sticker', 'imagemap', 'template'].includes(parsed.type)) {
                        messages.push(parsed);
                    }
                    // ─── ไม่รู้จัก type ───
                    else {
                        showModal('JSON ผิดพลาด', `บอลลูนแผ่นที่ ${narrowcastBalloons.indexOf(b) + 1}: ไม่รู้จัก message type "${parsed.type || '(ไม่มี)'}"<br><br>ที่รองรับ: bubble, carousel, flex, text, image, template, sticker, video, audio, location, imagemap`);
                        return;
                    }
                }
            }

            if (messages.length === 0) {
                showModal('ไม่มีข้อความ', 'กรุณาระบุข้อความอย่างน้อย 1 บอลลูนครับ');
                return;
            }

            // ═══ Mode B: Push to Specific Users ═══
            if (pushMode === 'users') {
                const uids = Array.from(pushSelectedUids);
                if (uids.length === 0) {
                    showModal('ยังไม่ได้เลือก', 'กรุณาเลือกสมาชิกอย่างน้อย 1 คน');
                    return;
                }
                showConfirmModal(
                    'ยืนยันการส่ง Push',
                    `จะส่งข้อความไปยัง <b>${uids.length}</b> คน ผ่าน LINE Push API<br><small class="text-slate-500">ใช้ค่าโควต้าตามจำนวนคน × จำนวนบอลลูน</small>`,
                    async () => {
                        showToast('กำลังส่ง Push...', 'loading');
                        try {
                            const res = await fetch(`${API_BASE_URL}/api/admin/audience/targeted_push`, {
                                method: 'POST', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ userIds: uids, messages })
                            });
                            const result = await res.json();
                            if (!res.ok) throw new Error(result.error || 'ส่งไม่สำเร็จ');
                            hideToast();
                            const errorList = (result.errors && result.errors.length > 0)
                                ? `<details class="mt-3 text-left"><summary class="text-xs text-rose-600 font-bold cursor-pointer">⚠️ Error logs (${result.errors.length})</summary><pre class="text-[10px] text-rose-500 mt-2 bg-rose-50 p-2 rounded overflow-x-auto max-h-40">${result.errors.map(e => escapeHtml(e)).join('\n')}</pre></details>`
                                : '';
                            const title = result.failed > 0 ? '⚠️ ส่งบางส่วนไม่สำเร็จ' : '✅ ส่งสำเร็จ';
                            showModal(title, `<div class="space-y-1 text-sm"><div>📤 ส่งสำเร็จ: <b class="text-emerald-600">${result.sent || 0}</b> คน</div><div>❌ ล้มเหลว: <b class="text-rose-600">${result.failed || 0}</b> คน</div>${errorList}</div>`);
                            pushSelectedUids.clear();
                            renderPushUserList(pushUsersList);
                        } catch (e) {
                            hideToast();
                            showModal('❌ ส่งไม่สำเร็จ', e.message);
                        }
                    }
                );
                return;
            }

            // ═══ Mode A: Audience Group (Narrowcast) ═══

            const confirmMsg = audienceId
                ? `คุณกำลังจะส่งบรอดแคสต์ไปยังกลุ่มเป้าหมายจำนวน ${availableAudienceGroups.find(g => g.audienceGroupId == audienceId)?.audienceCount || '...'} คน\n\nยืนยันการเริ่มส่งหรือไม่?`
                : `คุณกำลังจะส่งบรอดแคสต์ไปหา 'ผู้ใชทุกคน' ที่เป็นเพื่อนกับบอท (ผ่าน Narrowcast)\n\nยืนยันการเริ่มส่งหรือไม่?`;

            showConfirmModal('ยืนยันการส่ง', confirmMsg, async () => {
                showToast('กำลังส่งบรอดแคสต์...', 'loading');
                try {
                    const res = await fetch(`${API_BASE_URL}/api/admin/audience/narrowcast`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ audienceGroupId: audienceId, messages })
                    });
                    const result = await res.json();

                    if (!res.ok) throw new Error(result.error || 'เกิดข้อผิดพลาดในการส่ง');

                    showModal('ส่งสำเร็จ!', 'ระบบได้รับคำสั่งส่งบรอดแคสต์ของคุณเรียบร้อยแล้ว กดยืนยันเพื่อกลับหน้าหลักครับ', 'success');
                    loadView('tags');
                } catch (e) {
                    showModal('ส่งไม่สำเร็จ', 'เกิดข้อผิดพลาด: ' + e.message, 'error');
                }
            });
        }



        function showModal(title, message, type = 'info') {
            document.getElementById('modal-title').innerText = title;
            let icon = 'alert-circle';
            let iconColor = 'text-indigo-600';
            if (type === 'success') { icon = 'check-circle'; iconColor = 'text-emerald-500'; }
            if (type === 'error') { icon = 'x-circle'; iconColor = 'text-rose-500'; }

            document.getElementById('modal-content').innerHTML = `
                <div class="flex flex-col items-center text-center py-4">
                    <div class="${iconColor} mb-4"><i data-lucide="${icon}" class="w-16 h-16"></i></div>
                    <p class="text-slate-600 mb-6 font-medium whitespace-pre-line">${message}</p>
                    <button onclick="closeModal()" class="w-full py-3 bg-slate-800 text-white rounded-2xl font-bold hover:bg-slate-900 transition-all">
                        ตกลง
                    </button>
                </div>
            `;
            document.getElementById('modal-overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-overlay').classList.remove('opacity-0');
                document.getElementById('modal-container').classList.remove('scale-95');
                lucide.createIcons();
            }, 10);
        }

        function showConfirmModal(title, message, onConfirm, onCancel) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerHTML = `
                <div class="flex flex-col items-center text-center py-4">
                    <div class="text-amber-500 mb-4"><i data-lucide="help-circle" class="w-16 h-16"></i></div>
                    <p class="text-slate-600 mb-6 font-medium whitespace-pre-line">${message}</p>
                    <div class="flex gap-3 w-full">
                        <button id="modal-cancel-btn" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-all">
                            ยกเลิก
                        </button>
                        <button id="modal-confirm-btn" class="flex-1 py-3 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-all">
                            ยืนยัน
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('modal-confirm-btn').onclick = () => {
                closeModal();
                if (typeof onConfirm === 'function') onConfirm();
            };
            document.getElementById('modal-cancel-btn').onclick = () => {
                closeModal();
                if (typeof onCancel === 'function') onCancel();
            };

            document.getElementById('modal-overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-overlay').classList.remove('opacity-0');
                document.getElementById('modal-container').classList.remove('scale-95');
                lucide.createIcons();
            }, 10);
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('opacity-0');
            document.getElementById('modal-container').classList.add('scale-95');
            setTimeout(() => {
                document.getElementById('modal-overlay').classList.add('hidden');
            }, 300);
        }



        async function saveNarrowcastTemplate() {
            showPromptModal('บันทึกแม่แบบ', 'ตั้งชื่อแม่แบบข้อความนี้เพื่อให้จำได้ง่าย:', 'เช่น แจ้งโปรเดือน 10, ทักทายลูกค้าใหม่...', async (name) => {

                const messages = [];
                for (let b of narrowcastBalloons) {
                    if (b.content.trim()) messages.push({ type: b.type, content: b.content });
                }

                if (messages.length === 0) {

        let chatMemoryState = {};
        let activeChatUserId = null;
        let currentChatInterval = null;
        let globalChatUsersInterval = null;

        let allUniqueChatUsers = [];
        let chatUsersPage = 1;
        const USERS_PER_PAGE = 50;
        let chatSearchQuery = "";
        let chatTagFilter = "";

        async function fetchInitialChatUsers(silent = false) {
            const listEl = document.getElementById('chat-users-list');
            if (!silent && listEl) listEl.innerHTML = '<div class="flex justify-center py-10"><i data-lucide="loader-2" class="w-6 h-6 animate-spin text-indigo-500"></i></div>';
            if (!silent && window.lucide) lucide.createIcons();

            // ดึงรายชื่อผู้ใช้ที่เคยคุยด้วย (2,000 อันดับแรก)
            const { data, error } = await supabaseClient.from('chat_history').select('user_id').order('created_at', { ascending: false }).limit(2000);
            if (error) return;
            let tempIds = [...new Set(data.map(d => d.user_id))];

            // 1. กรองด้วย Tag ก่อน (ถ้ามีการระบุ)
            if (chatTagFilter) {
                const { data: tagMatches } = await supabaseClient.from('user_tags').select('user_id').eq('tag_name', chatTagFilter);
                const taggedIds = (tagMatches || []).map(t => t.user_id);
                tempIds = tempIds.filter(id => taggedIds.includes(id));
            }

            // 2. กรองด้วย Search Query (ชื่อหรือ ID)
            if (chatSearchQuery) {
                const { data: profiles } = await supabaseClient
                    .from('user_profiles')
                    .select('userId')
                    .or(`displayName.ilike.%${chatSearchQuery}%,userId.ilike.%${chatSearchQuery}%`);

                const matchedIds = (profiles || []).map(p => p.userId);
                allUniqueChatUsers = tempIds.filter(id => matchedIds.includes(id));
            } else {
                allUniqueChatUsers = tempIds;
            }

            chatUsersPage = 1;

            const banner = document.getElementById('new-msg-banner');
            if (banner) banner.remove();

            await renderChatUsersList(true);
        }

        async function handleChatSearch(val) {
            chatSearchQuery = val.trim();
            chatUsersPage = 1;
            await fetchInitialChatUsers();
        }

        async function handleChatTagFilter(val) {
            chatTagFilter = val;
            chatUsersPage = 1;
            await fetchInitialChatUsers();
        }

        async function silentUpdateUserList() {
            const listEl = document.getElementById('chat-users-list');
            if (!listEl) return;

            const { data: latestChat } = await supabaseClient.from('chat_history').select('user_id').order('created_at', { ascending: false }).limit(100);
            if (!latestChat) return;

            const latestUniqueIds = [...new Set(latestChat.map(d => d.user_id))];
            if (latestUniqueIds.length === 0) return;

            const currentTop = allUniqueChatUsers.slice(0, 15).join(',');
            const newTop = latestUniqueIds.slice(0, 15).join(',');

            if (currentTop !== newTop) {
                if (listEl.scrollTop < 100) {
                    fetchInitialChatUsers(true);
                } else {
                    let banner = document.getElementById('new-msg-banner');
                    if (!banner) {
                        listEl.insertAdjacentHTML('beforebegin', `<div id="new-msg-banner" onclick="fetchInitialChatUsers(); this.remove(); document.getElementById('chat-users-list').scrollTo({top: 0, behavior: 'smooth'});" class="bg-indigo-500 text-white text-[11px] font-bold py-2 cursor-pointer text-center hover:bg-indigo-600 transition-colors shadow-sm animate-pulse z-20 absolute top-16 left-0 right-0 mx-4 rounded-xl flex items-center justify-center gap-1.5"><i data-lucide="arrow-up" class="w-3 h-3"></i> มีแชทใหม่! แตะเพื่อดู</div>`);
                        if (window.lucide) lucide.createIcons();
                    }
                }
            } else {
                const metaKeys = latestUniqueIds.slice(0, 30).map(id => `chat_meta_${id}`);
                const { data: metas } = await supabaseClient.from('system_settings').select('key, value').in('key', metaKeys);
                if (!metas) return;

                metas.forEach(meta => {
                    const uid = meta.key.replace('chat_meta_', '');
                    const tab = document.getElementById(`user-tab-${uid}`);
                    if (tab) {
                        const isUnread = meta.value.unread;
                        const dotExists = tab.querySelector('.absolute.-top-1');

                        if (isUnread && !dotExists && activeChatUserId !== uid) {
                            tab.classList.add('border-rose-200', 'bg-rose-50/20');
                            tab.classList.remove('border-transparent');
                            tab.querySelector('.relative').insertAdjacentHTML('beforeend', '<div class="absolute -top-1 -right-1 flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-rose-500 border-2 border-white"></span></div>');
                        } else if ((!isUnread || activeChatUserId === uid) && dotExists) {
                            tab.classList.remove('border-rose-200', 'bg-rose-50/20');
                            tab.classList.add('border-transparent');
                            dotExists.remove();
                            const timer = tab.querySelector('.unread-timer');
                            if (timer) timer.remove();
                        }
                    }
                });
            }
        }

        async function renderChatUsersList(isInitial = false) {
            const listEl = document.getElementById('chat-users-list');

            const startIdx = (chatUsersPage - 1) * USERS_PER_PAGE;
            const endIdx = startIdx + USERS_PER_PAGE;
            const pageIds = allUniqueChatUsers.slice(startIdx, endIdx);

            if (pageIds.length === 0) {
                if (isInitial && listEl) listEl.innerHTML = '<div class="text-center text-slate-400 py-10 text-sm font-display">ไม่มีประวัติผู้ใช้</div>';
                return;
            }

            const { data: profiles } = await supabaseClient.from('user_profiles').select('userId, displayName, pictureUrl').in('userId', pageIds);

            const metaKeys = pageIds.map(id => `chat_meta_${id}`);
            const { data: metas } = await supabaseClient.from('system_settings').select('key, value').in('key', metaKeys);
            const metaMap = (metas || []).reduce((acc, curr) => { acc[curr.key.replace('chat_meta_', '')] = curr.value; return acc; }, {});

            const html = pageIds.map(id => {
                const p = profiles?.find(prof => prof.userId === id) || { displayName: 'Unknown', pictureUrl: null };
                const meta = metaMap[id] || {};
                const isUnread = meta.unread;
                const claimingAdmin = meta.adminName;
                const ts = meta.timestamp || Date.now();

                let unreadWaitHtml = '';
                if (isUnread) {
                    const mins = Math.max(0, Math.floor((Date.now() - ts) / 60000));
                    let waitText = mins < 1 ? 'เพิ่งเข้ามา' : `${mins} นาที`;
                    if (mins >= 60) {
                        const hours = Math.floor(mins / 60);
                        waitText = hours >= 24 ? `${Math.floor(hours / 24)} วัน` : `${hours} ชม.`;
                    }
                    unreadWaitHtml = `<div class="unread-timer text-[9px] text-rose-600 bg-rose-50 px-1.5 py-0.5 rounded border border-rose-200 flex items-center gap-1 w-fit font-bold shadow-sm" data-ts="${ts}"><i data-lucide="clock-4" class="w-3 h-3"></i> <span>รอ ${waitText}</span></div>`;
                }

                const tagsHtml = `
                    <div class="flex flex-wrap gap-1 mt-1 empty:hidden">
                        ${unreadWaitHtml}
                        ${claimingAdmin && !isUnread ? `<div class="text-[9px] text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded border border-emerald-100 truncate flex items-center gap-1 w-fit max-w-full"><i data-lucide="user-check" class="w-3 h-3 shrink-0"></i> ตอบโดย ${escapeHtml(claimingAdmin)}</div>` : ''}
                        ${claimingAdmin && isUnread ? `<div class="text-[9px] text-slate-500 bg-slate-50 px-1.5 py-0.5 rounded border border-slate-200 truncate flex items-center gap-1 w-fit max-w-full"><i data-lucide="user" class="w-2.5 h-2.5 shrink-0"></i> ${escapeHtml(claimingAdmin)}</div>` : ''}
                    </div>
                `;

                const unreadDot = isUnread ? '<div class="absolute -top-1 -right-1 flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-rose-500 border-2 border-white"></span></div>' : '';

                return `
                <div id="user-tab-${id}" onclick="openChat('${id}', '${escapeHtml(p.displayName)}', '${p.pictureUrl}')" class="p-3 bg-white/60 hover:bg-white rounded-xl shadow-sm border ${isUnread ? 'border-rose-200 bg-rose-50/20 relative' : 'border-transparent hover:border-indigo-100'} cursor-pointer transition-all flex items-center gap-3 group">
                    <div class="relative shrink-0">
                        <img src="${p.pictureUrl || 'https://cdn-icons-png.flaticon.com/128/1144/1144760.png'}" class="w-10 h-10 rounded-full border border-slate-100 object-cover shrink-0">
                        ${unreadDot}
                    </div>
                    <div class="overflow-hidden flex-1 flex flex-col justify-center">
                        <div class="font-bold text-sm truncate group-hover:text-indigo-600 transition-colors ${isUnread ? 'text-rose-700' : 'text-slate-800'}">${escapeHtml(p.displayName)}</div>
                        ${tagsHtml}
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300 group-hover:text-indigo-400 shrink-0"></i>
                </div>
                `;
            }).join('');

            if (isInitial) {
                if (listEl) listEl.innerHTML = html;
            } else {
                const btn = document.getElementById('chat-load-more-btn');
                if (btn) btn.remove();
                if (listEl) listEl.insertAdjacentHTML('beforeend', html);
            }

            if (endIdx < allUniqueChatUsers.length && listEl) {
                listEl.insertAdjacentHTML('beforeend', `
                    <button id="chat-load-more-btn" onclick="loadMoreChatUsers()" class="w-full py-2.5 mt-2 text-xs text-indigo-600 bg-white border border-indigo-100 hover:bg-indigo-50 rounded-xl font-bold transition-colors flex justify-center items-center gap-2 shadow-sm font-display tracking-wide uppercase">
                        โหลดรายชื่อเพิ่มเติม
                    </button>
                `);
            }
            if (window.lucide) lucide.createIcons();
        }

        function loadMoreChatUsers() {
            chatUsersPage++;
            const btn = document.getElementById('chat-load-more-btn');
            if (btn) btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin text-indigo-600"></i> กำลังโหลด...';
            if (window.lucide) lucide.createIcons();

            setInterval(() => {
                document.querySelectorAll('.unread-timer').forEach(el => {
                    const ts = parseInt(el.getAttribute('data-ts'));
                    if (ts) {
                        const mins = Math.max(0, Math.floor((Date.now() - ts) / 60000));
                        let waitText = mins < 1 ? 'เพิ่งเข้ามา' : `${mins} นาที`;
                        if (mins >= 60) {
                            const hours = Math.floor(mins / 60);
                            waitText = hours >= 24 ? `${Math.floor(hours / 24)} วัน` : `${hours} ชม.`;
                        }
                        const span = el.querySelector('span');
                        if (span) span.innerText = `รอ ${waitText}`;
                    }
                });
            }, 60000);
        }
