<!DOCTYPE html>
<html lang="th" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINE Chatbot Admin • V3 Pro</title>
    <link id="favicon" rel="icon" href="https://cdn-icons-png.flaticon.com/128/9977/9977388.png">
    <link id="apple-touch-icon" rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/128/9977/9977388.png">
    <meta name="description" content="LINE Chatbot Admin Panel V3" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/LINESeedSansTH/LINESeedSansTH.css" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap');

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --surface: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: 'LINE Seed Sans TH', 'Prompt', sans-serif;
            background-color: #f8fafc;
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.4); }

        .font-display { font-family: 'LINE Seed Sans TH', 'Outfit', sans-serif; }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .nav-item { position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
        .nav-item::before {
            content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px;
            background: var(--primary); border-radius: 0 4px 4px 0; transform: scaleY(0); transition: transform 0.3s ease;
        }
        .nav-active { background: linear-gradient(90deg, rgba(99, 102, 241, 0.1) 0%, rgba(99, 102, 241, 0) 100%); color: var(--primary-dark); }
        .nav-active::before { transform: scaleY(1); }
        .nav-active i { color: var(--primary); }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 4px 15px -3px rgba(79, 70, 229, 0.4), 0 2px 6px -2px rgba(79, 70, 229, 0.2);
            transition: all 0.3s ease;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5); }

        .slide-in { animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }

        .toast-enter { transform: translateX(100%) scale(0.9); opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .toast-enter-active { transform: translateX(0) scale(1); opacity: 1; }
        .toast-exit-active { transform: translateX(100%) scale(0.9); opacity: 0; transition: all 0.3s ease-in; }

        .table-row-hover:hover td { background-color: rgba(248, 250, 252, 0.8); }
        body { margin-bottom: var(--android-safe-area-inset-bottom, env(safe-area-inset-bottom)); }
    </style>
</head>

<body>
    <div id="app" class="min-h-screen"></div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center z-[100] hidden transition-all duration-300 p-4 opacity-0" onclick="if(event.target === this) closeModal()">
        <div class="glass w-full max-w-2xl max-h-[90vh] rounded-[2rem] shadow-2xl overflow-hidden transform scale-95 transition-all duration-300" id="modal-container">
            <div class="flex items-center justify-between px-8 py-6 border-b border-gray-100/50 bg-white/40">
                <h2 id="modal-title" class="text-2xl font-bold text-slate-800 font-display">Title</h2>
                <button onclick="closeModal()" class="p-2 rounded-full hover:bg-white/50 hover:text-rose-500 transition-colors">
                    <i data-lucide="x" class="w-6 h-6 text-slate-400"></i>
                </button>
            </div>
            <div id="modal-content" class="p-8 overflow-y-auto max-h-[75vh] bg-white/30"></div>
        </div>
    </div>

    <script>
        // ==============================================
        //                  CONFIGURATION
        // ==============================================
        const LIFF_ID = "2009815540-mD9OJXZa"; // <-- ใส่ LIFF ID
        const SUPABASE_URL = "https://kiumelolsilduqnvrekf.supabase.co"; // <-- ใส่ Supabase URL
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpdW1lbG9sc2lsZHVxbnZyZWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwODUyNzYsImV4cCI6MjA3MjY2MTI3Nn0.3hCFJiDrkgNJQEggS8MkRnxlhvqIMAax_a73NJq14gU"; // <-- ใส่ Supabase Anon Key
        const API_BASE_URL = `${SUPABASE_URL}/functions/v1/line-webhook`;

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUserProfile = null;
        let currentView = 'chat';
        let isSidebarOpen = false;
        let currentKeywords = [];

        let searchQuery = "";
        let currentPage = 1;
        const ITEMS_PER_PAGE = 50;

        let editingDataAiId = null; // สำหรับหน้า AI Knowledge

        document.addEventListener('DOMContentLoaded', initApp);

        async function initApp() {
            renderLoading('กำลังยืนยันตัวตนผ่าน LINE...');
            try {
                await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });
                await liff.ready;

                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }
                
                try {
                    const friendship = await liff.getFriendship();
                    if (!friendship.friendFlag && typeof liff.requestFriendship === 'function') {
                        await liff.requestFriendship();
                        const verifyFriendship = await liff.getFriendship();
                        if (verifyFriendship.friendFlag) showToast('ขอบคุณที่เพิ่มเราเป็นเพื่อนครับ!', 'success');
                    }
                } catch (err) { console.warn("Friendship check error:", err); }

                const profile = await liff.getProfile();
                currentUserProfile = profile;

                renderLoading('กำลังตรวจสอบสิทธิ์ Admin...');
                const { data: userProfile, error } = await supabaseClient.from('user_profiles').select('role').eq('userId', profile.userId).maybeSingle();

                if (error || !userProfile || userProfile.role !== 'admin') {
                    renderAccessDenied(profile);
                    return;
                }

                renderMainLayout();
                loadView('chat');
            } catch (err) {
                console.error(err);
                document.getElementById('app').innerHTML = `<div class="min-h-screen flex items-center justify-center p-4 text-center"><div class="glass p-8 rounded-3xl"><h2 class="font-bold text-xl mb-2 text-rose-600">Error</h2><p>${err.message}</p></div></div>`;
            }
        }

        function renderLoading(message = 'กำลังโหลด...') {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
                    <div class="glass p-8 rounded-3xl flex flex-col items-center shadow-2xl slide-in">
                        <i data-lucide="loader-2" class="w-12 h-12 animate-spin text-indigo-500 mb-4"></i>
                        <p class="text-slate-600 font-medium font-display text-lg">${message}</p>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function renderAccessDenied(profile) {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center p-4">
                    <div class="glass p-10 rounded-3xl shadow-2xl max-w-md w-full text-center slide-in">
                        <i data-lucide="shield-alert" class="text-red-500 w-16 h-16 mx-auto mb-4"></i>
                        <h1 class="text-3xl font-bold text-slate-800 mb-2 font-display">Access Denied</h1>
                        <p class="text-slate-500 mb-8 max-w-xs mx-auto">บัญชีนี้ไม่มีสิทธิ์ Admin ในระบบ</p>
                        <button onclick="window.location.reload()" class="w-full py-3.5 btn-primary text-white rounded-xl font-semibold shadow-lg transition-all hover:scale-[1.02]">โหลดหน้าเว็บใหม่</button>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function renderMainLayout() {
            document.getElementById('app').innerHTML = `
                <div class="md:hidden glass sticky top-0 z-40 px-5 h-16 flex items-center justify-between shadow-sm backdrop-blur-md">
                    <div class="flex items-center gap-3">
                         <div class="bg-gradient-to-tr from-indigo-600 to-violet-600 text-white p-2 rounded-xl shadow-lg transform scale-90"><i data-lucide="bot" class="w-5 h-5"></i></div>
                        <span class="font-bold text-xl text-slate-800 font-display">Admin<span class="text-indigo-600">Bot</span></span>
                    </div>
                    <button onclick="toggleSidebar()" class="p-2.5 text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all"><i data-lucide="menu" class="w-6 h-6"></i></button>
                </div>
                <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 hidden transition-opacity duration-300"></div>

                <div class="flex min-h-screen pt-4 md:pt-6 pb-6 px-4 md:px-6 gap-6 max-w-[1600px] mx-auto">
                    <aside id="sidebar" class="fixed md:sticky top-0 inset-y-0 left-0 w-[280px] h-[calc(100vh-3rem)] md:top-6 glass rounded-3xl transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-50 flex flex-col shadow-2xl md:shadow-lg border-white/40">
                        <div class="h-24 flex items-center px-8 border-b border-gray-100/50">
                            <div class="flex items-center gap-3.5">
                                <div class="bg-gradient-to-tr from-indigo-600 to-violet-600 text-white p-3 rounded-2xl shadow-lg"><i data-lucide="bot" class="w-6 h-6"></i></div>
                                <div><h1 class="font-bold text-2xl text-slate-800 font-display">Admin<span class="text-indigo-600">Bot</span><span class="text-xs ml-1 text-slate-400">V3</span></h1></div>
                            </div>
                        </div>

                        <div class="mx-5 mt-4 p-3 bg-white/60 rounded-xl border border-white/50 shadow-sm flex items-center justify-between">
                            <div class="flex items-center gap-2.5">
                                <div class="bg-indigo-100 text-indigo-600 p-1.5 rounded-lg"><i data-lucide="bot" class="w-4 h-4"></i></div>
                                <div><p class="text-xs font-bold text-slate-700">AI System</p><p id="global-ai-status-text" class="text-[10px] text-slate-400 font-medium">Loading...</p></div>
                            </div>
                            <button id="global-ai-toggle-btn" onclick="toggleGlobalAi()" class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-200 transition-colors"><span id="global-ai-toggle-knob" class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1 shadow-sm"></span></button>
                        </div>

                        <nav class="flex-1 px-5 py-4 space-y-1.5 overflow-y-auto">
                            <button onclick="loadView('chat');" id="nav-chat" class="nav-item w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-slate-600 hover:bg-white/60 hover:text-indigo-600 text-[15px] font-medium transition-all"><i data-lucide="message-circle" class="w-5 h-5"></i> <span>Live Chat</span></button>
                            <button onclick="loadView('keywords');" id="nav-keywords" class="nav-item w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-slate-600 hover:bg-white/60 hover:text-indigo-600 text-[15px] font-medium transition-all"><i data-lucide="message-square-plus" class="w-5 h-5"></i> <span>Keywords</span></button>
                            <button onclick="loadView('dataai');" id="nav-dataai" class="nav-item w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-slate-600 hover:bg-white/60 hover:text-indigo-600 text-[15px] font-medium transition-all"><i data-lucide="brain" class="w-5 h-5 text-fuchsia-500"></i> <span>คลังความรู้ AI</span></button>
                            <button onclick="loadView('users');" id="nav-users" class="nav-item w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-slate-600 hover:bg-white/60 hover:text-indigo-600 text-[15px] font-medium transition-all"><i data-lucide="users" class="w-5 h-5"></i> <span>สมาชิก (Users)</span></button>
                            <button onclick="loadView('permissions');" id="nav-permissions" class="nav-item w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-slate-600 hover:bg-white/60 hover:text-indigo-600 text-[15px] font-medium transition-all"><i data-lucide="key" class="w-5 h-5"></i> <span>สิทธิ์ VIP</span></button>
                            <button onclick="loadView('richmenus');" id="nav-richmenus" class="nav-item w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-slate-600 hover:bg-white/60 hover:text-indigo-600 text-[15px] font-medium transition-all"><i data-lucide="layout" class="w-5 h-5"></i> <span>Rich Menu</span></button>
                            <button onclick="loadView('tags');" id="nav-tags" class="nav-item w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-slate-600 hover:bg-white/60 hover:text-indigo-600 text-[15px] font-medium transition-all"><i data-lucide="tag" class="w-5 h-5"></i> <span>Tag & Audience</span></button>
                            <button onclick="loadView('narrowcast');" id="nav-narrowcast" class="nav-item w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-slate-600 hover:bg-white/60 hover:text-indigo-600 text-[15px] font-medium transition-all"><i data-lucide="send" class="w-5 h-5"></i> <span>Narrowcast</span></button>
                            <button onclick="loadView('groups');" id="nav-groups" class="nav-item w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-slate-600 hover:bg-white/60 hover:text-indigo-600 text-[15px] font-medium transition-all"><i data-lucide="users-2" class="w-5 h-5"></i> <span>Groups</span></button>
                            <button onclick="loadView('storage');" id="nav-storage" class="nav-item w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-slate-600 hover:bg-white/60 hover:text-indigo-600 text-[15px] font-medium transition-all"><i data-lucide="hard-drive" class="w-5 h-5"></i> <span>Storage</span></button>
                        </nav>

                        <div class="p-5 border-t border-gray-100/50">
                            <button onclick="liff.logout(); window.location.reload();" class="w-full flex items-center justify-center gap-2.5 px-4 py-3.5 text-rose-600 bg-rose-50/80 hover:bg-rose-100 rounded-xl transition-all font-semibold text-sm"><i data-lucide="log-out" class="w-4 h-4"></i> ออกจากระบบ</button>
                        </div>
                    </aside>
                    <main class="flex-1 min-w-0 flex flex-col transition-all"><div class="flex-1 w-full" id="content-area"></div></main>
                </div>
            `;
            initGlobalAiButton();
            lucide.createIcons();
        }

        function toggleSidebar() {
            isSidebarOpen = !isSidebarOpen;
            document.getElementById('sidebar').classList.toggle('-translate-x-full', !isSidebarOpen);
            document.getElementById('sidebar-overlay').classList.toggle('hidden', !isSidebarOpen);
        }

        async function loadView(viewName) {
            currentView = viewName; searchQuery = ""; currentPage = 1;
            if (window.innerWidth < 768 && isSidebarOpen) toggleSidebar();

            document.querySelectorAll('nav button').forEach(b => { b.classList.remove('bg-blue-50','text-blue-700','font-semibold','nav-active'); b.classList.add('text-gray-600'); });
            const activeBtn = document.getElementById(`nav-${viewName}`);
            if (activeBtn) { activeBtn.classList.add('nav-active','font-semibold'); activeBtn.classList.remove('text-gray-600'); }

            document.getElementById('content-area').innerHTML = '<div class="flex justify-center py-20"><i data-lucide="loader-2" class="w-8 h-8 animate-spin text-indigo-600"></i></div>';
            lucide.createIcons();

            if (viewName === 'chat') await renderChatMenu();
            else if (viewName === 'keywords') await renderKeywordsTable();
            else if (viewName === 'dataai') await renderDataAIView(); 
            else if (viewName === 'users') await renderUsersTable();
            else if (viewName === 'permissions') await renderPermissionsTable();
            else if (viewName === 'richmenus') await renderRichMenusTable();
            else if (viewName === 'tags') await renderTagsView();
            else if (viewName === 'narrowcast') await renderNarrowcastView();
            else if (viewName === 'groups') await renderGroupsTable();
            else if (viewName === 'storage') await renderStorageTable();
        }

        function handleSearch(val) {
            searchQuery = val.trim(); currentPage = 1;
            if (currentView === 'chat') renderChatMenu();
            else if (currentView === 'keywords') renderKeywordsTable();
            else if (currentView === 'dataai') renderDataAIView();
            else if (currentView === 'users') renderUsersTable();
            else if (currentView === 'permissions') renderPermissionsTable();
            else if (currentView === 'richmenus') renderRichMenusTable();
            else if (currentView === 'groups') renderGroupsTable();
            else if (currentView === 'storage') fetchAndRenderFiles();
        }

        function changePage(delta) {
            currentPage = Math.max(1, currentPage + delta);
            if (currentView === 'keywords') renderKeywordsTable();
            else if (currentView === 'dataai') renderDataAIView();
            else if (currentView === 'users') renderUsersTable();
            else if (currentView === 'permissions') renderPermissionsTable();
            else if (currentView === 'richmenus') renderRichMenusTable();
            else if (currentView === 'groups') renderGroupsTable();
        }

        // ==============================================
        // 🧠 คลังความรู้ AI (DataAI)
        // ==============================================
        async function renderDataAIView() {
            const from = (currentPage - 1) * ITEMS_PER_PAGE;
            const to = from + ITEMS_PER_PAGE - 1;

            let query = supabaseClient.from('dataai').select('*', { count: 'exact' }).order('created_at', { ascending: false });
            if (searchQuery) query = query.ilike('content', `%${searchQuery}%`);
            query = query.range(from, to);

            const { data, error, count } = await query;
            if (error) { showToast(error.message, 'error'); return; }

            const totalPages = Math.ceil(count / ITEMS_PER_PAGE);
            const hasPrev = currentPage > 1;
            const hasNext = currentPage < totalPages;

            let html = `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 slide-in">
                    <div>
                        <h1 class="text-3xl font-bold text-slate-800 flex items-center gap-3 font-display">
                            <span class="bg-fuchsia-100 text-fuchsia-600 p-2.5 rounded-2xl shadow-sm"><i data-lucide="brain" class="w-8 h-8"></i></span>
                            คลังความรู้ AI (DataAI)
                        </h1>
                        <p class="text-slate-500 mt-2 ml-1 text-sm font-medium">เพิ่มข้อมูลให้บอท AI อ่านและเรียนรู้ เพื่อใช้ตอบคำถามลูกบ้าน</p>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                        <div class="flex gap-2">
                            <div class="relative group">
                                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                                <input type="text" placeholder="ค้นหาเนื้อหา..." onkeydown="if(event.key === 'Enter') handleSearch(this.value)" value="${searchQuery}"
                                    class="pl-12 pr-5 py-3 border-0 rounded-2xl w-full sm:w-60 bg-white/70 shadow-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-fuchsia-500 outline-none" />
                            </div>
                            <button onclick="handleSearch(document.querySelector('input[placeholder=\\'ค้นหาเนื้อหา...\\']').value)" class="px-4 py-3 bg-fuchsia-50 text-fuchsia-600 rounded-2xl font-semibold hover:bg-fuchsia-100 transition-colors"><i data-lucide="search" class="w-5 h-5"></i></button>
                        </div>
                        <button onclick="openDataAIModal()" class="bg-fuchsia-600 hover:bg-fuchsia-700 text-white px-6 py-3 rounded-2xl flex items-center justify-center gap-2 font-bold shadow-lg transition-all active:scale-95 whitespace-nowrap">
                            <i data-lucide="plus" class="w-5 h-5"></i> เพิ่มความรู้
                        </button>
                    </div>
                </div>

                <div class="glass rounded-3xl overflow-hidden slide-in border-0 shadow-xl">
                    <div class="hidden md:block overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-gray-200/50 bg-slate-50/50">
                                    <th class="px-8 py-5 text-xs font-bold text-slate-500 uppercase">เนื้อหาความรู้ (Content)</th>
                                    <th class="px-6 py-5 text-xs font-bold text-slate-500 uppercase w-48 text-right">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100/50">
            `;

            if (!data || data.length === 0) {
                html += `<tr><td colspan="2"><div class="flex flex-col items-center justify-center py-20 text-slate-400"><div class="bg-fuchsia-50 p-6 rounded-full mb-4"><i data-lucide="database" class="w-12 h-12 text-fuchsia-300"></i></div><p class="font-bold text-xl">ไม่พบข้อมูลความรู้ AI</p></div></td></tr>`;
            } else {
                data.forEach(item => {
                    const shortText = item.content.length > 150 ? escapeHtml(item.content.substring(0, 150)) + '...' : escapeHtml(item.content);
                    const fullTextStr = encodeURIComponent(JSON.stringify(item));
                    html += `
                        <tr class="table-row-hover transition-all hover:bg-fuchsia-50/30 cursor-pointer" onclick="openDataAIModal('${fullTextStr}')">
                            <td class="px-8 py-5">

        function openDataAIModal(encodedData = null) {
            editingDataAiId = null;
            let content = '';
            let title = 'เพิ่มคลังความรู้ใหม่';

            if (encodedData) {
                const data = JSON.parse(decodeURIComponent(encodedData));
                editingDataAiId = data.id;
                content = data.content;
                title = 'แก้ไขคลังความรู้';
            }

            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerHTML = `
                <form id="dataaiForm" class="space-y-4">
                    <div class="p-4 bg-fuchsia-50/50 border border-fuchsia-100 rounded-2xl text-sm text-fuchsia-800 flex gap-3 shadow-sm mb-4">
                        <i data-lucide="info" class="w-5 h-5 shrink-0"></i>
                        <div>พิมพ์ข้อมูล ข้อบังคับ หรือประกาศที่ต้องการให้ AI จดจำ เพื่อใช้ตอบคำถามลูกบ้าน</div>

                        <button type="submit" class="px-6 py-3 bg-fuchsia-600 hover:bg-fuchsia-700 text-white rounded-xl shadow-lg flex items-center gap-2 font-bold transition-all">
                            <i data-lucide="save" class="w-4 h-4"></i> บันทึกข้อมูล

                    </div>
                </form>
            `;
            document.getElementById('dataaiForm').onsubmit = handleDataAISubmit;

        async function handleDataAISubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            setBtnLoading(btn, true);

            const content = e.target.content.value.trim();
            let error;
            if (editingDataAiId) {
                const { error: err } = await supabaseClient.from('dataai').update({ content }).eq('id', editingDataAiId);
                error = err;
            } else {
                const { error: err } = await supabaseClient.from('dataai').insert([{ content }]);
                error = err;
            }

            if (error) { showToast(error.message, 'error'); setBtnLoading(btn, false); } 
            else { showToast('บันทึกความรู้ AI สำเร็จ', 'success'); closeModal(); renderDataAIView(); }
        }

        async function deleteDataAI(id) {
            showConfirmModal('ลบข้อมูลความรู้?', 'หากลบไปแล้ว บอท AI จะไม่มีข้อมูลส่วนนี้ในการช่วยตอบคำถาม ยืนยันหรือไม่?', async () => {
                showToast('กำลังลบ...', 'loading');
                const { error } = await supabaseClient.from('dataai').delete().eq('id', id);
                if (error) showToast(error.message, 'error');
                else { showToast('ลบข้อมูลสำเร็จ'); renderDataAIView(); }
            });
        }

        // ==============================================
        // Helper UI & Logic Functions (ย่อจาก V2)
        // ==============================================
        function escapeHtml(text) { return (text||"").toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
        function formatThaiDateTime(iso) { try { return new Date(iso).toLocaleString('th-TH', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); } catch(e){return iso;} }
        function showToast(message, type='success') {
            const c = document.getElementById('toast-container'); const t = document.createElement('div');
            const bg = type==='error'?'border-rose-500 text-rose-600':type==='loading'?'border-indigo-500 text-indigo-600':'border-emerald-500 text-emerald-600';
            const icon = type==='error'?'alert-circle':type==='loading'?'loader-2 animate-spin':'check-circle2';
            t.className=`bg-white border-l-4 ${bg} shadow-2xl rounded-xl px-5 py-4 flex items-center gap-3 toast-enter`;
            t.innerHTML=`<i data-lucide="${icon}" class="w-5 h-5"></i><span class="font-bold text-sm">${message}</span>`;
            c.appendChild(t); lucide.createIcons();
            requestAnimationFrame(() => { t.classList.add('toast-enter-active'); t.classList.remove('toast-enter'); });
            setTimeout(() => { t.classList.add('toast-exit-active'); setTimeout(() => t.remove(), 300); }, 3000);
        }
        function openModal() { document.getElementById('modal-overlay').classList.remove('hidden'); setTimeout(()=>document.getElementById('modal-overlay').classList.remove('opacity-0'),10); }
        function closeModal() { document.getElementById('modal-overlay').classList.add('opacity-0'); setTimeout(()=>document.getElementById('modal-overlay').classList.add('hidden'),300); }
        function showModal(title, msg, type='info') {
            document.getElementById('modal-title').innerText=title;
            document.getElementById('modal-content').innerHTML=`<div class="text-center py-4"><i data-lucide="info" class="w-16 h-16 text-indigo-600 mx-auto mb-4"></i><p class="mb-6 font-medium">${msg}</p><button onclick="closeModal()" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">ตกลง</button></div>`;
            openModal(); lucide.createIcons();
        }
        function showConfirmModal(title, msg, onConfirm) {
            document.getElementById('modal-title').innerText=title;
            document.getElementById('modal-content').innerHTML=`<div class="text-center py-4"><p class="mb-6 font-medium whitespace-pre-line">${msg}</p><div class="flex gap-3"><button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold">ยกเลิก</button><button id="m-confirm" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">ยืนยัน</button></div></div>`;
            document.getElementById('m-confirm').onclick=()=>{closeModal(); onConfirm();}; openModal();
        }
        function setBtnLoading(btn, isL) { if(isL){ btn.dataset.o=btn.innerHTML; btn.innerHTML='<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>'; btn.disabled=true; } else { btn.innerHTML=btn.dataset.o; btn.disabled=false; } lucide.createIcons(); }
        function copyToClipboard(text) { navigator.clipboard.writeText(text); showToast('คัดลอกเรียบร้อย'); }

        async function fetchGlobalAiStatus() { const {data} = await supabaseClient.from('system_settings').select('value').eq('key','ai_global_enabled').maybeSingle(); return data ? (data.value===true||data.value==="true") : true; }
        async function toggleGlobalAi() { const c = await fetchGlobalAiStatus(); const n = !c; await supabaseClient.from('system_settings').upsert({key:'ai_global_enabled',value:n}); showToast(n?'เปิด AI ระบบแล้ว':'ปิด AI ระบบแล้ว'); initGlobalAiButton(); }
        async function initGlobalAiButton() { const isOn = await fetchGlobalAiStatus(); const btn = document.getElementById('global-ai-toggle-btn'); if(btn){ btn.className=isOn?"relative inline-flex h-6 w-11 rounded-full bg-emerald-500":"relative inline-flex h-6 w-11 rounded-full bg-slate-300"; document.getElementById('global-ai-toggle-knob').className=isOn?"inline-block h-4 w-4 transform rounded-full bg-white translate-x-6":"inline-block h-4 w-4 transform rounded-full bg-white translate-x-1"; } }
        async function toggleUserAi(uid, c) { await supabaseClient.from('user_profiles').update({ai_status:!c}).eq('userId',uid); showToast(!c?'เปิด AI':'ปิด AI'); renderUsersTable(); }
