        // Sync tier_id ของทุกคนใน DB ให้ตรงกับ points ปัจจุบัน
        async function syncTierForAll() {
            showConfirmModal('Sync Tier ทั้งระบบ?', 'ระบบจะคำนวณและอัปเดต tier_id ของทุกสมาชิกตาม points ปัจจุบัน', async () => {
                showToast('กำลัง sync...', 'info');
                const { data: members } = await supabaseClient.from('user_profiles').select('userId, points');
                const tiers = window._tiers || [];
                if (tiers.length === 0) return showToast('ยังไม่มี Tier กรุณาสร้างก่อน', 'warning');

                let updated = 0;
                for (const m of (members || [])) {
                    const tier = getTierByPoints(m.points || 0);
                    if (tier?.id) {
                        await supabaseClient.from('user_profiles').update({ tier_id: tier.id }).eq('userId', m.userId);
                        updated++;
                    }
                }
                showToast(`Sync เสร็จ ${updated} คน`, 'success');
                renderCrmMembersView();
            });
        }

        function filterMembers() {
            const q = document.getElementById('member-search').value.toLowerCase();
            const filtered = (window._allMembers || []).filter(m =>
                (m.displayName || '').toLowerCase().includes(q) ||
                (m.userId || '').toLowerCase().includes(q));
            renderMembersTable(filtered);
        }

        async function submitAdjustPoints(userId) {
            const btn = document.getElementById('pts-save-btn');
            const delta = parseInt(document.getElementById('pts-delta').value);
            if (!delta || isNaN(delta)) return showToast('กรุณากรอกจำนวนแต้ม', 'warning');
            const reason = document.getElementById('pts-reason').value.trim() || 'ปรับโดยแอดมิน';
            setBtnLoading(btn, true);
            try {
                const res = await fetch(`${API_BASE_URL}/api/crm/adjustPoints`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, delta, reason, createdBy: 'admin-panel' })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'ปรับแต้มล้มเหลว');
                showToast(`สำเร็จ! ยอดใหม่ ${d.new_balance} แต้ม (${d.tier_name})`, 'success');
                closeModal();
                renderCrmMembersView();
            } catch (e) { showToast(e.message, 'error'); }
            finally { setBtnLoading(btn, false); }
        }

        async function saveReward(editId) {
            const btn = document.getElementById('rw-save-btn');
            const name = document.getElementById('rw-name').value.trim();
            const cost = parseInt(document.getElementById('rw-cost').value);
            if (!name || !cost) return showToast('กรุณากรอกชื่อและแต้ม', 'warning');
            setBtnLoading(btn, true);
            const stock = document.getElementById('rw-stock').value;
            const payload = {
                name, description: document.getElementById('rw-desc').value.trim(),
                image_url: document.getElementById('rw-image').value.trim() || null,
                points_cost: cost, stock: stock ? parseInt(stock) : null,
                terms: document.getElementById('rw-terms').value.trim()
            };
            const { error } = editId
                ? await supabaseClient.from('rewards').update(payload).eq('id', editId)
                : await supabaseClient.from('rewards').insert(payload);
            setBtnLoading(btn, false);
            if (error) return showToast(error.message, 'error');
            showToast(editId ? 'แก้ไขสำเร็จ!' : 'เพิ่มรางวัลสำเร็จ!', 'success');
            closeModal();
            renderCrmRewardsView();
        }

                title, description: document.getElementById('n-desc').value.trim(),

                link_url: document.getElementById('n-link').value.trim() || null,

        function saveFeeReminderSchedule() {
            const config = {
                run_day:       parseInt(document.getElementById('fee-sch-day')?.value)  || 20,
                run_time:      document.getElementById('fee-sch-time')?.value           || '09:00',
                due_day:       parseInt(document.getElementById('fee-sch-dueday')?.value)|| 25,
                contact_phone: document.getElementById('fee-sch-phone')?.value?.trim()  || '',
            };
            localStorage.setItem('fee_reminder_config', JSON.stringify(config));
            showToast('✅ บันทึกการตั้งค่าสำเร็จ · จะรันวันที่ ' + config.run_day + ' เวลา ' + config.run_time + ' ทุกเดือน', 'success');
            // บันทึกลง system_settings ด้วย
            supabaseClient.from('system_settings').upsert([
                { key: 'fee_reminder_run_day',   value: String(config.run_day) },
                { key: 'fee_reminder_run_time',  value: config.run_time },
                { key: 'fee_reminder_due_day',   value: String(config.due_day) },
                { key: 'fee_reminder_phone',     value: config.contact_phone },
            ], { onConflict: 'key' }).then(() => closeModal());
        }

        async function runFeeReminderNow() {
            // บันทึก config ก่อน
            const config = {
                run_day:       parseInt(document.getElementById('fee-sch-day')?.value)  || 20,
                due_day:       parseInt(document.getElementById('fee-sch-dueday')?.value)|| 25,
                contact_phone: document.getElementById('fee-sch-phone')?.value?.trim()  || '',
            };
            closeModal();
            showToast('⏳ กำลังตรวจสอบและส่งแจ้งเตือน...', 'info');

            try {
                // 1. เรียก maintenance_check เพื่อดึงรายการบ้านค้างชำระ
                const now = new Date();
                const monthLabel = TH_MONTHS[now.getMonth()].col;
                const year = String(now.getFullYear() + 543);

                const checkUrl = `${API_BASE_URL}/api/admin/audience?action=maintenance_check&month=${encodeURIComponent(monthLabel)}&year=${encodeURIComponent(year)}`;
                const res = await fetch(checkUrl);
                const data = await res.json();
                if (!res.ok || !data.items?.length) {
                    showToast('ไม่พบบ้านค้างชำระในเดือนนี้', 'warning');
                    return;
                }

                // 2. ส่งแจ้งเตือนทุกบ้านที่มี LINE
                const items = data.items.filter(i => i.registered_users?.length > 0);
                if (!items.length) {
                    showToast('ไม่มีบ้านที่มี LINE ลงทะเบียน', 'warning');
                    return;
                }

                const res2 = await fetch(`${API_BASE_URL}/api/admin/audience/maintenance_notify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items,
                        monthLabel,
                        year,
                        dueDay: String(config.due_day),
                        contactPhone: config.contact_phone,
                        auto: true,
                    })
                });
                const d2 = await res2.json();
                if (!res2.ok) throw new Error(d2.error || 'ส่งล้มเหลว');
                showToast('✅ ส่งแจ้งเตือนสำเร็จ · ' + (d2.sent || items.length) + ' บ้าน', 'success');
            } catch(e) {
                showToast('❌ ' + e.message, 'error');
            }
        }

        async function checkMaintenance() {
            const btn = document.getElementById('m-check-btn');
            const month = document.getElementById('m-month').value;
            const year = document.getElementById('m-year').value;
            const monthLabel = TH_MONTHS.find(m => m.col === month)?.label || month;
            const result = document.getElementById('m-result');

            setBtnLoading(btn, true);
            result.innerHTML = `<div class="glass rounded-3xl p-8 text-center text-slate-400">กำลังตรวจสอบ...</div>`;

            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/audience/maintenance_check?month=${month}&year=${year}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'ตรวจสอบล้มเหลว');

                window._maintItems = data.items || [];

                if (data.total === 0) {
                    result.innerHTML = `
                        <div class="glass rounded-3xl p-12 text-center">
                            <div class="text-6xl mb-3">🎉</div>
                            <h3 class="text-xl font-bold text-emerald-600 mb-2">ไม่มีบ้านค้างชำระ!</h3>
                            <p class="text-slate-500 text-sm">${monthLabel} ${year} ทุกบ้านจ่ายเรียบร้อยแล้ว</p>
                        </div>`;
                    return;
                }

                renderMaintenanceList(data, monthLabel, year);
            } catch (e) {
                result.innerHTML = `<div class="glass rounded-3xl p-6 text-rose-600 text-center">${e.message}</div>`;
            } finally {
                setBtnLoading(btn, false);
            }
        }

        function toggleSelectAll() {
            const all = document.getElementById('m-select-all');
            const rows = document.querySelectorAll('.m-row-check');
            const target = all.checked || ![...rows].every(r => r.checked);
            rows.forEach(r => r.checked = target);

        async function sendMaintenanceNotify(monthLabel, year) {
            const btn = document.getElementById('m-send-btn');
            const checkedIdx = [...document.querySelectorAll('.m-row-check:checked')].map(c => parseInt(c.dataset.idx));
            if (checkedIdx.length === 0) return showToast('กรุณาเลือกบ้านที่จะส่ง', 'warning');

            const items = checkedIdx.map(i => window._maintItems[i]);
            const dueDay = document.getElementById('m-due-day').value;
            const contactPhone = document.getElementById('m-phone').value.trim();

            showConfirmModal(
                `ยืนยันส่งแจ้งเตือน?`,
                `จะส่ง LINE Flex Message ไปยัง ${items.reduce((s, i) => s + (i.registered_users?.length || 0), 0)} ผู้ใช้ จาก ${items.length} บ้าน · ${monthLabel} ${year}`,
                async () => {
                    setBtnLoading(btn, true);
                    try {
                        const res = await fetch(`${API_BASE_URL}/api/admin/audience/maintenance_notify`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ items, monthLabel, year, dueDay, contactPhone })
                        });
                        const d = await res.json();
                        if (!res.ok) throw new Error(d.error || 'ส่งล้มเหลว');
                        showToast(d.message, 'success');
                    } catch (e) { showToast(e.message, 'error'); }
                    finally { setBtnLoading(btn, false); }
                }
            );
        }

        function openAgmModal(editing) {
            const isEdit = !!editing;
            document.getElementById('modal-title').innerHTML = `<div class="flex items-center gap-2"><i data-lucide="vote" class="w-6 h-6 text-rose-500"></i> ${isEdit ? 'แก้ไข AGM Event' : 'สร้าง AGM Event'}</div>`;

            // datetime-local แปลง ISO → local string ตามไทม์โซน browser
            const toLocalInput = (isoStr) => {
                if (!isoStr) return '';
                const d = new Date(isoStr);
                const tz = d.getTimezoneOffset() * 60000;
                return new Date(d - tz).toISOString().slice(0, 16);
            };
            const startVal = isEdit ? toLocalInput(editing.starts_at) : new Date(Date.now() + 24*3600*1000 - new Date().getTimezoneOffset()*60000).toISOString().slice(0,16);
            const endVal   = isEdit ? toLocalInput(editing.ends_at)   : new Date(Date.now() + 7*24*3600*1000 - new Date().getTimezoneOffset()*60000).toISOString().slice(0,16);

            document.getElementById('modal-content').innerHTML = `

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1.5">วันเริ่มโหวต *</label>

        async function saveAgmEvent(editId) {
            const btn = document.getElementById('agm-save-btn');
            const title = document.getElementById('agm-title').value.trim();
            if (!title) return showToast('กรุณากรอกชื่อ', 'warning');

            const startsAt = localDatetimeToISO(document.getElementById('agm-start').value);
            const endsAt   = localDatetimeToISO(document.getElementById('agm-end').value);
            if (!startsAt || !endsAt) return showToast('กรุณากรอกวันเวลาให้ครบ', 'warning');
            if (new Date(endsAt) <= new Date(startsAt)) return showToast('เวลาปิดต้องหลังเวลาเริ่ม', 'warning');

            setBtnLoading(btn, true);
            const payload = {
                title,
                description: document.getElementById('agm-desc').value.trim(),
                starts_at: startsAt,
                ends_at: endsAt,
                quorum_pct: parseInt(document.getElementById('agm-quorum').value) || 50,
                total_houses: parseInt(document.getElementById('agm-total').value) || null
            };
            // เฉพาะตอนสร้างใหม่ที่ตั้ง status=draft
            if (!editId) payload.status = 'draft';

            const { error } = editId
                ? await supabaseClient.from('agm_events').update(payload).eq('id', editId)
                : await supabaseClient.from('agm_events').insert(payload);
            setBtnLoading(btn, false);
            if (error) {
                if (error.code === '42P01' || (error.message?.includes('relation') && error.message?.includes('agm'))) {
                    return showToast('ตาราง agm_events ไม่มีในฐานข้อมูล — ต้องรัน migration_3features.sql ก่อน', 'error');
                }
                return showToast(error.message, 'error');
            }
            showToast(editId ? 'แก้ไข AGM สำเร็จ' : 'สร้าง AGM สำเร็จ! กดเข้าจัดการเพื่อเพิ่มวาระ', 'success');
            closeModal();
            renderAgmAdminView();
        }

let slipData = [];

async function loadSlips() {
    document.getElementById('slip-result').innerHTML = '<div class="text-center py-12 text-slate-400">กำลังโหลด...</div>';
    try {
        const { data, error } = await supabaseClient
            .from('slip_submissions').select('*')
            .order('created_at', { ascending: false }).limit(200);
        if (error) throw error;
        slipData = data || [];

        document.getElementById('slip-stat-pending').innerText   = slipData.filter(s => s.status === 'pending').length;
        document.getElementById('slip-stat-confirmed').innerText = slipData.filter(s => s.status === 'confirmed').length;
        document.getElementById('slip-stat-rejected').innerText  = slipData.filter(s => s.status === 'rejected').length;

        filterSlips();
    } catch (e) {
        document.getElementById('slip-result').innerHTML = `<div class="bg-rose-50 text-rose-700 rounded-2xl p-4">${escapeHtml(e.message)}</div>`;
    }
}

function filterSlips() {
    const status = document.getElementById('slip-filter-status')?.value || '';
    const q = (document.getElementById('slip-search')?.value || '').toLowerCase();
    const filtered = slipData.filter(s => {
        if (status && s.status !== status) return false;
        if (q) {
            const hay = [s.house_number, s.display_name, s.month].filter(Boolean).join(' ').toLowerCase();
            if (!hay.includes(q)) return false;
        }
        return true;
    });
    renderSlips(filtered);
}

        const date = new Date(s.created_at).toLocaleString('th-TH', { timeZone: 'Asia/Bangkok', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        return `<div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="flex items-center justify-between px-4 py-2 bg-${statusColor}-50 border-b border-${statusColor}-100">

                    : '<div class="w-24 h-32 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-400 text-xs flex-shrink-0">ไม่มีรูป</div>'}
                <div class="flex-1 min-w-0 space-y-1.5">

                        <span class="font-extrabold text-slate-800 text-lg">🏠 ${escapeHtml(s.house_number || '—')}</span>

async function savePaymentSettings(btn) {

async function loadCarData() {
    document.getElementById('car-tbody').innerHTML = `<tr><td colspan="6" class="p-12 text-center text-slate-400">กำลังโหลด...</td></tr>`;
    try {
        const { data, error } = await supabaseClient

        if (error) throw error;
        carData = data || [];
        // Stats
        document.getElementById('car-stat-total').innerText = carData.length;
        document.getElementById('car-stat-pending').innerText = carData.filter(r => r.status === 'pending').length;
        document.getElementById('car-stat-approved').innerText = carData.filter(r => r.status === 'approved').length;
        document.getElementById('car-stat-rejected').innerText = carData.filter(r => r.status === 'rejected').length;
        applyCarFilters();
    } catch (e) {
        document.getElementById('car-tbody').innerHTML = `<tr><td colspan="6" class="p-12 text-center text-rose-500">${escapeHtml(e.message)}</td></tr>`;
    }
}

function applyCarFilters() {
    const q = (document.getElementById('car-search')?.value || '').toLowerCase().trim();
    const status = document.getElementById('car-status-filter')?.value || '';
    const type = document.getElementById('car-type-filter')?.value || '';
    carFiltered = carData.filter(r => {
        if (status && r.status !== status) return false;
        if (type && r.car_type !== type) return false;
        if (q) {
            const hay = [r.fullname, r.plate_number, r.province, r.house_number, r.phone].filter(Boolean).join(' ').toLowerCase();
            if (!hay.includes(q)) return false;
        }
        return true;
    });
    carPage = 1;
    renderCarTable();
}

async function setCarExpiry(carId, plate, houseNo, currentEndDate = '') {
    const { value: dates, isConfirmed } = await Swal.fire({
        title: `⏰ ตั้งวันหมดอายุ`,
        html: `<div class="text-sm text-slate-600 mb-3">ทะเบียน <b>${escapeHtml(plate)}</b> · บ้าน ${escapeHtml(houseNo)}</div>
               <div class="grid grid-cols-2 gap-2 text-left">
                 <div><label class="block text-xs font-bold mb-1 text-slate-700">วันเริ่มใช้งาน</label>
                 <input type="date" id="swal-start" value="${new Date().toISOString().slice(0,10)}" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm"></div>
                 <div><label class="block text-xs font-bold mb-1 text-slate-700">วันหมดอายุ</label>
                 <input type="date" id="swal-end" value="${currentEndDate || ''}" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm"></div>
               </div>`,
        showCancelButton: true,
        confirmButtonText: 'บันทึก',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#6366f1',
        preConfirm: () => ({
            start: document.getElementById('swal-start').value,
            end: document.getElementById('swal-end').value
        })
    });
    if (!isConfirmed || !dates.end) return;

    try {
        // Update car_registrations
        await supabaseClient.from('car_registrations')
            .update({ start_date: dates.start || null, end_date: dates.end })
            .eq('id', carId);

        // Update allowed_cars ถ้ามี (match plate + house)
        const { data: ac } = await supabaseClient.from('allowed_cars')
            .select('id').eq('plate_number', plate).eq('house_number', houseNo).maybeSingle();
        if (ac) {
            await supabaseClient.from('allowed_cars')
                .update({ start_date: dates.start || null, end_date: dates.end, status: 'pending_update' })
                .eq('id', ac.id);
            showToast('✅ บันทึก + sync allowed_cars แล้ว', 'success');
        } else {
            showToast('✅ บันทึกแล้ว', 'success');
        }
        loadCarData();
    } catch (e) { showToast(e.message, 'error'); }
}

async function updateCarStatus(carId, status) {
    try {
        // ดึงข้อมูลรถก่อน update
        const { data: car, error: fetchErr } = await supabaseClient
            .from('car_registrations').select('*').eq('id', carId).maybeSingle();
        if (fetchErr) throw fetchErr;

        // Update status ใน car_registrations
        const { error } = await supabaseClient
            .from('car_registrations').update({ status }).eq('id', carId);
        if (error) throw error;

        // ─── ถ้า approved → upsert ลง allowed_cars ───────────────────────
        if (status === 'approved' && car) {
            // ตั้งวันหมดอายุ default = 1 ปีจากวันนี้ (ถ้ายังไม่มี)
            const today = new Date().toISOString().slice(0, 10);
            const defaultEnd = new Date();
            defaultEnd.setFullYear(defaultEnd.getFullYear() + 1);
            const defaultEndStr = defaultEnd.toISOString().slice(0, 10);

            const allowedPayload = {
                plate_number:      car.plate_number,
                house_number:      car.house_number,
                province:          car.province || null,
                status:            'pending_update',     // รอ sync ลง LPR
                list_type:         'allowlist',
                start_date:        today,
                end_date:          defaultEndStr,
                // ถ้า car_registrations มี allowed_car_id อยู่แล้ว → เก็บไว้
            };

            // ตรวจว่ามี record ใน allowed_cars อยู่แล้วไหม (match plate + house)
            const { data: existing } = await supabaseClient
                .from('allowed_cars')
                .select('id, start_date, end_date')
                .eq('plate_number', car.plate_number)
                .eq('house_number', car.house_number)
                .maybeSingle();

            if (existing) {
                // update — ไม่เปลี่ยน start/end ถ้ามีอยู่แล้ว
                await supabaseClient.from('allowed_cars').update({
                    ...allowedPayload,
                    start_date: existing.start_date || today,
                    end_date:   existing.end_date   || defaultEndStr,
                    status: 'pending_update'
                }).eq('id', existing.id);

                // sync allowed_car_id กลับไปที่ car_registrations
                await supabaseClient.from('car_registrations')
                    .update({ allowed_car_id: String(existing.id), start_date: existing.start_date, end_date: existing.end_date })
                    .eq('id', carId);
                showToast('✅ อนุมัติ + sync กับ allowed_cars แล้ว', 'success');
            } else {
                // insert ใหม่
                const { data: newAc } = await supabaseClient
                    .from('allowed_cars').insert(allowedPayload).select().maybeSingle();
                if (newAc) {
                    await supabaseClient.from('car_registrations')
                        .update({ allowed_car_id: String(newAc.id), start_date: today, end_date: defaultEndStr })
                        .eq('id', carId);
                }
                showToast('✅ อนุมัติ + เพิ่มลง allowed_cars แล้ว', 'success');
            }
        } else {
            showToast(status === 'approved' ? '✅ อนุมัติแล้ว' : '❌ ปฏิเสธแล้ว', 'success');
        }
        loadCarData();
    } catch (e) { showToast(e.message, 'error'); }
}

}

async function loadUserhomeData() {
    document.getElementById('uh-tbody').innerHTML = `<tr><td colspan="9" class="p-12 text-center text-slate-400">กำลังโหลด...</td></tr>`;
    try {
        const { data, error } = await supabaseClient
            .from('userhome')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(2000);
        if (error) throw error;

        userhomeData = data || [];
        renderUserhomeStats(userhomeData);

        // populate ซอย dropdown
        const sois = [...new Set(userhomeData.map(r => r.soi).filter(Boolean))].sort();
        const soiSel = document.getElementById('uh-soi');
        soiSel.innerHTML = '<option value="">ทุกซอย</option>' + sois.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');

        applyUserhomeFilters();
    } catch (e) {
        document.getElementById('uh-tbody').innerHTML = `<tr><td colspan="9" class="p-12 text-center text-rose-500 font-bold">${escapeHtml(e.message)}</td></tr>`;
    }
}

function renderUserhomeStats(list) {
    const total = list.length;
    const owner = list.filter(r => r.living_status === 'เจ้าของบ้าน').length;
    const resident = list.filter(r => r.living_status === 'ผู้อาศัย').length;
    const tenant = list.filter(r => r.living_status === 'ผู้เช่า').length;
    const sevenDaysAgo = Date.now() - 7 * 24 * 3600 * 1000;
    const active = list.filter(r => r.updated_at && new Date(r.updated_at).getTime() > sevenDaysAgo).length;

    document.getElementById('uh-stat-total').innerText = total.toLocaleString();
    document.getElementById('uh-stat-owner').innerText = owner.toLocaleString();
    document.getElementById('uh-stat-resident').innerText = resident.toLocaleString();
    document.getElementById('uh-stat-tenant').innerText = tenant.toLocaleString();
    document.getElementById('uh-stat-active').innerText = active.toLocaleString();
}

function applyUserhomeFilters() {
    const q = (document.getElementById('uh-search')?.value || '').toLowerCase().trim();
    const soi = document.getElementById('uh-soi')?.value || '';
    const status = document.getElementById('uh-status')?.value || '';

    userhomeFiltered = userhomeData.filter(r => {
        if (soi && r.soi !== soi) return false;
        if (status && r.living_status !== status) return false;
        if (q) {
            const haystack = [r.fullname, r.line_name, r.house_no, r.soi, r.phone, r.email, r.line_id, r.uid]
                .filter(Boolean).join(' ').toLowerCase();
            if (!haystack.includes(q)) return false;
        }
        return true;
    });
    userhomePage = 1;
    renderUserhomeTable();
}

async function saveUserhomeEdit(uid, btn) {
    const fullname = document.getElementById('uhe-fullname').value.trim();
    const houseNo  = document.getElementById('uhe-house').value.trim();
    if (!fullname) return showToast('กรุณากรอกชื่อ', 'warning');
    if (!houseNo)  return showToast('กรุณากรอกบ้านเลขที่', 'warning');

    setBtnLoading(btn, true);
    const phone = document.getElementById('uhe-phone').value.trim() || null;
    const payload = {
        fullname,
        house_no:      houseNo,
        soi:           document.getElementById('uhe-soi').value.trim() || null,
        living_status: document.getElementById('uhe-status').value,
        member_count:  parseInt(document.getElementById('uhe-members').value) || 1,
        phone,
        email:         document.getElementById('uhe-email').value.trim() || null,
        updated_at:    new Date().toISOString()
    };
    try {
        // 1️⃣ อัปเดต userhome
        const { error } = await supabaseClient.from('userhome').update(payload).eq('uid', uid);
        if (error) throw error;

        // 2️⃣ sync ไปที่ user_profiles ด้วย (ไม่ต้องรอ Sync กด)
        //    อัปเดตเฉพาะ field ที่ user_profiles อาจขาด — ไม่ทับ points/tier
        const upPayload = {
            house_no:    houseNo,
            soi:         document.getElementById('uhe-soi').value.trim() || null,
            phone:       phone,
            email:       document.getElementById('uhe-email').value.trim() || null,
            updated_at:  new Date().toISOString()
        };
        await supabaseClient
            .from('user_profiles')
            .update(upPayload)
            .eq('"userId"', uid)
            .is('house_no', null);  // fill missing เท่านั้น ไม่ทับถ้ามีอยู่แล้ว

        showToast('บันทึกสำเร็จ', 'success');
        closeModal();
        loadUserhomeData();
    } catch (e) {
        showToast(e.message, 'error');
    } finally {
        setBtnLoading(btn, false);
    }
}

function qpSetSender(id) {
    window._qpSender = id;
    document.querySelectorAll('.qp-sender').forEach(btn => {
        const active = btn.id === `qp-sender-${id}`;
        btn.classList.toggle('border-indigo-400', active);
        btn.classList.toggle('bg-indigo-50', active);
        btn.classList.toggle('border-slate-200', !active);
        btn.classList.toggle('bg-white', !active);
    });
    const cf = document.getElementById('qp-custom-fields');
    if (cf) cf.classList.toggle('hidden', id !== 'custom');
}

function qpBuildSender() {
    const id = window._qpSender || 'none';
    if (id === 'none') return null;
    if (id === 'custom') {
        const n = (document.getElementById('qp-custom-name')?.value || '').trim().slice(0, 20);
        const i = (document.getElementById('qp-custom-icon')?.value || '').trim();
        if (!n) { showToast('กรุณาใส่ชื่อ Sender', 'warning'); return undefined; }
        return { name: n, ...(i ? { iconUrl: i } : {}) };
    }
    return QP_SENDERS[id] || null;
}

function qpSetType(type) {
    window._qpType = type;
    ['text','image','flex','sticker'].forEach(t => {
        const panel = document.getElementById(`qp-panel-${t}`);
        const tab   = document.getElementById(`qp-tab-${t}`);
        if (panel) panel.classList.toggle('hidden', t !== type);
        if (tab) {
            tab.className = t === type
                ? 'qp-tab px-3 py-1.5 rounded-xl text-xs font-bold bg-indigo-500 text-white'
                : 'qp-tab px-3 py-1.5 rounded-xl text-xs font-bold bg-slate-100 text-slate-600';
        }
    });
}

async function sendQuickPush(uid, btn) {
    const type = window._qpType || 'text';
    let message;

    // ── สร้าง message object ตาม type ──────────────────────────
    if (type === 'text') {
        const text = document.getElementById('qp-text')?.value.trim();
        if (!text) return showToast('กรุณาพิมพ์ข้อความ', 'warning');
        message = { type: 'text', text };

    } else if (type === 'image') {
        const orig = document.getElementById('qp-img-orig')?.value.trim();
        if (!orig) return showToast('กรุณาใส่ URL รูปภาพ', 'warning');
        const prev = document.getElementById('qp-img-prev')?.value.trim() || orig;
        message = { type: 'image', originalContentUrl: orig, previewImageUrl: prev };

    } else if (type === 'flex') {
        const alt  = document.getElementById('qp-flex-alt')?.value.trim();
        const json = document.getElementById('qp-flex-json')?.value.trim();
        if (!alt)  return showToast('กรุณาใส่ Alt Text', 'warning');
        if (!json) return showToast('กรุณาใส่ Flex JSON', 'warning');
        let contents;
        try { contents = JSON.parse(json); }
        catch(e) { return showToast('Flex JSON ไม่ถูกต้อง: ' + e.message, 'error'); }
        message = { type: 'flex', altText: alt, contents };

    } else if (type === 'sticker') {
        const pkg = document.getElementById('qp-stk-pkg')?.value.trim();
        const sid = document.getElementById('qp-stk-id')?.value.trim();
        if (!pkg || !sid) return showToast('กรุณาใส่ Package ID และ Sticker ID', 'warning');
        message = { type: 'sticker', packageId: pkg, stickerId: sid };
    }

    if (!message) return;

    // ── เพิ่ม sender ถ้าเลือกไว้ ─────────────────────────────
    const sender = qpBuildSender();
    if (sender === undefined) return; // custom sender validation failed
    if (sender) message.sender = sender;

    setBtnLoading(btn, true);
    try {
        const res = await fetch(`${API_BASE_URL}/api/admin/audience/targeted_push`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userIds: [uid], messages: [message] })
        });
        const d = await res.json();
        if (!res.ok) throw new Error(d.error || 'ส่งไม่สำเร็จ');
        if (d.failed > 0) {
            showToast(`ส่งไม่สำเร็จ: ${(d.errors || ['unknown']).join(', ').slice(0, 100)}`, 'error');
        } else {
            showToast('✅ ส่งสำเร็จ', 'success');
            closeModal();
        }
    } catch (e) {
        showToast(e.message, 'error');
    } finally {
        setBtnLoading(btn, false);
    }
}

async function syncOneUser(uid, name) {
    showConfirmModal(
        '🔄 Sync ข้อมูลคนนี้?',
        `<b>${escapeHtml(name) || '(ไม่ระบุ)'}</b><br><br>
         <span class="text-purple-700">①</span> userhome → user_profiles: <b>fill missing only</b><br>
         <span class="text-rose-700">②</span> user_profiles → userhome: <b>overwrite</b> 🎯 <span class="text-rose-600">[master]</span><br>
         <small class="text-slate-500">user_profiles เป็น master — ค่า conflict จะถูกทับด้วยข้อมูล CRM</small>`,
        async () => {
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/audience/sync_user`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: uid })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'Sync ล้มเหลว');

                const changes = d.changes || {};
                if (Object.keys(changes).length === 0) {
                    showToast('ไม่มีอะไรต้อง sync (ข้อมูลตรงกันแล้ว)', 'info');
                } else {
                    let msg = '✓ Sync สำเร็จ';
                    if (changes.userhome_created)        msg += ' · สร้าง userhome';
                    if (changes.user_profiles_created)   msg += ' · สร้าง user_profiles';
                    if (changes.user_profiles_filled)    msg += ` · เติม profiles ${Object.keys(changes.user_profiles_filled).length} ฟิลด์`;
                    if (changes.userhome_overwritten)    msg += ` · ทับ userhome ${Object.keys(changes.userhome_overwritten).length} ฟิลด์`;
                    showToast(msg, 'success');
                    loadUserhomeData();
                }
            } catch (e) {
                showToast(e.message, 'error');
            }
        }
    );
}

// ─── Refresh LINE Profile — รายบุคคล ─────────────────────────
async function refreshOneLineProfile(btn, uid) {
    if (!uid) return;
    const icon = btn.querySelector('i');
    btn.disabled = true;
    if (icon) icon.setAttribute('data-lucide', 'loader-circle');
    lucide.createIcons();

    try {
        const res = await fetch(`${API_BASE_URL}/api/admin/users/updateProfile`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: uid })
        });

        if (!res.ok) throw new Error('LINE API ไม่ตอบสนอง');
        const d = await res.json();

        const newName = d.displayName || d.profile?.displayName;
        const newPic  = d.pictureUrl  || d.profile?.pictureUrl;

        if (newName || newPic) {
            const patch = { updated_at: new Date().toISOString() };
            if (newName) patch.line_name = newName;
            if (newPic)  patch.profile   = newPic;

            const { error } = await supabaseClient
                .from('userhome').update(patch).eq('uid', uid);
            if (error) throw error;

            // อัปเดต UI ทันทีโดยไม่ต้องรีโหลดทั้งตาราง
            const row = userhomeData.find(r => r.uid === uid);
            if (row) {
                if (newName) row.line_name = newName;
                if (newPic)  row.profile   = newPic;
            }
            // อัปเดตรูปใน row ทันที
            const imgEl = btn.closest('tr')?.querySelector('img.uh-avatar');
            if (imgEl && newPic) imgEl.src = newPic;
            const nameEl = btn.closest('tr')?.querySelector('.uh-linename');
            if (nameEl && newName) nameEl.textContent = newName;

            showToast(`✅ อัปเดต ${newName || uid} สำเร็จ`, 'success');
        } else {
            showToast('ไม่พบข้อมูล LINE Profile', 'warning');
        }
    } catch (e) {
        showToast('❌ ' + e.message, 'error');
    } finally {
        btn.disabled = false;
        if (icon) icon.setAttribute('data-lucide', 'user-check');
        lucide.createIcons();
    }
}

// ─── Refresh LINE Profile (line_name + profile) ───────────────
async function refreshUserhomeLineProfiles(btn) {
    const total = userhomeData.length;
    if (!total) return showToast('ไม่มีข้อมูล', 'warning');

    showConfirmModal(
        '🔄 อัปเดต LINE Profile',
        `จะดึงชื่อและรูปโปรไฟล์ล่าสุดจาก LINE สำหรับ <b>${total} คน</b><br>
         <small class="text-slate-500">อัปเดตเฉพาะ line_name และ profile — ไม่แตะข้อมูลบ้าน</small>`,
        async () => {
            setBtnLoading(btn, true);
            let succeeded = 0, failed = 0;

            for (let i = 0; i < userhomeData.length; i++) {
                const r = userhomeData[i];
                if (!r.uid) { failed++; continue; }
                try {
                    const res = await fetch(`${API_BASE_URL}/api/admin/users/updateProfile`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: r.uid })
                    });
                    if (res.ok) {
                        const d = await res.json();
                        const newName = d.displayName || d.profile?.displayName;
                        const newPic  = d.pictureUrl  || d.profile?.pictureUrl;
                        if (newName || newPic) {
                            const patch = { updated_at: new Date().toISOString() };
                            if (newName) patch.line_name = newName;
                            if (newPic)  patch.profile   = newPic;
                            await supabaseClient.from('userhome').update(patch).eq('uid', r.uid);
                        }
                        succeeded++;
                    } else { failed++; }
                } catch (e) { failed++; }

                if ((i + 1) % 10 === 0 || i === userhomeData.length - 1)
                    showToast(`⏳ ${i+1}/${total}...`, 'loading');
                await new Promise(r => setTimeout(r, 120));
            }

            setBtnLoading(btn, false);
            showToast(`✅ สำเร็จ ${succeeded} · ล้มเหลว ${failed}`, 'success');
            loadUserhomeData();
        }
    );
}

// ─── Export CSV ───────────────────────────────────────────────
function exportUserhomeCSV() {
    if (userhomeFiltered.length === 0) return showToast('ไม่มีข้อมูลให้ export', 'warning');

    const headers = ['created_at','uid','line_name','fullname','house_no','soi','living_status','member_count','phone','email','line_id','visit_count','updated_at'];
    const csv = [
        headers.join(','),
        ...userhomeFiltered.map(r => headers.map(h => {
            const v = r[h];
            if (v === null || v === undefined) return '';
            const s = String(v).replace(/"/g, '""');
            return /[,"\n]/.test(s) ? `"${s}"` : s;
        }).join(','))
    ].join('\n');

    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `userhome_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`ดาวน์โหลด ${userhomeFiltered.length} รายการ`, 'success');
}

function awUpdateModeUI() {
    const mode = document.querySelector('input[name="aw-mode"]:checked')?.value || 'all';
    const colors = { all: 'emerald', per_house: 'indigo', owner_only: 'rose' };
    ['all','per_house','owner_only'].forEach(m => {
        const lbl = document.getElementById(`mode-label-${m}`);
        if (!lbl) return;
        const c = colors[m];
        if (m === mode) {
            lbl.classList.add(`border-${c}-400`, `bg-${c}-50`);
            lbl.classList.remove('border-slate-200','bg-white');
        } else {
            lbl.classList.remove(`border-${c}-400`, `bg-${c}-50`);
            lbl.classList.add('border-slate-200','bg-white');
        }
    });
}

function awGetMode() { return document.querySelector('input[name="aw-mode"]:checked')?.value || 'all'; }

function awFilterByMode(users, mode) {
    if (!users || users.length === 0) return [];
    if (mode === 'per_house') {
        const first = users.find(u => !u.already_awarded);
        return first ? [first] : [];
    }
    if (mode === 'owner_only')
        return users.filter(u => !u.already_awarded && u.living_status === 'เจ้าของบ้าน');
    return users.filter(u => !u.already_awarded);
}

function awToggleAll() {
    const all = document.getElementById('aw-select-all');
    const rows = document.querySelectorAll('.aw-row-check');
    const target = all ? all.checked || ![...rows].every(r => r.checked) : true;
    rows.forEach(r => r.checked = target);
    if (all) all.checked = target;
}

async function sendAwardPoints(monthLabel, year) {
    const btn = document.getElementById('aw-send-btn');
    const checkedIdx = [...document.querySelectorAll('.aw-row-check:checked')].map(c => parseInt(c.dataset.idx));
    if (checkedIdx.length === 0) return showToast('กรุณาเลือกบ้านที่จะให้แต้ม', 'warning');

    const mode = awGetMode();
    const modeLabel = { all:'ทุกคนในบ้าน', per_house:'1 บ้าน 1 แต้ม', owner_only:'เฉพาะเจ้าของบ้าน' }[mode];

    // กรอง items ตามนโยบายก่อนส่ง
    const rawItems = checkedIdx.map(i => window._awItems[i]);
    const items = rawItems.map(item => ({
        ...item,
        registered_users: awFilterByMode(item.registered_users || [], mode)
    })).filter(i => i.registered_users.length > 0);

    const pointsOnTime = parseInt(document.getElementById('aw-pts-ontime').value) || 100;
    const pointsEarly  = parseInt(document.getElementById('aw-pts-early').value) || 150;
    const eligibleCount = items.reduce((s, i) => s + i.registered_users.length, 0);

    showConfirmModal(
        `ยืนยันให้แต้ม?`,
        `จะให้แต้ม <b>${eligibleCount}</b> สมาชิก จาก ${items.length} บ้าน · ${monthLabel} ${year}<br>
         นโยบาย: <b class="text-indigo-600">${modeLabel}</b><br><br>
         จ่ายตรงเวลา = <b class="text-emerald-600">+${pointsOnTime}</b> · ล่วงหน้า = <b class="text-amber-600">+${pointsEarly}</b>`,
        async () => {
            setBtnLoading(btn, true);
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/audience/maintenance_award`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items, monthLabel, year, pointsOnTime, pointsEarly, award_mode: mode })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'ล้มเหลว');
                showToast(d.message, 'success');
                checkPaidMembers();
            } catch (e) { showToast(e.message, 'error'); }
            finally { setBtnLoading(btn, false); }
        }
    );
}

async function saveCheckInEvent(editId) {
    const btn = document.getElementById('ck-save-btn');
    const name = document.getElementById('ck-name').value.trim();
    const code = document.getElementById('ck-code').value.trim().toUpperCase();
    if (!name) return showToast('กรุณากรอกชื่อกิจกรรม', 'warning');
    if (!code || code.length < 4) return showToast('รหัสต้องมีอย่างน้อย 4 ตัวอักษร', 'warning');

    const startsAt = localDatetimeToISO(document.getElementById('ck-start').value);
    const endsAt   = localDatetimeToISO(document.getElementById('ck-end').value);
    if (!startsAt || !endsAt) return showToast('กรุณากรอกวันเวลาให้ครบ', 'warning');
    if (new Date(endsAt) <= new Date(startsAt)) return showToast('เวลาปิดต้องหลังเวลาเริ่ม', 'warning');

    setBtnLoading(btn, true);
    const payload = {
        name, code,
        icon: document.getElementById('ck-icon').value,
        points: parseInt(document.getElementById('ck-points').value) || 50,
        location: document.getElementById('ck-location').value.trim(),
        starts_at: startsAt,
        ends_at: endsAt,
        max_checkins: parseInt(document.getElementById('ck-max').value) || null
    };
    if (!editId) payload.is_active = true;  // ตอนสร้าง default = active

    const { error } = editId
        ? await supabaseClient.from('events').update(payload).eq('id', editId)
        : await supabaseClient.from('events').insert(payload);
    setBtnLoading(btn, false);
    if (error) {
        if (error.code === '23505') return showToast('รหัสนี้ใช้ไปแล้ว กรุณาเปลี่ยน', 'error');
        if (error.code === '42P01' || (error.message?.includes('relation') && error.message?.includes('events'))) {
            return showToast('ตาราง events ไม่มีในฐานข้อมูล — ต้องรัน migration_events_checkin.sql ก่อน', 'error');
        }
        return showToast(error.message, 'error');
    }
    showToast(editId ? 'แก้ไข Event สำเร็จ' : 'สร้าง Event สำเร็จ! ลูกบ้านเช็คอินได้แล้ว', 'success');
    closeModal();
    if (!editId) switchEventTab('checkin');
    loadActiveEvents();
}

async function deleteCheckInEvent(eventId, name, checkinCount) {
    const warn = (checkinCount > 0)
        ? `<div class="mt-2 text-rose-600 font-bold">⚠️ มีคนเช็คอินแล้ว ${checkinCount} คน</div><div class="text-xs text-slate-500">การลบจะลบ <b>ประวัติเช็คอินทั้งหมด</b> (แต้มที่ให้ไปแล้วไม่ถูกถอน)</div>`
        : '<div class="text-xs text-slate-500">ยังไม่มีใครเช็คอิน ลบได้ปลอดภัย</div>';
    showConfirmModal(
        'ลบ Event?',
        `จะลบ <b>${escapeHtml(name)}</b> ถาวร${warn}`,
        async () => {
            const { error } = await supabaseClient.from('events').delete().eq('id', eventId);
            if (error) return showToast(error.message, 'error');
            showToast('ลบแล้ว', 'success');
            loadActiveEvents();
        }
    );
}

function evSelectAll(checked) {

        if (c.closest('.ev-member-row').style.display !== 'none') c.checked = checked;
    });

}

function evUpdateCount() {
    const n = document.querySelectorAll('.ev-member:checked').length;
    document.getElementById('ev-count').innerText = `(${n} คน)`;
}

function evFilterMembers() {
    const q = document.getElementById('ev-search').value.toLowerCase();
    document.querySelectorAll('.ev-member-row').forEach(row => {
        const name = (row.dataset.name || '').toLowerCase();
        row.style.display = name.includes(q) ? '' : 'none';
    });
}

async function submitEventAward() {
    const btn = document.getElementById('ev-save-btn');
    const eventName = document.getElementById('ev-name').value.trim();
    const eventDate = document.getElementById('ev-date').value;
    const points = parseInt(document.getElementById('ev-points').value);
    if (!eventName) return showToast('กรุณากรอกชื่อกิจกรรม', 'warning');
    if (!points || points <= 0) return showToast('กรุณากรอกจำนวนแต้ม', 'warning');

    const userIds = [...document.querySelectorAll('.ev-member:checked')].map(c => c.dataset.uid);
    if (userIds.length === 0) return showToast('กรุณาเลือกสมาชิกที่เข้าร่วม', 'warning');

    showConfirmModal(
        'ยืนยันให้แต้ม?',
        `<b>${escapeHtml(eventName)}</b> · ${eventDate}<br>
         ให้แต้ม <b class="text-pink-600">+${points}</b> ต่อคน × <b>${userIds.length}</b> คน
         <br><br>รวม <b class="text-pink-600">${(points * userIds.length).toLocaleString()}</b> แต้ม`,
        async () => {
            setBtnLoading(btn, true);
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/audience/event_award`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        eventName, eventDate, points, userIds,
                        eventCode: `${eventDate}-${eventName.replace(/\s+/g,'-').slice(0,30)}`
                    })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'ล้มเหลว');
                showToast(d.message, 'success');
                closeModal();
                loadEventHistory();
            } catch (e) { showToast(e.message, 'error'); }
            finally { setBtnLoading(btn, false); }
        }
    );
}

    if (isBool) {
        input = `<label class="inline-flex items-center cursor-pointer">

const pointsSettingsChanges = new Map();

function onSettingChange(key, rawVal, isBool) {
    const setting = pointsSettingsCache.find(s => s.key === key);
    if (!setting) return;

    let newVal;
    if (isBool) {
        newVal = !!rawVal;
        const lbl = document.getElementById(`ps-bool-${key}`);
        if (lbl) lbl.innerText = newVal ? 'เปิด' : 'ปิด';
    } else {
        newVal = parseInt(rawVal) || 0;
    }

    if (newVal === setting.value) {
        pointsSettingsChanges.delete(key);
    } else {
        pointsSettingsChanges.set(key, newVal);
    }

    // Highlight row
    const row = document.querySelector(`.ps-row[data-row-key="${CSS.escape(key)}"]`);
    if (row) {
        if (pointsSettingsChanges.has(key)) row.classList.add('bg-fuchsia-50');
        else row.classList.remove('bg-fuchsia-50');
    }

    // Update save bar
    const cnt = pointsSettingsChanges.size;
    document.getElementById('ps-changes-count').innerText = `${cnt} การเปลี่ยนแปลง`;
    document.getElementById('ps-savebar').classList.toggle('hidden', cnt === 0);
}

async function savePointsSettings(btn) {
    if (pointsSettingsChanges.size === 0) return;

    const updates = Array.from(pointsSettingsChanges.entries()).map(([key, value]) => ({ key, value }));
    setBtnLoading(btn, true);
    try {
        const res = await fetch(`${API_BASE_URL}/api/admin/audience/points_settings_save`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ updates })
        });
        const d = await res.json();
        if (!res.ok) throw new Error(d.error || 'save fail');
        showToast(`บันทึก ${d.saved} ค่าสำเร็จ`, 'success');
        pointsSettingsChanges.clear();
        document.getElementById('ps-savebar').classList.add('hidden');
        await loadPointsSettings();
    } catch (e) {
        showToast(e.message, 'error');
    } finally {
        setBtnLoading(btn, false);
    }
}

async function bulkLoadUserList() {
    const { data } = await supabaseClient.from('user_profiles')
        .select('userId, displayName, first_name, last_name, house_no, tier_name, points')
        .order('points', { ascending: false }).limit(2000);
    bulkAdjustUsers = data || [];

    // populate tier filter
    const tiers = [...new Set(bulkAdjustUsers.map(u => u.tier_name).filter(Boolean))];
    const tierSel = document.getElementById('bulk-filter-tier');
    if (tierSel) tierSel.innerHTML = '<option value="">-- ทุก Tier --</option>' + tiers.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');

    bulkRenderUserList();
}

function bulkRenderUserList() {
    const list = document.getElementById('bulk-user-list');
    if (!list) return;
    const q = (document.getElementById('bulk-search')?.value || '').toLowerCase().trim();
    const filtered = bulkAdjustUsers.filter(u => {
        if (!q) return true;
        const hay = (u.displayName + ' ' + (u.first_name||'') + ' ' + (u.last_name||'') + ' ' + (u.house_no||'')).toLowerCase();
        return hay.includes(q);
    });

    list.innerHTML = filtered.map(u => {
        const name = u.first_name ? `${u.first_name} ${u.last_name||''}`.trim() : u.displayName;
        const checked = bulkAdjustSelected.has(u.userId);
        return `<label class="flex items-center gap-2 px-2 py-1.5 hover:bg-orange-50 cursor-pointer">
            <input type="checkbox" class="bulk-cb w-4 h-4 accent-orange-500" data-uid="${escapeHtml(u.userId)}" ${checked ? 'checked' : ''} onchange="onBulkUserToggle(this)">
            <div class="flex-1 min-w-0">
                <div class="text-xs font-bold truncate">${escapeHtml(name)}</div>
                <div class="text-[10px] text-slate-400">${u.house_no ? '🏠 '+escapeHtml(u.house_no)+' · ' : ''}${escapeHtml(u.tier_name || '—')} · ${(u.points||0).toLocaleString()}p</div>
            </div>
        </label>`;
    }).join('');
    bulkUpdateCount();
}

function onBulkUserToggle(cb) {
    if (cb.checked) bulkAdjustSelected.add(cb.dataset.uid);
    else bulkAdjustSelected.delete(cb.dataset.uid);
    bulkUpdateCount();
}

function bulkUpdateCount() {
    const el = document.getElementById('bulk-count');
    if (el) el.innerText = bulkAdjustSelected.size;
}

function bulkSelectVisible(check) {
    document.querySelectorAll('.bulk-cb').forEach(cb => {
        cb.checked = check;
        if (check) bulkAdjustSelected.add(cb.dataset.uid);
        else bulkAdjustSelected.delete(cb.dataset.uid);
    });
    bulkUpdateCount();
}

function bulkFilterList() { bulkRenderUserList(); }

function bulkSwitchMode(mode) {
    ['select', 'csv', 'filter'].forEach(m => {
        document.getElementById(`bulk-content-${m}`).classList.toggle('hidden', m !== mode);
        const btn = document.getElementById(`bulk-mode-${m}`);
        if (btn) {
            btn.classList.toggle('bg-white', m === mode);
            btn.classList.toggle('shadow-sm', m === mode);
            btn.classList.toggle('text-slate-500', m !== mode);
        }
    });
}

async function bulkLoadCsv(event) {
    const file = event.target.files[0];
    if (!file) return;
    const text = await file.text();
    const lines = text.split(/\r?\n/).filter(Boolean);
    if (lines.length === 0) return;

    // หา column userId (case-insensitive)
    const headers = lines[0].split(',').map(s => s.trim().replace(/^["']|["']$/g, ''));
    const uidColIdx = headers.findIndex(h => /^(userid|uid|user_id)$/i.test(h));
    if (uidColIdx === -1) {
        document.getElementById('bulk-csv-info').innerHTML = '<span class="text-rose-600">❌ ไม่พบคอลัมน์ userId</span>';
        return;
    }

    const uids = [];
    for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',').map(s => s.trim().replace(/^["']|["']$/g, ''));
        const uid = cols[uidColIdx];
        if (uid && uid.startsWith('U')) uids.push(uid);
    }

    bulkAdjustSelected.clear();
    uids.forEach(u => bulkAdjustSelected.add(u));
    document.getElementById('bulk-csv-info').innerHTML = `✅ โหลด <b>${uids.length}</b> รายการ`;
    bulkUpdateCount();
}

function bulkApplyFilter() {
    const tier = document.getElementById('bulk-filter-tier').value;
    const status = document.getElementById('bulk-filter-status').value;

    bulkAdjustSelected.clear();
    bulkAdjustUsers.forEach(u => {
        if (tier && u.tier_name !== tier) return;
        // status filter ต้อง join userhome → ตอนนี้ใช้ tier+ทั้งหมดก่อน
        bulkAdjustSelected.add(u.userId);
    });
    document.getElementById('bulk-filter-count').innerText = bulkAdjustSelected.size;
}

async function runBulkAdjust(btn) {
    const points = parseInt(document.getElementById('bulk-points').value);
    const reason = document.getElementById('bulk-reason').value.trim();

    if (!points || points === 0) return showToast('กรุณากรอกแต้ม (≠ 0)', 'warning');
    if (!reason || reason.length < 3) return showToast('กรุณากรอกเหตุผล ≥3 ตัว', 'warning');
    if (bulkAdjustSelected.size === 0) return showToast('ยังไม่ได้เลือกผู้ใช้', 'warning');

    const userIds = Array.from(bulkAdjustSelected);
    const totalPoints = points * userIds.length;
    const op = points > 0 ? 'เพิ่ม' : 'หัก';

    const proceed = await new Promise(resolve => {
        showConfirmModal(
            `ยืนยัน Bulk Adjust?`,
            `<div class="text-left space-y-2">
                <div>🎯 จะ<b>${op}</b>แต้ม <b class="${points > 0 ? 'text-emerald-600' : 'text-rose-600'}">${points > 0 ? '+' : ''}${points}</b> ต่อคน</div>
                <div>👥 จำนวน: <b>${userIds.length}</b> คน</div>
                <div>💎 รวม: <b class="${points > 0 ? 'text-emerald-600' : 'text-rose-600'}">${points > 0 ? '+' : ''}${totalPoints.toLocaleString()}</b> แต้ม</div>
                <div>📝 เหตุผล: <i>${escapeHtml(reason)}</i></div>
            </div>`,
            () => resolve(true),
            () => resolve(false)
        );
    });
    if (!proceed) return;

    setBtnLoading(btn, true);
    try {
        const res = await fetch(`${API_BASE_URL}/api/admin/audience/bulk_adjust`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userIds, points, reason })
        });
        const d = await res.json();
        if (!res.ok) throw new Error(d.error || 'fail');

        showModal('✅ Bulk Adjust สำเร็จ', `<div class="text-sm space-y-1">
            <div>✅ สำเร็จ: <b class="text-emerald-600">${d.success_count || 0}</b> คน</div>
            <div>❌ ล้มเหลว: <b class="text-rose-600">${d.failed_count || 0}</b> คน</div>
            ${d.errors ? `<details class="mt-2"><summary class="text-xs cursor-pointer">ดู errors</summary><pre class="text-[10px] bg-rose-50 p-2 rounded mt-1 max-h-32 overflow-y-auto">${escapeHtml(JSON.stringify(d.errors, null, 2))}</pre></details>` : ''}
        </div>`);
        bulkAdjustSelected.clear();
    } catch (e) {
        showToast(e.message, 'error');
    } finally {
        setBtnLoading(btn, false);
    }
}

function getAffectedFromPreview(type, preview) {

                { label: 'แต้มรวมที่จะหาย', count: p.total_points || 0, unit: 'แต้ม' }
            ];

async function exportBeforeReset() {
    if (!resetState.type) return showToast('เลือกประเภท Reset ก่อน', 'warning');

    showToast('⚙️ กำลัง export...', 'info');
    try {
        // Map → ตารางที่ต้อง backup
        const tablesMap = {
            points: ['user_profiles'],
            history: ['points_history'],
            points_and_history: ['user_profiles', 'points_history']
        };
        const tables = tablesMap[resetState.type] || [];

        let allCsv = '';
        for (const t of tables) {
            const { data } = await supabaseClient.from(t).select('*').limit(5000);
            if (!data || data.length === 0) continue;
            const headers = Object.keys(data[0]);
            allCsv += `\n\n=== ${t} (${data.length} rows) ===\n`;
            allCsv += headers.join(',') + '\n';
            allCsv += data.map(r => headers.map(h => {
                const v = r[h];
                if (v === null || v === undefined) return '';
                const s = JSON.stringify(v).replace(/^"|"$/g, '');
                return /[,"\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
            }).join(',')).join('\n');
        }

        const blob = new Blob(['\uFEFF' + allCsv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `backup_${resetState.type}_${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('✓ ดาวน์โหลด backup แล้ว — สามารถ reset ได้', 'success');
    } catch (e) {
        showToast('Export ล้มเหลว: ' + e.message, 'error');
    }
}

async function executeReset(btn) {
    if (!resetState.type) return;
    const confirmVal = document.getElementById('reset-confirm-input').value;
    if (confirmVal !== 'RESET') return showToast('พิมพ์ RESET ให้ถูกต้อง', 'warning');

    const info = RESET_TYPES[resetState.type];
    setBtnLoading(btn, true);

    try {
        const res = await fetch(`${API_BASE_URL}/api/admin/audience/reset_execute`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                type: resetState.type,
                adminId: window.currentUserEmail || 'admin',
                confirmCode: 'RESET'
            })
        });
        const d = await res.json();
        if (!res.ok) throw new Error(d.error || 'reset fail');

        showModal('✅ Reset สำเร็จ', `<div class="space-y-2 text-sm">
            <div class="text-emerald-600 font-bold text-lg">${info.icon} ${info.name} → ลบสำเร็จ</div>
            <pre class="text-[11px] bg-slate-50 p-2 rounded max-h-40 overflow-y-auto">${escapeHtml(JSON.stringify(d, null, 2))}</pre>
            <div class="text-[11px] text-slate-500 mt-2">บันทึก reset log แล้ว — ตรวจสอบได้ในตาราง reset_log</div>
        </div>`);

    } catch (e) {

    } finally {

}

async function runBackfill() {
    const btn = document.getElementById('bf-run-btn');
    const limit = parseInt(document.getElementById('bf-limit').value) || 50;
    const force = document.getElementById('bf-force').checked;

    setBtnLoading(btn, true);
    document.getElementById('bf-result').innerHTML = '<div class="text-center text-slate-400 py-3 text-sm">⚙️ กำลังประมวลผล... อย่าปิดหน้านี้</div>';

    try {
        const res = await fetch(`${API_BASE_URL}/api/admin/audience/common_fees_backfill`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ limit, force })
        });
        const d = await res.json();
        if (!res.ok) throw new Error(d.error || 'backfill fail');

        document.getElementById('bf-result').innerHTML = `
            <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-4">
                <div class="font-bold text-emerald-800 mb-2">✅ ${escapeHtml(d.message)}</div>
                <div class="grid grid-cols-3 gap-2 text-center text-xs">
                    <div class="bg-white rounded-lg p-2"><div class="text-slate-500">ประมวลผล</div><div class="text-xl font-bold text-emerald-600">${d.processed}</div></div>
                    <div class="bg-white rounded-lg p-2"><div class="text-slate-500">ให้แต้ม</div><div class="text-xl font-bold text-blue-600">${d.awarded}</div></div>
                    <div class="bg-white rounded-lg p-2"><div class="text-slate-500">ล้มเหลว</div><div class="text-xl font-bold text-rose-600">${d.failed}</div></div>
                </div>
                <div class="text-center text-sm mt-2">รวมแต้มที่ให้: <b class="text-purple-600">${(d.totalPoints || 0).toLocaleString()}</b> แต้ม</div>
                ${d.errors && d.errors.length > 0 ? `<details class="mt-3"><summary class="text-xs text-rose-600 font-bold cursor-pointer">Error logs (${d.errors.length})</summary><pre class="text-[10px] text-rose-500 mt-2 bg-rose-50 p-2 rounded overflow-x-auto">${d.errors.map(e => escapeHtml(e)).join('\n')}</pre></details>` : ''}
            </div>`;
        showToast(d.message, 'success');
        // refresh list ถ้าเปิดอยู่
        if (typeof loadCommonFees === 'function' && document.getElementById('cf-result')) loadCommonFees();
    } catch (e) {
        document.getElementById('bf-result').innerHTML = `<div class="bg-rose-50 border border-rose-200 rounded-2xl p-4 text-rose-700 font-bold">${e.message}</div>`;
        showToast(e.message, 'error');
    } finally { setBtnLoading(btn, false); }
}
