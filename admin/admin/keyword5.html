        async function fetchChatMessages() {
            if (!activeChatUserId) return;

            const { data, error } = await supabaseClient.from('chat_history').select('*').eq('user_id', activeChatUserId).order('created_at', { ascending: true });
            if (!error && data) {
                chatMemoryState[activeChatUserId] = data;
                updateMemoryUsage();

                const containerEl = document.getElementById('chat-messages');
                let html = '';
                let lastDate = '';

                data.forEach(msg => {
                    const isMe = msg.role !== 'user';
                    const msgDate = new Date(msg.created_at);
                    const timeStr = msgDate.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                    const dateStr = msgDate.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });

                    if (dateStr !== lastDate) {
                        html += `<div class="flex justify-center my-3"><span class="px-3 py-1 bg-white border border-slate-100 rounded-full text-[10px] font-bold text-slate-400 shadow-sm">${dateStr}</span></div>`;
                        lastDate = dateStr;
                    }

                    if (isMe) {
                        let rawAdminName = '';
                        let rawAdminPic = '';
                        let actualMsg = msg.message || '';
                        let isBot = false;
                        let bgClass = "bg-indigo-600 text-white";
                        let borderClass = "border-transparent";
                        let textClass = "text-white";
                        // 🟢 [จุดที่ 1: เพิ่มโค้ดนี้] กำหนดว่าข้อความนี้ให้ AI เรียนรู้ได้หรือไม่ (เฉพาะข้อความธรรมดาที่แอดมินพิมพ์)
                        const showAiLearn = !isBot && actualMsg && !actualMsg.startsWith('[IMAGE]') && !actualMsg.startsWith('[FILE]') && !actualMsg.startsWith('[STICKER]');

                        if (actualMsg.startsWith('[BOT] ')) {
                            actualMsg = actualMsg.substring(6);
                            isBot = true;
                            bgClass = "bg-indigo-50";
                            textClass = "text-slate-800";
                            borderClass = "border-indigo-100";
                        } else if (actualMsg.startsWith('[ADMIN:')) {
                            const bEnd = actualMsg.indexOf('] ');
                            if (bEnd > -1) {
                                const metaAdmin = actualMsg.substring(7, bEnd);
                                const tokenSplit = metaAdmin.split('|');
                                rawAdminName = tokenSplit[0];
                                rawAdminPic = tokenSplit[1] || '';
                                actualMsg = actualMsg.substring(bEnd + 2);
                            }
                        }

                        let innerText = escapeHtml(actualMsg);
                        if (actualMsg.startsWith('[IMAGE] ')) {
                            const url = actualMsg.replace('[IMAGE] ', '').trim();
                            innerText = `<img src="${url}" class="max-w-[200px] max-h-[240px] rounded-lg mt-1 cursor-pointer object-cover shadow-sm ${isBot ? 'border border-slate-200' : 'border border-white/20'}" onclick="window.open('${url}','_blank')" />`;
                        } else if (actualMsg.startsWith('[FILE] ') || actualMsg.startsWith('[ส่งไฟล์:')) {
                            innerText = escapeHtml(actualMsg).replace(/(https?:\/\/[^\s]+)/g, `<a href="$1" target="_blank" class="underline ${isBot ? 'text-indigo-600 hover:text-indigo-800' : 'text-indigo-100 hover:text-white'} block mt-1"><i data-lucide="external-link" class="w-3 h-3 inline"></i> ดาวน์โหลดไฟล์</a>`);
                        }

                        let adminHeader = '';
                        if (isBot) {
                            adminHeader = `<div class="flex items-center gap-1.5 mb-1 justify-end px-1 w-full"><div class="bg-indigo-500 text-white rounded px-1.5 py-0.5 text-[9px] font-bold tracking-wider flex items-center gap-1"><i data-lucide="bot" class="w-3 h-3"></i> AI Auto-Reply</div></div>`;
                        } else if (rawAdminName) {
                            adminHeader = `<div class="flex items-center gap-1.5 mb-1 justify-end px-1 w-full text-[10px] font-bold text-slate-500"><i data-lucide="user-check" class="w-3 h-3 text-emerald-500"></i> ${escapeHtml(rawAdminName)}</div>`;
                        }

                        html += `
                        <div class="flex justify-end mb-4">
                            <div class="flex flex-col items-end max-w-[70%]">
                                ${adminHeader}
                                <div class="${bgClass} ${textClass} px-4 py-2.5 rounded-2xl rounded-tr-[4px] shadow-sm border ${borderClass} whitespace-pre-wrap text-[14px] leading-relaxed break-all">${innerText}</div>
                                <div class="flex items-center gap-2 mt-1">
                                    <!-- 🟢 [เพิ่มปุ่มนี้] ปุ่มกดให้ AI จำ จะแสดงก็ต่อเมื่อ showAiLearn เป็น true -->
                                    ${showAiLearn ? `<button onclick="openAiLearnModal('${encodeURIComponent(actualMsg)}')" class="text-[10px] text-fuchsia-600 bg-fuchsia-50 hover:bg-fuchsia-100 px-2 py-1 rounded-lg border border-fuchsia-100 shadow-sm flex items-center gap-1 transition-colors"><i data-lucide="brain" class="w-3 h-3"></i> ให้ AI จำ</button>` : ''}
                                    <span class="text-[10px] font-medium text-slate-400 flex items-center gap-1"><i data-lucide="check-check" class="w-3 h-3 ${isBot ? 'text-slate-300' : 'text-indigo-400'}"></i> ${timeStr}</span>
                                </div>
                            </div>
                            ${rawAdminPic && !isBot ? `<img src="${rawAdminPic}" class="w-6 h-6 rounded-full ml-2 mt-4 border border-slate-200 object-cover shadow-sm shrink-0" />` : ''}
                        </div>`;
                    } else {
                        let safeMsg = msg.message || '';
                        let innerText = escapeHtml(safeMsg);
                        let bgClass = "bg-white";
                        let pxClass = "px-4 py-2.5 shadow-sm";
                        let borderClass = "border-slate-100";

                        if (safeMsg.startsWith('[IMAGE] ')) {
                            const url = safeMsg.replace('[IMAGE] ', '').trim();
                            innerText = `<img src="${url}" class="max-w-[200px] max-h-[240px] rounded-lg mt-1 cursor-pointer object-cover shadow-sm border border-slate-200" onclick="window.open('${url}','_blank')" />`;
                        } else if (safeMsg.startsWith('[STICKER] ')) {
                            const url = safeMsg.replace('[STICKER] ', '').trim();
                            innerText = `<img src="${url}" class="max-w-[140px] max-h-[140px] object-contain drop-shadow-md" />`;
                            bgClass = "bg-transparent";
                            borderClass = "border-transparent";
                            pxClass = "pt-1";
                        }

                        const avatarEl = document.getElementById('active-chat-avatar');
                        const avatarSrc = avatarEl ? avatarEl.src : 'https://cdn-icons-png.flaticon.com/512/847/847966.png';
                        
                        html += `
                        <div class="flex justify-start mb-4">
                            <img src="${avatarSrc}" class="w-6 h-6 rounded-full mr-2 mt-auto mb-5 border border-slate-200 object-cover shadow-sm shrink-0 opacity-80" />
                            <div class="flex flex-col items-start max-w-[70%]">
                                <div class="${bgClass} text-slate-700 ${pxClass} rounded-2xl rounded-bl-[4px] border ${borderClass} whitespace-pre-wrap text-[14px] leading-relaxed break-all">${innerText}</div>
                                <span class="text-[10px] font-medium text-slate-400 mt-1 pl-1">${timeStr}</span>
                            </div>
                        </div>`;
                    }
                });

                const isScrolledToBottom = containerEl.scrollHeight - containerEl.clientHeight <= containerEl.scrollTop + 50;

                containerEl.innerHTML = html || '<div class="flex flex-col items-center justify-center h-full text-slate-400"><i data-lucide="messages-square" class="w-12 h-12 mb-3 text-slate-200"></i><p>เริ่มการสนทนา</p></div>';
                lucide.createIcons();

                if (isScrolledToBottom || !containerEl.dataset.inited) {
                    containerEl.scrollTo({ top: containerEl.scrollHeight, behavior: !containerEl.dataset.inited ? 'instant' : 'smooth' });
                    if (data.length > 0) containerEl.dataset.inited = '1';
                }
            }

            await updateReplyStatus(activeChatUserId);
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg || !activeChatUserId) return;

            input.value = '';

            const containerEl = document.getElementById('chat-messages');
            containerEl.innerHTML += `
                <div class="flex justify-end mb-2 opacity-60">
                    <div class="flex flex-col items-end max-w-[70%]">
                        <div class="bg-indigo-600 text-white px-4 py-2.5 rounded-2xl rounded-tr-[4px] shadow-sm whitespace-pre-wrap text-[14px]">${escapeHtml(msg)}</div>
                        <span class="text-[10px] font-medium text-indigo-400 mt-1 flex items-center gap-1"><i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> กำลังส่ง...</span>
                    </div>
                </div>`;
            containerEl.scrollTo({ top: containerEl.scrollHeight, behavior: 'smooth' });
            lucide.createIcons();

            try {
                const adminId = await getAdminIdentity();
                const res = await fetch(`${API_BASE_URL}/api/admin/chat/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: activeChatUserId, text: msg, adminName: adminId.name, adminPic: adminId.pic })
                });
                const result = await res.json();

                if (!res.ok) {
                    showToast(result.error || 'ส่งข้อความไม่สำเร็จ', 'error');
                } else {
                    if (result.sentVia === 'push') {
                        showToast('ส่งแล้ว (ใช้ 1 สิทธิ์ Push Message)', 'success');
                    } else {
                        showToast('ส่งแล้ว (ตอบฟรี สำเร็จ)', 'success');
                    }
                    await fetchChatMessages();
                    await fetchChatQuota();
                }
            } catch (e) {
                showToast('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์', 'error');
            } finally {
                const btn = document.getElementById('chat-send-btn');
                if (btn) btn.innerHTML = '<i data-lucide="send" class="w-5 h-5"></i>';
                lucide.createIcons();
            }
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!activeChatUserId) {
                showToast('กรุณาเลือกผู้ใช้ก่อนส่งไฟล์', 'error');
                return;
            }
            if (file.size > 20 * 1024 * 1024) {
                showToast('ขนาดไฟล์ใหญ่เกินไป (รองรับไม่เกิน 20MB)', 'error');
                return;
            }

            const btn = document.getElementById('chat-send-btn');
            const originalIcon = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>';
            btn.disabled = true;
            lucide.createIcons();

            const formData = new FormData();
            formData.append('file', file);

            try {
                showToast('กำลังอัปโหลดไฟล์ (ห้ามปิดหน้านี้)...', 'loading');
                const uploadRes = await fetch(`${API_BASE_URL}/api/admin/chat/upload`, {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadRes.json();

                if (!uploadRes.ok) throw new Error(uploadData.error || 'อัปโหลดภาพ/ไฟล์ ไม่สำเร็จ');

                const isImage = file.type.startsWith('image/');
                const messageType = isImage ? 'image' : 'file';
                const displayMsg = isImage ? `[ส่งรูปภาพ]` : `[ส่งไฟล์: ${file.name}]`;

                const containerEl = document.getElementById('chat-messages');
                containerEl.innerHTML += `
                    <div class="flex justify-end mb-2 opacity-60">
                        <div class="flex flex-col items-end max-w-[70%]">
                            <div class="bg-indigo-600 text-white px-4 py-2.5 rounded-2xl rounded-tr-[4px] shadow-sm whitespace-pre-wrap text-[14px]">
                                ${isImage ? `<i data-lucide="image" class="w-4 h-4 inline mr-1"></i>` : `<i data-lucide="file" class="w-4 h-4 inline mr-1"></i>`}
                                ${displayMsg}
                            </div>
                            <span class="text-[10px] font-medium text-indigo-400 mt-1 flex items-center gap-1"><i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> รอการส่งไปที่ LINE...</span>
                        </div>
                    </div>`;
                containerEl.scrollTo({ top: containerEl.scrollHeight, behavior: 'smooth' });
                lucide.createIcons();

                const adminId = await getAdminIdentity();
                const sendRes = await fetch(`${API_BASE_URL}/api/admin/chat/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: activeChatUserId,
                        text: displayMsg,
                        messageType: messageType,
                        fileUrl: uploadData.url,
                        fileName: uploadData.name,
                        adminName: adminId.name,
                        adminPic: adminId.pic
                    })
                });

                const sendResult = await sendRes.json();
                if (!sendRes.ok) throw new Error(sendResult.error || 'ล้มเหลวในการส่ง LINE');

                showToast(sendResult.sentVia === 'push' ? 'แชร์ไฟล์แล้ว (ใช้สิทธิ์ Push Message)' : 'แชร์ไฟล์แล้ว (แบบตอบกลับฟรี)', 'success');
                await fetchChatMessages();
                await fetchChatQuota();

            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                btn.innerHTML = originalIcon;
                btn.disabled = false;
                event.target.value = '';
                lucide.createIcons();
            }
        }

        async function quickAssignAdmin(targetName) {
            if (!targetName || !targetName.trim()) return;
            const message = document.getElementById('assign-note').value.trim();
            const modal = document.getElementById('assign-admin-modal');

            modal.classList.add('hidden');
            modal.classList.remove('flex');

            try {
                const adminId = await getAdminIdentity();
                showToast('กำลังโอนแชทให้ ' + targetName + '...', 'loading');

                const res = await fetch(`${API_BASE_URL}/api/admin/chat/assign`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: activeChatUserId,
                        userName: document.getElementById('active-chat-name').innerText,
                        assignToName: targetName.trim(),
                        assignedByName: adminId.name,
                        message: message
                    })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

        async function changeBucket(bucketId) {
            if (!bucketId) return;
            currentBucket = bucketId;
            searchQuery = "";
            currentFolderPath = [];
            document.getElementById('storage-searcher').value = "";
            renderStorageTable();
        }

        function navigateToSubfolder(folderName) {
            currentFolderPath.push(folderName);
            searchQuery = "";
            document.getElementById('storage-searcher').value = "";
            fetchAndRenderFiles();
        }

        function navigateToFolder(index) {
            if (index === -1) {
                currentFolderPath = [];
            } else {
                currentFolderPath = currentFolderPath.slice(0, index + 1);
            }
            searchQuery = "";
            document.getElementById('storage-searcher').value = "";
            fetchAndRenderFiles();
        }

        function jumpToFolder(bucketId, fullPath) {
            currentBucket = bucketId;
            const selector = document.getElementById('bucket-selector');
            if (selector) selector.value = bucketId;
            
            currentFolderPath = fullPath.split('/').filter(p => p !== '');
            searchQuery = "";
            document.getElementById('storage-searcher').value = "";
            fetchAndRenderFiles();
        }

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024, dm = decimals < 0 ? 0 : decimals, sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'], i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        async function fetchAndRenderFiles() {
            const gridContainer = document.getElementById('storage-grid');
            if (!gridContainer) return;
            
            gridContainer.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center py-16 text-gray-500"><i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4 text-indigo-500"></i><p class="font-medium animate-pulse">กำลังสืบค้นข้อมูล...</p></div>';
            lucide.createIcons();

            let allFiles = [];

            if (searchQuery) {
                const { data: buckets } = await supabaseClient.storage.listBuckets();
                if (buckets) {
                    for (const b of buckets) {
                        const { data: files } = await supabaseClient.storage.from(b.id).list('', { 
                            limit: 200, 
                            offset: 0, 
                            sortBy: { column: 'name', order: 'asc' },
                            search: searchQuery 
                        });
                        if (files) {
                            files.forEach(f => {
                                if (f.name === '.emptyFolderPlaceholder') return;
                                f.bucketId = b.id;
                                allFiles.push(f);
                            });
                        }
                    }
                }
                const bcContainer = document.getElementById('storage-breadcrumbs');
                bcContainer.innerHTML = `<span class="text-slate-500 font-bold flex items-center gap-1.5"><i data-lucide="search" class="w-4 h-4"></i> ผลการค้นหา "${searchQuery}" ทั่วทั้งระบบ</span>`;
                bcContainer.classList.remove('hidden');
            } else {
                if (!currentBucket) return;
                const pathStr = currentFolderPath.join('/');
                const opts = { limit: 1000, offset: 0, sortBy: { column: 'name', order: 'asc' } };

                const { data: files, error } = await supabaseClient.storage.from(currentBucket).list(pathStr, opts);

                if (error) {
                    gridContainer.innerHTML = `<div class="col-span-full text-center py-12 text-rose-500 font-medium bg-rose-50/50 rounded-2xl">Error: ${error.message}</div>`;
                    return;
                }
                
                if (files) {
                    files.forEach(f => {
                        if (f.name === '.emptyFolderPlaceholder') return;
                        f.bucketId = currentBucket;
                        allFiles.push(f);
                    });
                }

                const bcContainer = document.getElementById('storage-breadcrumbs');
                if (currentFolderPath.length > 0) {
                    bcContainer.classList.remove('hidden');
                    let bcHtml = `<button onclick="navigateToFolder(-1)" class="text-slate-500 hover:text-indigo-600 font-bold flex items-center gap-1.5 transition-colors"><i data-lucide="folder-tree" class="w-4 h-4"></i> Root</button>`;
                    currentFolderPath.forEach((f, i) => {
                        bcHtml += ` <i data-lucide="chevron-right" class="w-3 h-3 text-slate-300"></i> `;
                        bcHtml += `<button onclick="navigateToFolder(${i})" class="text-slate-600 hover:text-indigo-600 font-medium">${f}</button>`;
                    });
                    bcContainer.innerHTML = bcHtml;
                } else {
                    bcContainer.classList.add('hidden');
                }
            }

            if (!allFiles || allFiles.length === 0) {
               gridContainer.innerHTML = '<div class="col-span-full text-center py-16 text-slate-400 font-medium bg-slate-50/50 rounded-[2rem] border border-slate-100 shadow-inner">ไม่พบไฟล์หรือโฟลเดอร์</div>';
               return;
            }

            let html = '';
            
            allFiles.forEach(f => {
                const isFolder = f.id === null || !f.id || !f.metadata;
                let icon = isFolder ? 'folder' : 'image';
                const isImage = f.name.match(/\.(jpg|jpeg|png|webp|gif|svg)$/i);
                if (!isFolder && !isImage) icon = 'file';
                
                const pathStr = currentFolderPath.join('/');
                const finalPath = searchQuery ? f.name : (pathStr ? `${pathStr}/${f.name}` : f.name);
                const publicUrlRes = !isFolder ? supabaseClient.storage.from(f.bucketId).getPublicUrl(finalPath) : null;
                const pUrl = publicUrlRes?.data?.publicUrl;
                const shortName = f.name.split('/').pop() || f.name;

                html += `
                <div class="group relative bg-white rounded-2xl border border-slate-200/60 shadow-sm hover:shadow-xl hover:-translate-y-1 hover:border-indigo-200 transition-all duration-300 overflow-hidden flex flex-col ${isFolder || pUrl ? 'cursor-pointer' : ''}"
                    ${isFolder ? (searchQuery ? `onclick="jumpToFolder('${f.bucketId}', '${f.name}')"` : `onclick="navigateToSubfolder('${shortName}')"`) : pUrl ? `onclick="window.open('${pUrl}', '_blank')"` : ''}>
                    
                    <!-- Thumbnail Area -->
                    <div class="aspect-square bg-slate-50 relative flex items-center justify-center overflow-hidden w-full ${isFolder ? 'group-hover:bg-amber-50' : 'group-hover:bg-indigo-50/30'} transition-colors">
                        ${!isFolder && pUrl && isImage ? 
                            `<img src="${pUrl}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy" />` : 
                            `<div class="p-3.5 sm:p-4 rounded-3xl ${isFolder ? 'bg-amber-100 text-amber-500' : 'bg-indigo-100 text-indigo-500'} shadow-sm transform group-hover:scale-110 transition-transform duration-300">
                                <i data-lucide="${icon}" class="w-8 h-8 sm:w-10 sm:h-10 ${isFolder ? 'fill-amber-100' : ''}"></i>
                             </div>`
                        }
                        
                        ${!isFolder ? 
                            `<button onclick="event.stopPropagation(); deleteStorageFile('${finalPath}', '${f.bucketId}')" 
                                class="absolute top-2 right-2 p-2 bg-white/90 backdrop-blur-md rounded-xl text-slate-400 hover:text-rose-500 hover:bg-rose-50 shadow-md opacity-100 md:opacity-0 md:group-hover:opacity-100 transform md:translate-y-2 md:group-hover:translate-y-0 transition-all duration-200 border border-slate-100 hover:border-rose-100 active:scale-95 z-10" 
                                title="ลบไฟล์">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>` 
                        : ''}
                    </div>

                    <!-- Details Area -->
                    <div class="p-3.5 border-t border-slate-100 bg-white/80 backdrop-blur flex-1 flex flex-col justify-between">
                        <div class="flex items-start justify-between gap-2 mb-2">
                            <h3 class="font-bold text-slate-700 text-[13px] sm:text-[14px] leading-tight line-clamp-2 w-full break-all group-hover:text-indigo-600 transition-colors" title="${f.name}">${shortName}</h3>
                        </div>
                        <div class="flex items-center justify-between mt-auto gap-2">
                             <div class="text-[9px] sm:text-[10px] font-bold px-2 py-0.5 rounded-lg tracking-wide ${isFolder ? 'bg-amber-50 text-amber-600 border border-amber-100' : 'bg-indigo-50/50 text-indigo-500 border border-indigo-100 uppercase'} truncate max-w-[65%]">
                                ${isFolder ? 'FOLDER' : (searchQuery ? f.bucketId : (f.metadata?.mimetype?.split('/')[1] || 'FILE'))}
                             </div>
                             ${!isFolder ? `<span class="text-[10px] sm:text-xs text-slate-400 font-medium font-mono bg-slate-50 px-1.5 py-0.5 rounded border border-slate-100">${formatBytes(f.metadata?.size, 0)}</span>` : ''}
                        </div>
                    </div>
                </div>
                `;
            });
            
            gridContainer.innerHTML = html;
            lucide.createIcons();
        }

        function deleteStorageFile(filePath, bucketId) {
            const fileName = filePath.split('/').pop();
            const targetBucket = bucketId || currentBucket;
            showConfirmModal('ลบไฟล์ (Delete File)', `คุณแน่ใจหรือไม่ที่ต้องการลบไฟล์ <b class="font-mono text-rose-500">${fileName}</b> จาก <b>${targetBucket}</b> ? การลบนี้จะไม่สามารถกู้คืนได้`, async () => {
                showToast('กำลังลบไฟล์...', 'loading');
                const { error } = await supabaseClient.storage.from(targetBucket).remove([filePath]);
                if (error) {
                    showToast(`ข้อผิดพลาด: ${error.message}`, 'error');
                } else {
                    showToast('ลบไฟล์เรียบร้อยแล้ว', 'success');
                    fetchAndRenderFiles();
                }
            });
        }

        async function handleDataAISubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            setBtnLoading(btn, true);

            const content = e.target.content.value.trim();

        // 3. 📥 Import / Export Data AI (CSV)
        async function exportDataAiCsv() {
            showToast('กำลังเตรียมไฟล์ CSV...', 'loading');
            const { data } = await supabaseClient.from('dataai').select('content');
            if(!data || data.length === 0) return showToast('ไม่มีข้อมูลให้ Export', 'error');
            
            let csv = '\uFEFFContent\n'; // UTF-8 BOM
            data.forEach(d => { csv += `"${(d.content || '').replace(/"/g, '""')}"\n`; });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `DataAI_Export_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            showToast('ดาวน์โหลดเรียบร้อย', 'success');
        }

        function triggerImportCsv() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    showToast('กำลังนำเข้าข้อมูล กรุณารอสักครู่...', 'loading');
                    const text = event.target.result;
                    const rows = text.split('\n').filter(r => r.trim());
                    let successCount = 0;
                    
                    // Skip header (i=1)
                    for (let i = 1; i < rows.length; i++) {
                        let content = rows[i].replace(/^"|"$/g, '').replace(/""/g, '"').trim();
                        if (content) {
                            await supabaseClient.from('dataai').insert([{ content }]);
                            successCount++;
                        }
                    }
                    showToast(`นำเข้าสำเร็จ ${successCount} รายการ!`, 'success');
                    if (currentView === 'dataai') renderDataAIView();
                };
                reader.readAsText(file);
            };
            input.click();
        }

        async function loadTickets() {
            const { data } = await supabaseClient.from('system_settings').select('value').eq('key', 'kanban_data').maybeSingle();
            kanbanTickets = data?.value?.tickets || [];
            
            document.getElementById('col-todo').innerHTML = '';
            document.getElementById('col-doing').innerHTML = '';
            document.getElementById('col-done').innerHTML = '';
            
            let counts = { todo: 0, doing: 0, done: 0 };

            const priorityConfig = {
                high:   { label: 'สูง',    cls: 'bg-rose-100 text-rose-600 border-rose-200',     dot: 'bg-rose-500',    borderL: 'border-l-rose-500' },
                medium: { label: 'ปานกลาง', cls: 'bg-amber-100 text-amber-600 border-amber-200',   dot: 'bg-amber-400',   borderL: 'border-l-amber-400' },
                low:    { label: 'ต่ำ',    cls: 'bg-emerald-100 text-emerald-600 border-emerald-200', dot: 'bg-emerald-400', borderL: 'border-l-emerald-400' },
            };
            const statusBorder = { todo: 'border-l-rose-500', doing: 'border-l-amber-500', done: 'border-l-emerald-500' };

            kanbanTickets.forEach(t => {
                counts[t.status]++;
                const p = priorityConfig[t.priority] || priorityConfig.medium;
                const borderColor = t.priority ? p.borderL : statusBorder[t.status];
                const dueDateHtml = t.dueDate ? (() => {
                    const diff = Math.ceil((new Date(t.dueDate) - new Date()) / 86400000);
                    const overdue = diff < 0;
                    const soon = diff >= 0 && diff <= 2;
                    const cls = overdue ? 'text-rose-500 bg-rose-50 border-rose-200' : soon ? 'text-amber-600 bg-amber-50 border-amber-200' : 'text-slate-500 bg-slate-50 border-slate-200';
                    const label = overdue ? `เกินกำหนด ${Math.abs(diff)} วัน` : diff === 0 ? 'วันนี้!' : `${diff} วัน`;
                    return `<span class="text-[10px] font-bold px-2 py-0.5 rounded-lg border ${cls} flex items-center gap-1"><i data-lucide="calendar-clock" class="w-3 h-3"></i>${label}</span>`;
                })() : '';

                const el = document.createElement('div');
                el.id = `ticket-${t.id}`;
                el.className = `bg-white dark:bg-slate-700 p-4 rounded-2xl shadow-sm border border-slate-200 cursor-move hover:shadow-lg transition-all relative group active:cursor-grabbing border-l-4 ${borderColor} select-none`;
                el.draggable = true;
                el.ondragstart = (e) => { e.dataTransfer.setData("text/plain", t.id); };
                el.innerHTML = `
                    <div class="flex items-start justify-between gap-2 mb-2">
                        <div class="font-bold text-slate-800 text-sm leading-snug flex-1">${escapeHtml(t.title)}</div>
                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                            <button onclick="editTicket('${t.id}')" class="p-1.5 text-slate-400 hover:text-indigo-500 hover:bg-indigo-50 rounded-lg transition-colors"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
                            <button onclick="deleteTicket('${t.id}')" class="p-1.5 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                        </div>
                    </div>
                    ${t.desc ? `<div class="text-xs text-slate-500 line-clamp-2 mb-3 leading-relaxed">${escapeHtml(t.desc)}</div>` : ''}
                    ${t.assignee ? `<div class="text-xs text-slate-500 flex items-center gap-1.5 mb-2"><div class="w-5 h-5 rounded-full bg-gradient-to-tr from-indigo-400 to-violet-400 flex items-center justify-center text-white text-[9px] font-bold shrink-0">${escapeHtml(t.assignee.charAt(0).toUpperCase())}</div><span class="truncate">${escapeHtml(t.assignee)}</span></div>` : ''}
                    <div class="flex items-center justify-between pt-2.5 border-t border-slate-100 mt-1 gap-2 flex-wrap">
                        <div class="flex items-center gap-1.5 flex-wrap">
                            <span class="text-[10px] text-slate-400 font-mono bg-slate-50 px-1.5 py-0.5 rounded-md border border-slate-100">#${t.id.substring(0,6)}</span>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-lg border ${p.cls} flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full ${p.dot} inline-block"></span>${p.label}</span>
                        </div>
                        ${dueDateHtml}
                    </div>
                `;
                document.getElementById(`col-${t.status}`)?.appendChild(el);
            });

            document.getElementById('count-todo').innerText = counts.todo;
            document.getElementById('count-doing').innerText = counts.doing;
            document.getElementById('count-done').innerText = counts.done;
            lucide.createIcons();
        }

            const assignee = document.getElementById('tk-assignee').value.trim();
            const dueDate  = document.getElementById('tk-duedate').value;

            setBtnLoading(btn, true);

                const t = kanbanTickets.find(x => x.id === editId);
                if (t) Object.assign(t, { title, desc: document.getElementById('tk-desc').value.trim(), priority, status, assignee, dueDate });
            } else {
                kanbanTickets.push({ id: Date.now().toString(), title, desc: document.getElementById('tk-desc').value.trim(), priority, status, assignee, dueDate });

            await saveTickets();
            await loadTickets();

                                <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg text-xs font-bold border border-emerald-200">🔍 พบข้อมูลอ้างอิง ${dbKnowledge.length} รายการ</span>

                        `;

                    btn.innerHTML = `<i data-lucide="play" class="w-5 h-5"></i> วิเคราะห์การตอบกลับ`;

        function filterGaps(status) {
            document.querySelectorAll('.gap-tab').forEach(t => {
                t.classList.remove('border-b-2', 'border-rose-500', 'border-emerald-500', 'border-slate-500', 'text-rose-600', 'text-emerald-600', 'text-slate-700');
                t.classList.add('text-slate-500');
            });
            const activeTab = document.getElementById(`gap-tab-${status}`);
            if (activeTab) {
                activeTab.classList.remove('text-slate-500');
                if (status === 'pending') activeTab.classList.add('border-b-2', 'border-rose-500', 'text-rose-600');
                if (status === 'added')   activeTab.classList.add('border-b-2', 'border-emerald-500', 'text-emerald-600');
                if (status === 'wontfix') activeTab.classList.add('border-b-2', 'border-slate-500', 'text-slate-700');
            }

            const filtered = (window._allGaps || []).filter(g => g.status === status);
            const list = document.getElementById('gap-list');

            if (filtered.length === 0) {
                list.innerHTML = `<div class="p-10 text-center text-slate-400 text-sm">ไม่มีข้อมูล</div>`;
                return;
            }

            list.innerHTML = filtered.map(g => `
                <div class="p-5 hover:bg-white/50 transition-colors group" data-gap-id="${g.id}" data-question="${escapeHtml(g.question || '').replace(/"/g, '&quot;')}">

                            <div class="text-slate-800 font-medium leading-relaxed">${escapeHtml(g.question)}</div>

                                <button onclick="updateGapStatus(${g.id}, 'wontfix')" class="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs font-bold rounded-xl hover:bg-slate-200 transition-all">ไม่เพิ่ม</button>

                                <button onclick="updateGapStatus(${g.id}, 'pending')" class="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs font-bold rounded-xl hover:bg-slate-200 transition-all">ย้อน</button>

        async function saveGapToKB(gapId, originalQuestion) {
            const btn = document.getElementById('gap-save-btn');
            const answer = document.getElementById('gap-kb-content').value.trim();
            if (!answer) return showToast('กรุณาเขียนคำตอบ', 'warning');
            setBtnLoading(btn, true);

            // รวมคำถาม+คำตอบเป็น content เดียว (dataai มีแค่ column content)
            const content = `Q: ${originalQuestion}\nA: ${answer}`;
            const { error: insErr } = await supabaseClient.from('dataai').insert({ content });
            if (insErr) { setBtnLoading(btn, false); return showToast(insErr.message, 'error'); }

            await supabaseClient.from('ai_gaps').update({ status: 'added' }).eq('id', gapId);
            showToast('เพิ่มลง KB สำเร็จ! แนะนำให้กด Regenerate Embeddings ที่หน้าคลังความรู้', 'success');
            closeModal();
            renderAiGapsView();
        }

        function toggleTagChip(btn) {
            const tag = btn.dataset.tag;
            const idx = window._selectedTags.indexOf(tag);
            if (idx === -1) {
                window._selectedTags.push(tag);
                btn.classList.remove('bg-slate-50', 'text-slate-600', 'border-slate-200');
                btn.classList.add('bg-blue-500', 'text-white', 'border-blue-500');
            } else {
                window._selectedTags.splice(idx, 1);
                btn.classList.add('bg-slate-50', 'text-slate-600', 'border-slate-200');
                btn.classList.remove('bg-blue-500', 'text-white', 'border-blue-500');
            }
            document.getElementById('tag-count').innerText = window._selectedTags.length;
            document.getElementById('push-btn').disabled = window._selectedTags.length === 0;
        }

        async function sendTargetedPush() {
            const tags = window._selectedTags || [];
            const message = document.getElementById('push-message').value.trim();
            const match = document.querySelector('input[name="match"]:checked')?.value || 'any';
            if (!message) return showToast('กรุณาพิมพ์ข้อความ', 'warning');

            showConfirmModal('ยืนยันการส่ง?', `จะส่งข้อความไปยัง user ที่มี tags (${match === 'all' ? 'ครบทุก' : 'อย่างน้อย 1'}): ${tags.join(', ')}`, async () => {
                const btn = document.getElementById('push-btn');
                setBtnLoading(btn, true);
                try {
                    const res = await fetch(`${API_BASE_URL}/api/admin/audience/targeted_push`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tags, match, messages: [{ type: 'text', text: message }] })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'ส่งไม่สำเร็จ');
                    showToast(`ส่งสำเร็จ ${data.sent} คน (เลือกได้ ${data.targetedUsers} คน)`, 'success');
                    document.getElementById('push-message').value = '';
                } catch (e) { showToast(e.message, 'error'); }
                finally { setBtnLoading(btn, false); }
            });
        }

                const total = Object.values(tierCount).reduce((a, b) => a + b, 0) || 1;
                const tierColorMap = { Member:'bg-slate-500', Silver:'bg-slate-300', Gold:'bg-amber-400', Platinum:'bg-indigo-300' };
                document.getElementById('tier-distribution').innerHTML = Object.entries(tierCount)
                    .sort((a, b) => b[1] - a[1])
                    .map(([name, count]) => {
                        const pct = Math.round((count / total) * 100);
                        return `<div class="mb-3"><div class="flex justify-between text-sm mb-1">
                            <span class="font-bold text-slate-700">${escapeHtml(name)}</span>
                            <span class="text-slate-500">${count} คน (${pct}%)</span></div>
                            <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full ${tierColorMap[name] || 'bg-slate-400'}" style="width:${pct}%"></div>
                            </div></div>`;
                    }).join('') || '<p class="text-sm text-slate-400">ยังไม่มีข้อมูล tier</p>';

                // recent activities
                document.getElementById('recent-points').innerHTML = (recent || []).map(r => {
                    const d = r.points_delta ?? 0;
                    const cls = d >= 0 ? 'text-emerald-600 bg-emerald-50' : 'text-rose-600 bg-rose-50';
                    const sign = d > 0 ? '+' : '';
                    return `<div class="flex items-center gap-3 p-2.5 rounded-xl hover:bg-slate-50 transition-colors">
                        <span class="text-xs font-bold ${cls} px-2.5 py-1 rounded-lg min-w-[60px] text-center">${sign}${d}</span>
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-medium text-slate-700 truncate">${escapeHtml(r.reason || '—')}</div>
                            <div class="text-[11px] text-slate-400 font-mono truncate">${(r.user_id||'').substring(0,12)}... · ${new Date(r.created_at).toLocaleString('th-TH')}</div>
                        </div></div>`;
                }).join('') || '<p class="text-sm text-slate-400 text-center py-4">ยังไม่มีกิจกรรม</p>';

            } catch (e) { showToast('โหลดข้อมูลล้มเหลว: ' + e.message, 'error'); }
            lucide.createIcons();
        }

        async function loadVillageMap() {
            const container = document.getElementById('map-container');
            const month = document.getElementById('map-month')?.value;
            const year  = parseInt(document.getElementById('map-year')?.value || 0);
            if (!container || !month || !year) return;
            container.innerHTML = '<div class="text-center py-12 text-slate-400">กำลังโหลด...</div>';
            document.getElementById('map-info').classList.add('hidden');
            document.getElementById('map-stats').classList.add('hidden');
            window._mapData = {};

            const [{ data: payments }, { data: homes }] = await Promise.all([
                supabaseClient.from('house_payments').select('house_numbe, soi, owner_name, ' + month).eq('year', year),
                supabaseClient.from('userhome').select('uid, house_no, soi, fullname, line_name, living_status, phone, profile'),
            ]);

            if (!payments?.length) { container.innerHTML = '<div class="text-center py-12 text-slate-400">ไม่พบข้อมูลปี ' + year + '</div>'; return; }

            const norm = s => (s||'').toString().replace(/\s+/g,'').toLowerCase();
            const homeMap = {};
            (homes||[]).forEach(h => { homeMap[norm(h.house_no)] = h; });

            const PAID = ['จ่ายแล้ว','ล่วงหน้า'];
            const getCol = st => {
                if (st === 'จ่ายแล้ว') return { bg:'#dcfce7', bd:'#16a34a', tx:'#166534', dot:'#22c55e' };
                if (st === 'ล่วงหน้า') return { bg:'#fef9c3', bd:'#d97706', tx:'#78350f', dot:'#f59e0b' };
                if (!st)               return { bg:'#f1f5f9', bd:'#94a3b8', tx:'#475569', dot:'#cbd5e1' };
                return { bg:'#fee2e2', bd:'#dc2626', tx:'#7f1d1d', dot:'#ef4444' };
            };

            const soiMap = {};
            (payments||[]).forEach(p => {
                const soi = (p.soi||'').trim() || 'ไม่ระบุ';
                if (!soiMap[soi]) soiMap[soi] = [];
                const status = (p[month]||'').trim();
                const home = homeMap[norm(p.house_numbe)] || {};
                const key = 'k' + soiMap[soi].length + '_' + soi.replace(/\W/g,'');
                const data = { key, house_no:p.house_numbe, owner:p.owner_name||home.fullname||home.line_name||'—',
                    status, uid:home.uid||null, profile:home.profile||null,
                    living_status:home.living_status||'', phone:home.phone||'', line_name:home.line_name||'' };
                window._mapData[key] = data;
                soiMap[soi].push(data);
            });

            Object.values(soiMap).forEach(arr => arr.sort((a,b) => {
                const na = parseInt((a.house_no||'').split('/')[1]||0);
                const nb = parseInt((b.house_no||'').split('/')[1]||0);
                return na - nb;
            }));

            // Layout ตามแผนผังจริง — ถนนกลางแบ่งซ้าย/ขวา
            const LAYOUT = [
                { label:'ฝั่งซ้าย (3L/3K/3J)', sois:['3L','3K','3J'], border:'right:2px solid #94a3b8' },
                { label:'', sois:[], road:true },
                { label:'กลาง (3H/3G/3F)', sois:['3H','3G','3F'], border:'right:1px dashed #cbd5e1' },
                { label:'กลาง (3D/3B)', sois:['3D','3B'], border:'right:1px dashed #cbd5e1' },
                { label:'ฝั่งขวา (3E/3C/3A)', sois:['3E','3C','3A','3'], border:'' },
            ];

            const allLayout = LAYOUT.flatMap(l => l.sois);
            const others = Object.keys(soiMap).filter(s => !allLayout.includes(s)).sort();
            if (others.length) LAYOUT.push({ label:'อื่นๆ', sois:others, border:'' });

            const makeCell = h => {
                const c = getCol(h.status);
                return '<div data-key="' + escapeHtml(h.key) + '" onclick="mapClickHouse(this.dataset.key)" style="' +
                    'background:' + c.bg + ';border:1.5px solid ' + c.bd + ';color:' + c.tx + ';' +
                    'cursor:pointer;border-radius:6px;padding:3px 5px;margin:2px;min-width:60px;max-width:72px;' +
                    'text-align:center;position:relative;transition:transform 0.1s,box-shadow 0.1s' +
                    '" onmouseover="this.style.transform=\'scale(1.1)\';this.style.boxShadow=\'0 2px 8px rgba(0,0,0,0.2)\'"' +
                    ' onmouseout="this.style.transform=\'\';this.style.boxShadow=\'\'">'+
                    (h.uid ? '<span style="position:absolute;top:2px;left:2px;width:5px;height:5px;border-radius:50%;background:#3b82f6"></span>' : '') +
                    '<div style="font-size:9px;font-weight:700;line-height:1.2">' + escapeHtml(h.house_no) + '</div>' +
                    '<div style="font-size:8px;opacity:0.7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml((h.owner||'').substring(0,6)) + '</div>' +
                    '</div>';
            };

            const makeSoi = soiName => {
                const arr = soiMap[soiName] || [];
                if (!arr.length) return '';
                return '<div style="margin-bottom:5px">' +
                    '<div style="font-size:10px;font-weight:700;color:#334155;margin-bottom:2px">' + escapeHtml(soiName) + ' <span style="color:#94a3b8;font-weight:400">' + arr.length + '</span></div>' +
                    '<div style="display:flex;flex-wrap:wrap">' + arr.map(makeCell).join('') + '</div></div>';
            };

            container.innerHTML = '<div style="display:flex;gap:0;min-width:700px">' +
                LAYOUT.map(col => {
                    if (col.road) return '<div style="width:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center">' +
                        '<div style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:9px;font-weight:700;color:#64748b;letter-spacing:2px">ถนน</div></div>';
                    return '<div style="flex:1;min-width:130px;padding:0 6px;border-style:solid;border-color:transparent;border-width:0;' + col.border + '">' +
                        '<div style="font-size:10px;font-weight:700;color:#64748b;text-align:center;margin-bottom:6px;padding:2px 4px;background:#f1f5f9;border-radius:5px">' + col.label + '</div>' +
                        col.sois.map(makeSoi).join('') + '</div>';
                }).join('') + '</div>';

            // สถิติ
            const all = Object.values(window._mapData);
            const st = document.getElementById('map-stats');
            st.className = 'grid grid-cols-4 gap-2 mt-3';
            const nPaid   = all.filter(h => PAID.includes(h.status)).length;
            const nUnpaid = all.filter(h => h.status && !PAID.includes(h.status)).length;
            const nNoData = all.filter(h => !h.status).length;
            const nLine   = all.filter(h => h.uid).length;
            st.innerHTML = [
                ['#dcfce7','#16a34a','check',nPaid,'จ่ายแล้ว'],
                ['#fee2e2','#dc2626','alert-triangle',nUnpaid,'ค้างชำระ'],
                ['#f1f5f9','#64748b','minus',nNoData,'ไม่มีข้อมูล'],
                ['#eff6ff','#2563eb','message-circle',nLine,'มี LINE'],
            ].map(([bg,col,icon,val,lbl]) =>
                '<div style="background:' + bg + ';border:1px solid ' + col + ';border-radius:12px;padding:10px;text-align:center">' +
                '<i data-lucide="' + icon + '" style="width:20px;height:20px;color:' + col + ';margin:0 auto 4px"></i>' +
                '<div style="font-size:22px;font-weight:700;color:' + col + '">' + val + '</div>' +
                '<div style="font-size:11px;font-weight:600;color:' + col + '">' + lbl + '</div></div>'
            ).join('');
            st.classList.remove('hidden');
            lucide.createIcons();
        }

        async function loadInvoiceList() {
            const el = document.getElementById('invoice-list');
            if (!el) return;
            el.innerHTML = '<div class="text-center py-8 text-slate-400">⏳ กำลังโหลด...</div>';

            // โหลด payment_settings
            const { data: ps } = await supabaseClient.from('payment_settings').select('key,value');
            const cfg = {};
            (ps||[]).forEach(r => { cfg[r.key] = r.value; });

            const month  = document.getElementById('inv-month')?.value;   // เช่น 'jun'
            const year   = document.getElementById('inv-year')?.value;    // พ.ศ. เช่น '2569'
            const filter = document.getElementById('inv-filter')?.value || 'unpaid';
            // house_payments เก็บปีเป็น พ.ศ. ตรงๆ ไม่ต้องแปลง
            const yearVal = parseInt(year);
            const monthLabel = TH_MONTHS.find(m => m.col === month)?.label || month;

            // โหลด house_payments ของปีนั้น
            const { data: payments, error: payErr } = await supabaseClient
                .from('house_payments')
                .select('house_numbe, soi, owner_name, year, ' + month)
                .eq('year', yearVal);

            if (payErr) {
                el.innerHTML = '<div class="glass rounded-3xl p-8 text-center text-rose-500">❌ โหลดข้อมูลไม่ได้: ' + escapeHtml(payErr.message) + '</div>';
                return;
            }

            // แยกบ้านที่จ่ายแล้ว / ค้างชำระ
            const paid_statuses = ['จ่ายแล้ว', 'ล่วงหน้า'];
            const paidSet   = new Set();
            const unpaidList = [];
            const allPayMap = {};

            (payments||[]).forEach(p => {
                const val = (p[month]||'').toString().trim();
                allPayMap[p.house_numbe] = val;
                if (paid_statuses.includes(val)) paidSet.add(p.house_numbe);
                else unpaidList.push(p);
            });

            // โหลด userhome เพื่อ join LINE uid
            const { data: homes } = await supabaseClient
                .from('userhome').select('uid, house_no, soi, fullname, line_name, phone');
            const homeMap = {};
            const homeMapNorm = {}; // normalized key สำหรับ fuzzy match
            const norm = s => (s||'').toString().replace(/\s+/g,'').toLowerCase();
            (homes||[]).forEach(h => {
                homeMap[h.house_no] = h;
                homeMapNorm[norm(h.house_no)] = h;
            });
            const findHome = key => homeMap[key] || homeMapNorm[norm(key)] || null;

            // กรองตาม filter
            let list;
            if (filter === 'unpaid') {
                // บ้านที่ค้างชำระเดือนนี้ = ค่าไม่ใช่ "จ่ายแล้ว" และไม่ใช่ "ล่วงหน้า"
                list = unpaidList.map(p => ({
                    house_no:  p.house_numbe,
                    soi:       p.soi,
                    owner_name: p.owner_name,
                    status:    p[month] || 'ยังไม่จ่าย',
                    uid:       findHome(p.house_numbe)?.uid || null,
                    fullname:  findHome(p.house_numbe)?.fullname || findHome(p.house_numbe)?.line_name || p.owner_name || '—',
                    phone:     findHome(p.house_numbe)?.phone || null,
                    line_name: findHome(p.house_numbe)?.line_name || null,
                }));
            } else {
                list = (payments||[]).map(p => ({
                    house_no:  p.house_numbe,
                    soi:       p.soi,

        function invToggleAll() {
            const main = document.getElementById('inv-select-all') || document.getElementById('inv-th-check');
            const rows = document.querySelectorAll('.inv-row-check:not(:disabled)');
            const check = main?.checked ?? true;
            rows.forEach(r => r.checked = check);
            // sync ทั้งสอง checkbox header
            ['inv-select-all','inv-th-check'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.checked = check;
            });
            invUpdateCount();
        }

        function invUpdateCount() {
            const selected = [...document.querySelectorAll('.inv-row-check:checked')];
            const countEl = document.getElementById('inv-selected-count');
            if (countEl) {
                if (selected.length === 0) {
                    countEl.textContent = '— ยังไม่ได้เลือก';
                } else {
                    const cfg = window._invCfg || {};
                    const amount = parseFloat(cfg.amount||'0');
                    const payMap = window._invPayMap || {};
                    const allCols = TH_MONTHS.map(m=>m.col);
                    const total = selected.reduce((sum, cb) => {
                        const h = window._invHomes[parseInt(cb.dataset.idx)];
                        const p = payMap[h?.house_no]||{};
                        return sum + allCols.filter(c=>!p[c]).length * amount;
                    }, 0);
                    countEl.textContent = 'เลือก ' + selected.length + ' บ้าน · ยอดรวม ' + total.toLocaleString() + ' บาท';
                }
            }
        }

        async function sendSelectedInvoicesLine(btn) {
            const selected = [...document.querySelectorAll('.inv-row-check:checked')];
            if (!selected.length) return showToast('เลือกบ้านที่ต้องการส่งก่อน', 'warning');
            const monthLabel = TH_MONTHS.find(m=>m.col===window._invMonth)?.label || window._invMonth;
            showConfirmModal(
                '📤 ส่ง LINE ที่เลือก?',
                'ส่งใบแจ้งหนี้ให้ <b>' + selected.length + '</b> บ้าน · งวด ' + monthLabel,
                async () => {
                    setBtnLoading(btn, true);
                    let ok=0, fail=0;
                    for (const cb of selected) {
                        const idx = cb.dataset.idx;
                        try { await sendInvoiceLine(idx, null); ok++; }
                        catch(_) { fail++; }
                        await new Promise(r => setTimeout(r, 200));
                        if ((ok+fail) % 5 === 0)
                            showToast('⏳ ' + (ok+fail) + '/' + selected.length + '...', 'info');
                    }
                    setBtnLoading(btn, false);
                    showToast('✅ ส่งสำเร็จ ' + ok + ' · ล้มเหลว ' + fail, 'success');
                }
            );
        }

        async function invSelectAllAndSend(btn) {
            // เลือกทุกบ้านที่มี LINE แล้วส่ง
            const rows = document.querySelectorAll('.inv-row-check:not(:disabled)');
            if (!rows.length) {
                await loadInvoiceList();
                showToast('โหลดรายการแล้ว เลือกบ้านที่ต้องการแล้วกด "ส่ง LINE ที่เลือก"', 'info');
                return;
            }
            rows.forEach(r => r.checked = true);
            invUpdateCount();
            await sendSelectedInvoicesLine(btn);
        }

            const selected = [...document.querySelectorAll('.inv-row-check:checked')];

            for (const cb of selected) {
                await downloadInvoicePDF(cb.dataset.idx);
                await new Promise(r => setTimeout(r, 600));

            showToast('✅ เปิดครบ ' + selected.length + ' หน้าต่าง · กด พิมพ์ ในแต่ละหน้า', 'success');
        }

            return {

                total:       amount,  // 1 เดือน = 1 ยอด

                monthLabel,
                issueDate,
                dueDayNum,
                villageName: cfg.village_name  || 'Golden Land Serene',

                    }
                };

                // ใช้ push API โดยตรง (1 user = pushMessage ไม่ใช่ multicast)
                const res = await fetch(API_BASE_URL + '/api/admin/audience/targeted_push', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },

                if (rd.failed > 0) throw new Error('LINE ปฏิเสธ: ' + JSON.stringify(rd.errors || rd));

                if (btn) btn.disabled = false;
            }

        async function sendAllInvoices(btn) {
            const list = window._invHomes;
            if (!list?.length) return showToast('โหลดรายการก่อน','warning');
            showConfirmModal('📤 ส่ง LINE ทุกบ้านที่ค้าง?','จะส่งใบแจ้งหนี้ให้ <b>'+list.length+'</b> บ้าน',
                async () => {
                    setBtnLoading(btn,true);
                    let ok=0,fail=0;
                    for (let i=0;i<list.length;i++) {
                        if (!list[i].uid){fail++;continue;}
                        try { await sendInvoiceLine(i,null); ok++; } catch(_){fail++;}
                        if((i+1)%5===0) showToast('⏳ '+(i+1)+'/'+list.length+'...','info');
                        await new Promise(r=>setTimeout(r,200));
                    }
                    setBtnLoading(btn,false);
                    showToast('✅ ส่งสำเร็จ '+ok+' · ล้มเหลว '+fail,'success');
                }
            );
        }

        function loadScript(src) {
            return new Promise((res,rej)=>{
                if(document.querySelector('script[src="'+src+'"]')){res();return;}
                const s=document.createElement('script');
                s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);
            });
        }

        async function saveReward(e, editId) {
            e.preventDefault();
            const form = e.target;
            const fd   = new FormData(form);
            const payload = {
                name:        fd.get('name'),
                description: fd.get('description') || null,
                points_cost: parseInt(fd.get('points_cost')) || 100,
                stock:       fd.get('stock') ? parseInt(fd.get('stock')) : null,
                category:    fd.get('category') || 'general',
                expires_at:  fd.get('expires_at') || null,
                terms:       fd.get('terms') || null,
                image_url:   fd.get('image_url') || null,
                is_active:   true,
                updated_at:  new Date().toISOString(),
            };
            try {
                const { error } = editId
                    ? await supabaseClient.from('rewards').update(payload).eq('id', editId)
                    : await supabaseClient.from('rewards').insert(payload);
                if (error) throw error;
                showToast(editId ? 'แก้ไขสำเร็จ' : 'เพิ่มของรางวัลสำเร็จ', 'success');
                closeModal();
                await loadRewardsAdmin();
            } catch(e) { showToast(e.message, 'error'); }
        }

            const { error } = await supabaseClient.from('rewards').update({ is_active: !currentState, updated_at: new Date().toISOString() }).eq('id', id);

            showToast(!currentState ? 'เปิดรางวัลแล้ว' : 'ปิดรางวัลแล้ว', 'success');
            await loadRewardsAdmin();
        }

        async function loadCouponsAdmin() {
            const status = document.getElementById('coupon-filter')?.value || '';
            const el     = document.getElementById('coupon-table');
            if (!el) return;
            try {
                let q = supabaseClient.from('user_coupons')
                    .select('*, reward:reward_id(name, points_cost)')
                    .order('created_at', { ascending: false }).limit(100);
                if (status) q = q.eq('status', status);
                const { data, error } = await q;
                if (error) throw error;
                const rows = data || [];
                if (!rows.length) { el.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">ไม่มีข้อมูล</div>'; return; }
                const stBadge = s => ({ active:'<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700">ยังไม่ใช้</span>', used:'<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-slate-200 text-slate-600">ใช้แล้ว</span>', expired:'<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-amber-100 text-amber-700">หมดอายุ</span>' })[s] || s;
                el.innerHTML = `<div class="overflow-x-auto"><table class="w-full text-sm">
                    <thead><tr class="text-xs text-slate-500 border-b border-slate-100">
                        <th class="text-left py-2 font-semibold">โค้ด</th>
                        <th class="text-left py-2 font-semibold">รางวัล</th>
                        <th class="text-left py-2 font-semibold">User ID</th>
                        <th class="text-left py-2 font-semibold">สถานะ</th>
                        <th class="text-left py-2 font-semibold">วันแลก</th>
                        <th class="text-left py-2 font-semibold">วันหมดอายุ</th>
                    </tr></thead>
                    <tbody>${rows.map(c => `<tr class="border-b border-slate-50 hover:bg-slate-50 transition">
                        <td class="py-2.5 font-mono font-bold tracking-widest text-amber-600">${escapeHtml(c.code)}</td>
                        <td class="py-2.5">${escapeHtml(c.reward?.name || '—')}</td>
                        <td class="py-2.5 text-xs text-slate-400 font-mono">${escapeHtml((c.user_id||'').slice(0,12))}…</td>
                        <td class="py-2.5">${stBadge(c.status)}</td>
                        <td class="py-2.5 text-slate-500">${c.created_at ? new Date(c.created_at).toLocaleString('th-TH',{timeZone:'Asia/Bangkok',dateStyle:'short',timeStyle:'short'}) : '—'}</td>
                        <td class="py-2.5 text-slate-500">${c.expires_at ? new Date(c.expires_at).toLocaleString('th-TH',{timeZone:'Asia/Bangkok',dateStyle:'short',timeStyle:'short'}) : '—'}</td>
                    </tr>`).join('')}</tbody>
                </table></div>`;
            } catch(e) { el.innerHTML = `<div class="text-center py-6 text-rose-500">${escapeHtml(e.message)}</div>`; }
        }

        async function scanCoupon() {
            const code  = document.getElementById('scan-input').value.trim().toUpperCase();
            const resEl = document.getElementById('scan-result');
            if (!code || code.length < 6) { resEl.innerHTML = '<p class="text-sm text-slate-400">กรุณาพิมพ์โค้ด 6–8 ตัว</p>'; return; }
            resEl.innerHTML = '<p class="text-sm text-slate-400">กำลังตรวจสอบ...</p>';
            try {
                const res = await fetch(`${API_BASE_URL}/api/crm/verifyCoupon`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, staffId: 'admin' })
                });
                const d = await res.json();
                if (!res.ok) {
                    resEl.innerHTML = `<div class="p-4 bg-rose-50 border border-rose-200 rounded-2xl text-rose-700 font-bold text-sm">❌ ${escapeHtml(d.error || 'ใช้ไม่ได้')}</div>`;
                } else {
                    resEl.innerHTML = `<div class="p-4 bg-emerald-50 border border-emerald-200 rounded-2xl">
                        <div class="text-emerald-700 font-bold text-base mb-1">✅ ยืนยันสำเร็จ!</div>
                        <div class="text-sm text-slate-600">🎁 ${escapeHtml(d.coupon?.reward?.name || '—')}</div>
                        <div class="text-sm text-slate-500">👤 User: ${escapeHtml((d.coupon?.user_id||'').slice(0,16))}</div>
                        <div class="text-xs text-emerald-600 mt-1 font-mono">โค้ด ${escapeHtml(code)} ถูกใช้แล้ว</div>
                    </div>`;
                    document.getElementById('scan-input').value = '';
                    await loadCouponsAdmin();
                }
            } catch(e) { resEl.innerHTML = `<div class="p-3 text-rose-600 text-sm">${escapeHtml(e.message)}</div>`; }
        }

        function schedToggleTime() {
            const t = document.getElementById('sch-stype')?.value;
            const rdw = document.getElementById('sch-runday-wrap');
            const rt  = document.getElementById('sch-runtime');
            if (!rdw || !rt) return;
            rdw.classList.toggle('hidden', t === 'once');
            rt.type = t === 'once' ? 'datetime-local' : 'time';
            rt.value = '';
        }

        function schedSetSender(id) {
            document.getElementById('sch-sender-val').value = id;
            document.querySelectorAll('.sch-sender').forEach(b => {
                const active = b.id === 'sch-sender-' + id;
                b.classList.toggle('border-blue-400', active);
                b.classList.toggle('bg-blue-50', active);
                b.classList.toggle('border-slate-200', !active);
                b.classList.toggle('bg-white', !active);
            });
        }

        function schedSetType(t) {
            document.getElementById('sch-mtype-val').value = t;
            ['text','image','flex','sticker'].forEach(tp => {
                const panel = document.getElementById('sch-panel-' + tp);
                const btn   = document.getElementById('sch-type-' + tp);
                if (panel) panel.classList.toggle('hidden', tp !== t);
                if (btn) {
                    btn.className = 'sch-type px-3 py-1.5 rounded-xl text-xs font-bold ' + (tp === t ? 'bg-blue-500 text-white' : 'bg-slate-100 text-slate-600');
                }
            });
        }

        async function loadScheduleTemplates() {
            const { data } = await supabaseClient.from('scheduled_broadcasts')
                .select('id, name, template_name, message_type, message_json, sender_id')
                .not('template_name', 'is', null).neq('template_name', '');
            const wrap = document.getElementById('sch-templates');
            const list = document.getElementById('sch-template-list');
            if (!data || !data.length) return showToast('ยังไม่มี Template', 'warning');

        async function applyTemplate(id) {
            const t = (window._schedTemplates || []).find(x => x.id === id);
            if (!t) return;
            const mj = t.message_json || {};
            const mt = t.message_type || 'text';
            // ใส่ข้อมูล template
            if (mt === 'text' && mj.text) {
                const ta = document.querySelector('#sch-panel-text textarea');
                if (ta) ta.value = mj.text;
            } else if (mt === 'flex') {
                const alt = document.querySelector('#sch-panel-flex input');
                const jsn = document.querySelector('#sch-panel-flex textarea');
                if (alt) alt.value = mj.altText || '';
                if (jsn) jsn.value = mj.contents ? JSON.stringify(mj.contents, null, 2) : '';
            } else if (mt === 'image') {
                const inputs = document.querySelectorAll('#sch-panel-image input');
                if (inputs[0]) inputs[0].value = mj.originalContentUrl || '';
                if (inputs[1]) inputs[1].value = mj.previewImageUrl    || '';
            }
            schedSetType(mt);
            schedSetSender(t.sender_id || 'none');
            showToast('โหลด Template สำเร็จ', 'success');
        }

        async function saveSchedule(e) {
            e.preventDefault();
            const fd   = new FormData(e.target);
            const editId = fd.get('edit_id') || null;
            const mt   = fd.get('message_type') || 'text';
            const sid  = fd.get('sender_id') || 'none';

            // สร้าง message_json ตาม type
            let msgJson = {};
            if (mt === 'text') {
                const text = fd.get('msg_text')?.trim();
                if (!text) return showToast('กรุณาพิมพ์ข้อความ', 'warning');
                msgJson = { type: 'text', text };
            } else if (mt === 'image') {
                const orig = fd.get('msg_img_orig')?.trim();
                if (!orig) return showToast('กรุณาใส่ URL รูปภาพ', 'warning');
                const prev = fd.get('msg_img_prev')?.trim() || orig;
                msgJson = { type: 'image', originalContentUrl: orig, previewImageUrl: prev };
            } else if (mt === 'flex') {
                const alt  = fd.get('msg_flex_alt')?.trim();
                const json = fd.get('msg_flex_json')?.trim();
                if (!alt || !json) return showToast('กรุณาใส่ Alt Text และ Flex JSON', 'warning');
                let contents;
                try { contents = JSON.parse(json); } catch(err) { return showToast('Flex JSON ไม่ถูกต้อง: ' + err.message, 'error'); }
                msgJson = { type: 'flex', altText: alt, contents };
            } else if (mt === 'sticker') {
                const pkg = fd.get('msg_stk_pkg')?.trim();
                const stk = fd.get('msg_stk_id')?.trim();
                if (!pkg || !stk) return showToast('กรุณาใส่ Package ID และ Sticker ID', 'warning');
                msgJson = { type: 'sticker', packageId: pkg, stickerId: stk };
            }

            // เพิ่ม sender ถ้าไม่ใช่ค่าเริ่มต้น (text/image/flex เท่านั้น)
            const sender = SCHEDULE_SENDERS[sid];
            if (sender && mt !== 'sticker') msgJson.sender = sender;

            const schedType = fd.get('schedule_type');
            const payload = {
                name:          fd.get('name')?.trim(),
                template_name: fd.get('template_name')?.trim() || null,
                message_type:  mt,
                message_json:  msgJson,
                sender_id:     sid,
                schedule_type: schedType,
                run_day:       parseInt(fd.get('run_day')) || 20,
                run_time:      schedType === 'monthly' ? (fd.get('run_time') || '09:00') : null,
                run_at:        schedType === 'once'    ? (fd.get('run_time') ? new Date(fd.get('run_time')).toISOString() : null) : null,
                target_type:   'all',
                status:        'pending',
                updated_at:    new Date().toISOString(),
            };

            const res = await fetch(API_BASE_URL + '/api/admin/scheduled?action=save', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(editId ? { ...payload, id: editId } : payload)
            });
            if (!res.ok) return showToast('บันทึกไม่สำเร็จ', 'error');
            showToast('✅ บันทึกสำเร็จ', 'success');
            closeModal();
            await loadScheduleList();
        }

        async function previewRichMenu(type) {
            const id = document.getElementById(type === 'member' ? 'cfg-member-richmenu' : 'cfg-default-richmenu')?.value?.trim();
            const box = document.getElementById('rm-preview-box');
            const content = document.getElementById('rm-preview-content');
            if (!id) return showToast('ใส่ Rich Menu ID ก่อน', 'warning');
            if (!box || !content) return;
            box.classList.remove('hidden');
            content.innerHTML = '⏳ กำลังโหลด...';
            try {
                // ใช้ LINE API โดยตรงผ่าน backend richmenus endpoint
                const res = await fetch(`${API_BASE_URL}/api/admin/richmenus`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'get_one', richMenuId: id })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'โหลดไม่สำเร็จ (ตรวจสอบ ID)');
                const rm = d.richMenu || d;
                content.innerHTML =
                    '<div class="space-y-1">' +
                    '<div><span class="font-bold text-blue-700">ID:</span> <span class="font-mono text-xs">' + escapeHtml(rm.richMenuId || id) + '</span></div>' +
                    '<div><span class="font-bold text-blue-700">ชื่อ:</span> ' + escapeHtml(rm.name || '-') + '</div>' +
                    '<div><span class="font-bold text-blue-700">ขนาด:</span> ' + (rm.size ? rm.size.width + ' × ' + rm.size.height : '-') + '</div>' +
                    '<div><span class="font-bold text-blue-700">ปุ่ม:</span> ' + (rm.areas?.length || 0) + ' areas</div>' +
                    '<div class="text-emerald-700 font-bold mt-1">✅ Rich Menu ID ถูกต้อง</div>' +
                    '</div>';
            } catch(e) {
                content.innerHTML = '<span class="text-rose-600 font-bold">❌ ' + escapeHtml(e.message) + '</span>';
            }
        }

        async function applyRichMenuNow() {
            const memberId  = document.getElementById('cfg-member-richmenu')?.value?.trim();
            if (!memberId) return showToast('ใส่ Rich Menu สมาชิกก่อน', 'warning');
            showConfirmModal(
                '🔄 Apply Rich Menu ให้ทุกคน?',
                'ระบบจะเปลี่ยน Rich Menu ให้สมาชิกทุกคนที่ลงทะเบียนแล้ว<br>' +
                '<small class="text-slate-500">อาจใช้เวลาสักครู่ตาม LINE API rate limit</small>',
                async () => {
                    showToast('⏳ กำลัง apply...', 'info');
                    try {
                        // ดึง userId ทุกคนจาก userhome
                        const { data: members } = await supabaseClient
                            .from('userhome').select('uid').not('uid', 'is', null);
                        if (!members?.length) return showToast('ไม่พบสมาชิก', 'warning');

                        let ok = 0, fail = 0;
                        for (let i = 0; i < members.length; i += 50) {
                            const chunk = members.slice(i, i + 50);
                            for (const m of chunk) {
                                try {
                                    const r = await fetch(`${API_BASE_URL}/api/register/complete`, {
                                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ userId: m.uid, richMenuId: memberId, silent: true })
                                    });
                                    r.ok ? ok++ : fail++;
                                } catch(_) { fail++; }
                                await new Promise(r => setTimeout(r, 80)); // rate limit
                            }
                            showToast('⏳ ' + Math.min(i+50, members.length) + '/' + members.length + ' คน...', 'loading');
                        }
                        showToast('✅ Apply สำเร็จ ' + ok + ' คน · ล้มเหลว ' + fail + ' คน', 'success');

                        // บันทึก member_richmenu ลง settings ด้วย
                        await supabaseClient.from('system_settings').upsert(
                            { key: 'member_richmenu', value: memberId }, { onConflict: 'key' }
                        );
                    } catch(e) { showToast('❌ ' + e.message, 'error'); }
                }
            );
        }

        async function saveTier(editId) {
            const btn = document.getElementById('t-save-btn');
            const name = document.getElementById('t-name').value.trim();
            const min = parseInt(document.getElementById('t-min').value);
            const color = document.querySelector('input[name="t-color"]:checked')?.value;
            if (!name || isNaN(min)) return showToast('กรุณากรอกชื่อและคะแนนขั้นต่ำ', 'warning');
            if (!color) return showToast('กรุณาเลือกสี', 'warning');
            setBtnLoading(btn, true);

            const payload = { name, min_points: min, color_theme: color };
            const { error } = editId
                ? await supabaseClient.from('tiers').update(payload).eq('id', editId)
                : await supabaseClient.from('tiers').insert([payload]);

            setBtnLoading(btn, false);
            if (error) return showToast(error.message, 'error');
            showToast(editId ? 'อัปเดตแล้ว' : 'เพิ่ม Level สำเร็จ!', 'success');
            closeModal();
            renderCrmTiersView();
        }

        async function deleteTier(id, name) {
            showConfirmModal(`ลบ Level "${name}"?`, 'การลบไม่สามารถนำกลับได้', async () => {
                const { error } = await supabaseClient.from('tiers').delete().eq('id', id);
                if (error) return showToast(error.message, 'error');
                showToast('ลบแล้ว', 'success');
                renderCrmTiersView();
            });
        }

        // คำนวณ tier จาก points และ tiers list (client-side)
        function getTierByPoints(points) {
            const tiers = window._tiers || [];
            if (tiers.length === 0) return { name: 'Member', color_theme: 'bg-slate-400' };
            const sorted = [...tiers].sort((a, b) => b.min_points - a.min_points);
            return sorted.find(t => (points || 0) >= t.min_points) || tiers[0];
        }

                'bg-sky-500':    'bg-sky-50 text-sky-700 border-sky-200',
