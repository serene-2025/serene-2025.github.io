<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบฝากรูป Google Drive (API Version)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 500; }
        .tab-inactive { color: #6b7280; border-bottom: 3px solid transparent; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="bg-blue-600 rounded-t-2xl p-6 text-white text-center shadow-md">
            <h2 class="text-2xl font-semibold flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
                </svg>
                ระบบจัดการรูปภาพ (API)
            </h2>
        </div>

        <div class="bg-white rounded-b-2xl shadow-xl overflow-hidden min-h-[500px]">
            <!-- Navigation Tabs -->
            <div class="flex border-b border-gray-200">
                <button onclick="switchTab('upload')" id="tab-upload" class="flex-1 py-4 text-center transition-colors tab-active flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                    อัปโหลดรูปภาพ
                </button>
                <button onclick="switchTab('gallery')" id="tab-gallery" class="flex-1 py-4 text-center transition-colors tab-inactive flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    คลังรูปภาพที่อัปโหลด
                </button>
            </div>

            <div class="p-6 md:p-8">
                <!-- ==================== UPLOAD SECTION ==================== -->
                <div id="section-upload" class="max-w-xl mx-auto block">
                    <div id="uploadArea" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center transition-colors hover:border-blue-400 bg-gray-50">
                        <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                        <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="updateFileName()" />
                        <label for="fileInput" class="cursor-pointer bg-white text-blue-600 border border-blue-600 px-4 py-2 rounded-lg font-medium hover:bg-blue-50 transition block w-max mx-auto">
                            เลือกรูปภาพ
                        </label>
                        <p id="fileNameDisplay" class="mt-3 text-sm text-gray-500 truncate px-2">ยังไม่ได้เลือกไฟล์</p>
                    </div>

                    <div class="mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">ตั้งชื่อไฟล์ใหม่ (ไม่บังคับ)</label>
                        <input type="text" id="customFileName" placeholder="เช่น รูปหน้างาน_01 (ไม่ต้องใส่นามสกุลไฟล์)" class="w-full text-sm border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                    </div>

                    <button id="uploadBtn" onclick="uploadImage()" class="w-full mt-6 bg-blue-600 text-white py-3 rounded-xl font-medium hover:bg-blue-700 transition disabled:opacity-50 flex items-center justify-center gap-2">
                        <span>อัปโหลดรูปภาพ</span>
                    </button>

                    <div id="uploadStatus" class="mt-4 text-center text-sm font-medium hidden"></div>

                    <!-- Upload Result -->
                    <div id="uploadResult" class="mt-6 hidden">
                        <div class="bg-green-50 border border-green-200 rounded-xl p-4">
                            <div class="text-center mb-4 text-green-700 font-semibold flex items-center justify-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
                                อัปโหลดสำเร็จ
                            </div>
                            <div class="mb-4 flex justify-center">
                                <img id="previewImageUpload" src="" class="max-h-32 rounded-lg shadow-sm border border-gray-200 object-cover" alt="Preview">
                            </div>
                            <div class="space-y-3">
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 mb-1">URL (LH 3)</label>
                                    <div class="flex gap-2">
                                        <input type="text" id="resultLh3" class="w-full text-sm bg-white border border-gray-300 rounded px-3 py-2 outline-none" readonly>
                                        <button onclick="copyToClipboard('resultLh3')" class="bg-gray-100 hover:bg-gray-200 border border-gray-300 px-3 rounded text-gray-600">คัดลอก</button>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 mb-1">URL (LH 5)</label>
                                    <div class="flex gap-2">
                                        <input type="text" id="resultLh5" class="w-full text-sm bg-white border border-gray-300 rounded px-3 py-2 outline-none" readonly>
                                        <button onclick="copyToClipboard('resultLh5')" class="bg-gray-100 hover:bg-gray-200 border border-gray-300 px-3 rounded text-gray-600">คัดลอก</button>
                                    </div>
                                </div>
                            </div>
                            <button onclick="resetUploadForm()" class="w-full mt-4 text-sm text-blue-600 font-medium hover:underline">
                                + อัปโหลดรูปอื่น
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ==================== GALLERY SECTION ==================== -->
                <div id="section-gallery" class="hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-medium text-gray-700">รูปภาพทั้งหมดของคุณ</h3>
                        <button onclick="loadGallery()" class="text-sm bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg flex items-center gap-1 text-gray-600 border border-gray-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                            รีเฟรช
                        </button>
                    </div>

                    <div id="galleryLoader" class="flex flex-col items-center justify-center py-12 text-gray-500 hidden">
                        <svg class="animate-spin h-8 w-8 text-blue-600 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        กำลังโหลดรูปภาพ...
                    </div>

                    <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>

                    <div id="galleryEmpty" class="text-center py-16 hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        <p class="text-gray-500 font-medium text-lg">ยังไม่มีรูปภาพในระบบ</p>
                        <p class="text-gray-400 text-sm mt-1">อัปโหลดรูปภาพใหม่เพื่อดูข้อมูลที่นี่</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded shadow-lg text-sm transition-opacity duration-300 opacity-0 pointer-events-none z-50"></div>

    <script>
        // =========================================================
        // 🔴 นำลิงก์จาก Apps Script (ที่ลงท้ายด้วย /exec) มาใส่ที่นี่
        // =========================================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwy_FKgw5jop1aaaHWaAZtxGKN8H-Vy_j9I43kCO6NlQmpxVUNYfy2jSORj7fCPTVtw/exec';

        function switchTab(tabId) {
            const uploadTab = document.getElementById('tab-upload');
            const galleryTab = document.getElementById('tab-gallery');
            const uploadSec = document.getElementById('section-upload');
            const gallerySec = document.getElementById('section-gallery');

            if (tabId === 'upload') {
                uploadTab.className = "flex-1 py-4 text-center transition-colors tab-active flex justify-center items-center gap-2";
                galleryTab.className = "flex-1 py-4 text-center transition-colors tab-inactive flex justify-center items-center gap-2 hover:bg-gray-50 hover:text-gray-900";
                uploadSec.classList.remove('hidden');
                gallerySec.classList.add('hidden');
            } else {
                galleryTab.className = "flex-1 py-4 text-center transition-colors tab-active flex justify-center items-center gap-2";
                uploadTab.className = "flex-1 py-4 text-center transition-colors tab-inactive flex justify-center items-center gap-2 hover:bg-gray-50 hover:text-gray-900";
                gallerySec.classList.remove('hidden');
                uploadSec.classList.add('hidden');
                loadGallery();
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed bottom-4 left-1/2 transform -translate-x-1/2 px-4 py-2 rounded shadow-lg text-sm transition-opacity duration-300 z-50 ${isError ? 'bg-red-600 text-white' : 'bg-gray-800 text-white'}`;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => { toast.classList.add('opacity-0', 'pointer-events-none'); }, 3000);
        }

        function copyToClipboard(elementId) {
            const inputElement = document.getElementById(elementId);
            inputElement.select();
            inputElement.setSelectionRange(0, 99999);
            document.execCommand("copy");
            showToast('คัดลอกลิงก์สำเร็จแล้ว!');
        }

        function updateFileName() {
            const input = document.getElementById('fileInput');
            const display = document.getElementById('fileNameDisplay');
            if (input.files.length > 0) {
                display.textContent = input.files[0].name;
                display.classList.replace('text-gray-500', 'text-blue-600');
            } else {
                display.textContent = 'ยังไม่ได้เลือกไฟล์';
                display.classList.replace('text-blue-600', 'text-gray-500');
            }
        }

        function resetUploadForm() {
            document.getElementById('fileInput').value = '';
            document.getElementById('customFileName').value = '';
            updateFileName();
            document.getElementById('uploadResult').classList.add('hidden');
            document.getElementById('uploadStatus').classList.add('hidden');
        }

        async function fetchAppsScript(payload) {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
            return await response.json();
        }

        function uploadImage() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                showToast('กรุณาเลือกรูปภาพก่อนครับ', true);
                return;
            }

            const file = fileInput.files[0];
            const customNameInput = document.getElementById('customFileName').value.trim();
            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('uploadStatus');
            
            let finalFileName = file.name;
            if (customNameInput) {
                const extension = file.name.substring(file.name.lastIndexOf('.'));
                finalFileName = customNameInput + extension;
            }
            
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังส่งไฟล์...`;
            status.classList.remove('hidden');
            status.innerHTML = '<span class="text-blue-600">กรุณารอสักครู่ (อาจใช้เวลา 10-20 วินาที)...</span>';
            document.getElementById('uploadResult').classList.add('hidden');

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64Data = e.target.result;
                const payload = {
                    action: 'upload',
                    base64: base64Data,
                    filename: finalFileName,
                    mimeType: file.type
                };

                try {
                    const data = await fetchAppsScript(payload);
                    btn.disabled = false;
                    btn.innerHTML = 'อัปโหลดรูปภาพ';
                    
                    if(data.success) {
                        status.innerHTML = '<span class="text-green-600">อัปโหลดเสร็จสมบูรณ์!</span>';
                        document.getElementById('previewImageUpload').src = data.urls.lh3_thumb;
                        document.getElementById('resultLh3').value = data.urls.lh3;
                        document.getElementById('resultLh5').value = data.urls.lh5;
                        document.getElementById('uploadResult').classList.remove('hidden');
                    } else {
                        status.innerHTML = `<span class="text-red-600">เกิดข้อผิดพลาด: ${data.error}</span>`;
                    }
                } catch (error) {
                    btn.disabled = false;
                    btn.innerHTML = 'อัปโหลดรูปภาพ';
                    status.innerHTML = `<span class="text-red-600">เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว</span>`;
                }
            };
            reader.readAsDataURL(file);
        }

        async function loadGallery() {
            const grid = document.getElementById('galleryGrid');
            const loader = document.getElementById('galleryLoader');
            const empty = document.getElementById('galleryEmpty');
            
            grid.innerHTML = '';
            grid.classList.add('hidden');
            empty.classList.add('hidden');
            loader.classList.remove('hidden');
            loader.classList.add('flex');

            try {
                const data = await fetchAppsScript({ action: 'getGallery' });
                
                loader.classList.add('hidden');
                loader.classList.remove('flex');

                if (!data.success || data.images.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }

                grid.classList.remove('hidden');
                data.images.forEach(img => {
                    const inputId = `copy-lh3-${img.id}`;
                    // นำชื่อไฟล์ไปเก็บใน id ด้วยเพื่อใช้ดึงข้อมูลตอนกดแก้ไข
                    const card = document.createElement('div');
                    card.id = `card-${img.id}`;
                    card.className = "bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow flex flex-col";
                    card.innerHTML = `
                        <div class="h-40 bg-gray-100 flex items-center justify-center overflow-hidden relative group">
                            <img src="${img.thumb}" alt="${img.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                        </div>
                        <div class="p-4 flex-1 flex flex-col">
                            <div class="flex justify-between items-start mb-3">
                                <p id="name-${img.id}" class="text-sm font-medium text-gray-800 truncate pr-2" title="${img.name}">${img.name}</p>
                                <button onclick="renameImageCard('${img.id}', '${img.name}')" class="text-gray-400 hover:text-blue-500 transition shrink-0" title="เปลี่ยนชื่อ">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                                </button>
                            </div>
                            <div class="mt-auto">
                                <label class="block text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1">Direct Link</label>
                                <div class="flex gap-1.5 mb-3">
                                    <input type="text" id="${inputId}" value="${img.urlLh3}" class="w-full text-xs bg-gray-50 border border-gray-200 rounded px-2 py-1.5 outline-none" readonly>
                                    <button onclick="copyToClipboard('${inputId}')" class="bg-blue-50 hover:bg-blue-100 text-blue-600 border border-blue-200 px-2.5 rounded transition">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                                    </button>
                                </div>
                                <button onclick="deleteImageCard('${img.id}')" class="w-full text-xs text-red-500 hover:text-red-700 font-medium py-1.5 border border-transparent hover:border-red-200 hover:bg-red-50 rounded transition flex items-center justify-center gap-1">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    ลบรูปนี้
                                </button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                showToast('โหลดข้อมูลล้มเหลว', true);
                loader.classList.add('hidden');
                loader.classList.remove('flex');
            }
        }

        async function deleteImageCard(fileId) {
            if(!confirm("คุณต้องการลบรูปภาพนี้ใช่หรือไม่? (รูปจะถูกย้ายลงถังขยะใน Drive)")) return;
            
            const card = document.getElementById(`card-${fileId}`);
            if(card) card.style.opacity = '0.5';

            try {
                const data = await fetchAppsScript({ action: 'delete', id: fileId });

                if(data.success) {
                    if(card) card.remove();
                    showToast('ลบรูปภาพเรียบร้อยแล้ว');
                    
                    const grid = document.getElementById('galleryGrid');
                    if(grid.children.length === 0) {
                        document.getElementById('galleryEmpty').classList.remove('hidden');
                    }
                } else {
                    if(card) card.style.opacity = '1';
                    showToast('เกิดข้อผิดพลาดในการลบ: ' + data.error, true);
                }
            } catch (error) {
                if(card) card.style.opacity = '1';
                showToast('เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว', true);
            }
        }

        // 🟢 ฟังก์ชันใหม่: สำหรับเปลี่ยนชื่อไฟล์ใน Gallery
        async function renameImageCard(fileId, oldFullName) {
            // ตัดนามสกุลไฟล์ออกเพื่อให้ผู้ใช้กรอกง่ายๆ
            let extension = "";
            let oldNameOnly = oldFullName;
            const lastDotIndex = oldFullName.lastIndexOf('.');
            if (lastDotIndex !== -1) {
                extension = oldFullName.substring(lastDotIndex);
                oldNameOnly = oldFullName.substring(0, lastDotIndex);
            }

            const newNameInput = prompt("กรอกชื่อไฟล์ใหม่ (ไม่ต้องใส่นามสกุลไฟล์):", oldNameOnly);
            
            // ถ้ากดยกเลิก หรือไม่กรอกอะไร หรือชื่อเหมือนเดิม ให้ยกเลิกการทำงาน
            if (newNameInput === null || newNameInput.trim() === "" || newNameInput.trim() === oldNameOnly) {
                return;
            }

            const card = document.getElementById(`card-${fileId}`);
            if(card) card.style.opacity = '0.5';

            try {
                const data = await fetchAppsScript({ 
                    action: 'rename', 
                    id: fileId, 
                    newName: newNameInput.trim() 
                });

                if(data.success) {
                    if(card) card.style.opacity = '1';
                    // อัปเดตชื่อใหม่บนหน้าจอ
                    const nameElement = document.getElementById(`name-${fileId}`);
                    if (nameElement) {
                        nameElement.textContent = data.newName;
                        nameElement.title = data.newName;
                        
                        // อัปเดตฟังก์ชันในปุ่มให้รับชื่อใหม่ไปด้วย
                        const editBtn = nameElement.nextElementSibling;
                        editBtn.setAttribute('onclick', `renameImageCard('${fileId}', '${data.newName}')`);
                    }
                    showToast('เปลี่ยนชื่อไฟล์สำเร็จ');
                } else {
                    if(card) card.style.opacity = '1';
                    showToast('เกิดข้อผิดพลาด: ' + data.error, true);
                }
            } catch (error) {
                if(card) card.style.opacity = '1';
                showToast('เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว', true);
            }
        }
    </script>
</body>
</html>
