<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Image Hub (Pro)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- นำเข้า SweetAlert2 สำหรับหน้าต่างแจ้งเตือนสวยๆ -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
        }
        .tab-active { 
            color: #4f46e5; 
            border-bottom: 3px solid #4f46e5; 
            background: linear-gradient(to top, rgba(79, 70, 229, 0.05) 0%, transparent 100%);
        }
        .tab-inactive { color: #6b7280; border-bottom: 3px solid transparent; }
        .gradient-text {
            background: linear-gradient(to right, #4f46e5, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-semibold gradient-text inline-flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
                Drive Image Hub
            </h1>
            <p class="text-gray-500 mt-2">จัดการและฝากรูปภาพบน Google Drive พร้อม Direct URL</p>
        </div>

        <div class="glass-card rounded-3xl overflow-hidden min-h-[500px]">
            <!-- Navigation Tabs -->
            <div class="flex border-b border-gray-200/60">
                <button onclick="switchTab('upload')" id="tab-upload" class="flex-1 py-5 text-center font-medium transition-all tab-active flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                    อัปโหลดรูปภาพ
                </button>
                <button onclick="switchTab('gallery')" id="tab-gallery" class="flex-1 py-5 text-center font-medium transition-all tab-inactive flex justify-center items-center gap-2 hover:bg-gray-50/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    คลังรูปภาพ
                </button>
            </div>

            <div class="p-6 md:p-10 relative">
                <!-- ==================== UPLOAD SECTION ==================== -->
                <div id="section-upload" class="max-w-2xl mx-auto block">
                    
                    <!-- โฟลเดอร์ปลายทาง -->
                    <div class="mb-6 flex flex-col sm:flex-row gap-3 items-end">
                        <div class="flex-1 w-full">
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">📂 โฟลเดอร์ปลายทาง</label>
                            <select id="uploadFolderSelect" class="w-full text-sm border border-gray-300 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition bg-white">
                                <option value="">กำลังโหลดโฟลเดอร์...</option>
                            </select>
                        </div>
                        <button onclick="promptCreateFolder()" class="w-full sm:w-auto bg-indigo-50 text-indigo-600 border border-indigo-200 px-5 py-3 rounded-xl hover:bg-indigo-100 font-medium transition flex items-center justify-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                            สร้างโฟลเดอร์
                        </button>
                    </div>

                    <div id="uploadArea" class="border-2 border-dashed border-indigo-200 rounded-2xl p-10 text-center transition-all hover:border-indigo-500 hover:bg-indigo-50/30 bg-gray-50/50 group">
                        <div class="bg-white w-20 h-20 rounded-full flex items-center justify-center mx-auto shadow-sm mb-4 group-hover:scale-110 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                        </div>
                        <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="updateFileName()" />
                        <label for="fileInput" class="cursor-pointer bg-white text-indigo-600 border shadow-sm px-6 py-2.5 rounded-full font-medium hover:bg-indigo-50 transition inline-block mx-auto">
                            คลิกเลือกรูปภาพ
                        </label>
                        <p id="fileNameDisplay" class="mt-4 text-sm text-gray-500 truncate px-2">ลากไฟล์มาวาง หรือคลิกเพื่อเลือกไฟล์</p>
                    </div>

                    <div class="mt-6">
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">ตั้งชื่อไฟล์ใหม่ (ไม่บังคับ)</label>
                        <input type="text" id="customFileName" placeholder="ตัวอย่าง: picture_01 (ไม่ต้องใส่นามสกุล)" class="w-full text-sm border border-gray-300 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition bg-white">
                    </div>

                    <button id="uploadBtn" onclick="uploadImage()" class="w-full mt-8 bg-gradient-to-r from-indigo-500 to-blue-600 text-white py-4 rounded-xl font-medium hover:from-indigo-600 hover:to-blue-700 transition shadow-lg shadow-indigo-200 flex items-center justify-center gap-2">
                        <span>🚀 เริ่มอัปโหลดรูปภาพ</span>
                    </button>

                    <!-- Upload Result Box -->
                    <div id="uploadResult" class="mt-8 hidden animate-[fadeIn_0.5s_ease-out]">
                        <div class="bg-green-50 border border-green-200 rounded-2xl p-6 relative overflow-hidden">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-green-100 rounded-full blur-3xl -mr-10 -mt-10"></div>
                            
                            <div class="text-center mb-5 text-green-700 font-semibold flex items-center justify-center gap-2 relative z-10">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
                                อัปโหลดสำเร็จเรียบร้อย!
                            </div>
                            
                            <div class="flex flex-col md:flex-row gap-6 relative z-10">
                                <div class="w-full md:w-1/3 flex justify-center items-center">
                                    <img id="previewImageUpload" src="" class="max-h-40 rounded-xl shadow-md border border-gray-200 object-cover" alt="Preview">
                                </div>
                                <div class="w-full md:w-2/3 space-y-4">
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">Direct URL (LH 3)</label>
                                        <div class="flex gap-2">
                                            <input type="text" id="resultLh3" class="w-full text-sm bg-white border border-gray-300 rounded-lg px-3 py-2 outline-none text-gray-600" readonly>
                                            <button onclick="copyToClipboard('resultLh3')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 border border-indigo-200 px-4 rounded-lg font-medium transition shrink-0">คัดลอก</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wider">Direct URL (LH 5)</label>
                                        <div class="flex gap-2">
                                            <input type="text" id="resultLh5" class="w-full text-sm bg-white border border-gray-300 rounded-lg px-3 py-2 outline-none text-gray-600" readonly>
                                            <button onclick="copyToClipboard('resultLh5')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 border border-indigo-200 px-4 rounded-lg font-medium transition shrink-0">คัดลอก</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <button onclick="resetUploadForm()" class="w-full mt-6 text-sm text-indigo-600 font-medium hover:underline flex justify-center items-center gap-1 relative z-10">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                                อัปโหลดรูปภาพอื่น
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ==================== GALLERY SECTION ==================== -->
                <div id="section-gallery" class="hidden">
                    <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                        <div class="w-full sm:w-auto flex items-center gap-3">
                            <label class="text-gray-600 font-medium whitespace-nowrap">เลือกโฟลเดอร์:</label>
                            <select id="galleryFolderSelect" onchange="loadGallery()" class="w-full sm:w-64 text-sm border border-gray-300 rounded-xl px-4 py-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 bg-white shadow-sm">
                                <option value="">กำลังโหลดโฟลเดอร์...</option>
                            </select>
                        </div>
                        
                        <button onclick="loadGallery()" class="w-full sm:w-auto text-sm bg-white hover:bg-gray-50 px-4 py-2.5 rounded-xl flex items-center justify-center gap-2 text-gray-700 border border-gray-300 shadow-sm transition hover:shadow">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                            รีเฟรชข้อมูล
                        </button>
                    </div>

                    <div id="galleryLoader" class="flex flex-col items-center justify-center py-20 text-indigo-500 hidden">
                        <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-200 border-t-indigo-600 mb-4"></div>
                        <span class="font-medium">กำลังโหลดรูปภาพ...</span>
                    </div>

                    <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

                    <div id="galleryEmpty" class="text-center py-20 hidden">
                        <div class="bg-gray-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        </div>
                        <p class="text-gray-600 font-medium text-lg">ยังไม่มีรูปภาพในโฟลเดอร์นี้</p>
                        <p class="text-gray-400 text-sm mt-1">สลับไปหน้าอัปโหลดเพื่อเพิ่มรูปภาพเลย</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- โค้ดส่วน Logic ควบคุม -->
    <script>
        // =========================================================
        // 🔴 นำลิงก์จาก Apps Script (ที่ลงท้ายด้วย /exec) มาใส่ที่นี่
        // =========================================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwy_FKgw5jop1aaaHWaAZtxGKN8H-Vy_j9I43kCO6NlQmpxVUNYfy2jSORj7fCPTVtw/exec';

        // โหลดข้อมูลตั้งต้นเมื่อเปิดเว็บ
        document.addEventListener('DOMContentLoaded', () => {
            loadFolders();
        });

        // ================= UI & UTILS =================
        function switchTab(tabId) {
            const uploadTab = document.getElementById('tab-upload');
            const galleryTab = document.getElementById('tab-gallery');
            const uploadSec = document.getElementById('section-upload');
            const gallerySec = document.getElementById('section-gallery');

            if (tabId === 'upload') {
                uploadTab.className = "flex-1 py-5 text-center font-medium transition-all tab-active flex justify-center items-center gap-2";
                galleryTab.className = "flex-1 py-5 text-center font-medium transition-all tab-inactive flex justify-center items-center gap-2 hover:bg-gray-50/50";
                uploadSec.classList.remove('hidden');
                gallerySec.classList.add('hidden');
            } else {
                galleryTab.className = "flex-1 py-5 text-center font-medium transition-all tab-active flex justify-center items-center gap-2";
                uploadTab.className = "flex-1 py-5 text-center font-medium transition-all tab-inactive flex justify-center items-center gap-2 hover:bg-gray-50/50";
                gallerySec.classList.remove('hidden');
                uploadSec.classList.add('hidden');
                loadGallery();
            }
        }

        function copyToClipboard(elementId) {
            const inputElement = document.getElementById(elementId);
            inputElement.select();
            document.execCommand("copy");
            
            Swal.fire({
                toast: true,
                position: 'bottom',
                icon: 'success',
                title: 'คัดลอกลิงก์สำเร็จ!',
                showConfirmButton: false,
                timer: 2000,
                customClass: { popup: 'rounded-xl' }
            });
        }

        function updateFileName() {
            const input = document.getElementById('fileInput');
            const display = document.getElementById('fileNameDisplay');
            if (input.files.length > 0) {
                display.innerHTML = `<span class="text-indigo-600 font-medium">${input.files[0].name}</span>`;
            } else {
                display.textContent = 'ลากไฟล์มาวาง หรือคลิกเพื่อเลือกไฟล์';
            }
        }

        function resetUploadForm() {
            document.getElementById('fileInput').value = '';
            document.getElementById('customFileName').value = '';
            updateFileName();
            document.getElementById('uploadResult').classList.add('hidden');
        }

        async function fetchAppsScript(payload) {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
            return await response.json();
        }

        // ================= FOLDER LOGIC =================
        async function loadFolders() {
            try {
                const data = await fetchAppsScript({ action: 'getFolders' });
                if(data.success) {
                    renderFolderSelects(data.folders);
                }
            } catch (error) {
                console.error("Failed to load folders");
            }
        }

        function renderFolderSelects(folders) {
            const uploadSelect = document.getElementById('uploadFolderSelect');
            const gallerySelect = document.getElementById('galleryFolderSelect');
            
            let html = '';
            folders.forEach(f => {
                html += `<option value="${f.id}">${f.name}</option>`;
            });
            
            uploadSelect.innerHTML = html;
            
            // เก็บค่าโฟลเดอร์เก่าไว้ก่อนรีเฟรชถ้ามี
            const currentGalVal = gallerySelect.value; 
            gallerySelect.innerHTML = html;
            if(currentGalVal) gallerySelect.value = currentGalVal;
        }

        async function promptCreateFolder() {
            const { value: folderName } = await Swal.fire({
                title: 'สร้างโฟลเดอร์ใหม่',
                input: 'text',
                inputPlaceholder: 'กรอกชื่อโฟลเดอร์...',
                showCancelButton: true,
                confirmButtonText: 'สร้าง',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#4f46e5',
                cancelButtonColor: '#6b7280',
                inputValidator: (value) => {
                    if (!value) return 'กรุณากรอกชื่อโฟลเดอร์'
                }
            });

            if (folderName) {
                Swal.fire({ title: 'กำลังสร้าง...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    const data = await fetchAppsScript({ action: 'createFolder', folderName: folderName });
                    if(data.success) {
                        await loadFolders(); // รีเฟรชรายการ
                        document.getElementById('uploadFolderSelect').value = data.id; // เลือกโฟลเดอร์ใหม่ให้อัตโนมัติ
                        Swal.fire({ icon: 'success', title: 'สร้างโฟลเดอร์สำเร็จ', text: data.name, timer: 1500, showConfirmButton: false });
                    } else {
                        Swal.fire('ข้อผิดพลาด', data.error, 'error');
                    }
                } catch (error) {
                    Swal.fire('ข้อผิดพลาด', 'เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว', 'error');
                }
            }
        }

        // ================= UPLOAD LOGIC =================
        async function uploadImage() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                Swal.fire({ icon: 'warning', title: 'ยังไม่ได้เลือกไฟล์', text: 'กรุณาเลือกรูปภาพก่อนครับ', confirmButtonColor: '#4f46e5' });
                return;
            }

            const file = fileInput.files[0];
            const customNameInput = document.getElementById('customFileName').value.trim();
            const targetFolderId = document.getElementById('uploadFolderSelect').value;
            
            let finalFileName = file.name;
            if (customNameInput) {
                const extension = file.name.substring(file.name.lastIndexOf('.'));
                finalFileName = customNameInput + extension;
            }
            
            document.getElementById('uploadResult').classList.add('hidden');

            Swal.fire({
                title: 'กำลังอัปโหลด...',
                text: 'โปรดรอสักครู่ ห้ามปิดหน้านี้',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64Data = e.target.result;
                const payload = {
                    action: 'upload',
                    base64: base64Data,
                    filename: finalFileName,
                    mimeType: file.type,
                    targetFolderId: targetFolderId // ส่ง ID โฟลเดอร์ที่เลือกไปด้วย
                };

                try {
                    const data = await fetchAppsScript(payload);
                    if(data.success) {
                        Swal.close();
                        document.getElementById('previewImageUpload').src = data.urls.lh3_thumb;
                        document.getElementById('resultLh3').value = data.urls.lh3;
                        document.getElementById('resultLh5').value = data.urls.lh5;
                        document.getElementById('uploadResult').classList.remove('hidden');
                    } else {
                        Swal.fire('อัปโหลดไม่สำเร็จ', data.error, 'error');
                    }
                } catch (error) {
                    Swal.fire('อัปโหลดไม่สำเร็จ', 'เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว', 'error');
                }
            };
            reader.readAsDataURL(file);
        }

        // ================= GALLERY LOGIC =================
        async function loadGallery() {
            const grid = document.getElementById('galleryGrid');
            const loader = document.getElementById('galleryLoader');
            const empty = document.getElementById('galleryEmpty');
            const targetFolderId = document.getElementById('galleryFolderSelect').value;
            
            grid.innerHTML = '';
            grid.classList.add('hidden');
            empty.classList.add('hidden');
            loader.classList.remove('hidden');
            loader.classList.add('flex');

            try {
                const data = await fetchAppsScript({ action: 'getGallery', targetFolderId: targetFolderId });
                
                loader.classList.add('hidden');
                loader.classList.remove('flex');

                if (!data.success || data.images.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }

                grid.classList.remove('hidden');
                data.images.forEach(img => {
                    const inputId = `copy-lh3-${img.id}`;
                    const card = document.createElement('div');
                    card.id = `card-${img.id}`;
                    card.className = "bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm hover-lift flex flex-col";
                    card.innerHTML = `
                        <div class="h-48 bg-gray-100 flex items-center justify-center overflow-hidden relative group">
                            <img src="${img.thumb}" alt="${img.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3">
                                <a href="${img.urlLh3}=s0" target="_blank" class="bg-white/90 text-gray-800 p-2 rounded-full hover:bg-white hover:text-indigo-600 transition" title="ดูภาพขนาดเต็ม">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                                </a>
                            </div>
                        </div>
                        <div class="p-5 flex-1 flex flex-col">
                            <div class="flex justify-between items-start mb-4">
                                <p id="name-${img.id}" class="text-sm font-semibold text-gray-800 truncate pr-2" title="${img.name}">${img.name}</p>
                                <button onclick="renameImageCard('${img.id}', '${img.name}')" class="text-gray-400 hover:text-indigo-600 bg-gray-50 hover:bg-indigo-50 p-1.5 rounded-lg transition shrink-0" title="เปลี่ยนชื่อ">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                                </button>
                            </div>
                            <div class="mt-auto space-y-3">
                                <div class="flex gap-2">
                                    <input type="text" id="${inputId}" value="${img.urlLh3}" class="w-full text-xs bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 outline-none text-gray-500" readonly>
                                    <button onclick="copyToClipboard('${inputId}')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-3 rounded-lg font-medium transition text-xs">คัดลอก</button>
                                </div>
                                <button onclick="deleteImageCard('${img.id}')" class="w-full text-xs text-red-500 hover:text-white font-medium py-2.5 border border-red-200 hover:bg-red-500 hover:border-red-500 rounded-lg transition flex items-center justify-center gap-1.5">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    ย้ายลงถังขยะ
                                </button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                Swal.fire('ข้อผิดพลาด', 'โหลดข้อมูลล้มเหลว', 'error');
                loader.classList.add('hidden');
            }
        }

        async function deleteImageCard(fileId) {
            const confirm = await Swal.fire({
                title: 'ยืนยันการลบ?',
                text: "ไฟล์จะถูกย้ายลงถังขยะใน Google Drive",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'ใช่, ลบเลย',
                cancelButtonText: 'ยกเลิก'
            });

            if(!confirm.isConfirmed) return;
            
            const card = document.getElementById(`card-${fileId}`);
            if(card) card.style.opacity = '0.5';

            try {
                const data = await fetchAppsScript({ action: 'delete', id: fileId });
                if(data.success) {
                    if(card) card.remove();
                    Swal.fire({ toast: true, position: 'bottom', icon: 'success', title: 'ลบรูปภาพเรียบร้อย', showConfirmButton: false, timer: 2000 });
                    
                    if(document.getElementById('galleryGrid').children.length === 0) {
                        document.getElementById('galleryEmpty').classList.remove('hidden');
                    }
                } else {
                    if(card) card.style.opacity = '1';
                    Swal.fire('ข้อผิดพลาด', data.error, 'error');
                }
            } catch (error) {
                if(card) card.style.opacity = '1';
                Swal.fire('ข้อผิดพลาด', 'เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว', 'error');
            }
        }

        async function renameImageCard(fileId, oldFullName) {
            let extension = "";
            let oldNameOnly = oldFullName;
            const lastDotIndex = oldFullName.lastIndexOf('.');
            if (lastDotIndex !== -1) {
                extension = oldFullName.substring(lastDotIndex);
                oldNameOnly = oldFullName.substring(0, lastDotIndex);
            }

            const { value: newNameInput } = await Swal.fire({
                title: 'เปลี่ยนชื่อไฟล์',
                input: 'text',
                inputValue: oldNameOnly,
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#4f46e5'
            });
            
            if (!newNameInput || newNameInput.trim() === "" || newNameInput.trim() === oldNameOnly) return;

            const card = document.getElementById(`card-${fileId}`);
            if(card) card.style.opacity = '0.5';

            try {
                const data = await fetchAppsScript({ action: 'rename', id: fileId, newName: newNameInput.trim() });
                if(data.success) {
                    if(card) card.style.opacity = '1';
                    const nameElement = document.getElementById(`name-${fileId}`);
                    if (nameElement) {
                        nameElement.textContent = data.newName;
                        nameElement.title = data.newName;
                        nameElement.nextElementSibling.setAttribute('onclick', `renameImageCard('${fileId}', '${data.newName}')`);
                    }
                    Swal.fire({ toast: true, position: 'bottom', icon: 'success', title: 'เปลี่ยนชื่อสำเร็จ', showConfirmButton: false, timer: 2000 });
                } else {
                    if(card) card.style.opacity = '1';
                    Swal.fire('ข้อผิดพลาด', data.error, 'error');
                }
            } catch (error) {
                if(card) card.style.opacity = '1';
                Swal.fire('ข้อผิดพลาด', 'เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว', 'error');
            }
        }
    </script>
</body>
</html>
