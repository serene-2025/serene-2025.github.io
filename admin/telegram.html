<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram ID Finder & Saver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        telegram: '#2AABEE',
                        telegramDark: '#229ED9'
                    }
                }
            }
        }
    </script>
    <style>
        input[type="text"] { font-size: 16px; }
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; background-color: #f4f7fe; }
        
        .info-input {
            width: 100%;
            background-color: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 0.75rem;
            padding: 0.75rem 2.5rem 0.75rem 1rem;
            color: #475569;
            font-weight: 500;
            outline: none;
            transition: all 0.2s;
        }
        .info-input:focus { border-color: #cbd5e1; }
        .copy-btn {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            background: none;
            border: none;
            padding: 0.25rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .copy-btn:hover { color: #64748b; }
        .info-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col items-center pb-10">

    <!-- ส่วนหัว -->
    <div class="w-full max-w-md bg-telegram text-white p-6 rounded-b-3xl shadow-md z-10 relative">
        <div class="flex items-center justify-center gap-3 mb-2">
            <i class="fab fa-telegram text-4xl"></i>
            <h1 class="text-2xl font-bold tracking-wide">ID Finder Pro</h1>
        </div>
        <p class="text-center text-blue-100 text-sm">ค้นหาและบันทึกข้อมูล Telegram ID แบบละเอียด</p>
    </div>

    <!-- ส่วนเนื้อหาหลัก -->
    <div class="w-full max-w-md p-4 flex-1 flex flex-col gap-4 -mt-4 pt-8">
        
        <!-- กล่องค้นหา -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
            <label class="block text-sm font-bold text-gray-700 mb-2">Bot Token</label>
            <div class="relative">
                <input type="text" id="botToken" 
                    class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 pl-10 focus:outline-none focus:border-telegram focus:ring-1 focus:ring-telegram transition-all"
                    placeholder="วาง Bot Token ตรงนี้...">
                <i class="fas fa-key absolute left-4 top-3.5 text-gray-400"></i>
            </div>
            
            <button onclick="fetchTelegramData()" id="searchBtn"
                class="w-full mt-4 bg-telegram hover:bg-telegramDark text-white font-bold py-3.5 rounded-xl shadow-md transition-all active:scale-95 flex items-center justify-center gap-2">
                <i class="fas fa-search"></i> ตรวจสอบข้อมูล
            </button>

            <div id="errorAlert" class="hidden mt-4 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <i class="fas fa-exclamation-triangle text-yellow-400"></i>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-yellow-700 font-medium" id="errorText">เกิดข้อผิดพลาด</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- กล่องแสดงผลลัพธ์ -->
        <div id="resultContainer" class="hidden flex-col gap-4 animate-bounce-short">
            
            <!-- 1. ข้อมูลบอท -->
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-800 flex items-center gap-2 mb-4">
                    <i class="fas fa-robot text-blue-500"></i> ข้อมูลบอท
                </h3>
                <div class="space-y-3">
                    <div>
                        <label class="info-label">BOT NAME</label>
                        <div class="relative">
                            <input type="text" id="r_botName" class="info-input" readonly value="-">
                            <button onclick="copyInput('r_botName')" class="copy-btn"><i class="far fa-copy"></i></button>
                        </div>
                    </div>
                    <div>
                        <label class="info-label">USERNAME</label>
                        <div class="relative">
                            <input type="text" id="r_botUser" class="info-input" readonly value="-">
                            <button onclick="copyInput('r_botUser')" class="copy-btn"><i class="far fa-copy"></i></button>
                        </div>
                    </div>
                    <div>
                        <label class="info-label">BOT ID</label>
                        <div class="relative">
                            <input type="text" id="r_botId" class="info-input" readonly value="-">
                            <button onclick="copyInput('r_botId')" class="copy-btn"><i class="far fa-copy"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. ข้อมูลผู้ใช้ล่าสุด (Private) -->
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-800 flex items-center gap-2 mb-4">
                    <i class="fas fa-user text-purple-500"></i> ข้อมูลผู้ใช้ล่าสุด
                </h3>
                <div class="space-y-3">
                    <div>
                        <label class="info-label">CHAT ID (PRIVATE)</label>
                        <div class="relative">
                            <input type="text" id="r_userId" class="info-input" readonly value="-">
                            <button onclick="copyInput('r_userId')" class="copy-btn"><i class="far fa-copy"></i></button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="info-label">FIRST NAME</label>
                            <div class="relative">
                                <input type="text" id="r_userFirstName" class="info-input" readonly value="-">
                                <button onclick="copyInput('r_userFirstName')" class="copy-btn"><i class="far fa-copy"></i></button>
                            </div>
                        </div>
                        <div>
                            <label class="info-label">LAST NAME</label>
                            <div class="relative">
                                <input type="text" id="r_userLastName" class="info-input" readonly value="-">
                                <button onclick="copyInput('r_userLastName')" class="copy-btn"><i class="far fa-copy"></i></button>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="info-label">USERNAME</label>
                        <div class="relative">
                            <input type="text" id="r_userUsername" class="info-input" readonly value="-">
                            <button onclick="copyInput('r_userUsername')" class="copy-btn"><i class="far fa-copy"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3. ข้อมูลกลุ่มล่าสุด (Group/Channel) -->
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-800 flex items-center justify-between mb-4">
                    <span class="flex items-center gap-2"><i class="fas fa-users text-green-500"></i> ข้อมูลกลุ่มล่าสุด</span>
                    <span class="text-[10px] text-gray-400 font-normal bg-gray-50 border border-gray-100 px-2 py-1 rounded-md" title="หากไม่พบข้อมูล ให้แท็กบอทหรือพิมพ์ /start ในกลุ่ม">ต้องพิมพ์ /start ในกลุ่ม</span>
                </h3>
                <div class="space-y-3">
                    <div>
                        <label class="info-label">GROUP ID</label>
                        <div class="relative">
                            <input type="text" id="r_groupId" class="info-input" readonly value="-">
                            <button onclick="copyInput('r_groupId')" class="copy-btn"><i class="far fa-copy"></i></button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="info-label">GROUP NAME</label>
                            <div class="relative">
                                <input type="text" id="r_groupTitle" class="info-input" readonly value="-">
                                <button onclick="copyInput('r_groupTitle')" class="copy-btn"><i class="far fa-copy"></i></button>
                            </div>
                        </div>
                        <div>
                            <label class="info-label">TYPE</label>
                            <div class="relative">
                                <input type="text" id="r_groupType" class="info-input" readonly value="-">
                                <button onclick="copyInput('r_groupType')" class="copy-btn"><i class="far fa-copy"></i></button>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="info-label">USERNAME</label>
                        <div class="relative">
                            <input type="text" id="r_groupUser" class="info-input" readonly value="-">
                            <button onclick="copyInput('r_groupUser')" class="copy-btn"><i class="far fa-copy"></i></button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- ประวัติการค้นหา -->
        <div class="w-full mt-4">
            <div class="flex justify-between items-center px-2 mb-2">
                <h3 class="font-bold text-gray-700 flex items-center gap-2">
                    <i class="fas fa-history text-gray-400"></i> ประวัติที่เคยค้นหา
                </h3>
                <button onclick="clearAllHistory()" class="text-xs text-red-500 font-medium bg-red-50 px-2 py-1 rounded-md hover:bg-red-100 transition-colors">ล้างทั้งหมด</button>
            </div>
            
            <div id="historyList" class="space-y-3 text-sm">
                <!-- ประวัติจะถูกโหลดมาใส่ที่นี่ -->
            </div>
        </div>

    </div>

    <!-- Toast แจ้งเตือนคัดลอก -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl text-sm transition-opacity duration-300 opacity-0 pointer-events-none z-50 flex items-center gap-2">
        <i class="fas fa-check text-green-400"></i> <span id="toastText">คัดลอกแล้ว!</span>
    </div>

    <!-- ส่วนของ JavaScript -->
    <script>
        const HISTORY_KEY = 'tg_id_history_v4';

        window.onload = () => {
            renderHistory();
            const history = getHistory();
            if (history.length > 0) {
                document.getElementById('botToken').value = history[0].token;
            }
        };

        async function fetchTelegramData() {
            const tokenInput = document.getElementById('botToken');
            const token = tokenInput.value.trim();
            const searchBtn = document.getElementById('searchBtn');
            const resultContainer = document.getElementById('resultContainer');
            const errorAlert = document.getElementById('errorAlert');

            if (!token) {
                showError('กรุณาวาง Bot Token ก่อนครับ');
                return;
            }

            // Reset UI
            searchBtn.disabled = true;
            searchBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังตรวจสอบ...';
            resultContainer.classList.add('hidden');
            errorAlert.classList.add('hidden');
            clearChatCards(); // ล้างข้อมูลเก่าออกก่อน

            try {
                // 1. ดึงข้อมูล Bot (getMe)
                const botRes = await fetch(`https://api.telegram.org/bot${token}/getMe`);
                const botData = await botRes.json();

                if (!botData.ok) {
                    showError('Token ไม่ถูกต้อง หรือ Bot นี้ถูกลบไปแล้ว');
                    resetBtn(searchBtn);
                    return;
                }

                // นำข้อมูล Bot ลง UI และเก็บค่าไว้บันทึก
                const botName = botData.result.first_name || '-';
                const botUser = botData.result.username ? '@' + botData.result.username : '-';
                const botId = botData.result.id || '-';

                document.getElementById('r_botName').value = botName;
                document.getElementById('r_botUser').value = botUser;
                document.getElementById('r_botId').value = botId;

                // 2. ดึงข้อมูลแชททั้งหมด (getUpdates)
                const updateRes = await fetch(`https://api.telegram.org/bot${token}/getUpdates`);
                const updateData = await updateRes.json();

                if (updateData.ok) {
                    let latestUser = null;
                    let latestGroup = null;

                    // วนลูปหาข้อมูลล่าสุดแยกตามประเภท
                    if (updateData.result.length > 0) {
                        for (const update of updateData.result) {
                            let chatObj = null;
                            if (update.message) chatObj = update.message.chat;
                            else if (update.my_chat_member) chatObj = update.my_chat_member.chat;
                            else if (update.channel_post) chatObj = update.channel_post.chat;
                            else if (update.edited_message) chatObj = update.edited_message.chat;
                            else if (update.callback_query) chatObj = update.callback_query.message.chat;
                            else if (update.chat_member) chatObj = update.chat_member.chat;
                            
                            if (chatObj) {
                                if (chatObj.type === 'private') {
                                    latestUser = chatObj;
                                } else if (['group', 'supergroup', 'channel'].includes(chatObj.type)) {
                                    latestGroup = chatObj;
                                }
                            }
                        }

                        const botInfo = { name: botName, user: botUser, id: botId };
                        let foundAny = false;

                        if (latestUser) {
                            populateUserCard(latestUser);
                            saveToHistory(token, botInfo, latestUser);
                            foundAny = true;
                        }
                        if (latestGroup) {
                            populateGroupCard(latestGroup);
                            saveToHistory(token, botInfo, latestGroup);
                            foundAny = true;
                        }

                        if (foundAny) {
                            resultContainer.classList.remove('hidden');
                            resultContainer.classList.add('flex');
                        } else {
                            showError('พบการเชื่อมต่อ แต่ดึงข้อมูลผู้ใช้/กลุ่มไม่ได้ ลองพิมพ์ทักบอทอีกครั้งครับ');
                            resultContainer.classList.remove('hidden');
                            resultContainer.classList.add('flex');
                        }
                    } else {
                        showError('ไม่พบข้อมูลแชท: กรุณาทักแชทบอท หรือดึงบอทเข้ากลุ่ม แล้วกดค้นหาใหม่ครับ');
                        resultContainer.classList.remove('hidden');
                        resultContainer.classList.add('flex');
                    }
                } else {
                    if (updateData.error_code === 409) {
                        showError('⚠️ ไม่สามารถดึงข้อมูลได้เนื่องจาก Bot ติด Webhook อยู่! (ต้องกดลบ Webhook ก่อน)');
                    } else {
                        showError('ข้อผิดพลาด: ' + updateData.description);
                    }
                }

            } catch (e) {
                showError('ไม่สามารถเชื่อมต่อ API ได้ กรุณาตรวจสอบอินเทอร์เน็ต');
                console.error(e);
            } finally {
                resetBtn(searchBtn);
            }
        }

        // ล้างค่าข้อมูลแชทเป็นขีด (-)
        function clearChatCards() {
            const fields = [
                'r_userId', 'r_userFirstName', 'r_userLastName', 'r_userUsername',
                'r_groupId', 'r_groupTitle', 'r_groupType', 'r_groupUser'
            ];
            fields.forEach(id => document.getElementById(id).value = '-');
        }

        function populateUserCard(chat) {
            document.getElementById('r_userId').value = chat.id || '-';
            document.getElementById('r_userFirstName').value = chat.first_name || '-';
            document.getElementById('r_userLastName').value = chat.last_name || '-';
            document.getElementById('r_userUsername').value = chat.username ? '@' + chat.username : '-';
        }

        function populateGroupCard(chat) {
            document.getElementById('r_groupId').value = chat.id || '-';
            document.getElementById('r_groupTitle').value = chat.title || chat.first_name || '-';
            document.getElementById('r_groupType').value = (chat.type || '-').toUpperCase();
            document.getElementById('r_groupUser').value = chat.username ? '@' + chat.username : '-';
        }

        function resetBtn(btn) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-search"></i> ตรวจสอบข้อมูล';
        }

        function showError(msg) {
            const errorAlert = document.getElementById('errorAlert');
            document.getElementById('errorText').textContent = msg;
            errorAlert.classList.remove('hidden');
        }

        // --- ระบบ Copy และ History ---
        function copyInput(inputId) {
            const inputEl = document.getElementById(inputId);
            if (inputEl.value && inputEl.value !== '-') {
                inputEl.select();
                document.execCommand("copy");
                showToast('คัดลอก: ' + inputEl.value);
                window.getSelection().removeAllRanges();
            }
        }

        function copyText(text) {
            const temp = document.createElement("input");
            document.body.appendChild(temp);
            temp.value = text;
            temp.select();
            document.execCommand("copy");
            document.body.removeChild(temp);
            showToast('คัดลอก ID แล้ว');
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').textContent = text;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function getHistory() {
            const data = localStorage.getItem(HISTORY_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveToHistory(token, botInfo, chat) {
            let history = getHistory();
            const chatName = chat.title || chat.first_name || chat.username || "Unknown";
            
            const newItem = {
                id: Date.now() + Math.floor(Math.random() * 1000), // ป้องกัน ID ซ้ำถ้าบันทึกพร้อมกัน
                token: token, 
                bot: botInfo,
                chat: {
                    id: chat.id || '-',
                    type: chat.type || 'unknown',
                    firstName: chatName,
                    lastName: chat.last_name || '-',
                    username: chat.username ? '@' + chat.username : '-'
                },
                time: new Date().toLocaleString('th-TH')
            };

            // กรองอันเก่าที่ซ้ำออก
            history = history.filter(item => !(item.chat.id === chat.id && item.token === token));
            history.unshift(newItem);
            
            if (history.length > 30) history.pop();
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderHistory();
        }

        function deleteHistoryItem(id) {
            let history = getHistory();
            history = history.filter(item => item.id !== id);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderHistory();
        }

        function clearAllHistory() {
            if(confirm('ต้องการล้างประวัติทั้งหมดใช่หรือไม่?')) {
                localStorage.removeItem(HISTORY_KEY);
                renderHistory();
            }
        }

        function renderHistory() {
            const history = getHistory();
            const listContainer = document.getElementById('historyList');
            
            if (history.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-8 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-300"><i class="fas fa-folder-open text-2xl mb-2"></i><p>ยังไม่มีข้อมูลบันทึก</p></div>`;
                return;
            }

            listContainer.innerHTML = history.map(item => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col gap-2 group cursor-pointer hover:border-telegram transition-colors" onclick="useHistory(${item.id})">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <p class="font-bold text-gray-800">${item.chat.firstName}</p>
                                <span class="text-[10px] px-2 py-0.5 rounded-full ${item.chat.type === 'private' ? 'bg-purple-100 text-purple-700' : 'bg-green-100 text-green-700'} uppercase">${item.chat.type}</span>
                            </div>
                            <p class="text-sm text-telegram font-mono mt-0.5">ID: ${item.chat.id}</p>
                            <p class="text-xs text-gray-400 mt-1"><i class="fas fa-robot text-blue-400"></i> บอท: ${item.bot.name}</p>
                        </div>
                        <div class="flex gap-2" onclick="event.stopPropagation()">
                            <button onclick="copyText('${item.chat.id}')" class="w-8 h-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center hover:bg-blue-100" title="คัดลอก Chat ID">
                                <i class="far fa-copy text-xs"></i>
                            </button>
                            <button onclick="deleteHistoryItem(${item.id})" class="w-8 h-8 rounded-full bg-red-50 text-red-400 flex items-center justify-center hover:bg-red-100" title="ลบประวัติ">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function useHistory(id) {
            const history = getHistory();
            const item = history.find(i => i.id === id);
            if (!item) return;

            // นำ Token กลับไปใส่
            document.getElementById('botToken').value = item.token;
            
            // เคลียร์ฟอร์มแชทเก่า
            clearChatCards();

            // ใส่ข้อมูลบอท
            document.getElementById('r_botName').value = item.bot.name;
            document.getElementById('r_botUser').value = item.bot.user;
            document.getElementById('r_botId').value = item.bot.id;

            // ใส่ข้อมูลแชทตามประเภท
            if (item.chat.type === 'private') {
                document.getElementById('r_userId').value = item.chat.id;
                document.getElementById('r_userFirstName').value = item.chat.firstName;
                document.getElementById('r_userLastName').value = item.chat.lastName;
                document.getElementById('r_userUsername').value = item.chat.username;
            } else {
                document.getElementById('r_groupId').value = item.chat.id;
                document.getElementById('r_groupTitle').value = item.chat.firstName;
                document.getElementById('r_groupType').value = item.chat.type.toUpperCase();
                document.getElementById('r_groupUser').value = item.chat.username;
            }

            document.getElementById('resultContainer').classList.remove('hidden');
            document.getElementById('resultContainer').classList.add('flex');
            document.getElementById('errorAlert').classList.add('hidden');

            window.scrollTo({ top: 0, behavior: 'smooth' });
            showToast('โหลดข้อมูลจากประวัติแล้ว');
        }
    </script>
</body>
</html>
